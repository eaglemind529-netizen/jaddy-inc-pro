    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const WHATSAPP_NUMBER = "584120000000"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Notificación flotante (Arreglado para que desaparezca)
        const showToast = (text) => {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500); // Se oculta tras 2.5 segundos
        };

        window.handleImgError = (img) => {
            img.onerror = null; 
            img.src = "https://via.placeholder.com/400?text=Imagen+No+Disponible";
        };

        const formatDropbox = (url) => {
            if (!url) return "https://via.placeholder.com/400?text=Aiko+Repuestos";
            return url.trim().replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        };

        window.sendOrder = (productName) => {
            const message = `¡Hola! Me interesa información sobre: *${productName}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        };

        window.shareCatalog = async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'PRODUCTOS LS',
                        text: 'Consulta nuestro catálogo actualizado.',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Compartir cancelado');
                }
            } else {
                // Fallback: Copiar al portapapeles
                const el = document.createElement('textarea');
                el.value = window.location.href;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Copiado al portapapeles");
            }
        };

        document.getElementById('mainWsBtn').onclick = () => {
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('¡Hola! Quiero hacer una consulta sobre los productos.')}`, '_blank');
        };

        onSnapshot(query(collection(db, "perfumes"), orderBy("createdAt", "desc")), (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            if (snap.empty) {
                grid.innerHTML = `<div class="col-span-2 text-center py-20 text-gray-400 font-bold">No hay productos disponibles.</div>`;
                return;
            }

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const img = formatDropbox(p.img);
                
                grid.innerHTML += `
                    <div class="product-card p-3">
                        <div class="aspect-square rounded-2xl bg-gray-50 mb-3 flex items-center justify-center overflow-hidden img-container">
                            <img src="${img}" onerror="handleImgError(this)" class="max-h-full w-full object-contain">
                        </div>
                        <div class="px-1 flex flex-col flex-grow">
                            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-tight mb-1 line-clamp-2">${p.name}</h4>
                            <div class="flex items-center justify-between mt-auto pt-2">
                                <div class="flex flex-col">
                                    <span class="price-main text-lg">$${parseFloat(p.price).toFixed(2)}</span>
                                </div>
                                <button onclick="sendOrder('${p.name}')" class="w-9 h-9 bg-gray-900 rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        });
    </script>
