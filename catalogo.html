<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LS | Catálogo Inmersivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #000;
            overflow-x: hidden;
        }

        /* Grid Principal */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background-color: #f3f4f6;
        }

        .product-card {
            background: white;
            padding: 15px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            margin-bottom: 8px;
        }

        /* Pantalla Completa */
        #productModal {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #productModal.active {
            display: flex;
            transform: translateY(0);
        }

        /* Selector de Tipo (Dama/Caballero) dentro del Modal */
        .modal-filter-bar {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
            overflow-x: auto;
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #999;
            background: #f9f9f9;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .filter-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Contenido del Modal */
        .modal-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .variant-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #fff;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            margin-bottom: 12px;
        }

        .variant-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #fcfcfc;
            border-radius: 12px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1010;
            background: #f0f0f0;
            border-radius: 50%;
            padding: 8px;
        }

        .hidden { display: none; }
    </style>
</head>
<body class="pb-20">

    <!-- Header Principal -->
    <header class="p-6 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold text-xs italic">LS</div>
            <h1 class="font-black text-xs uppercase tracking-tighter italic">Luxury Selection</h1>
        </div>
        <i data-lucide="search" class="w-6 h-6"></i>
    </header>

    <!-- Grid de Catálogo -->
    <div id="catalogGrid" class="product-grid">
        <!-- Generado por JS -->
    </div>

    <!-- PANTALLA COMPLETA (MODAL) -->
    <div id="productModal">
        <button onclick="closeModal()" class="close-btn">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>

        <!-- Info Principal del Producto -->
        <div class="pt-16 px-6 pb-4">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase leading-none mb-1">Cargando...</h2>
            <p id="modalMainPrice" class="text-lg font-bold text-gray-400">Selecciona una variante</p>
        </div>

        <!-- FILTRO DE VARIANTES SUPERIOR -->
        <div class="modal-filter-bar">
            <button onclick="filterModalVariants('todos')" id="m-btn-todos" class="filter-btn active">Todos</button>
            <button onclick="filterModalVariants('dama')" id="m-btn-dama" class="filter-btn">Dama</button>
            <button onclick="filterModalVariants('caballero')" id="m-btn-caballero" class="filter-btn">Caballero</button>
            <button onclick="filterModalVariants('unisex')" id="m-btn-unisex" class="filter-btn">Unisex</button>
        </div>

        <!-- Lista de Variantes -->
        <div class="modal-scroll">
            <div id="variantsContainer">
                <!-- Variantes filtradas aquí -->
            </div>
        </div>

        <!-- Footer Acción -->
        <div class="p-6 border-t border-gray-100">
            <button onclick="contactWhatsApp()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest flex justify-center items-center gap-2 shadow-xl">
                Consultar Disponibilidad
                <i data-lucide="message-circle" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let selectedProduct = null;
        let currentModalFilter = 'todos';

        const cleanUrl = (url) => {
            if (!url) return "https://via.placeholder.com/400?text=LS";
            return url.trim().replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        };

        // Cargar Datos
        onSnapshot(query(collection(db, "perfumes"), orderBy("name", "asc")), (snap) => {
            products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal('${p.id}')">
                    <img src="${cleanUrl(p.img)}">
                    <h3 class="text-[10px] font-black uppercase italic tracking-tighter mb-1 truncate">${p.name}</h3>
                    <p class="text-xs font-bold text-pink-600">$${p.priceNew}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.openModal = (id) => {
            selectedProduct = products.find(p => p.id === id);
            if (!selectedProduct) return;

            document.getElementById('modalTitle').innerText = selectedProduct.name;
            document.getElementById('modalMainPrice').innerText = `Desde $${selectedProduct.priceNew}`;
            
            const modal = document.getElementById('productModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            
            filterModalVariants('todos'); // Resetear filtro al abrir
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            const modal = document.getElementById('productModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 400);
        };

        window.filterModalVariants = (category) => {
            currentModalFilter = category;
            
            // UI de botones
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`m-btn-${category}`).classList.add('active');

            renderVariants();
        };

        function renderVariants() {
            const container = document.getElementById('variantsContainer');
            let variants = selectedProduct.variants || [];

            // Filtrar las variantes del producto seleccionado
            if (currentModalFilter !== 'todos') {
                variants = variants.filter(v => v.gender?.toLowerCase() === currentModalFilter);
            }

            if (variants.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center opacity-30">
                        <i data-lucide="package-search" class="w-12 h-12 mx-auto mb-2"></i>
                        <p class="text-xs font-black uppercase">Sin resultados en ${currentModalFilter}</p>
                    </div>
                `;
            } else {
                container.innerHTML = variants.map(v => `
                    <div class="variant-card">
                        <img src="${cleanUrl(v.img || selectedProduct.img)}">
                        <div class="flex-1">
                            <h4 class="font-black italic uppercase text-xs leading-tight">${v.title}</h4>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${v.size || 'Unidad'}</p>
                            <p class="text-lg font-black mt-1">$${v.priceNew}</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-black">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        window.contactWhatsApp = () => {
            const msg = `¡Hola! 👋 Me gustaría consultar la disponibilidad de *${selectedProduct.name}*.`;
            window.open(`https://wa.me/584120000000?text=${encodeURIComponent(msg)}`, '_blank');
        };

    </script>
</body>
</html>
