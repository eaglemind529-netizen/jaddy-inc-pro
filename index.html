background-color: var(--negro-puro);

.grid-menu {
display: grid;

gap: 20px;
width: 100%;
max-width: 320px;
}
.box-item {
background: #0F0F0F;
border: 1px solid #1a1a1a;
aspect-ratio: 1 / 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
border-radius: 32px;
transition: all 0.2s ease;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
text-decoration: none;
}
.box-item:active { transform: scale(0.92); border-color: var(--oro); }
.icon-circle {
width: 54px; height: 54px; border-radius: 20px;
display: flex; align-items: center; justify-content: center;

}
.gold-box {
background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%);
}
.fade-in { animation: fadeIn 0.5s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

</a>
</div>

<!-- LÓGICA DE CONEXIÓN REAL -->
<script type="module">
    import { conectarCerebro, onAuthStateChanged, auth } from './conexion.js';
    
    // Elementos visuales
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');

    // Intentar conectar apenas carga el menú
    conectarCerebro();

    // Escuchar si la conexión se activa de verdad
    onAuthStateChanged(auth, (user) => {
        if (user) {
            dot.classList.replace('bg-red-500', 'bg-green-500');
            txt.innerText = "SISTEMA ACTIVO";
            txt.classList.replace('text-gray-500', 'text-green-500');
        } else {
            dot.classList.replace('bg-green-500', 'bg-red-500');
            txt.innerText = "SISTEMA INACTIVO";
        }
    });
</script>
</body>
