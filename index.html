    <script>
        // --- LOGICA DE NAVEGACION ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const targetContent = document.getElementById('tab-' + tabId);
            const targetBtn = document.getElementById('btn-' + tabId);
            if (targetContent && targetBtn) {
                targetContent.classList.add('active');
                targetBtn.classList.add('active');
            }
        }

        function toggleChat() {
            // Lógica de apertura de chat omitida para brevedad, se mantiene funcionalidad original
            console.log("Chat activado");
        }

        // --- SISTEMA MASTER OFFLINE (PWA) ---
        
        // 1. Detección Inteligente de Conexión
        function actualizarEstadoConexion() {
            const punto = document.getElementById('punto-estado');
            const texto = document.getElementById('texto-estado');
            const banner = document.getElementById('offline-indicator');

            if (navigator.onLine) {
                punto.classList.replace('bg-orange-500', 'bg-green-600');
                punto.classList.add('animate-pulse');
                texto.innerText = "SISTEMA ACTIVO";
                banner.style.display = "none";
            } else {
                punto.classList.replace('bg-green-600', 'bg-orange-500');
                punto.classList.remove('animate-pulse');
                texto.innerText = "MODO LOCAL (OFFLINE)";
                banner.style.display = "block";
            }
        }

        window.addEventListener('online', actualizarEstadoConexion);
        window.addEventListener('offline', actualizarEstadoConexion);
        actualizarEstadoConexion();

        // 2. Registro de Service Worker Dinámico
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'luxury-v1';
                const OFFLINE_URLS = ['./', './index.html', './deudores.html', './ventas.html', './clientes.html'];

                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(OFFLINE_URLS)));
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then(res => res || fetch(e.request).catch(() => caches.match('./index.html')))
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl)
                .then(() => console.log('Soporte Offline Activado.'))
                .catch(err => console.log('Error PWA:', err));
        }
    </script>
