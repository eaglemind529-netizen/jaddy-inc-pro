            max-width: 400px;
        }

        .box-item {
            background: #0F0F0F;

            align-items: center;

            transition: all 0.2s ease;

        }

        .icon-circle {

        }

            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        </div>
    </header>

    <!-- Contenido Principal -->
    <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-6 pb-28 overflow-y-auto">
        
        <div id="default-view" class="fade-in w-full flex flex-col items-center">
            
            <div class="text-center mb-10">
                <h2 class="text-white text-xs font-bold tracking-[0.3em] uppercase opacity-40 mb-2">Módulos de Gestión</h2>
                <div class="w-10 h-[1px] bg-gold-box mx-auto opacity-30"></div>

            <div class="grid-menu">

                <button onclick="App.abrir('productos')" class="box-item">

    </nav>

    <!-- Lógica del Cerebro -->
    <script>
        window.App = {
            modulos: {},
            registrar: function(config) {
                const loadingMsg = document.getElementById('loading-msg');
                if (loadingMsg) loadingMsg.remove();

                this.modulos[config.id] = config;

                const navBar = document.getElementById('bottom-bar');
                const btn = document.createElement('button');
                btn.id = `nav-${config.id}`;
                btn.className = "nav-item";
                btn.innerHTML = `<span class="text-2xl">${config.icono}</span><span class="text-[9px] font-bold uppercase mt-1">${config.nombre}</span>`;

                btn.onclick = () => this.abrir(config.id);
                navBar.appendChild(btn);
            },
            abrir: function(id) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const navBtn = document.getElementById(`nav-${id}`);
                if(navBtn) navBtn.classList.add('active');

                const main = document.getElementById('main-content');
                const modulo = this.modulos[id];

                main.innerHTML = `
                    <div class="fade-in w-full h-full p-2 max-w-md mx-auto">
                        <div class="flex justify-between items-center mb-6 border-b border-gray-900 pb-4">
                            <h2 class="text-[#D4AF37] text-xl font-black uppercase tracking-tighter">${modulo.nombre}</h2>
                            <button onclick="window.location.reload()" class="bg-gray-900 text-[9px] text-gray-400 font-black px-4 py-2 rounded-full uppercase">Cerrar</button>
                        </div>
                        <div id="render-${id}"></div>
                    </div>
                `;
                modulo.dibujar(`render-${id}`);
            }
        };

        // Autocarga de módulos para prueba de interfaz
        window.onload = () => {
            App.registrar({
                id: 'productos',
                nombre: 'Productos',
                icono: '📦',
                dibujar: (c) => document.getElementById(c).innerHTML = '<p class="text-gray-500 text-xs">Cargando catálogo...</p>'
            });
            App.registrar({
                id: 'inventario',
                nombre: 'Inventario',
                icono: '📊',
                dibujar: (c) => document.getElementById(c).innerHTML = '<p class="text-gray-500 text-xs">Verificando Stock...</p>'
            });
            App.registrar({
                id: 'caja',
                nombre: 'Caja',
                icono: '💰',
                dibujar: (c) => document.getElementById(c).innerHTML = '<p class="text-gray-500 text-xs">Cierre de caja en proceso...</p>'
            });
        };
    </script>
