        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Pantalla de Ingreso Integrada -->
    <div id="login-overlay">
        <div class="w-full max-w-sm bg-[#0F0F0F] p-8 rounded-[2rem] border border-white/5 shadow-2xl">

            <input type="email" id="email" placeholder="Correo" class="w-full bg-black border border-white/5 rounded-2xl p-4 mb-4 text-white text-xs outline-none focus:border-[#D4AF37]">

            <button onclick="login()" class="w-full gold-box py-4 rounded-2xl text-black font-black uppercase tracking-widest text-[10px] italic">Ingresar Sistema</button>

    <!-- Tu Contenido original -->
    <div id="app-content" class="hidden">
        <header class="sticky top-0 h-16 border-b border-gray-900 bg-black flex items-center justify-between px-6 z-50">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 gold-box rounded flex items-center justify-center text-black text-[10px] font-bold">JI</div>

            <button onclick="cerrarSesion()" class="text-white/50"><i class="fas fa-power-off text-xs"></i></button>

        <main class="flex-1 px-6 pt-8">
            <!-- Contenido comercial, stock, etc -->
            <div id="tab-comercial" class="tab-content active">
                <h2 class="text-[9px] font-black uppercase opacity-40 mb-2 italic">Gestión Comercial</h2>
                <div class="grid grid-cols-2 gap-4">
                    <a href="ventas.html" class="p-6 bg-[#0F0F0F] rounded-3xl border border-white/5 text-center"><i class="fas fa-shopping-cart text-oro mb-2"></i><br><span class="text-[10px] uppercase">Ventas</span></a>

                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (e) { document.getElementById('error-msg').innerText = "Acceso restringido"; }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Validación estricta con el Gestor
                onSnapshot(doc(db, "usuarios", user.email), (doc) => {
                    if (doc.exists() && doc.data().status === 'activo') {
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('app-content').classList.remove('hidden');
                    } else {
                        signOut(auth);
                    }
                });
            }
        });

        window.cerrarSesion = () => signOut(auth).then(() => location.reload());
    </script>
