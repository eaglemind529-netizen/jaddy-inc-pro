```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury System - Gold Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --negro-puro: #050505;
            --tarjeta: #0F0F0F;
        }

        body {
            background-color: var(--negro-puro);
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .texto-dorado {
            background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            @apply flex flex-col items-center justify-center flex-1 transition-all duration-300;
            color: #444;
        }

        .nav-item.active {
            color: var(--oro);
        }

        /* Animación */
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Encabezado -->
    <header class="h-16 border-b border-gray-900 bg-black flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 bg-gradient-to-b from-[#D4AF37] to-[#AA8419] rounded flex items-center justify-center text-black text-[10px] font-bold">LX</div>
            <h1 class="texto-dorado uppercase tracking-widest text-sm font-black">Luxury System</h1>
        </div>
        <span class="text-[9px] text-gray-600 font-bold tracking-tighter">SISTEMA ACTIVO</span>
    </header>

    <!-- Contenido -->
    <main id="main-content" class="flex-1 overflow-y-auto px-4 py-6 pb-28">
        <div id="default-view" class="h-full flex flex-col items-center justify-center text-center fade-in">
            <span class="text-5xl mb-4">👑</span>
            <h2 class="text-xl font-light tracking-widest text-white uppercase">Bienvenido</h2>
            <p class="text-gray-600 text-xs mt-2">Seleccione un módulo en el menú inferior.</p>
        </div>
    </main>

    <!-- Menú Inferior -->
    <nav id="bottom-bar" class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-gray-900 flex items-center justify-around z-50 shadow-2xl">
        <div id="loading-msg" class="text-[9px] text-gray-700 tracking-widest uppercase animate-pulse">Cargando...</div>
    </nav>

    <!-- Lógica del Cerebro -->
    <script>
        window.App = {
            modulos: {},
            registrar: function(config) {
                const loadingMsg = document.getElementById('loading-msg');
                if (loadingMsg) loadingMsg.remove();

                this.modulos[config.id] = config;

                const navBar = document.getElementById('bottom-bar');
                const btn = document.createElement('button');
                btn.id = `nav-${config.id}`;
                btn.className = "nav-item";
                btn.innerHTML = `<span class="text-2xl">${config.icono}</span><span class="text-[9px] font-bold uppercase mt-1">${config.nombre}</span>`;

                btn.onclick = () => this.abrir(config.id);
                navBar.appendChild(btn);
            },
            abrir: function(id) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`nav-${id}`).classList.add('active');

                const main = document.getElementById('main-content');
                const modulo = this.modulos[id];

                main.innerHTML = `
                    <div class="fade-in">
                        <h2 class="text-[#D4AF37] text-2xl font-bold uppercase mb-4">${modulo.nombre}</h2>
                        <div id="render-${id}"></div>
                    </div>
                `;
                modulo.dibujar(`render-${id}`);
            }
        };
    </script>

    <!-- Scripts externos -->
    <script type="module" src="database.js"></script>
    <script src="inventario.js"></script>

</body>
</html>

```
