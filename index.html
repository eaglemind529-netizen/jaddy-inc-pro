```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury System - Jaddy INC</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --oro: #D4AF37;
            --negro-puro: #050505;
        }

        body {
            background-color: var(--negro-puro);
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .texto-dorado {
            background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            @apply flex flex-col items-center justify-center flex-1 transition-all duration-300;
            color: #444;
        }

        .nav-item.active {
            color: var(--oro);
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 320px; 
        }

        .box-item {
            background: #0F0F0F;
            border: 1px solid #1a1a1a;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .box-item:active { transform: scale(0.92); border-color: var(--oro); }

        .icon-circle {
            width: 54px; height: 54px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; font-size: 22px;
        }

        .gold-box {
            background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%);
        }

        .product-card {
            background: #0F0F0F; border: 1px solid #1a1a1a;
            border-radius: 24px; padding: 14px; margin-bottom: 12px;
        }

        .input-luxury {
            background: #0A0A0A; border: 1px solid #1a1a1a;
            @apply w-full rounded-2xl py-4 px-5 text-white text-[11px] font-bold tracking-widest mb-3 outline-none focus:border-[#D4AF37] transition-all;
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Encabezado -->
    <header class="h-16 border-b border-gray-900 bg-black flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 gold-box rounded flex items-center justify-center text-black text-[10px] font-bold">JI</div>
            <h1 class="texto-dorado uppercase tracking-widest text-sm font-black">Jaddy INC</h1>
        </div>
        <div class="flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
            <span id="status-text" class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">Sincronizando</span>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4 pb-28 overflow-y-auto">
        <div id="default-view" class="fade-in w-full flex flex-col items-center">
            <div class="text-center mb-10">
                <h2 class="text-white text-[10px] font-black tracking-[0.4em] uppercase opacity-40 mb-4 italic">Módulos de Élite</h2>
                <div class="w-12 h-[2px] gold-box mx-auto rounded-full"></div>
            </div>
            <div class="grid-menu">
                <button onclick="App.abrir('productos')" class="box-item">
                    <div class="icon-circle gold-box text-black shadow-lg shadow-yellow-900/30"><i class="fas fa-box"></i></div>
                    <span class="texto-dorado font-black text-[11px] tracking-tighter uppercase">Productos</span>
                </button>
                <button onclick="App.abrir('inventario')" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-list-ul opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] tracking-tighter uppercase">Inventario</span>
                </button>
                <div class="box-item opacity-10 border-dashed"><i class="fas fa-plus text-gray-500"></i></div>
                <div class="box-item opacity-10 border-dashed"><i class="fas fa-plus text-gray-500"></i></div>
            </div>
        </div>
    </main>

    <!-- Menú Inferior -->
    <nav id="bottom-bar" class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-gray-900 flex items-center justify-around z-50 shadow-2xl px-2">
    </nav>

    <script>
        window.App = {
            modulos: {},
            dbReady: false,
            registrar: function(config) {
                this.modulos[config.id] = config;
                const navBar = document.getElementById('bottom-bar');
                const btn = document.createElement('button');
                btn.id = `nav-${config.id}`;
                btn.className = "nav-item";
                btn.innerHTML = `<span class="text-xl">${config.icono}</span><span class="text-[8px] font-bold uppercase mt-1 tracking-tighter">${config.nombre}</span>`;
                btn.onclick = () => this.abrir(config.id);
                navBar.appendChild(btn);
                
                // Actualizar UI de conexión si es necesario
                document.getElementById('status-dot').className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
                document.getElementById('status-text').innerText = "Conectado";
                this.dbReady = true;
            },
            abrir: function(id) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const navBtn = document.getElementById(`nav-${id}`);
                if(navBtn) navBtn.classList.add('active');

                const main = document.getElementById('main-content');
                const modulo = this.modulos[id];

                main.classList.remove('justify-center');
                main.classList.add('justify-start', 'pt-4');

                main.innerHTML = `
                    <div class="fade-in w-full max-w-md mx-auto h-full flex flex-col">
                        <div class="flex justify-between items-center mb-6 px-2">
                            <h2 class="text-[#D4AF37] text-xl font-black uppercase tracking-tighter">${modulo.nombre}</h2>
                            <button onclick="window.location.reload()" class="bg-gray-900/50 text-[9px] text-gray-500 font-bold px-5 py-2 rounded-full uppercase border border-gray-800">Cerrar</button>
                        </div>
                        <div id="render-${id}" class="flex-1 overflow-y-auto px-2"></div>
                    </div>
                `;
                modulo.dibujar(`render-${id}`);
            },
            mostrarFormulario: function() {
                const container = document.getElementById('render-productos');
                container.innerHTML = `
                    <div class="fade-in bg-[#0F0F0F] border border-gray-900 rounded-[32px] p-6 mb-20 shadow-2xl">
                        <h3 class="texto-dorado text-xs font-black uppercase tracking-[0.3em] mb-6 text-center italic">Registro de Producto</h3>
                        <input type="text" id="p-nombre" placeholder="NOMBRE DEL PRODUCTO" class="input-luxury">
                        <input type="text" id="p-ref" placeholder="REFERENCIA / MODELO" class="input-luxury">
                        <input type="number" id="p-precio" placeholder="PRECIO DE VENTA" class="input-luxury">
                        <input type="number" id="p-stock" placeholder="CANTIDAD INICIAL" class="input-luxury">
                        
                        <div class="flex gap-3 mt-4">
                            <button onclick="App.abrir('productos')" class="flex-1 py-4 bg-gray-900 text-gray-500 font-black text-[9px] uppercase rounded-2xl">Cancelar</button>
                            <button onclick="App.guardarProducto()" class="flex-[2] py-4 gold-box text-black font-black text-[9px] uppercase rounded-2xl shadow-lg">Guardar en Base de Datos</button>
                        </div>
                    </div>
                `;
            },
            guardarProducto: function() {
                const data = {
                    nombre: document.getElementById('p-nombre').value,
                    ref: document.getElementById('p-ref').value,
                    precio: document.getElementById('p-precio').value,
                    stock: document.getElementById('p-stock').value
                };
                
                if(!data.nombre || !data.precio) return alert("Complete los campos obligatorios");
                
                // Aquí llamamos a la función que debería estar en tu conexion.js
                if(window.db_save_product) {
                    window.db_save_product(data);
                } else {
                    console.log("Simulación de guardado:", data);
                    this.abrir('productos');
                }
            }
        };

        const moduloProductos = {
            id: 'productos',
            nombre: 'Productos',
            icono: '📦',
            dibujar: function(id) {
                document.getElementById(id).innerHTML = `
                    <div class="mb-6 flex gap-2">
                        <input type="text" placeholder="BUSCAR..." class="flex-1 bg-[#0F0F0F] border border-gray-900 rounded-2xl py-3 px-4 text-[9px] font-bold text-gray-500 tracking-widest outline-none">
                        <button onclick="App.mostrarFormulario()" class="w-12 h-12 gold-box rounded-2xl text-black shadow-lg shadow-yellow-900/20"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="product-card flex items-center gap-4 opacity-60">
                        <div class="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-gray-700"><i class="fas fa-box"></i></div>
                        <div class="flex-1">
                            <h4 class="text-gray-400 text-[10px] font-black uppercase">Sin productos registrados</h4>
                            <p class="text-gray-700 text-[7px] font-bold uppercase tracking-widest">Pulse el botón + para empezar</p>
                        </div>
                    </div>
                `;
            }
        };

        window.onload = () => {
            App.registrar(moduloProductos);
            App.registrar({ id: 'inventario', nombre: 'Inventario', icono: '📊', dibujar: (id) => {} });
        };
    </script>

    <script type="module" src="conexion.js"></script>
    <script src="inventario.js"></script>
</body>
</html>
