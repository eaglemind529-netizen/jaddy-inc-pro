<html lang="es" class="notranslate" translate="no">

    <title>Jaddy Inc Pro</title>

<body class="notranslate">

    <div id="app" class="flex flex-col h-screen overflow-hidden">
        <!-- Header fijo para que siempre se vea algo -->
        <header class="h-16 border-b border-[#111] bg-black flex items-center justify-between px-6 shrink-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-tr from-[#AA8419] to-[#F1D37E] rounded flex items-center justify-center text-black font-black text-[10px]">LX</div>
                <h1 class="oro-texto uppercase tracking-[0.2em] text-xs">Jaddy Inc. Pro</h1>
            </div>
            <div id="status-dot" class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>

        <!-- Contenido que cambia -->
        <main id="contenido" class="flex-1 overflow-y-auto p-5 pb-24 bg-black animar">
            <div class="h-full flex flex-col items-center justify-center text-center space-y-4">

                <h2 class="text-xl font-light tracking-[0.4em] uppercase">Elite Panel</h2>
                <p class="text-gray-600 text-[9px] uppercase tracking-widest mt-2">Cargando base de datos...</p>
            </div>
        </main>

        <!-- Menú Inferior -->
        <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-[#111] flex items-center justify-around z-50">
            <button onclick="irA('inicio')" id="btn-inicio" class="flex flex-col items-center justify-center flex-1 nav-activo transition-all">
                <span class="text-xl mb-1">🏠</span>
                <span class="text-[8px] font-black uppercase tracking-widest">Inicio</span>
            </button>
            <button onclick="irA('stock')" id="btn-stock" class="flex flex-col items-center justify-center flex-1 text-gray-700 transition-all">

                <span class="text-[8px] font-black uppercase tracking-widest">Stock</span>
            </button>
        </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let productos = [];

        // Función para cambiar de vista manualmente
        window.irA = (seccion) => {
            const cont = document.getElementById('contenido');
            const bInicio = document.getElementById('btn-inicio');
            const bStock = document.getElementById('btn-stock');
            
            // Estetica de botones
            if(seccion === 'inicio') {
                bInicio.classList.add('nav-activo');
                bStock.classList.remove('nav-activo');
                bStock.classList.add('text-gray-700');
                
                cont.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center space-y-4 animar">
                        <div class="w-20 h-20 rounded-full border border-[#111] bg-[#050505] flex items-center justify-center text-5xl">👑</div>
                        <h2 class="text-xl font-light tracking-[0.4em] uppercase text-white">Elite Panel</h2>
                        <p class="text-gray-600 text-[9px] uppercase tracking-[0.3em] mt-3">Acceso Autorizado</p>
                    </div>`;
            } else {
                bStock.classList.add('nav-activo');
                bStock.classList.remove('text-gray-700');
                bInicio.classList.remove('nav-activo');
                bInicio.classList.add('text-gray-700');
                dibujarStock();
            }
        };

        function dibujarStock() {
            const cont = document.getElementById('contenido');
            let html = `
                <div class="mb-8 animar">
                    <p class="text-[#D4AF37] text-[9px] font-bold tracking-[0.4em] uppercase mb-1">Módulo</p>
                    <h2 class="text-white text-3xl font-black uppercase tracking-tight">Inventario</h2>
                </div>
                <div class="grid gap-3 animar">`;
            
            if (productos.length === 0) {
                html += `<div class="py-20 text-center text-gray-800 text-[8px] uppercase tracking-widest">Sincronizando con la nube...</div>`;
            } else {
                productos.forEach(p => {
                    html += `
                        <div class="tarjeta-lujo p-5 rounded-xl flex justify-between items-center">
                            <div>
                                <p class="text-white font-bold uppercase text-[11px]">${p.nombre || 'Producto'}</p>
                                <p class="text-gray-500 text-[9px] uppercase">Stock: ${p.cantidad || 0}</p>
                            </div>
                            <div class="text-[#D4AF37] font-black text-xl tracking-tighter">$${p.precio || 0}</div>
                        </div>`;
                });
            }
            html += `</div>`;
            cont.innerHTML = html;
        }

        // Escuchar Firebase
        onSnapshot(collection(db, "inventario"), (snap) => {
            productos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('status-dot').classList.replace('bg-red-600', 'bg-[#D4AF37]');
            // Si estamos en la pestaña stock, refrescar
            if(document.getElementById('btn-stock').classList.contains('nav-activo')) {
                dibujarStock();
            }
        });

    </script>
</body>
</html>
