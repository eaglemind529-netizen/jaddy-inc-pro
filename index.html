
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Luxury System - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --oro: #D4AF37; --negro-puro: #050505; }
        body { 
            background-color: var(--negro-puro); 
            color: #E0E0E0; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
        }
        
        #safety-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 340px; margin: 0 auto; }
        .box-item { background: #0F0F0F; border: 1px solid #1a1a1a; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 32px; transition: all 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-decoration: none; outline: none; }
        .box-item:active { transform: scale(0.95); border-color: var(--oro); }
        .icon-circle { width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 20px; }
        .gold-box { background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%); }
        
        .tab-btn { flex: 1; padding: 15px 5px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #444; transition: all 0.3s; border-bottom: 2px solid transparent; cursor: pointer; background: transparent; border: none; }
        .tab-btn.active { color: var(--oro); border-bottom: 2px solid var(--oro); background: linear-gradient(to top, rgba(212, 175, 55, 0.05), transparent); }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .content-spacer { padding-bottom: 100px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="safety-overlay">
        <div class="w-10 h-10 border-2 border-oro/20 border-t-oro rounded-full animate-spin"></div>
    </div>

    <header class="sticky top-0 h-16 border-b border-gray-900 bg-black flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 gold-box rounded flex items-center justify-center text-black text-[10px] font-bold">JI</div>
            <h1 class="texto-dorado uppercase tracking-widest text-sm font-black">JADDY INC</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></div>
            <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">SISTEMA ONLINE</span>
        </div>
    </header>

    <nav class="sticky top-16 bg-black border-b border-gray-900 z-40 flex w-full">
        <button onclick="switchTab('comercial')" id="btn-comercial" class="tab-btn active">Comercial</button>
        <button onclick="switchTab('stock')" id="btn-stock" class="tab-btn">Almacén</button>
        <button onclick="switchTab('analisis')" id="btn-analisis" class="tab-btn">Equipo</button>
    </nav>

    <main id="swipe-area" class="flex-1 px-6 pt-8 content-spacer">
        
        <div id="tab-comercial" class="tab-content active">
            <div class="text-center mb-8">
                <h2 class="text-white text-[9px] font-black tracking-[0.4em] uppercase opacity-40 mb-2 italic">Gestión Comercial</h2>
                <div class="w-8 h-[1px] bg-oro/30 mx-auto"></div>
            </div>
            <div class="grid-menu">
                <a href="ventas.html" class="box-item">
                    <div class="icon-circle gold-box text-black"><i class="fas fa-shopping-cart"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Ventas</span>
                </a>
                <a href="deudores.html" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-hand-holding-dollar opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Cartera</span>
                </a>
                <a href="egresos.html" class="box-item">
                    <div class="icon-circle bg-oro/10 text-oro"><i class="fas fa-file-invoice-dollar"></i></div>
                    <span class="texto-dorado font-black text-[11px] uppercase">Finanzas</span>
                </a>
                <a href="clientes.html" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-address-card opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Clientes</span>
                </a>
            </div>
        </div>

        <div id="tab-stock" class="tab-content">
            <div class="text-center mb-8">
                <h2 class="text-white text-[9px] font-black tracking-[0.4em] uppercase opacity-40 mb-2 italic">Control de Almacén</h2>
                <div class="w-8 h-[1px] bg-oro/30 mx-auto"></div>
            </div>
            <div class="grid-menu">
                <a href="inventario.html" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-list-ul opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Inventario</span>
                </a>
                <a href="productos.html" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-box opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Productos</span>
                </a>
            </div>
        </div>

        <div id="tab-analisis" class="tab-content">
            <div class="text-center mb-8">
                <h2 class="text-white text-[9px] font-black tracking-[0.4em] uppercase opacity-40 mb-2 italic">Equipo y Datos</h2>
                <div class="w-8 h-[1px] bg-oro/30 mx-auto"></div>
            </div>
            <div class="grid-menu">
                <a href="vendedores.html" class="box-item">
                    <div class="icon-circle bg-white/5 border border-white/10 text-white"><i class="fas fa-users opacity-70"></i></div>
                    <span class="text-white font-black text-[11px] uppercase">Vendedores</span>
                </a>
                <a href="reportes.html" class="box-item">
                    <div class="icon-circle border border-oro/20 text-oro"><i class="fas fa-chart-line"></i></div>
                    <span class="texto-dorado font-black text-[11px] uppercase">Reportes</span>
                </a>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-14 bg-black/90 backdrop-blur-xl border-t border-gray-900 flex items-center justify-between px-8 z-50">
        <div class="text-[7px] text-oro tracking-[0.4em] uppercase opacity-30 font-black">Luxury System Master v1.5</div>
    </nav>

    <script>
        document.getElementById('safety-overlay').style.display = 'none';

        const tabs = ['comercial', 'stock', 'analisis'];
        let currentIdx = 0;

        window.switchTab = function(tabId) {
            currentIdx = tabs.indexOf(tabId);
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        };

        let touchstartX = 0;
        const swipeArea = document.getElementById('swipe-area');
        swipeArea.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
        swipeArea.addEventListener('touchend', e => {
            const diff = touchstartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 70) {
                if (diff > 0 && currentIdx < 2) switchTab(tabs[currentIdx + 1]);
                else if (diff < 0 && currentIdx > 0) switchTab(tabs[currentIdx - 1]);
            }
        }, {passive: true});
    </script>
</body>
</html>
