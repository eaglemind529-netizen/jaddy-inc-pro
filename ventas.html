```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas Luxury | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        /* Seguridad: El body empieza oculto */
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: none; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 13px; font-weight: bold; text-transform: uppercase; outline: none; }
        .input-field:focus { border-color: var(--gold); }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; background: transparent; transition: 0.3s; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        #loading-screen { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto">

    <!-- Pantalla de Carga/Seguridad -->
    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Validando Credenciales</p>
    </div>

    <div class="p-4">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-zinc-800 shadow-lg"></div>
        </header>

        <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
            <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Nuevo Despacho</h2>
            
            <div class="space-y-4">
                <input type="hidden" id="edit-id">

                <!-- Vendedor -->
                <div class="relative">
                    <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Vendedor:</p>
                    <select id="sel-vendedor" class="input-field border-gold/30 text-gold italic">
                        <option value="">-- CARGANDO EQUIPO --</option>
                    </select>
                </div>

                <!-- Cliente -->
                <div class="flex gap-2">
                    <button id="btn-cli-reg" onclick="window.toggleCliente(true)" class="tab-btn active">Registrado</button>
                    <button id="btn-cli-ocu" onclick="window.toggleCliente(false)" class="tab-btn">Ocasional</button>
                </div>
                <div id="area-cliente-reg">
                    <select id="sel-cliente" class="input-field">
                        <option value="">-- SELECCIONAR CLIENTE --</option>
                    </select>
                </div>
                <div id="area-cliente-ocu" class="hidden">
                    <input type="text" id="inp-cliente-nom" placeholder="NOMBRE DEL CLIENTE OCASIONAL" class="input-field">
                </div>

                <!-- Producto y Variante -->
                <div class="grid grid-cols-1 gap-3">
                    <select id="sel-producto" class="input-field">
                        <option value="">-- SELECCIONAR PRODUCTO --</option>
                    </select>
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante:</p>
                        <select id="sel-variante" class="input-field border-gold/10 text-gold">
                            <option value="ESTANDAR">ESTANDAR / UNICA</option>
                        </select>
                    </div>
                </div>

                <!-- Tipo de Venta -->
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="window.setTipo('CONTADO')" id="t-contado" class="tab-btn active">Detal</button>
                    <button onclick="window.setTipo('CREDITO')" id="t-credito" class="tab-btn">Crédito</button>
                    <button onclick="window.setTipo('MAYOR')" id="t-mayor" class="tab-btn">Mayor</button>
                </div>

                <!-- Cantidades y Precios -->
                <div class="grid grid-cols-3 gap-3">
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Cant:</p>
                        <input type="number" id="inp-cantidad" value="1" min="1" class="input-field text-center text-lg">
                    </div>
                    <div class="relative">
                        <p class="text-[7px] text-orange-400 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Desc. $:</p>
                        <input type="number" id="inp-descuento" value="0" min="0" class="input-field text-center text-lg text-orange-400">
                    </div>
                    <div class="relative">
                        <p class="text-[7px] text-green-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Total:</p>
                        <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-lg text-green-400 border-green-900/30">
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button id="btn-cancel" onclick="window.cancelarEdicion()" class="hidden flex-1 bg-zinc-900 text-white font-black py-4 rounded-xl uppercase text-[10px]">Cancelar</button>
                    <button id="btn-venta" onclick="window.registrarVenta()" class="flex-[2] bg-white text-black font-black py-4 rounded-xl uppercase text-xs">Procesar Venta</button>
                </div>
            </div>
        </section>

        <h3 class="text-[9px] font-black text-gray-600 uppercase tracking-[3px] mb-4 text-center italic">Operaciones de Usuario</h3>
        <div id="listaVentas" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Mismo config que Clientes
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let productosGlobal = [];
        let ventasGlobal = [];
        let userId = null;
        let pSeleccionado = null;
        let tipoVenta = 'CONTADO';

        // --- MANEJO DE SESIÓN PRIVADA ---
        onAuthStateChanged(auth, (user) => { 
            if(user && !user.isAnonymous){ 
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('statusDot').classList.add('bg-green-500', 'shadow-green-500/50');
                escucharDatos(user.uid); 
            } else {
                window.location.href = "login.html";
            }
        });

        function escucharDatos(uid) {
            // Cargar Vendedores de la ruta del usuario
            onSnapshot(collection(db, 'usuarios', uid, 'vendedores'), snap => {
                const sel = document.getElementById('sel-vendedor');
                sel.innerHTML = '<option value="">-- VENDEDOR --</option>' + 
                    snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
            });

            // Cargar Clientes de la ruta del usuario
            onSnapshot(collection(db, 'usuarios', uid, 'clientes'), snap => {
                const sel = document.getElementById('sel-cliente');
                sel.innerHTML = '<option value="">-- CLIENTE --</option>' + 
                    snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
            });

            // Cargar Productos de la ruta del usuario
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), snap => {
                productosGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const sel = document.getElementById('sel-producto');
                sel.innerHTML = '<option value="">-- PRODUCTO --</option>' + 
                    productosGlobal.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()}</option>`).join('');
            });

            // Cargar Ventas del usuario
            onSnapshot(query(collection(db, 'usuarios', uid, 'ventas_realizadas'), orderBy("timestamp", "desc")), snap => {
                ventasGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderizarVentas();
            });
        }

        // --- LÓGICA DE UI ---
        window.toggleCliente = (reg) => {
            document.getElementById('btn-cli-reg').classList.toggle('active', reg);
            document.getElementById('btn-cli-ocu').classList.toggle('active', !reg);
            document.getElementById('area-cliente-reg').classList.toggle('hidden', !reg);
            document.getElementById('area-cliente-ocu').classList.toggle('hidden', reg);
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['contado', 'credito', 'mayor'].forEach(id => {
                document.getElementById('t-'+id)?.classList.toggle('active', id === t.toLowerCase());
            });
            calcularTotal();
        };

        document.getElementById('sel-producto').addEventListener('change', (e) => {
            pSeleccionado = productosGlobal.find(x => x.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            if (pSeleccionado?.variantes?.length > 0) {
                selVar.innerHTML = pSeleccionado.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                selVar.innerHTML = '<option value="ESTANDAR">ESTANDAR / UNICA</option>';
            }
            calcularTotal();
        });

        function calcularTotal() {
            if(!pSeleccionado) return;
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 0;
            const desc = parseFloat(document.getElementById('inp-descuento').value) || 0;
            
            let unit = 0;
            if(tipoVenta === 'CONTADO') unit = pSeleccionado.precio_detal || 0;
            else if(tipoVenta === 'CREDITO') unit = pSeleccionado.precio_credito || 0;
            else if(tipoVenta === 'MAYOR') unit = pSeleccionado.precio_mayor || 0;
            
            const total = (unit * cant) - desc;
            document.getElementById('inp-precio').value = (total < 0 ? 0 : total).toLocaleString();
        }

        window.registrarVenta = async () => {
            if(!userId || !pSeleccionado) return;
            const editId = document.getElementById('edit-id').value;
            
            const v = {
                vendedor: document.getElementById('sel-vendedor').value,
                cliente: document.getElementById('btn-cli-reg').classList.contains('active') ? 
                          document.getElementById('sel-cliente').value : 
                          document.getElementById('inp-cliente-nom').value.toUpperCase(),
                producto: pSeleccionado.nombre,
                productoId: pSeleccionado.id,
                variante: document.getElementById('sel-variante').value,
                cantidad: parseInt(document.getElementById('inp-cantidad').value),
                descuento: parseFloat(document.getElementById('inp-descuento').value) || 0,
                total: parseFloat(document.getElementById('inp-precio').value.replace(/,/g, '')),
                tipo: tipoVenta,
                timestamp: Date.now(),
                fecha_venta: new Date().toLocaleDateString()
            };

            if(!v.vendedor || !v.cliente) return;

            try {
                if(editId) {
                    await updateDoc(doc(db, 'usuarios', userId, 'ventas_realizadas', editId), v);
                } else {
                    await addDoc(collection(db, 'usuarios', userId, 'ventas_realizadas'), v);
                }
                window.cancelarEdicion();
            } catch (e) { console.error(e); }
        };

        window.editarVenta = (id) => {
            const v = ventasGlobal.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('sel-vendedor').value = v.vendedor;
            document.getElementById('sel-producto').value = v.productoId;
            pSeleccionado = productosGlobal.find(p => p.id === v.productoId);
            window.setTipo(v.tipo);
            document.getElementById('inp-cantidad').value = v.cantidad;
            document.getElementById('inp-descuento').value = v.descuento;
            document.getElementById('btn-venta').innerText = "ACTUALIZAR VENTA";
            document.getElementById('btn-cancel').classList.remove('hidden');
            calcularTotal();
            window.scrollTo(0,0);
        };

        window.eliminarVenta = async (id) => {
            if(confirm('¿ELIMINAR VENTA?')) {
                await deleteDoc(doc(db, 'usuarios', userId, 'ventas_realizadas', id));
            }
        };

        window.cancelarEdicion = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('btn-venta').innerText = "PROCESAR VENTA";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('inp-cantidad').value = 1;
            document.getElementById('inp-descuento').value = 0;
            document.getElementById('inp-precio').value = "0.00";
        };

        function renderizarVentas() {
            const container = document.getElementById('listaVentas');
            if(ventasGlobal.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-20 text-[10px] font-black uppercase italic">Historial Vacío</div>';
                return;
            }
            container.innerHTML = ventasGlobal.map(v => `
                <div class="sale-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[7px] font-black bg-white/10 px-2 py-0.5 rounded text-gold uppercase">${v.tipo}</span>
                            <div class="text-[11px] font-black uppercase mt-1">${v.cliente}</div>
                            <div class="text-[9px] text-gray-500 italic mt-0.5">${v.producto} (${v.variante}) x${v.cantidad}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-green-400 font-black text-sm">$${v.total.toLocaleString()}</div>
                            <div class="flex gap-3 justify-end mt-2">
                                <button onclick="window.editarVenta('${v.id}')" class="text-blue-500 text-[10px]"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="window.eliminarVenta('${v.id}')" class="text-red-900 text-[10px]"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Inputs dinámicos
        document.getElementById('inp-cantidad').addEventListener('input', calcularTotal);
        document.getElementById('inp-descuento').addEventListener('input', calcularTotal);

    </script>
</body>
</html>
