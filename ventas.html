```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Ventas | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; transition: 0.3s; background: transparent; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        #statusDot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div id="statusDot" class="bg-red-600"></div>
            <span id="connLabel" class="text-[8px] font-mono text-gray-500 uppercase">Desconectado</span>
        </div>
        <h1 class="text-gold font-black italic text-xs tracking-widest">JADDY INC - GLOBAL</h1>
    </header>

    <!-- Formulario de Registro -->
    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic text-shadow">Registro de Venta</h2>
        
        <div class="space-y-4">
            <!-- Vendedor (Conectado a la DB Global) -->
            <div class="relative">
                <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Vendedor:</p>
                <select id="sel-vendedor" class="input-field border-gold/30 text-gold">
                    <option value="">Cargando vendedores...</option>
                </select>
            </div>

            <!-- Cliente -->
            <div id="area-cliente">
                <p class="text-[7px] text-gray-500 mb-1 ml-2 uppercase">Cliente:</p>
                <select id="sel-cliente" class="input-field">
                    <option value="">Cargando clientes...</option>
                </select>
            </div>

            <!-- Producto -->
            <div class="grid grid-cols-1 gap-3">
                <select id="sel-producto" class="input-field">
                    <option value="">Seleccionar Producto</option>
                </select>
                <div class="relative">
                    <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante / Fragancia:</p>
                    <select id="sel-variante" class="input-field border-gold/20 text-gold">
                        <option value="">Elija producto primero</option>
                    </select>
                </div>
            </div>

            <!-- Tipo de Venta -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTipo('CONTADO')" id="t-contado" class="tab-btn active">Contado</button>
                <button onclick="setTipo('CREDITO')" id="t-credito" class="tab-btn">Crédito</button>
                <button onclick="setTipo('MAYOR')" id="t-mayor" class="tab-btn">Mayor</button>
            </div>

            <!-- Cantidad y Total -->
            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-1 uppercase">Cant.</p>
                    <input type="number" id="inp-cantidad" value="1" min="1" oninput="calcularTotal()" class="input-field text-center text-xl font-bold">
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-1 uppercase">Total USD</p>
                    <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-xl text-green-400 font-bold">
                </div>
            </div>

            <button id="btn-venta" onclick="registrarVenta()" class="w-full bg-white text-black font-black py-5 rounded-xl uppercase text-xs tracking-widest shadow-xl">Guardar en Base de Datos</button>
        </div>
    </section>

    <h3 class="text-[8px] text-gray-500 font-black uppercase tracking-[3px] mb-4 text-center italic">Historial Completo</h3>
    <div id="listaVentas" class="space-y-3 pb-10">
        <p class="text-center text-[10px] text-gray-600">Cargando registros existentes...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let productosGlobal = [];
        let pSeleccionado = null;
        let tipoVenta = 'CONTADO';

        // Autenticación mínima necesaria para Firestore
        signInAnonymously(auth).then(() => {
            document.getElementById('statusDot').className = "bg-green-500";
            document.getElementById('connLabel').innerText = "Conectado a la Red";
            conectarBaseDatos();
        });

        function conectarBaseDatos() {
            // RUTA GLOBAL: /artifacts/{appId}/public/data/{collection}
            // Esto asegura que se conecte a los archivos de información que ya existen
            
            // 1. Cargar Vendedores
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'vendedores'), (s) => {
                const html = s.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre}</option>`).join('');
                document.getElementById('sel-vendedor').innerHTML = '<option value="">-- SELECCIONAR --</option>' + html;
            });

            // 2. Cargar Clientes
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clientes'), (s) => {
                const html = s.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
                document.getElementById('sel-cliente').innerHTML = '<option value="">-- SELECCIONAR --</option>' + html;
            });

            // 3. Cargar Productos
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'productos'), (s) => {
                productosGlobal = s.docs.map(d => ({id: d.id, ...d.data()}));
                const html = productosGlobal.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
                document.getElementById('sel-producto').innerHTML = '<option value="">-- SELECCIONAR --</option>' + html;
            });

            // 4. Cargar Ventas Realizadas (HISTORIAL GLOBAL)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas'), (s) => {
                const ventas = s.docs.map(d => ({id: d.id, ...d.data()}))
                                   .sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                renderVentas(ventas);
            });
        }

        document.getElementById('sel-producto').onchange = (e) => {
            pSeleccionado = productosGlobal.find(x => x.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            
            if (!pSeleccionado) {
                selVar.innerHTML = '<option value="">Elija opción</option>';
                return;
            }

            let opciones = [];
            // Intentamos extraer fragancias o variantes de cualquier campo disponible
            ['fragancias', 'variantes', 'notas', 'opciones'].forEach(k => {
                if (pSeleccionado[k]) {
                    if (Array.isArray(pSeleccionado[k])) opciones = [...opciones, ...pSeleccionado[k]];
                    else opciones = [...opciones, ...pSeleccionado[k].split(',').map(s => s.trim())];
                }
            });

            opciones = [...new Set(opciones)].filter(o => o !== "");
            selVar.innerHTML = opciones.length > 0 
                ? opciones.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('')
                : '<option value="GENERAL">GENERAL</option>';
            
            calcularTotal();
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['contado', 'credito', 'mayor'].forEach(id => {
                document.getElementById('t-'+id).classList.toggle('active', id === t.toLowerCase());
            });
            calcularTotal();
        };

        window.calcularTotal = () => {
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 0;
            if(!pSeleccionado) return;
            
            let p = parseFloat(pSeleccionado.precio_detal || pSeleccionado.precio || 0);
            if(tipoVenta === 'CREDITO') p = parseFloat(pSeleccionado.precio_credito || p);
            if(tipoVenta === 'MAYOR') p = parseFloat(pSeleccionado.precio_mayor || p);
            
            document.getElementById('inp-precio').value = (p * cant).toFixed(2);
        };

        window.registrarVenta = async () => {
            const vend = document.getElementById('sel-vendedor').value;
            const cli = document.getElementById('sel-cliente').value;
            const frag = document.getElementById('sel-variante').value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);
            const total = parseFloat(document.getElementById('inp-precio').value);

            if(!vend || !cli || !pSeleccionado) {
                alert("Por favor complete todos los campos");
                return;
            }

            const payload = {
                vendedor: vend,
                cliente: cli.toUpperCase(),
                producto: pSeleccionado.nombre,
                productoId: pSeleccionado.id,
                variante: frag,
                cantidad: cant,
                total: total,
                tipo: tipoVenta,
                timestamp: Date.now(),
                fecha: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            try {
                // Guardar en la ruta pública ORIGINAL
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas'), payload);
                // Limpiar campos simples
                document.getElementById('inp-cantidad').value = 1;
                document.getElementById('inp-precio').value = "0.00";
            } catch (e) {
                console.error("Error al guardar:", e);
            }
        };

        window.eliminarVenta = async (id) => {
            if(!confirm("¿Eliminar este registro permanentemente?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas', id));
        };

        function renderVentas(data) {
            const container = document.getElementById('listaVentas');
            if(data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 text-[10px]">No hay ventas registradas.</p>';
                return;
            }
            container.innerHTML = data.map(v => `
                <div class="sale-card gold-border">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[7px] font-black uppercase text-gold">${v.tipo}</span>
                            <div class="text-[11px] font-bold uppercase text-white">${v.cliente}</div>
                            <div class="text-[8px] text-gray-500">${v.fecha} · ${v.hora}</div>
                        </div>
                        <div class="text-right">
                            <button onclick="eliminarVenta('${v.id}')" class="text-red-900/50 text-[10px] mb-1"><i class="fa-solid fa-trash"></i></button>
                            <div class="text-green-400 font-black text-sm">$${v.total.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="bg-white/5 px-2 py-0.5 rounded text-[8px] text-gray-400">${v.producto}</span>
                        <span class="bg-gold/10 px-2 py-0.5 rounded text-[8px] text-gold font-bold">${v.variante}</span>
                        <span class="text-[7px] text-gray-600 ml-auto uppercase">${v.vendedor}</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

```
