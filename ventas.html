<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas CRM | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; appearance: none; }
        .input-field:focus { border-color: var(--gold); outline: none; }
        
        /* Botones de Tabulación Mejorados */
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; transition: all 0.2s; background: transparent; }
        .tab-btn.active { background: white; color: black; border-color: white; transform: scale(1.02); }
        
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; animation: fadeIn 0.4s ease; }
        
        .date-panel { background: #151515; border: 1px dashed rgba(212, 175, 55, 0.3); border-radius: 16px; padding: 12px; margin-top: 10px; display: none; }
        .date-panel.visible { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; animation: slideDown 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 200px; } }
        
        .loader { width: 20px; height: 20px; border: 2px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Panel de Ventas y Despacho</h2>
        
        <div class="space-y-4">
            <!-- Vendedor -->
            <div class="relative">
                <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase">Despachado por:</p>
                <select id="sel-vendedor" class="input-field border-gold/30 text-gold">
                    <option value="">-- CARGANDO VENDEDORES... --</option>
                </select>
            </div>

            <!-- Tipo de Cliente -->
            <div class="flex gap-2">
                <button id="btn-cli-reg" class="tab-btn active">Registrado</button>
                <button id="btn-cli-ocu" class="tab-btn">Ocasional</button>
            </div>

            <div id="area-cliente-reg">
                <select id="sel-cliente" class="input-field">
                    <option value="">-- SELECCIONAR CLIENTE --</option>
                </select>
            </div>
            <div id="area-cliente-ocu" class="hidden">
                <input type="text" id="inp-cliente-nom" placeholder="NOMBRE DEL CLIENTE OCASIONAL" class="input-field">
            </div>

            <!-- Producto y Variante -->
            <div class="grid grid-cols-1 gap-3">
                <div class="relative">
                    <select id="sel-producto" class="input-field">
                        <option value="">-- SELECCIONAR PRODUCTO --</option>
                    </select>
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase">Variante / Tamaño</p>
                    <select id="sel-variante" class="input-field">
                        <option value="GENERAL">GENERAL</option>
                    </select>
                </div>
            </div>

            <!-- Tipo de Venta -->
            <div class="grid grid-cols-3 gap-2">
                <button id="t-contado" class="tab-btn active">Contado</button>
                <button id="t-credito" class="tab-btn">Crédito</button>
                <button id="t-mayor" class="tab-btn">Al Mayor</button>
            </div>

            <!-- PANEL DE FECHAS (SÓLO CRÉDITO) -->
            <div id="panel-fechas" class="date-panel">
                <div class="relative">
                    <p class="text-[7px] text-gold font-black uppercase mb-1 ml-1">Fecha Entrega</p>
                    <input type="date" id="fecha-entrega" class="input-field !p-2 !text-[11px]">
                </div>
                <div class="relative">
                    <p class="text-[7px] text-red-500 font-black uppercase mb-1 ml-1">Fecha de Cobro</p>
                    <input type="date" id="fecha-pago" class="input-field !p-2 !text-[11px]">
                </div>
            </div>

            <!-- Cantidad y Precio -->
            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <p class="text-[7px] text-gray-500 font-black absolute top-2 left-3 uppercase">Cant.</p>
                    <input type="number" id="inp-cantidad" value="1" min="1" class="input-field text-center text-xl pt-6">
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 font-black absolute top-2 left-3 uppercase">Total USD</p>
                    <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-xl text-green-400 pt-6">
                </div>
            </div>

            <button id="btn-venta" class="w-full bg-white text-black font-black py-5 rounded-xl uppercase text-sm active:scale-95 transition-transform shadow-lg">
                Procesar Despacho
            </button>
        </div>
    </section>

    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2 italic">Historial de Hoy</h2>
    <div id="listaVentas" class="space-y-3">
        <div class="text-center py-10 opacity-20 text-xs font-bold italic">Cargando registros...</div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, addDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let dataStore = {
            productos: [],
            vendedores: [],
            clientes: [],
            seleccionado: null,
            tipoVenta: 'CONTADO'
        };

        // UI Elements
        const selVendedor = document.getElementById('sel-vendedor');
        const selCliente = document.getElementById('sel-cliente');
        const selProducto = document.getElementById('sel-producto');
        const selVariante = document.getElementById('sel-variante');
        const inpCantidad = document.getElementById('inp-cantidad');
        const inpTotal = document.getElementById('inp-precio');
        const panelFechas = document.getElementById('panel-fechas');
        const btnVenta = document.getElementById('btn-venta');

        // Inicialización de Auth
        async function start() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        document.getElementById('statusDot').classList.replace('bg-red-600', 'bg-green-500');
                        document.getElementById('fecha-entrega').value = new Date().toISOString().split('T')[0];
                        escucharDatos();
                    }
                });
            } catch (e) { console.error("Auth Error", e); }
        }

        function escucharDatos() {
            const pathBase = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

            // Cargar Vendedores
            onSnapshot(pathBase('vendedores'), (s) => {
                dataStore.vendedores = s.docs.map(d => ({id: d.id, ...d.data()}));
                selVendedor.innerHTML = '<option value="">-- SELECCIONAR VENDEDOR --</option>' + 
                    dataStore.vendedores.map(v => `<option value="${v.id}">${v.nombre}</option>`).join('');
            });

            // Cargar Clientes
            onSnapshot(pathBase('clientes'), (s) => {
                dataStore.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
                selCliente.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>' + 
                    dataStore.clientes.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
            });

            // Cargar Productos
            onSnapshot(pathBase('productos'), (s) => {
                dataStore.productos = s.docs.map(d => ({id: d.id, ...d.data()}));
                selProducto.innerHTML = '<option value="">-- SELECCIONAR PRODUCTO --</option>' + 
                    dataStore.productos.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            });

            // Cargar Ventas (Historial)
            onSnapshot(pathBase('ventas'), (s) => {
                const ventas = s.docs.map(d => d.data()).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                renderVentas(ventas.slice(0, 8));
            });
        }

        // Lógica de Producto Seleccionado
        selProducto.onchange = () => {
            const prod = dataStore.productos.find(p => p.id === selProducto.value);
            dataStore.seleccionado = prod;
            
            if (prod && prod.variantes && prod.variantes.length > 0) {
                selVariante.innerHTML = prod.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                selVariante.innerHTML = '<option value="GENERAL">GENERAL</option>';
            }
            actualizarCalculos();
        };

        // Lógica de Botones (Tabs)
        document.getElementById('btn-cli-reg').onclick = () => {
            document.getElementById('btn-cli-reg').classList.add('active');
            document.getElementById('btn-cli-ocu').classList.remove('active');
            document.getElementById('area-cliente-reg').classList.remove('hidden');
            document.getElementById('area-cliente-ocu').classList.add('hidden');
        };

        document.getElementById('btn-cli-ocu').onclick = () => {
            document.getElementById('btn-cli-ocu').classList.add('active');
            document.getElementById('btn-cli-reg').classList.remove('active');
            document.getElementById('area-cliente-ocu').classList.remove('hidden');
            document.getElementById('area-cliente-reg').classList.add('hidden');
        };

        const tipos = ['contado', 'credito', 'mayor'];
        tipos.forEach(t => {
            document.getElementById(`t-${t}`).onclick = () => {
                dataStore.tipoVenta = t.toUpperCase();
                tipos.forEach(x => document.getElementById(`t-${x}`).classList.toggle('active', x === t));
                panelFechas.classList.toggle('visible', t === 'credito');
                actualizarCalculos();
            };
        });

        function actualizarCalculos() {
            const p = dataStore.seleccionado;
            const cant = parseInt(inpCantidad.value) || 0;
            if (!p) return;

            let precioBase = 0;
            if (dataStore.tipoVenta === 'CONTADO') precioBase = p.precio_detal || 0;
            else if (dataStore.tipoVenta === 'CREDITO') precioBase = p.precio_credito || 0;
            else precioBase = p.precio_mayor || 0;

            inpTotal.value = (precioBase * cant).toFixed(2);
        }

        inpCantidad.oninput = actualizarCalculos;

        // GUARDAR VENTA
        btnVenta.onclick = async () => {
            if (!user) return;
            
            const vId = selVendedor.value;
            const pId = selProducto.value;
            const cliente = document.getElementById('btn-cli-reg').classList.contains('active') ? 
                selCliente.value : document.getElementById('inp-cliente-nom').value;

            if (!vId || !pId || !cliente) {
                alert("Completa Vendedor, Producto y Cliente");
                return;
            }

            btnVenta.disabled = true;
            btnVenta.innerHTML = '<span class="loader"></span>';

            try {
                const ventaObj = {
                    vendedorId: vId,
                    vendedorNombre: dataStore.vendedores.find(v => v.id === vId).nombre,
                    cliente: cliente.toUpperCase(),
                    productoId: pId,
                    productoNombre: dataStore.seleccionado.nombre,
                    variante: selVariante.value,
                    tipo: dataStore.tipoVenta,
                    cantidad: parseInt(inpCantidad.value),
                    total: parseFloat(inpTotal.value),
                    fecha_entrega: document.getElementById('fecha-entrega').value,
                    fecha_pago: dataStore.tipoVenta === 'CREDITO' ? document.getElementById('fecha-pago').value : null,
                    timestamp: Date.now()
                };

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ventas'), ventaObj);
                
                // Actualización de Inventario (Opcional si usas el módulo de inventario)
                const stockId = `${pId}_${ventaObj.variante}`.replace(/\s+/g, '_');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventario', stockId), {
                    stock: increment(-ventaObj.cantidad),
                    vendido: increment(ventaObj.cantidad)
                }, { merge: true });

                alert("¡Despacho registrado con éxito!");
                limpiar();
            } catch (e) {
                console.error(e);
                alert("Error al guardar");
            } finally {
                btnVenta.disabled = false;
                btnVenta.innerHTML = "Procesar Despacho";
            }
        };

        function limpiar() {
            inpCantidad.value = 1;
            document.getElementById('inp-cliente-nom').value = "";
            document.getElementById('fecha-pago').value = "";
            actualizarCalculos();
        }

        function renderVentas(ventas) {
            const container = document.getElementById('listaVentas');
            if (ventas.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-20 text-xs italic">No hay ventas registradas</div>';
                return;
            }
            container.innerHTML = ventas.map(v => `
                <div class="sale-card">
                    <div class="flex justify-between">
                        <div>
                            <span class="text-[7px] ${v.tipo === 'CREDITO' ? 'text-red-400' : 'text-gold'} font-black uppercase">${v.tipo}</span>
                            <div class="text-xs font-black uppercase">${v.cliente}</div>
                            <div class="text-[8px] text-gray-500 font-bold">${v.productoNombre} (${v.variante})</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-black text-green-400">$${v.total.toFixed(2)}</div>
                            <div class="text-[7px] text-gray-600">${v.cantidad} UNID.</div>
                        </div>
                    </div>
                    ${v.fecha_pago ? `<div class="mt-2 text-[7px] text-red-500 font-bold">PAGO PENDIENTE: ${v.fecha_pago}</div>` : ''}
                </div>
            `).join('');
        }

        start();
    </script>
</body>
</html>
