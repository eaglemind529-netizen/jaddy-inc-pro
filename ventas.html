```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas CRM | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; appearance: none; }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; transition: 0.3s; background: transparent; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #statusDot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div id="statusDot" class="bg-red-500"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Panel de Despacho</h2>
        
        <div class="space-y-4">
            <div class="relative">
                <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Despachado por:</p>
                <select id="sel-vendedor" class="input-field border-gold/30 text-gold">
                    <option value="">-- SELECCIONAR VENDEDOR --</option>
                </select>
            </div>

            <div class="flex gap-2">
                <button id="btn-cli-reg" onclick="toggleCliente(true)" class="tab-btn active">Registrado</button>
                <button id="btn-cli-ocu" onclick="toggleCliente(false)" class="tab-btn">Ocasional</button>
            </div>
            <div id="area-cliente-reg">
                <select id="sel-cliente" class="input-field">
                    <option value="">-- SELECCIONAR CLIENTE --</option>
                </select>
            </div>
            <div id="area-cliente-ocu" class="hidden">
                <input type="text" id="inp-cliente-nom" placeholder="NOMBRE DE CLIENTE NUEVO" class="input-field">
            </div>

            <div class="grid grid-cols-1 gap-3">
                <select id="sel-producto" class="input-field">
                    <option value="">-- SELECCIONAR PRODUCTO --</option>
                </select>
                <select id="sel-variante" class="input-field">
                    <option value="">-- ELIGE FRAGANCIA --</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTipo('CONTADO')" id="t-contado" class="tab-btn active">Contado</button>
                <button onclick="setTipo('CREDITO')" id="t-credito" class="tab-btn">Crédito</button>
                <button onclick="setTipo('MAYOR')" id="t-mayor" class="tab-btn">Mayor</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="inp-cantidad" value="1" min="1" oninput="calcularTotal()" class="input-field text-center text-xl">
                <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-xl text-green-400">
            </div>

            <button id="btn-venta" onclick="registrarVenta()" class="w-full bg-white text-black font-black py-5 rounded-xl uppercase text-sm">
                Procesar Venta
            </button>
        </div>
    </section>

    <div id="listaVentas" class="space-y-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let productosGlobal = [];
        let pSeleccionado = null;
        let tipoVenta = 'CONTADO';

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('statusDot').className = "bg-green-500 w-3 h-3 rounded-full shadow-[0_0_10px_green]";
                cargarDatos();
            }
        });

        function cargarDatos() {
            // Cargar Vendedores
            onSnapshot(collection(db, "vendedores"), (snap) => {
                const vens = snap.docs.map(d => d.data());
                document.getElementById('sel-vendedor').innerHTML = '<option value="">-- VENDEDOR --</option>' + 
                    vens.map(v => `<option value="${v.nombre}">${v.nombre}</option>`).join('');
            });

            // Cargar Clientes
            onSnapshot(collection(db, "clientes"), (snap) => {
                const clis = snap.docs.map(d => d.data());
                document.getElementById('sel-cliente').innerHTML = '<option value="">-- CLIENTE --</option>' + 
                    clis.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
            });

            // Cargar Productos (RESTAURADO)
            onSnapshot(collection(db, "productos"), (snap) => {
                productosGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('sel-producto').innerHTML = '<option value="">-- PRODUCTO --</option>' + 
                    productosGlobal.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            });

            // Cargar Ventas
            onSnapshot(query(collection(db, "ventas_realizadas"), orderBy("timestamp", "desc")), (snap) => {
                renderVentas(snap.docs.map(d => d.data()));
            });
        }

        document.getElementById('sel-producto').onchange = (e) => {
            pSeleccionado = productosGlobal.find(x => x.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            if (pSeleccionado && pSeleccionado.variantes) {
                // Aquí se cargan las fragancias que ya tenías
                selVar.innerHTML = pSeleccionado.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                selVar.innerHTML = '<option value="GENERAL">GENERAL</option>';
            }
            calcularTotal();
        };

        window.toggleCliente = (reg) => {
            document.getElementById('btn-cli-reg').classList.toggle('active', reg);
            document.getElementById('btn-cli-ocu').classList.toggle('active', !reg);
            document.getElementById('area-cliente-reg').classList.toggle('hidden', !reg);
            document.getElementById('area-cliente-ocu').classList.toggle('hidden', reg);
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['contado', 'credito', 'mayor'].forEach(id => {
                document.getElementById('t-'+id).classList.toggle('active', id === t.toLowerCase());
            });
            calcularTotal();
        };

        window.calcularTotal = () => {
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 0;
            if(!pSeleccionado) return;
            let precio = pSeleccionado.precio_detal || 0;
            if(tipoVenta === 'CREDITO') precio = pSeleccionado.precio_credito || 0;
            if(tipoVenta === 'MAYOR') precio = pSeleccionado.precio_mayor || 0;
            document.getElementById('inp-precio').value = (precio * cant).toFixed(2);
        };

        window.registrarVenta = async () => {
            const v = document.getElementById('sel-vendedor').value;
            const p = document.getElementById('sel-producto').value;
            const c = document.getElementById('btn-cli-reg').classList.contains('active') ? 
                      document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-nom').value;

            if(!v || !p || !c) return alert("Faltan datos");

            await addDoc(collection(db, "ventas_realizadas"), {
                vendedor: v,
                cliente: c.toUpperCase(),
                producto: pSeleccionado.nombre,
                variante: document.getElementById('sel-variante').value,
                cantidad: parseInt(document.getElementById('inp-cantidad').value),
                total: parseFloat(document.getElementById('inp-precio').value),
                tipo: tipoVenta,
                timestamp: Date.now()
            });
            alert("Venta guardada");
        };

        function renderVentas(ventas) {
            document.getElementById('listaVentas').innerHTML = ventas.map(v => `
                <div class="sale-card">
                    <div class="flex justify-between">
                        <span class="text-gold text-[8px] font-black">${v.tipo}</span>
                        <span class="text-green-400 font-black">$${v.total}</span>
                    </div>
                    <div class="text-xs uppercase font-bold">${v.cliente}</div>
                    <div class="text-[9px] text-gray-400">${v.producto} / ${v.variante}</div>
                </div>
            `).join('');
        }

        signInAnonymously(auth);
    </script>
</body>
</html>


```
