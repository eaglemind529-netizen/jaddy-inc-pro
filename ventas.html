```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #050505; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; }
        .glass-card { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px; }
        .input-gold { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: white; transition: 0.3s; }
        .input-gold:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        .btn-action { background: white; color: black; font-weight: 900; border-radius: 14px; padding: 16px; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-action:active { transform: scale(0.97); }
        .label-mini { font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .tag-tipo { font-size: 9px; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .active-tab { background: var(--gold) !important; color: black !important; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-20">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black tracking-tighter">JADDY <span class="text-gold">INC</span></h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Punto de Venta Real</p>
        </div>
        <div id="db-status" class="flex items-center gap-2 bg-red-900/20 px-3 py-1 rounded-full border border-red-500/30">
            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-[9px] font-bold text-red-500">OFFLINE</span>
        </div>
    </header>

    <div class="glass-card p-6 space-y-5 shadow-2xl">
        <!-- VENDEDOR -->
        <div>
            <label class="label-mini">Vendedor Responsable</label>
            <select id="sel-vendedor" class="input-gold text-gold font-bold">
                <option value="">Cargando base de datos...</option>
            </select>
        </div>

        <!-- CLIENTE -->
        <div>
            <div class="flex gap-2 mb-3">
                <button id="btn-c-fijo" onclick="toggleCliente(true)" class="flex-1 py-2 rounded-lg bg-[#222] text-[10px] font-bold uppercase active-tab">Cliente Fijo</button>
                <button id="btn-c-nuevo" onclick="toggleCliente(false)" class="flex-1 py-2 rounded-lg bg-[#222] text-[10px] font-bold uppercase">Ocasional</button>
            </div>
            <div id="box-fijo">
                <select id="sel-cliente" class="input-gold"><option value="">Seleccionar...</option></select>
            </div>
            <div id="box-nuevo" class="hidden">
                <input type="text" id="nom-cliente" placeholder="Nombre del cliente" class="input-gold">
            </div>
        </div>

        <!-- PRODUCTO -->
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="label-mini">Producto</label>
                <select id="sel-producto" class="input-gold">
                    <option value="">Cargando inventario...</option>
                </select>
            </div>
            <div>
                <label class="label-mini text-gold">Fragancia / Variante</label>
                <select id="sel-fragancia" class="input-gold border-gold/30">
                    <option value="">-</option>
                </select>
            </div>
        </div>

        <!-- PRECIOS -->
        <div>
            <label class="label-mini">Tipo de Venta</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="cambiarTipo('detal')" id="t-detal" class="py-2 rounded-lg bg-[#222] text-[10px] font-bold uppercase active-tab">Detal</button>
                <button onclick="cambiarTipo('credito')" id="t-credito" class="py-2 rounded-lg bg-[#222] text-[10px] font-bold uppercase">Crédito</button>
                <button onclick="cambiarTipo('mayor')" id="t-mayor" class="py-2 rounded-lg bg-[#222] text-[10px] font-bold uppercase">Mayor</button>
            </div>
        </div>

        <!-- SUBTOTAL Y ACCION -->
        <div class="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-white/5">
            <div>
                <label class="label-mini">Cantidad</label>
                <input type="number" id="cant" value="1" min="1" class="bg-transparent text-2xl font-black w-16 outline-none">
            </div>
            <div class="text-right">
                <label class="label-mini text-gold">Total a Cobrar</label>
                <div id="total-display" class="text-3xl font-black text-green-400">$0.00</div>
            </div>
        </div>

        <button onclick="procesarVenta()" class="btn-action shadow-lg">Finalizar Venta</button>
    </div>

    <div class="mt-8">
        <h3 class="label-mini mb-4">Registro de hoy</h3>
        <div id="historial" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy, limit, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let cacheProductos = [];
        let itemActual = null;
        let modalidad = 'detal';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('db-status').innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div><span class="text-[9px] font-bold text-green-500">CONECTADO</span>';
                document.getElementById('db-status').className = "flex items-center gap-2 bg-green-900/20 px-3 py-1 rounded-full border border-green-500/30";
                vincularColecciones();
            }
        });

        function vincularColecciones() {
            const userPath = (col) => collection(db, 'artifacts', appId, 'users', currentUser.uid, col);

            // 1. Sincronizar Vendedores
            onSnapshot(userPath('vendedores'), snap => {
                const sel = document.getElementById('sel-vendedor');
                sel.innerHTML = '<option value="">ELEGIR VENDEDOR</option>' + 
                    snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
            });

            // 2. Sincronizar Clientes
            onSnapshot(userPath('clientes'), snap => {
                const sel = document.getElementById('sel-cliente');
                sel.innerHTML = '<option value="">ELEGIR CLIENTE</option>' + 
                    snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
            });

            // 3. Sincronizar Productos
            onSnapshot(userPath('productos'), snap => {
                cacheProductos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sel = document.getElementById('sel-producto');
                sel.innerHTML = '<option value="">ELEGIR PRODUCTO</option>' + 
                    cacheProductos.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()}</option>`).join('');
            });

            // 4. Sincronizar Historial
            const qVentas = query(userPath('ventas_realizadas'), orderBy('timestamp', 'desc'), limit(10));
            onSnapshot(qVentas, snap => {
                const cont = document.getElementById('historial');
                cont.innerHTML = snap.docs.map(d => {
                    const v = d.data();
                    return `
                        <div class="bg-[#111] p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                            <div>
                                <p class="text-[8px] font-black text-gold uppercase">${v.vendedor}</p>
                                <h4 class="text-xs font-black uppercase">${v.cliente}</h4>
                                <p class="text-[9px] text-gray-500">${v.producto} (${v.variante})</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black text-green-400">$${v.total}</p>
                                <p class="text-[7px] text-gray-700">${v.fecha || ''}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // Lógica de UI y Cálculo
        document.getElementById('sel-producto').onchange = (e) => {
            itemActual = cacheProductos.find(p => p.id === e.target.value);
            const selF = document.getElementById('sel-fragancia');
            if (itemActual) {
                // Compatible con tus campos "fragancias" o "variantes"
                const lista = itemActual.fragancias || itemActual.variantes || [];
                selF.innerHTML = lista.length > 0 ? 
                    lista.map(f => `<option value="${f}">${f.toUpperCase()}</option>`).join('') :
                    '<option value="ESTÁNDAR">SIN VARIANTES</option>';
                recalcular();
            }
        };

        window.cambiarTipo = (t) => {
            modalidad = t;
            ['detal', 'credito', 'mayor'].forEach(id => {
                document.getElementById('t-'+id).classList.toggle('active-tab', id === t);
            });
            recalcular();
        };

        function recalcular() {
            if (!itemActual) return;
            const c = parseInt(document.getElementById('cant').value) || 1;
            let p = parseFloat(itemActual.precio_detal || 0);
            if (modalidad === 'credito') p = parseFloat(itemActual.precio_credito || p);
            if (modalidad === 'mayor') p = parseFloat(itemActual.precio_mayor || p);
            document.getElementById('total-display').innerText = `$${(p * c).toFixed(2)}`;
        }

        document.getElementById('cant').oninput = recalcular;

        window.toggleCliente = (fijo) => {
            document.getElementById('btn-c-fijo').classList.toggle('active-tab', fijo);
            document.getElementById('btn-c-nuevo').classList.toggle('active-tab', !fijo);
            document.getElementById('box-fijo').classList.toggle('hidden', !fijo);
            document.getElementById('box-nuevo').classList.toggle('hidden', fijo);
        };

        window.procesarVenta = async () => {
            if (!itemActual) return alert("Selecciona un producto.");
            const vend = document.getElementById('sel-vendedor').value;
            const esFijo = !document.getElementById('box-fijo').classList.contains('hidden');
            const cli = esFijo ? document.getElementById('sel-cliente').value : document.getElementById('nom-cliente').value;
            
            if (!vend || !cli) return alert("Completa Vendedor y Cliente.");

            const venta = {
                vendedor: vend,
                cliente: cli.toUpperCase(),
                producto: itemActual.nombre,
                variante: document.getElementById('sel-fragancia').value,
                cantidad: document.getElementById('cant').value,
                tipo: modalidad.toUpperCase(),
                total: document.getElementById('total-display').innerText.replace('$', ''),
                timestamp: Date.now(),
                fecha: new Date().toLocaleTimeString()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'ventas_realizadas'), venta);
                alert("✓ VENTA REGISTRADA");
                document.getElementById('nom-cliente').value = "";
                document.getElementById('cant').value = 1;
            } catch (err) {
                alert("Error de conexión");
            }
        };

        signInAnonymously(auth);
    </script>
</body>
</html>
