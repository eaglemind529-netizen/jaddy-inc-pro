                <div class="relative">
                    <p class="text-[7px] text-gray-500 font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase">Variante / Tamaño</p>

                    </select>
                </div>

            <!-- Tipo de Venta -->
            <div class="grid grid-cols-3 gap-2">
                <button id="t-contado" class="tab-btn active">Contado</button>

            <!-- PANEL DE FECHAS (CRÉDITO) -->
            <div id="panel-fechas" class="date-panel">
                <div class="relative">

                <div class="relative">
                    <p class="text-[7px] text-red-500 font-black uppercase mb-1 ml-1">Fecha de Cobro</p>
                    <input type="date" id="fecha-pago" class="input-field !p-2 !text-[11px]">

            <!-- Cantidad y Precio -->
            <div class="grid grid-cols-2 gap-3">

                    <p class="text-[7px] text-gray-500 font-black absolute top-2 left-3 uppercase">Cant.</p>
                    <input type="number" id="inp-cantidad" value="1" min="1" class="input-field text-center text-xl pt-6">
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 font-black absolute top-2 left-3 uppercase">Total USD</p>
                    <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-xl text-green-400 pt-6">
                </div>
            </div>

            <button id="btn-venta" class="w-full bg-white text-black font-black py-5 rounded-xl uppercase text-sm active:scale-95 transition-transform shadow-lg">

    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2 italic">Historial de Hoy</h2>
    <div id="listaVentas" class="space-y-3 pb-10">
        <div class="text-center py-10 opacity-20 text-xs font-bold italic">Esperando conexión...</div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN PROPORCIONADA
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890",
            measurementId: "G-7VCRCRSCRQ"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let dataStore = { productos: [], vendedores: [], clientes: [], seleccionado: null, tipoVenta: 'CONTADO' };

        // UI Status Helper
        const setStatus = (online) => {
            const dot = document.getElementById('statusDot');
            if (dot) dot.className = online ? 'status-online' : 'status-offline';
        };

        // Inicio de Sesión y Conexión de Datos
        async function initApp() {
            try {
                // Autenticación primero
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        setStatus(true);
                        activarListeners();
                    } else {
                        setStatus(false);
                    }
                });
            } catch (err) {
                console.error("Error de conexión:", err);
                setStatus(false);
            }
        }

        function activarListeners() {
            // Regla 1: Rutas de colecciones exactas
            const publicData = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

            // Escuchar Vendedores
            onSnapshot(publicData('vendedores'), (snap) => {
                dataStore.vendedores = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const sel = document.getElementById('sel-vendedor');
                sel.innerHTML = '<option value="">-- SELECCIONAR VENDEDOR --</option>' + 
                    dataStore.vendedores.map(v => `<option value="${v.nombre}">${v.nombre}</option>`).join('');
            }, (err) => console.log("Error vendedores:", err));

            // Escuchar Clientes
            onSnapshot(publicData('clientes'), (snap) => {
                dataStore.clientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const sel = document.getElementById('sel-cliente');
                sel.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>' + 
                    dataStore.clientes.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
            }, (err) => console.log("Error clientes:", err));

            // Escuchar Productos
            onSnapshot(publicData('productos'), (snap) => {
                dataStore.productos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const sel = document.getElementById('sel-producto');
                sel.innerHTML = '<option value="">-- SELECCIONAR PRODUCTO --</option>' + 
                    dataStore.productos.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            }, (err) => console.log("Error productos:", err));

            // Escuchar Historial de Ventas
            onSnapshot(publicData('ventas'), (snap) => {
                const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}))
                    .sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                renderVentas(ventas.slice(0, 10));
            }, (err) => console.log("Error ventas:", err));
        }

        // --- MANEJO DE INTERFAZ ---
        document.getElementById('btn-cli-reg').onclick = () => {
            document.getElementById('btn-cli-reg').classList.add('active');
            document.getElementById('btn-cli-ocu').classList.remove('active');
            document.getElementById('area-cliente-reg').classList.remove('hidden');
            document.getElementById('area-cliente-ocu').classList.add('hidden');
        };

        document.getElementById('btn-cli-ocu').onclick = () => {
            document.getElementById('btn-cli-ocu').classList.add('active');
            document.getElementById('btn-cli-reg').classList.remove('active');
            document.getElementById('area-cliente-ocu').classList.remove('hidden');
            document.getElementById('area-cliente-reg').classList.add('hidden');
        };

        const tBtns = ['contado', 'credito', 'mayor'];
        tBtns.forEach(t => {
            document.getElementById(`t-${t}`).onclick = () => {
                dataStore.tipoVenta = t.toUpperCase();
                tBtns.forEach(x => document.getElementById(`t-${x}`).classList.toggle('active', x === t));
                document.getElementById('panel-fechas').classList.toggle('visible', t === 'credito');
                actualizarCalculos();
            };
        });

        document.getElementById('sel-producto').onchange = (e) => {
            const p = dataStore.productos.find(prod => prod.id === e.target.value);
            dataStore.seleccionado = p;
            if (p && p.variantes) {
                 document.getElementById('sel-variante').innerHTML = p.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                 document.getElementById('sel-variante').innerHTML = '<option value="GENERAL">GENERAL</option>';
            }
            actualizarCalculos();
        };

        function actualizarCalculos() {
            const p = dataStore.seleccionado;
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 0;
            if (!p) return;
            let precio = dataStore.tipoVenta === 'CONTADO' ? (p.precio_detal || 0) : 
                         dataStore.tipoVenta === 'CREDITO' ? (p.precio_credito || 0) : (p.precio_mayor || 0);
            document.getElementById('inp-precio').value = (precio * cant).toFixed(2);
        }

        document.getElementById('inp-cantidad').oninput = actualizarCalculos;

        // ACCIÓN: REGISTRAR VENTA
        document.getElementById('btn-venta').onclick = async () => {
            const btn = document.getElementById('btn-venta');
            const vendedor = document.getElementById('sel-vendedor').value;
            const prodId = document.getElementById('sel-producto').value;
            const cliReg = document.getElementById('btn-cli-reg').classList.contains('active');
            const cliente = cliReg ? document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-nom').value;

            if (!vendedor || !prodId || !cliente) {
                alert("Por favor completa los campos obligatorios.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Procesando...';

            try {
                const ventaData = {
                    vendedor: vendedor,
                    cliente: cliente.toUpperCase(),
                    productoNombre: dataStore.seleccionado.nombre,
                    variante: document.getElementById('sel-variante').value,
                    tipo: dataStore.tipoVenta,
                    cantidad: Number(document.getElementById('inp-cantidad').value),
                    total: Number(document.getElementById('inp-precio').value),
                    fecha_entrega: document.getElementById('fecha-entrega').value || null,
                    fecha_cobro: dataStore.tipoVenta === 'CREDITO' ? document.getElementById('fecha-pago').value : null,
                    timestamp: Date.now(),
                    creadoPor: auth.currentUser.uid
                };

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ventas'), ventaData);
                
                // Limpiar campos
                document.getElementById('inp-cliente-nom').value = "";
                alert("Venta procesada con éxito.");
            } catch (err) {
                console.error(err);
                alert("Error al guardar la venta.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Procesar Despacho";
            }
        };

        function renderVentas(ventas) {
            const list = document.getElementById('listaVentas');
            if (ventas.length === 0) {
                list.innerHTML = '<div class="text-center py-10 opacity-20 text-xs italic">Sin ventas registradas</div>';
                return;
            }
            list.innerHTML = ventas.map(v => `
                <div class="sale-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[7px] ${v.tipo === 'CREDITO' ? 'text-red-500' : 'text-gold'} font-black">${v.tipo}</span>
                            <div class="text-xs font-black uppercase text-white">${v.cliente}</div>
                            <div class="text-[8px] text-gray-500 font-bold">${v.productoNombre} (${v.variante})</div>
                            <div class="text-[6px] text-gray-600 mt-1">POR: ${v.vendedor}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-black text-green-400">$${(v.total || 0).toFixed(2)}</div>
                            <div class="text-[7px] text-gray-600">${v.cantidad} UNID.</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Iniciar
        initApp();
    </script>
</body>
</html>
