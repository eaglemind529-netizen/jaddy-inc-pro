```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE VENTAS | JADDY INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000000; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-field { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px; padding: 12px; width: 100%; color: white; font-size: 13px; font-weight: 600; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: var(--gold); background: #111; }
        .tab-btn { flex: 1; padding: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-radius: 8px; border: 1px solid #1a1a1a; color: #444; transition: 0.3s; }
        .tab-btn.active { background: #D4AF37; color: black; border-color: #D4AF37; }
        .card-venta { background: #050505; border: 1px solid #111; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        #status-indicator { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .connected { background: #00ff00 !important; box-shadow: 0 0 12px #00ff00 !important; }
    </style>
</head>
<body class="p-4 pb-24 max-w-lg mx-auto">

    <!-- HEADER DE ESTADO -->
    <header class="flex justify-between items-center mb-6 bg-[#0a0a0a] p-3 rounded-2xl border border-white/5">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="bg-red-600"></div>
            <div>
                <p id="conn-text" class="text-[9px] font-black uppercase text-red-500 tracking-widest">Desconectado</p>
                <p id="user-id-display" class="text-[7px] text-gray-500 font-mono">Esperando Auth...</p>
            </div>
        </div>
        <div class="text-[10px] text-gold font-black italic tracking-tighter">JADDY INC PRO</div>
    </header>

    <!-- FORMULARIO -->
    <section class="gold-border bg-[#050505] p-5 rounded-[24px] mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[11px] tracking-[3px] mb-6 italic underline decoration-gold/20">Operación de Caja</h2>
        
        <div class="space-y-4">
            <input type="hidden" id="edit-id" value="">
            
            <!-- VENDEDOR -->
            <div>
                <p class="text-[8px] text-gold uppercase mb-1 font-bold ml-1">Vendedor Responsable</p>
                <select id="sel-vendedor" class="input-field border-gold/20">
                    <option value="">Cargando vendedores...</option>
                </select>
            </div>

            <!-- CLIENTE -->
            <div class="flex gap-2">
                <button onclick="setClienteType(true)" id="c-reg" class="tab-btn active">Registrado</button>
                <button onclick="setClienteType(false)" id="c-ocu" class="tab-btn">Ocasional</button>
            </div>
            
            <div id="box-reg">
                <select id="sel-cliente" class="input-field">
                    <option value="">Cargando clientes...</option>
                </select>
            </div>
            <div id="box-ocu" class="hidden">
                <input type="text" id="inp-cliente-ocu" placeholder="NOMBRE COMPLETO" class="input-field uppercase">
            </div>

            <!-- PRODUCTO -->
            <div class="grid grid-cols-1 gap-3">
                <div>
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold ml-1">Producto / Servicio</p>
                    <select id="sel-producto" class="input-field">
                        <option value="">Cargando catálogo...</option>
                    </select>
                </div>
                <div>
                    <p class="text-[8px] text-gold uppercase mb-1 font-bold ml-1">Variante / Fragancia</p>
                    <select id="sel-variante" class="input-field border-gold/30">
                        <option value="">Seleccione producto</option>
                    </select>
                </div>
            </div>

            <!-- TIPO DE PAGO -->
            <div class="flex gap-1">
                <button onclick="setVentaType('CONTADO')" id="v-contado" class="tab-btn active">Contado</button>
                <button onclick="setVentaType('CREDITO')" id="v-credito" class="tab-btn">Crédito</button>
                <button onclick="setVentaType('PRESUPUESTO')" id="v-presupuesto" class="tab-btn">Presupuesto</button>
            </div>

            <!-- CANTIDAD Y PRECIO -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 p-2 rounded-xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold text-center">Cantidad</p>
                    <input type="number" id="inp-cant" value="1" min="1" oninput="updateTotal()" class="bg-transparent w-full text-center text-2xl font-black outline-none">
                </div>
                <div class="bg-white/5 p-2 rounded-xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold text-center">Total USD</p>
                    <input type="text" id="inp-total" value="0.00" readonly class="bg-transparent w-full text-center text-2xl font-black text-green-500 outline-none">
                </div>
            </div>

            <button id="btn-save" onclick="saveVenta()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest mt-2 active:scale-95 transition-transform">
                Procesar y Guardar
            </button>
            <button id="btn-cancel" onclick="resetForm()" class="hidden w-full bg-red-950/20 text-red-500 font-bold py-2 rounded-lg uppercase text-[9px] mt-2 border border-red-500/20">
                Cancelar Edición
            </button>
        </div>
    </section>

    <!-- LISTADO -->
    <div id="ventas-list" class="space-y-3">
        <div class="text-center py-10 opacity-20 text-[10px] uppercase font-black tracking-[4px]">Sincronizando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-app';

        let uID = null;
        let store = { productos: [], clientes: [], vendedores: [], ventas: [] };
        let curProd = null;
        let vType = 'CONTADO';

        // 1. INICIAR AUTENTICACIÓN (REGLA 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth Error:", e); }
        };

        // 2. ESCUCHAR CAMBIOS DE AUTH Y CARGAR DATOS
        onAuthStateChanged(auth, (user) => {
            if (user) {
                uID = user.uid;
                document.getElementById('status-indicator').classList.add('connected');
                document.getElementById('conn-text').innerText = "CONECTADO";
                document.getElementById('conn-text').className = "text-[9px] font-black uppercase text-green-500 tracking-widest";
                document.getElementById('user-id-display').innerText = "ID: " + uID;
                
                // Solo cargar datos cuando tenemos uID
                startSync();
            }
        });

        initAuth();

        // 3. SINCRONIZACIÓN DE DATOS (REGLA 1 Y 2)
        function startSync() {
            if (!uID) return;

            // Vendedores
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'vendedores'), (s) => {
                store.vendedores = s.docs.map(d => d.data().nombre);
                fillSelect('sel-vendedor', store.vendedores, 'Vendedor');
            }, (e) => console.error("Vendedores Error:", e));

            // Clientes
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'clientes'), (s) => {
                store.clientes = s.docs.map(d => d.data().nombre);
                fillSelect('sel-cliente', store.clientes, 'Cliente');
            }, (e) => console.error("Clientes Error:", e));

            // Productos
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'productos'), (s) => {
                store.productos = s.docs.map(d => ({ id: d.id, ...d.data() }));
                fillSelect('sel-producto', store.productos.map(p => ({v: p.id, t: p.nombre})), 'Producto');
            }, (e) => console.error("Productos Error:", e));

            // Ventas / Presupuestos
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), (s) => {
                store.ventas = s.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderVentas();
            }, (e) => console.error("Ventas Error:", e));
        }

        function fillSelect(id, data, label) {
            const el = document.getElementById(id);
            let html = `<option value="">-- SELECCIONAR ${label.toUpperCase()} --</option>`;
            data.forEach(i => {
                if (typeof i === 'object') html += `<option value="${i.v}">${i.t}</option>`;
                else html += `<option value="${i}">${i}</option>`;
            });
            el.innerHTML = html;
        }

        // LÓGICA DE INTERFAZ
        window.setClienteType = (isReg) => {
            document.getElementById('c-reg').className = isReg ? 'tab-btn active' : 'tab-btn';
            document.getElementById('c-ocu').className = !isReg ? 'tab-btn active' : 'tab-btn';
            document.getElementById('box-reg').classList.toggle('hidden', !isReg);
            document.getElementById('box-ocu').classList.toggle('hidden', isReg);
        };

        window.setVentaType = (t) => {
            vType = t;
            ['CONTADO', 'CREDITO', 'PRESUPUESTO'].forEach(type => {
                document.getElementById(`v-${type.toLowerCase()}`).className = (type === t) ? 'tab-btn active' : 'tab-btn';
            });
            updateTotal();
        };

        document.getElementById('sel-producto').onchange = (e) => {
            curProd = store.productos.find(p => p.id === e.target.value);
            const varEl = document.getElementById('sel-variante');
            if (curProd) {
                let list = curProd.variantes || curProd.fragancias || [];
                if (typeof list === 'string') list = list.split(',');
                varEl.innerHTML = list.map(v => `<option value="${v.trim()}">${v.trim().toUpperCase()}</option>`).join('');
            } else {
                varEl.innerHTML = '<option value="">Seleccione producto</option>';
            }
            updateTotal();
        };

        window.updateTotal = () => {
            if (!curProd) return;
            const cant = parseInt(document.getElementById('inp-cant').value) || 0;
            let pUSD = parseFloat(curProd.precio_detal || curProd.precio || 0);
            if (vType === 'CREDITO') pUSD = parseFloat(curProd.precio_credito || pUSD);
            document.getElementById('inp-total').value = (pUSD * cant).toFixed(2);
        };

        window.saveVenta = async () => {
            if (!uID || !curProd) return;
            const btn = document.getElementById('btn-save');
            const editId = document.getElementById('edit-id').value;
            
            const vendor = document.getElementById('sel-vendedor').value;
            const isReg = document.getElementById('c-reg').classList.contains('active');
            const client = isReg ? document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-ocu').value;
            const variant = document.getElementById('sel-variante').value;

            if (!vendor || !client) {
                btn.classList.add('bg-red-500');
                setTimeout(() => btn.classList.remove('bg-red-500'), 1000);
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const payload = {
                vendedor: vendor,
                cliente: client.toUpperCase(),
                producto: curProd.nombre,
                productoId: curProd.id,
                variante: variant,
                cantidad: parseInt(document.getElementById('inp-cant').value),
                total: parseFloat(document.getElementById('inp-total').value),
                tipo: vType,
                createdAt: serverTimestamp(),
                fechaStr: new Date().toLocaleDateString()
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas', editId), payload);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), payload);
                }
                resetForm();
            } catch (e) { console.error("Error guardando:", e); }
            
            btn.disabled = false;
            btn.innerText = "PROCESAR Y GUARDAR";
        };

        window.deleteVenta = async (id) => {
            if(confirm('¿Eliminar este registro?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas', id));
            }
        };

        window.editVenta = (id) => {
            const v = store.ventas.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('sel-vendedor').value = v.vendedor;
            document.getElementById('sel-producto').value = v.productoId;
            document.getElementById('sel-producto').dispatchEvent(new Event('change'));
            
            setTimeout(() => {
                document.getElementById('sel-variante').value = v.variante;
                setVentaType(v.tipo);
                document.getElementById('inp-cant').value = v.cantidad;
                updateTotal();
            }, 100);

            document.getElementById('btn-save').innerText = "ACTUALIZAR REGISTRO";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('inp-cliente-ocu').value = "";
            document.getElementById('inp-cant').value = 1;
            document.getElementById('inp-total').value = "0.00";
            document.getElementById('btn-save').innerText = "PROCESAR Y GUARDAR";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        function renderVentas() {
            const list = document.getElementById('ventas-list');
            if (store.ventas.length === 0) {
                list.innerHTML = '<div class="text-center py-10 opacity-20 text-[9px] uppercase font-bold">Sin movimientos registrados</div>';
                return;
            }
            list.innerHTML = store.ventas.map(v => `
                <div class="card-venta gold-border/10">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="px-2 py-0.5 rounded-[4px] text-[8px] font-black uppercase ${v.tipo === 'PRESUPUESTO' ? 'bg-blue-600 text-white' : 'bg-gold text-black'}">${v.tipo}</span>
                                <span class="text-[8px] text-gray-600 font-bold tracking-tighter">${v.fechaStr}</span>
                            </div>
                            <h3 class="text-[11px] font-black uppercase text-white tracking-wide">${v.cliente}</h3>
                            <p class="text-[10px] text-gray-500 mt-1 font-medium">${v.producto} <span class="text-gold/50 ml-1">#${v.variante}</span></p>
                        </div>
                        <div class="text-right">
                            <div class="flex gap-4 justify-end mb-3">
                                <button onclick="editVenta('${v.id}')" class="text-blue-500/50 hover:text-blue-500"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteVenta('${v.id}')" class="text-red-500/50 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                            <div class="text-xl font-black text-white">$${v.total.toFixed(2)}</div>
                            <div class="text-[7px] text-gold/40 uppercase font-black tracking-widest mt-1">Vendedor: ${v.vendedor}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
