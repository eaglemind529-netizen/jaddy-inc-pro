```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto de Venta | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; outline: none; }
        .input-field:focus { border-color: var(--gold); }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #666; background: transparent; transition: 0.3s; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .btn-main { background: white; color: black; font-weight: 900; border-radius: 15px; width: 100%; padding: 18px; text-transform: uppercase; transition: 0.2s; active:scale-95; }
        .label-text { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; margin-left: 5px; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .card-venta { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6 pt-2">
        <div>
            <h1 class="text-[12px] font-black uppercase tracking-[3px]">Sistema <span class="text-gold">Ventas</span></h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase">Jaddy INC Professional</p>
        </div>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></div>
    </header>

    <div class="bg-[#0A0A0A] p-5 rounded-[30px] gold-border space-y-5 shadow-2xl">
        <!-- VENDEDOR -->
        <div>
            <label class="label-text">Vendedor</label>
            <select id="sel-vendedor" class="input-field text-gold">
                <option value="">Cargando equipo...</option>
            </select>
        </div>

        <!-- CLIENTE -->
        <div>
            <div class="flex gap-2 mb-3">
                <button id="btn-cli-reg" onclick="toggleCliente(true)" class="tab-btn active">Cliente Fijo</button>
                <button id="btn-cli-ocu" onclick="toggleCliente(false)" class="tab-btn">Ocasional</button>
            </div>
            <div id="area-cliente-reg">
                <select id="sel-cliente" class="input-field">
                    <option value="">Seleccionar Cliente...</option>
                </select>
            </div>
            <div id="area-cliente-ocu" class="hidden">
                <input type="text" id="inp-cliente-nom" placeholder="Nombre Completo" class="input-field">
            </div>
        </div>

        <!-- PRODUCTO Y VARIANTE -->
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="label-text">Producto</label>
                <select id="sel-producto" class="input-field">
                    <option value="">-- SELECCIONAR --</option>
                </select>
            </div>
            <div>
                <label class="label-text text-gold">Fragancia / Variante</label>
                <select id="sel-variante" class="input-field border-gold/30">
                    <option value="">-</option>
                </select>
            </div>
        </div>

        <!-- TIPO DE PRECIO -->
        <div>
            <label class="label-text">Modalidad de Pago</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTipo('DETAL')" id="t-detal" class="tab-btn active text-[9px]">Detal</button>
                <button onclick="setTipo('CREDITO')" id="t-credito" class="tab-btn text-[9px]">Crédito</button>
                <button onclick="setTipo('MAYOR')" id="t-mayor" class="tab-btn text-[9px]">Mayor</button>
            </div>
        </div>

        <!-- CANTIDAD Y TOTAL -->
        <div class="grid grid-cols-2 gap-4 pt-2">
            <div class="bg-[#111] p-3 rounded-2xl border border-white/5">
                <label class="label-text text-center ml-0">Cantidad</label>
                <input type="number" id="inp-cantidad" value="1" min="1" class="w-full bg-transparent text-center text-3xl font-black outline-none text-white">
            </div>
            <div class="bg-[#111] p-3 rounded-2xl border border-gold/10">
                <label class="label-text text-center ml-0 text-gold font-black">Total USD</label>
                <div class="text-center text-3xl font-black text-green-500" id="display-total">$0.00</div>
            </div>
        </div>

        <button onclick="registrarVenta()" class="btn-main mt-4 shadow-xl">Confirmar Venta</button>
    </div>

    <div class="mt-8">
        <h3 class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-50">Últimos Movimientos</h3>
        <div id="listaVentas" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let userUid = null;
        let productosCache = [];
        let pSeleccionado = null;
        let tipoVenta = 'DETAL';

        const statusDot = document.getElementById('statusDot');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                statusDot.classList.remove('bg-red-600');
                statusDot.classList.add('bg-green-500');
                statusDot.style.boxShadow = "0 0 10px #22c55e";
                iniciarSincronizacion();
            }
        });

        function iniciarSincronizacion() {
            // Sincronizar Vendedores (Asegúrate de que la colección sea 'vendedores')
            onSnapshot(collection(db, 'artifacts', appId, 'users', userUid, 'vendedores'), snap => {
                const sel = document.getElementById('sel-vendedor');
                sel.innerHTML = snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('') || '<option value="">SIN VENDEDORES</option>';
            });

            // Sincronizar Clientes
            onSnapshot(collection(db, 'artifacts', appId, 'users', userUid, 'clientes'), snap => {
                const sel = document.getElementById('sel-cliente');
                const options = snap.docs.map(d => `<option value="${d.data().nombre}">${d.data().nombre.toUpperCase()}</option>`).join('');
                sel.innerHTML = '<option value="">SELECCIONAR CLIENTE</option>' + options;
            });

            // Sincronizar Productos e Inventario
            onSnapshot(collection(db, 'artifacts', appId, 'users', userUid, 'productos'), snap => {
                productosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sel = document.getElementById('sel-producto');
                sel.innerHTML = '<option value="">-- ELEGIR PRODUCTO --</option>' + 
                    productosCache.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()}</option>`).join('');
            });

            // Sincronizar Historial de Ventas (limitado a 10)
            const qVentas = query(collection(db, 'artifacts', appId, 'users', userUid, 'ventas_realizadas'), orderBy("timestamp", "desc"), limit(10));
            onSnapshot(qVentas, snap => {
                const container = document.getElementById('listaVentas');
                container.innerHTML = snap.docs.map(d => {
                    const v = d.data();
                    return `
                        <div class="card-venta p-4 rounded-2xl flex justify-between items-center shadow-lg">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[7px] bg-white text-black px-1.5 py-0.5 rounded font-black">${v.tipo}</span>
                                    <span class="text-[7px] text-gold font-bold uppercase">${v.vendedor}</span>
                                </div>
                                <h4 class="text-[11px] font-black uppercase text-white">${v.cliente}</h4>
                                <p class="text-[8px] text-gray-500 font-medium">${v.producto} • ${v.variante}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-green-400 font-black text-sm">$${parseFloat(v.total).toFixed(2)}</p>
                                <p class="text-[7px] text-gray-700 font-bold uppercase">${v.hora || ''}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // Cambio de Producto -> Carga Variantes
        document.getElementById('sel-producto').onchange = (e) => {
            pSeleccionado = productosCache.find(x => x.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            if (pSeleccionado) {
                // Buscamos en 'variantes' o 'fragancias' (común en tus fotos)
                const lista = pSeleccionado.variantes || pSeleccionado.fragancias || [];
                if (lista.length > 0) {
                    selVar.innerHTML = lista.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
                } else {
                    selVar.innerHTML = '<option value="GENERAL">ESTÁNDAR</option>';
                }
                calcular();
            }
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['detal', 'credito', 'mayor'].forEach(id => {
                document.getElementById('t-'+id).classList.toggle('active', id === t.toLowerCase());
            });
            calcular();
        };

        function calcular() {
            if (!pSeleccionado) return;
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 1;
            
            // Lógica de precios según el tipo seleccionado
            let precioUnitario = parseFloat(pSeleccionado.precio_detal || 0);
            if (tipoVenta === 'CREDITO') precioUnitario = parseFloat(pSeleccionado.precio_credito || precioUnitario);
            if (tipoVenta === 'MAYOR') precioUnitario = parseFloat(pSeleccionado.precio_mayor || precioUnitario);

            const total = precioUnitario * cant;
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        }

        document.getElementById('inp-cantidad').oninput = calcular;

        window.toggleCliente = (reg) => {
            document.getElementById('btn-cli-reg').classList.toggle('active', reg);
            document.getElementById('btn-cli-ocu').classList.toggle('active', !reg);
            document.getElementById('area-cliente-reg').classList.toggle('hidden', !reg);
            document.getElementById('area-cliente-ocu').classList.toggle('hidden', reg);
        };

        window.registrarVenta = async () => {
            if(!userUid || !pSeleccionado) return alert("Selecciona un producto primero.");
            
            const vName = document.getElementById('sel-vendedor').value;
            const isReg = document.getElementById('btn-cli-reg').classList.contains('active');
            const cName = isReg ? document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-nom').value;
            const varElegida = document.getElementById('sel-variante').value;
            const totalVenta = document.getElementById('display-total').innerText.replace('$', '');

            if(!vName || !cName) {
                alert("Faltan datos de Vendedor o Cliente");
                return;
            }

            const data = {
                vendedor: vName,
                cliente: cName.toUpperCase(),
                producto: pSeleccionado.nombre,
                variante: varElegida,
                cantidad: parseInt(document.getElementById('inp-cantidad').value),
                total: totalVenta,
                tipo: tipoVenta,
                timestamp: Date.now(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true})
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', userUid, 'ventas_realizadas'), data);
                // Feedback visual de éxito
                alert("VENTA REGISTRADA CON ÉXITO");
                // Reset básico
                document.getElementById('inp-cantidad').value = 1;
                document.getElementById('inp-cliente-nom').value = "";
            } catch (e) {
                console.error(e);
                alert("Error al guardar en base de datos");
            }
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();
    </script>
</body>
</html>
