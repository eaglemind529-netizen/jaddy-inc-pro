```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JADDY INC | ADMINISTRADOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.4); }
        .input-style { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: white; font-size: 14px; outline: none; }
        .input-style:focus { border-color: var(--gold); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; transition: 0.5s; }
        .active-conn { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .inactive-conn { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-8 bg-zinc-950 p-4 rounded-2xl border border-white/5">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="status-dot inactive-conn"></div>
            <div>
                <p id="status-text" class="text-[10px] font-black uppercase text-red-500">Sin Sincronizar</p>
                <p id="user-id-view" class="text-[7px] text-zinc-600 font-mono tracking-tighter italic">Esperando UID...</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-gold font-black italic text-xs">JADDY INC</p>
            <p class="text-[8px] text-zinc-500 font-bold uppercase">Higuerote - Control</p>
        </div>
    </header>

    <main class="gold-border bg-[#050505] p-6 rounded-[30px] shadow-2xl">
        <div class="space-y-5">
            
            <div>
                <label class="text-[9px] text-gold font-black uppercase mb-2 block tracking-widest">Vendedor / Despacho</label>
                <select id="vendedor_select" class="input-style border-gold/20">
                    <option value="">CARGANDO PERSONAL...</option>
                </select>
            </div>

            <div>
                <label class="text-[9px] text-zinc-500 font-black uppercase mb-2 block tracking-widest">Cliente</label>
                <input type="text" id="cliente_nombre" placeholder="ESCRIBE EL NOMBRE" class="input-style uppercase font-bold">
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase mb-2 block tracking-widest">Línea de Producto</label>
                    <select id="producto_select" class="input-style"></select>
                </div>
                <div>
                    <label class="text-[9px] text-gold font-black uppercase mb-2 block tracking-widest">Fragancia</label>
                    <select id="fragancia_select" class="input-style border-gold/10"></select>
                </div>
            </div>

            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5">
                <div class="flex justify-between items-center">
                    <div class="text-center">
                        <p class="text-[8px] text-zinc-500 font-bold uppercase">Cant.</p>
                        <input type="number" id="cantidad_val" value="1" min="1" class="bg-transparent text-xl font-black w-12 text-center outline-none">
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-zinc-500 font-bold uppercase italic">Monto Total</p>
                        <input type="text" id="monto_total" value="0.00" readonly class="bg-transparent text-2xl font-black text-green-500 text-right outline-none w-32">
                    </div>
                </div>
            </div>

            <button onclick="enviarRegistro()" id="btn-final" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-[11px] tracking-[3px] active:scale-95 transition-all">
                Guardar Operación
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-app';

        let uID = null;
        let catalogo = [];

        // 1. AUTENTICACIÓN INMEDIATA
        const connect = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uID = user.uid;
                document.getElementById('status-indicator').className = 'status-dot active-conn';
                document.getElementById('status-text').innerText = 'SINCRONIZADO';
                document.getElementById('status-text').className = 'text-[10px] font-black uppercase text-green-500';
                document.getElementById('user-id-view').innerText = `ID: ${uID}`;
                fetchData();
            }
        });

        connect();

        // 2. CARGA DE DATOS SIN ERRORES DE CAMPO
        function fetchData() {
            // Vendedores (Path: artifacts/appId/users/uID/vendedores)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'vendedores'), (snap) => {
                const list = snap.docs.map(d => d.data().nombre || d.data().vendedor || d.id);
                const select = document.getElementById('vendedor_select');
                select.innerHTML = '<option value="">-- SELECCIONAR --</option>' + 
                    list.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
            });

            // Productos (Path: artifacts/appId/users/uID/productos)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'productos'), (snap) => {
                catalogo = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const pSelect = document.getElementById('producto_select');
                pSelect.innerHTML = '<option value="">-- PRODUCTO --</option>' + 
                    catalogo.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()}</option>`).join('');
            });
        }

        // 3. LÓGICA DE NEGOCIO (FRAGANCIAS Y TOTAL)
        document.getElementById('producto_select').onchange = (e) => {
            const prod = catalogo.find(x => x.id === e.target.value);
            const fSelect = document.getElementById('fragancia_select');
            if(prod) {
                let frags = prod.fragancias || prod.variantes || [];
                if(typeof frags === 'string') frags = frags.split(',');
                fSelect.innerHTML = frags.map(f => `<option value="${f.trim()}">${f.trim().toUpperCase()}</option>`).join('');
            }
            calcular();
        };

        function calcular() {
            const p = catalogo.find(x => x.id === document.getElementById('producto_select').value);
            if(!p) return;
            const cant = document.getElementById('cantidad_val').value;
            const precio = p.precio_detal || p.precio || 0;
            document.getElementById('monto_total').value = (precio * cant).toFixed(2);
        }

        document.getElementById('cantidad_val').oninput = calcular;

        // 4. GUARDADO EN LA RUTA CORRECTA
        window.enviarRegistro = async () => {
            const btn = document.getElementById('btn-final');
            const data = {
                vendedor: document.getElementById('vendedor_select').value,
                cliente: document.getElementById('cliente_nombre').value.toUpperCase(),
                producto: document.getElementById('producto_select').options[document.getElementById('producto_select').selectedIndex].text,
                fragancia: document.getElementById('fragancia_select').value,
                cantidad: Number(document.getElementById('cantidad_val').value),
                total: Number(document.getElementById('monto_total').value),
                createdAt: serverTimestamp()
            };

            if(!data.vendedor || !data.cliente) return;

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), data);
                document.getElementById('cliente_nombre').value = "";
                btn.innerText = "¡REGISTRADO!";
                setTimeout(() => { btn.disabled = false; btn.innerText = "Guardar Operación"; }, 1500);
            } catch (e) {
                console.error(e);
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
