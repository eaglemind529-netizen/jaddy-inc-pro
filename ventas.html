
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE VENTAS | JADDY INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000000; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-field { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px; padding: 12px; width: 100%; color: white; font-size: 13px; font-weight: 600; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: var(--gold); background: #111; }
        .tab-btn { flex: 1; padding: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-radius: 8px; border: 1px solid #1a1a1a; color: #444; }
        .tab-btn.active { background: #D4AF37; color: black; border-color: #D4AF37; }
        .card-venta { background: #050505; border: 1px solid #111; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        #status-indicator { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px rgba(255,0,0,0.5); transition: 0.3s; }
        .connected { background: #00ff00 !important; box-shadow: 0 0 12px #00ff00 !important; }
    </style>
</head>
<body class="p-4 pb-24 max-w-lg mx-auto">

    <!-- CABECERA DE CONEXIÓN -->
    <header class="flex justify-between items-center mb-6 bg-[#0a0a0a] p-3 rounded-2xl border border-white/5">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="bg-red-600"></div>
            <div>
                <p id="conn-text" class="text-[9px] font-black uppercase text-red-500">Desconectado</p>
                <p id="user-id-display" class="text-[7px] text-gray-500 font-mono">Esperando sesión...</p>
            </div>
        </div>
        <button onclick="location.reload()" class="text-[10px] bg-white/5 px-3 py-1 rounded-lg border border-white/10 uppercase font-bold">Refrescar</button>
    </header>

    <!-- FORMULARIO DE REGISTRO -->
    <section class="gold-border bg-[#050505] p-5 rounded-[24px] mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[11px] tracking-[3px] mb-6 italic underline decoration-gold/20">Nueva Operación</h2>
        
        <div class="space-y-4">
            <input type="hidden" id="edit-id" value="">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <p class="text-[8px] text-gold uppercase mb-1 font-bold">Vendedor / Despacho</p>
                    <select id="sel-vendedor" class="input-field"></select>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="setClienteType(true)" id="c-reg" class="tab-btn active">Registrado</button>
                <button onclick="setClienteType(false)" id="c-ocu" class="tab-btn">Ocasional</button>
            </div>
            
            <div id="box-reg">
                <select id="sel-cliente" class="input-field"></select>
            </div>
            <div id="box-ocu" class="hidden">
                <input type="text" id="inp-cliente-ocu" placeholder="Nombre del Cliente" class="input-field uppercase">
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div>
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold">Producto</p>
                    <select id="sel-producto" class="input-field"></select>
                </div>
                <div>
                    <p class="text-[8px] text-gold uppercase mb-1 font-bold">Fragancia / Variante</p>
                    <select id="sel-variante" class="input-field border-gold/30"></select>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="setVentaType('CONTADO')" id="v-contado" class="tab-btn active">Contado</button>
                <button onclick="setVentaType('CREDITO')" id="v-credito" class="tab-btn">Crédito</button>
                <button onclick="setVentaType('PRESUPUESTO')" id="v-presupuesto" class="tab-btn">Presupuesto</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold text-center">Cantidad</p>
                    <input type="number" id="inp-cant" value="1" min="1" oninput="updateTotal()" class="input-field text-center text-xl font-black">
                </div>
                <div>
                    <p class="text-[8px] text-gray-500 uppercase mb-1 font-bold text-center">Total</p>
                    <input type="text" id="inp-total" value="0.00" readonly class="input-field text-center text-xl font-black text-green-500">
                </div>
            </div>

            <button id="btn-save" onclick="saveVenta()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-xs tracking-tighter mt-2 shadow-lg active:scale-95 transition-transform">
                Procesar Operación
            </button>
            <button id="btn-cancel" onclick="resetForm()" class="hidden w-full bg-red-950/30 text-red-500 font-bold py-2 rounded-lg uppercase text-[9px] mt-2 border border-red-500/20">
                Cancelar Edición
            </button>
        </div>
    </section>

    <!-- LISTADO DE VENTAS / PRESUPUESTOS -->
    <div id="ventas-list" class="space-y-3">
        <div class="text-center py-10 text-gray-800 text-[10px] uppercase font-black">Cargando base de datos...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-app';

        let uID = null;
        let dataStore = { productos: [], clientes: [], vendedores: [], ventas: [] };
        let currentP = null;
        let vType = 'CONTADO';

        // CONEXIÓN CRÍTICA
        const initSession = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uID = user.uid;
                document.getElementById('status-indicator').classList.add('connected');
                document.getElementById('conn-text').innerText = "CONECTADO";
                document.getElementById('conn-text').className = "text-[9px] font-black uppercase text-green-500";
                document.getElementById('user-id-display').innerText = "ID: " + uID;
                loadData();
            }
        });

        initSession();

        function loadData() {
            if (!uID) return;
            const userPath = (name) => collection(db, 'artifacts', appId, 'users', uID, name);

            onSnapshot(userPath('vendedores'), (s) => {
                dataStore.vendedores = s.docs.map(d => d.data().nombre);
                renderSelect('sel-vendedor', dataStore.vendedores, 'Vendedor');
            });

            onSnapshot(userPath('clientes'), (s) => {
                dataStore.clientes = s.docs.map(d => d.data().nombre);
                renderSelect('sel-cliente', dataStore.clientes, 'Cliente');
            });

            onSnapshot(userPath('productos'), (s) => {
                dataStore.productos = s.docs.map(d => ({ id: d.id, ...d.data() }));
                renderSelect('sel-producto', dataStore.productos.map(p => ({v: p.id, t: p.nombre})), 'Producto');
            });

            onSnapshot(userPath('ventas_realizadas'), (s) => {
                dataStore.ventas = s.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderVentas();
            }, (err) => console.error("Error Firestore:", err));
        }

        function renderSelect(id, data, placeholder) {
            const el = document.getElementById(id);
            let html = `<option value="">-- ${placeholder.toUpperCase()} --</option>`;
            data.forEach(item => {
                if (typeof item === 'object') html += `<option value="${item.v}">${item.t}</option>`;
                else html += `<option value="${item}">${item}</option>`;
            });
            el.innerHTML = html;
        }

        window.setClienteType = (isReg) => {
            document.getElementById('c-reg').classList.toggle('active', isReg);
            document.getElementById('c-ocu').classList.toggle('active', !isReg);
            document.getElementById('box-reg').classList.toggle('hidden', !isReg);
            document.getElementById('box-ocu').classList.toggle('hidden', isReg);
        };

        window.setVentaType = (t) => {
            vType = t;
            ['v-contado', 'v-credito', 'v-presupuesto'].forEach(id => {
                document.getElementById(id).classList.toggle('active', id === `v-${t.toLowerCase()}`);
            });
            updateTotal();
        };

        document.getElementById('sel-producto').onchange = (e) => {
            currentP = dataStore.productos.find(p => p.id === e.target.value);
            const varEl = document.getElementById('sel-variante');
            if (currentP) {
                let vars = currentP.variantes || currentP.fragancias || [];
                if (typeof vars === 'string') vars = vars.split(',');
                varEl.innerHTML = vars.map(v => `<option value="${v.trim()}">${v.trim().toUpperCase()}</option>`).join('');
            } else {
                varEl.innerHTML = '';
            }
            updateTotal();
        };

        window.updateTotal = () => {
            if (!currentP) return;
            const cant = parseInt(document.getElementById('inp-cant').value) || 0;
            let price = parseFloat(currentP.precio_detal || currentP.precio || 0);
            if (vType === 'CREDITO') price = parseFloat(currentP.precio_credito || price);
            // El presupuesto usualmente usa precio de contado o uno base
            document.getElementById('inp-total').value = (price * cant).toFixed(2);
        };

        window.saveVenta = async () => {
            if (!uID) return;
            const btn = document.getElementById('btn-save');
            const editId = document.getElementById('edit-id').value;
            
            const vendor = document.getElementById('sel-vendedor').value;
            const isReg = document.getElementById('c-reg').classList.contains('active');
            const client = isReg ? document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-ocu').value;
            const variant = document.getElementById('sel-variante').value;
            
            if (!vendor || !client || !currentP || !variant) return; // Validación simple

            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            const docData = {
                vendedor: vendor,
                cliente: client.toUpperCase(),
                producto: currentP.nombre,
                productoId: currentP.id,
                variante: variant,
                cantidad: parseInt(document.getElementById('inp-cant').value),
                total: parseFloat(document.getElementById('inp-total').value),
                tipo: vType,
                createdAt: serverTimestamp(),
                fechaStr: new Date().toLocaleDateString(),
                horaStr: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas', editId), docData);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), docData);
                }
                resetForm();
            } catch (e) { console.error(e); }
            btn.disabled = false;
            btn.innerText = "Procesar Operación";
        };

        window.deleteVenta = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas', id));
        };

        window.editVenta = (id) => {
            const v = dataStore.ventas.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('sel-vendedor').value = v.vendedor;
            document.getElementById('sel-producto').value = v.productoId;
            
            document.getElementById('sel-producto').dispatchEvent(new Event('change'));
            setTimeout(() => {
                document.getElementById('sel-variante').value = v.variante;
                setVentaType(v.tipo);
                document.getElementById('inp-cant').value = v.cantidad;
                updateTotal();
            }, 100);

            document.getElementById('btn-save').innerText = "Actualizar Registro";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('inp-cliente-ocu').value = "";
            document.getElementById('inp-cant').value = 1;
            document.getElementById('inp-total').value = "0.00";
            document.getElementById('btn-save').innerText = "Procesar Operación";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        function renderVentas() {
            const list = document.getElementById('ventas-list');
            if (dataStore.ventas.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-800 text-[10px] uppercase font-black italic">No hay registros</div>';
                return;
            }
            list.innerHTML = dataStore.ventas.map(v => `
                <div class="card-venta">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="${v.tipo === 'PRESUPUESTO' ? 'bg-blue-600' : 'bg-gold'} text-black text-[7px] font-black px-1.5 py-0.5 rounded uppercase">${v.tipo}</span>
                                <span class="text-[7px] text-gray-500 font-bold">${v.fechaStr}</span>
                            </div>
                            <h3 class="text-xs font-black uppercase text-white">${v.cliente}</h3>
                            <p class="text-[9px] text-gray-400 mt-1">${v.producto} <span class="text-gold">(${v.variante})</span></p>
                        </div>
                        <div class="text-right">
                            <div class="flex gap-3 justify-end mb-2">
                                <button onclick="editVenta('${v.id}')" class="text-blue-400 text-[11px] opacity-40 hover:opacity-100"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteVenta('${v.id}')" class="text-red-500 text-[11px] opacity-40 hover:opacity-100"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <div class="text-lg font-black text-green-400">$${v.total.toFixed(2)}</div>
                            <div class="text-[8px] text-gray-600 uppercase font-bold">V: ${v.vendedor}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

```
