</head>
<body class="p-4 pb-24 max-w-xl mx-auto">

    <!-- BARRA DE ESTADO REAL-TIME -->
    <header class="flex justify-between items-center mb-6 bg-[#0a0a0a] p-4 rounded-2xl border border-white/5">
        <div class="flex items-center gap-3">
            <div id="indicador" class="status-dot offline"></div>

            </div>
        </div>
        <div class="text-right">
            <h1 class="text-gold font-black italic text-xs tracking-widest">JADDY INC</h1>
            <p class="text-[7px] text-gray-500 uppercase font-bold">Data Synchronization Active</p>
        </div>
    </header>

    <!-- FORMULARIO DE OPERACIÓN -->
    <div class="gold-border bg-[#050505] p-6 rounded-[28px] shadow-2xl mb-10">
        <div class="space-y-5">
            
            <!-- VENDEDOR (TU ESTRUCTURA) -->
            <div>
                <label class="text-[9px] text-gold font-black uppercase ml-1 mb-2 block tracking-widest">Responsable de Venta</label>
                <select id="vendedor" class="input-field"></select>
            </div>

            <!-- CLIENTE -->
            <div class="flex gap-2">
                <button onclick="toggleCliente(true)" id="tab-cli-reg" class="btn-tab active">Cliente Registrado</button>
                <button onclick="toggleCliente(false)" id="tab-cli-ocu" class="btn-tab">Ocasional</button>
            </div>
            
            <div id="cli-reg-box">
                <select id="cliente" class="input-field"></select>
            </div>
            <div id="cli-ocu-box" class="hidden">
                <input type="text" id="cliente_nombre" placeholder="NOMBRE DEL CLIENTE" class="input-field uppercase">
            </div>

            <!-- PRODUCTO Y FRAGANCIA (TU LÓGICA) -->
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="text-[9px] text-gray-500 font-black uppercase ml-1 mb-2 block tracking-widest">Línea de Producto</label>
                    <select id="producto" class="input-field"></select>
                </div>
                <div id="fragancia-container">
                    <label class="text-[9px] text-gold font-black uppercase ml-1 mb-2 block tracking-widest">Fragancia / Variante</label>
                    <select id="fragancia" class="input-field border-gold/20"></select>
                </div>
            </div>

            <!-- MODO DE OPERACIÓN -->
            <div class="flex gap-1">
                <button onclick="setModo('CONTADO')" id="m-contado" class="btn-tab active">Contado</button>
                <button onclick="setModo('CREDITO')" id="m-credito" class="btn-tab">Crédito</button>
                <button onclick="setModo('PRESUPUESTO')" id="m-presupuesto" class="btn-tab">Presupuesto</button>
            </div>

            <!-- VALORES -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Cantidad</p>
                    <input type="number" id="cantidad" value="1" min="1" class="bg-transparent w-full text-center text-2xl font-black outline-none">
                </div>
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Total USD</p>
                    <input type="text" id="total" value="0.00" readonly class="bg-transparent w-full text-center text-2xl font-black text-green-500 outline-none">
                </div>
            </div>

            <button onclick="procesarOperacion()" id="btn-main" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-xs tracking-[4px] active:scale-95 transition-all">
                Registrar Movimiento
            </button>
        </div>
    </div>

    <!-- LISTADO DE MOVIMIENTOS -->
    <div id="lista-movimientos" class="space-y-4">
        <div class="text-center py-20 opacity-10 font-black text-xs tracking-[10px]">CARGANDO DATA...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-main';

        let uID = null;
        let db_local = { productos: [], clientes: [], vendedores: [], movimientos: [] };
        let selectedProd = null;
        let modoActual = 'CONTADO';

        // AUTENTICACIÓN BLINDADA
        async function startAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uID = user.uid;
                document.getElementById('indicador').className = 'status-dot online';
                document.getElementById('txt-status').innerText = 'Conectado';
                document.getElementById('txt-status').className = 'text-[10px] font-black uppercase text-green-500 tracking-tighter';
                document.getElementById('user-display').innerText = `Sync ID: ${uID}`;
                conectarBaseDeDatos();
            }
        });

        startAuth();

        // CARGA FIEL DE TUS COLECCIONES
        function conectarBaseDeDatos() {
            // Vendedores
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'vendedores'), (s) => {
                db_local.vendedores = s.docs.map(d => d.data().nombre || d.data().vendedor);
                llenarSelect('vendedor', db_local.vendedores, 'Vendedor');
            });

            // Clientes
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'clientes'), (s) => {
                db_local.clientes = s.docs.map(d => d.data().nombre || d.data().cliente);
                llenarSelect('cliente', db_local.clientes, 'Cliente');
            });

            // Productos (Respetando fragancia y precios)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'productos'), (s) => {
                db_local.productos = s.docs.map(d => ({ id: d.id, ...d.data() }));
                llenarSelect('producto', db_local.productos.map(p => ({v: p.id, t: p.nombre})), 'Producto');
            });

            // Movimientos (Ventas y Presupuestos)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), (s) => {
                db_local.movimientos = s.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderizarMovimientos();
            });
        }

        function llenarSelect(id, data, label) {
            const el = document.getElementById(id);
            let h = `<option value="">-- SELECCIONAR ${label} --</option>`;
            data.forEach(item => {
                if(typeof item === 'object') h += `<option value="${item.v}">${item.t}</option>`;
                else h += `<option value="${item}">${item}</option>`;
            });
            el.innerHTML = h;
        }

        // LÓGICA DE PRODUCTOS Y PRECIOS
        document.getElementById('producto').onchange = (e) => {
            selectedProd = db_local.productos.find(p => p.id === e.target.value);
            const fragSelect = document.getElementById('fragancia');
            
            if(selectedProd) {
                // Cómo guardas la fragancia: puede ser array o string separado por comas
                let frags = selectedProd.fragancias || selectedProd.variantes || [];
                if(typeof frags === 'string') frags = frags.split(',').map(f => f.trim());
                
                fragSelect.innerHTML = frags.map(f => `<option value="${f}">${f.toUpperCase()}</option>`).join('');
                document.getElementById('fragancia-container').style.opacity = "1";
            } else {
                fragSelect.innerHTML = "";
            }
            calcularTotal();
        };

        window.setModo = (m) => {
            modoActual = m;
            ['contado', 'credito', 'presupuesto'].forEach(i => {
                document.getElementById(`m-${i}`).className = (i === m.toLowerCase()) ? 'btn-tab active' : 'btn-tab';
            });
            calcularTotal();
        };

        window.toggleCliente = (isReg) => {
            document.getElementById('tab-cli-reg').className = isReg ? 'btn-tab active' : 'btn-tab';
            document.getElementById('tab-cli-ocu').className = !isReg ? 'btn-tab active' : 'btn-tab';
            document.getElementById('cli-reg-box').classList.toggle('hidden', !isReg);
            document.getElementById('cli-ocu-box').classList.toggle('hidden', isReg);
        };

        function calcularTotal() {
            if(!selectedProd) return;
            const cant = parseInt(document.getElementById('cantidad').value) || 0;
            let precio = parseFloat(selectedProd.precio_detal || selectedProd.precio || 0);
            
            if(modoActual === 'CREDITO') {
                precio = parseFloat(selectedProd.precio_credito || precio);
            }
            
            document.getElementById('total').value = (precio * cant).toFixed(2);
        }

        document.getElementById('cantidad').oninput = calcularTotal;

        window.procesarOperacion = async () => {
            if(!uID || !selectedProd) return;
            
            const btn = document.getElementById('btn-main');
            const vend = document.getElementById('vendedor').value;
            const isReg = document.getElementById('tab-cli-reg').classList.contains('active');
            const cli = isReg ? document.getElementById('cliente').value : document.getElementById('cliente_nombre').value;
            const frag = document.getElementById('fragancia').value;

            if(!vend || !cli) {
                btn.style.background = "#400";
                btn.innerText = "FALTAN DATOS";
                setTimeout(() => { btn.style.background = "#fff"; btn.innerText = "Registrar Movimiento"; }, 1500);
                return;
            }

            btn.disabled = true;
            btn.innerText = "GUARDANDO EN CLOUD...";

            const data = {
                vendedor: vend,
                cliente: cli.toUpperCase(),
                producto: selectedProd.nombre,
                productoId: selectedProd.id,
                fragancia: frag,
                cantidad: parseInt(document.getElementById('cantidad').value),
                total: parseFloat(document.getElementById('total').value),
                tipo: modoActual,
                createdAt: serverTimestamp(),
                fecha: new Date().toLocaleDateString()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', uID, 'ventas_realizadas'), data);
                // Reset simple
                document.getElementById('cliente_nombre').value = "";
                document.getElementById('cantidad').value = 1;
                document.getElementById('total').value = "0.00";
            } catch(e) { console.error(e); }

            btn.disabled = false;
            btn.innerText = "Registrar Movimiento";
        };

        function renderizarMovimientos() {
            const container = document.getElementById('lista-movimientos');
            if(db_local.movimientos.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-bold text-[10px] tracking-widest">SIN ACTIVIDAD RECIENTE</div>';
                return;
            }

            container.innerHTML = db_local.movimientos.map(m => `
                <div class="card-movimiento gold-border">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[7px] font-black px-2 py-0.5 rounded bg-white text-black">${m.tipo}</span>
                                <span class="text-[7px] text-gray-500 font-bold uppercase">${m.fecha}</span>
                            </div>
                            <h4 class="text-xs font-black uppercase text-white">${m.cliente}</h4>
                            <p class="text-[10px] text-gray-500 font-bold mt-1">${m.producto} <span class="text-gold">/ ${m.fragancia}</span></p>
                            <p class="text-[8px] text-gray-700 mt-2 font-black uppercase tracking-tighter">Atendido por: ${m.vendedor}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-white">$${m.total.toFixed(2)}</p>
                            <p class="text-[8px] text-gray-600 font-bold">CANT: ${m.cantidad}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
