```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas CRM | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6">Panel de Despacho</h2>
        
        <div class="space-y-4">
            <!-- Selector de Cliente -->
            <div class="flex gap-2 mb-4">
                <button id="btn-cli-reg" onclick="switchCliente(true)" class="tab-btn active">Registrado</button>
                <button id="btn-cli-ocu" onclick="switchCliente(false)" class="tab-btn">Ocasional</button>
            </div>

            <div id="area-cliente-reg">
                <select id="sel-cliente" class="input-field text-gold uppercase">
                    <option value="">-- SELECCIONAR CLIENTE --</option>
                </select>
                <div id="reputacion-aviso" class="text-[8px] mt-1 ml-2 font-black"></div>
            </div>

            <div id="area-cliente-ocu" class="hidden">
                <input type="text" id="inp-cliente-nom" placeholder="Nombre de persona nueva" class="input-field uppercase">
            </div>

            <!-- Producto -->
            <div class="grid grid-cols-2 gap-2">
                <select id="sel-producto" class="input-field"></select>
                <select id="sel-variante" class="input-field"><option value="">Fragancia</option></select>
            </div>

            <!-- Tipo de Venta -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTipo('CONTADO')" id="t-contado" class="tab-btn active">Contado</button>
                <button onclick="setTipo('CREDITO')" id="t-credito" class="tab-btn">Crédito</button>
                <button onclick="setTipo('MAYOR')" id="t-mayor" class="tab-btn">Mayor</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="inp-cantidad" value="1" class="input-field text-center text-xl">
                <input type="number" id="inp-precio" placeholder="Total $" class="input-field text-center text-xl text-green-400">
            </div>

            <button id="btn-venta" onclick="registrarVenta()" class="w-full bg-white text-black font-black py-5 rounded-xl uppercase text-sm active:scale-95 transition-transform">
                Procesar Venta
            </button>
        </div>
    </section>

    <div id="listaVentas" class="space-y-3"></div>

    <script type="module">
        import { conectarCerebro, obtenerProductos, auth, onAuthStateChanged } from './conexion.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const db = getFirestore();
        const appId = "jaddy-inc-inventario";
        let stockGlobal = {};
        let clientesGlobal = [];
        let productosGlobal = [];
        let tipoVenta = 'CONTADO';
        let esRegistrado = true;

        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusDot').classList.replace('bg-red-600', 'bg-green-500');
                
                obtenerProductos(l => {
                    productosGlobal = l;
                    document.getElementById('sel-producto').innerHTML = '<option value="">PROD</option>' + l.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clientes'), snap => {
                    clientesGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    document.getElementById('sel-cliente').innerHTML = '<option value="">-- CLIENTE --</option>' + 
                        clientesGlobal.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventario_master'), snap => {
                    snap.docs.forEach(d => stockGlobal[d.id] = d.data());
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas'), snap => {
                    renderizarVentas(snap.docs.map(d => d.data()));
                });
            }
        });

        window.switchCliente = (reg) => {
            esRegistrado = reg;
            document.getElementById('btn-cli-reg').classList.toggle('active', reg);
            document.getElementById('btn-cli-ocu').classList.toggle('active', !reg);
            document.getElementById('area-cliente-reg').classList.toggle('hidden', !reg);
            document.getElementById('area-cliente-ocu').classList.toggle('hidden', reg);
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['CONTADO', 'CREDITO', 'MAYOR'].forEach(id => {
                document.getElementById('t-'+id.toLowerCase()).classList.toggle('active', id === t);
            });
        };

        document.getElementById('sel-producto').onchange = (e) => {
            const p = productosGlobal.find(x => x.id === e.target.value);
            document.getElementById('sel-variante').innerHTML = p ? p.variantes.map(v=>`<option value="${v}">${v}</option>`).join('') : '';
        };

        window.registrarVenta = async () => {
            const cliId = document.getElementById('sel-cliente').value;
            const cliNomOcu = document.getElementById('inp-cliente-nom').value;
            const prod = productosGlobal.find(x => x.id === document.getElementById('sel-producto').value);
            const variante = document.getElementById('sel-variante').value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);
            const precio = document.getElementById('inp-precio').value;

            let clienteFinal = esRegistrado ? (clientesGlobal.find(c=>c.id === cliId)?.nombre || "ANÓNIMO") : cliNomOcu;
            if (!clienteFinal) clienteFinal = "OCASIONAL";

            const ventaId = "V-" + Date.now();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas', ventaId), {
                cliente: clienteFinal, prodId: prod.id, nombre: prod.nombre, variante, 
                cantidad: cant, precio, tipo: tipoVenta, fecha: new Date().getTime()
            });

            const invRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventario_master', `${prod.id}_${variante}`);
            await setDoc(invRef, { ventas: increment(cant), stock_actual: increment(-cant) }, { merge: true });
            
            document.getElementById('inp-precio').value = "";
            document.getElementById('inp-cliente-nom').value = "";
        };

        function renderizarVentas(ventas) {
            ventas.sort((a,b) => b.fecha - a.fecha);
            document.getElementById('listaVentas').innerHTML = ventas.map(v => `
                <div class="sale-card">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="text-[7px] text-gold font-bold uppercase tracking-widest">${v.tipo}</div>
                            <div class="text-[11px] font-black text-white uppercase">${v.cliente}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-black text-green-400">$${v.precio}</div>
                            <div class="text-[8px] text-gray-500 font-bold">${v.cantidad} UD.</div>
                        </div>
                    </div>
                    <div class="text-[8px] text-gray-400 border-t border-white/5 pt-2 uppercase font-bold">
                        ${v.nombre} - ${v.variante}
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
