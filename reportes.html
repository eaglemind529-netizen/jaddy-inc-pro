```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .card-elite { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 2rem; 
            padding: 1.5rem;
        }
        .btn-gold {
            background-color: #d4af37;
            color: #000;
            font-weight: 900;
            font-style: italic;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        .btn-gold:hover { background-color: #fff; }
        .btn-whatsapp {
            background-color: #25d366;
            color: #fff;
            font-weight: 900;
            border-radius: 1.5rem;
        }
        input {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 1rem !important;
            color: white !important;
            padding: 0.75rem 1rem !important;
        }
        .font-elite { font-weight: 900; font-style: italic; text-transform: uppercase; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="p-4 pb-10">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-elite">PRODUCTOS <span class="text-[#d4af37]">JADDY</span></h1>
            <p class="text-[8px] tracking-[0.2em] text-zinc-500 font-bold uppercase">Módulos de Élite V2.0</p>
        </div>
        <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
    </header>

    <!-- Filtros de Fecha -->
    <div class="card-elite mb-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1">
                <label class="text-[9px] font-elite text-zinc-500 ml-2">DESDE</label>
                <input type="date" id="fecha-inicio" class="w-full text-xs outline-none focus:border-[#d4af37]">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-elite text-zinc-500 ml-2">HASTA</label>
                <input type="date" id="fecha-fin" class="w-full text-xs outline-none focus:border-[#d4af37]">
            </div>
        </div>
        <button id="btn-consultar" class="w-full py-4 btn-gold text-xs uppercase tracking-widest">Generar Reporte</button>
    </div>

    <!-- Utilidad Neta (Estilo Imagen 3) -->
    <div id="resumen-container" class="card-elite mb-6 relative overflow-hidden">
        <div class="absolute top-4 right-6 opacity-20 text-4xl">💎</div>
        <p class="text-[10px] font-elite text-zinc-400 mb-2">UTILIDAD NETA DEL PERIODO</p>
        <p id="resumen-balance" class="text-5xl font-black italic mb-6 text-white leading-none">$0</p>
        
        <div class="flex gap-6 border-t border-zinc-800/50 pt-4">
            <div>
                <p class="text-[8px] font-elite text-zinc-500">INGRESOS (+)</p>
                <p id="resumen-ventas" class="text-emerald-500 font-black italic text-lg">$0</p>
            </div>
            <div>
                <p class="text-[8px] font-elite text-zinc-500">EGRESOS (-)</p>
                <p id="resumen-egresos" class="text-red-500 font-black italic text-lg">$0</p>
            </div>
        </div>
    </div>

    <!-- Métricas Secundarias -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card-elite !p-4">
            <p class="text-[8px] font-elite text-zinc-500">CUENTAS POR COBRAR</p>
            <p class="text-xl font-black italic text-amber-600">$0</p>
        </div>
        <div class="card-elite !p-4">
            <p class="text-[8px] font-elite text-zinc-500">VENTAS REALIZADAS</p>
            <p id="resumen-cantidad" class="text-xl font-black italic text-white">0</p>
        </div>
    </div>

    <!-- Botón WhatsApp -->
    <button onclick="compartirWhatsApp()" class="w-full py-4 btn-whatsapp flex items-center justify-center gap-3 text-xs font-elite mb-8">
        <i class="fab fa-whatsapp text-lg"></i>
        ENVIAR REPORTE POR WHATSAPP
    </button>

    <!-- Detalle de Movimientos -->
    <div class="space-y-4">
        <h3 class="text-[10px] font-elite text-zinc-500 tracking-widest ml-2">Lista de Movimientos</h3>
        <div id="lista-movimientos" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";
        let userId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                const hoy = new Date().toISOString().split('T')[0];
                document.getElementById('fecha-inicio').value = hoy;
                document.getElementById('fecha-fin').value = hoy;
            }
        });

        document.getElementById('btn-consultar').addEventListener('click', async () => {
            if (!userId) return;
            
            const inicio = new Date(document.getElementById('fecha-inicio').value + 'T00:00:00');
            const fin = new Date(document.getElementById('fecha-fin').value + 'T23:59:59');

            const [ventasSnap, egresosSnap] = await Promise.all([
                getDocs(collection(db, 'artifacts', appId, 'users', userId, 'ventas')),
                getDocs(collection(db, 'artifacts', appId, 'users', userId, 'egresos'))
            ]);

            const movimientos = [];
            let totalV = 0;
            let totalE = 0;
            let countV = 0;

            ventasSnap.forEach(doc => {
                const d = doc.data();
                const f = new Date(d.fecha);
                if (f >= inicio && f <= fin) {
                    totalV += d.monto;
                    countV++;
                    movimientos.push({ ...d, tipo: 'VENTA', color: 'emerald' });
                }
            });

            egresosSnap.forEach(doc => {
                const d = doc.data();
                const f = new Date(d.fecha);
                if (f >= inicio && f <= fin) {
                    totalE += d.monto;
                    movimientos.push({ ...d, tipo: 'EGRESO', color: 'red' });
                }
            });

            movimientos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            // UI
            document.getElementById('resumen-ventas').innerText = `$${totalV.toLocaleString()}`;
            document.getElementById('resumen-egresos').innerText = `$${totalE.toLocaleString()}`;
            document.getElementById('resumen-balance').innerText = `$${(totalV - totalE).toLocaleString()}`;
            document.getElementById('resumen-cantidad').innerText = countV;

            const lista = document.getElementById('lista-movimientos');
            lista.innerHTML = movimientos.map(m => `
                <div class="card-elite flex justify-between items-center border-l-4 ${m.tipo === 'VENTA' ? 'border-emerald-500' : 'border-red-500'} !py-4">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-[7px] font-elite px-2 py-0.5 rounded bg-${m.color}-500/10 text-${m.color}-500">${m.tipo}</span>
                            <p class="text-white font-elite text-[10px] tracking-tight">${m.tipo === 'VENTA' ? (m.cliente || 'VENTA GENERAL') : (m.categoria || 'EGRESO')}</p>
                        </div>
                        <p class="text-[8px] text-zinc-600 font-bold mt-1">${new Date(m.fecha).toLocaleDateString()} - ${m.detalle || ''}</p>
                    </div>
                    <p class="text-${m.color}-500 font-elite text-sm">${m.tipo === 'VENTA' ? '+' : '-'}$${m.monto.toLocaleString()}</p>
                </div>
            `).join('');
        });

        window.compartirWhatsApp = () => {
            const v = document.getElementById('resumen-ventas').innerText;
            const e = document.getElementById('resumen-egresos').innerText;
            const b = document.getElementById('resumen-balance').innerText;
            const msg = encodeURIComponent(`*REPORTE JADDY INC*\n\nIngresos: ${v}\nEgresos: ${e}\n*Utilidad Neta: ${b}*`);
            window.open(`https://wa.me/?text=${msg}`);
        };
    </script>
</body>
</html>
