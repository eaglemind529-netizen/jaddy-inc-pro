
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analítica Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: none; }
        .card-stats { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 24px; padding: 20px; }
        .premium-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 1px solid rgba(212, 175, 55, 0.1); }
        .filter-btn { background: #111; border: 1px solid #222; color: #666; padding: 8px 4px; border-radius: 10px; font-size: 8px; font-weight: 900; text-transform: uppercase; flex: 1; }
        .filter-btn.active { background: var(--gold); color: black; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto select-none">

    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-widest text-center">Actualizando Finanzas...</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Regresar</button>
        <h1 class="text-[10px] font-black text-white uppercase tracking-[4px]">Financial Intelligence</h1>
    </header>

    <div class="flex justify-between gap-1 mb-6">
        <button onclick="cambiarFiltro('hoy')" id="btn-hoy" class="filter-btn">Hoy</button>
        <button onclick="cambiarFiltro('todo')" id="btn-todo" class="filter-btn active">Historial</button>
    </div>

    <section class="mb-8 text-center">
        <p class="text-[9px] font-black text-gold uppercase mb-2">Utilidad Neta (Solo Efectivo Real)</p>
        <div class="card-stats premium-gradient border-gold/20">
            <h3 id="ganancia-neta" class="text-3xl font-black text-green-400">$0.00</h3>
            <p id="mensaje-status" class="text-[7px] text-gray-500 mt-2 uppercase tracking-widest italic"></p>
        </div>
    </section>

    <section class="grid grid-cols-1 gap-4">
        <div class="card-stats">
            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[2px] mb-1 text-center">Dinero Ingresado (Caja)</p>
            <h2 id="total-ventas" class="text-4xl font-black text-white text-center">$0.00</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-stats border-red-900/30">
                <p class="text-[7px] font-black text-red-500 uppercase mb-2">Gastos Totales</p>
                <h3 id="total-egresos" class="text-xl font-black text-white">$0.00</h3>
            </div>
            <div class="card-stats border-blue-900/30">
                <p class="text-[7px] font-black text-blue-500 uppercase mb-2">Por Cobrar (No Sumado)</p>
                <h3 id="total-credito" class="text-xl font-black text-blue-400">$0.00</h3>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let store = { ventas: [], productos: [], gastos: [] };
        let filtro = 'todo';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.body.style.display = 'block';
                
                onSnapshot(collection(db, "ventas"), s => { store.ventas = s.docs.map(d => d.data()); calcular(); });
                onSnapshot(collection(db, "productos"), s => { store.productos = s.docs.map(d => d.data()); calcular(); });
                onSnapshot(collection(db, "gastos"), s => { store.gastos = s.docs.map(d => d.data()); calcular(); });
            }
        });

        function parse(v) {
            if(!v) return 0;
            return parseFloat(v.toString().replace(/[$,]/g, '')) || 0;
        }

        function calcular() {
            let tCajaReal = 0; 
            let tGastos = 0; 
            let tInversionEfectiva = 0; 
            let tSoloCreditoPendiente = 0;
            const hoy = new Date().toDateString();

            store.ventas.forEach(v => {
                let fechaV = v.fecha?.seconds ? new Date(v.fecha.seconds * 1000).toDateString() : (v.fecha ? new Date(v.fecha).toDateString() : null);
                
                if (filtro === 'todo' || fechaV === hoy) {
                    const montoTotal = parse(v.total || v.precio);
                    const prod = store.productos.find(prod => prod.nombre === v.producto);
                    const costoUnitario = parse(prod?.costo);
                    const cantidad = v.cantidad || 1;

                    const esCredito = (v.metodo || v.tipo || "").toLowerCase().includes("credito");

                    if (!esCredito) {
                        // VENTA AL CONTADO: Entra el dinero y se resta su inversión
                        tCajaReal += montoTotal;
                        tInversionEfectiva += (costoUnitario * cantidad);
                    } else {
                        // VENTA A CRÉDITO: Solo sumamos los abonos reales
                        let abonosReales = 0;
                        v.abonos?.forEach(a => abonosReales += parse(a.monto));
                        
                        tCajaReal += abonosReales;
                        tSoloCreditoPendiente += (montoTotal - abonosReales);
                        
                        // Solo restamos la inversión proporcional a lo que ya cobraste (Opcional)
                        // Para ser conservadores: si es crédito, no restamos inversión hasta que sea contado
                        // Pero aquí lo dejamos fuera de la "Utilidad Neta" actual.
                    }
                }
            });

            store.gastos.forEach(g => {
                let fechaG = g.fecha?.seconds ? new Date(g.fecha.seconds * 1000).toDateString() : (g.fecha ? new Date(g.fecha).toDateString() : null);
                if (filtro === 'todo' || fechaG === hoy) tGastos += parse(g.monto);
            });

            // UTILIDAD NETA: Dinero que entró - Inversión de lo vendido contado - Gastos
            const neta = tCajaReal - tGastos - tInversionEfectiva;

            document.getElementById('total-ventas').innerText = `$${tCajaReal.toLocaleString()}`;
            document.getElementById('total-egresos').innerText = `$${tGastos.toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${tSoloCreditoPendiente.toLocaleString()}`;
            document.getElementById('ganancia-neta').innerText = `$${neta.toLocaleString()}`;
            document.getElementById('mensaje-status').innerText = `Dinero líquido disponible`;
        }

        window.cambiarFiltro = (f) => {
            filtro = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active');
            calcular();
        }
    </script>
</body>
</html>
