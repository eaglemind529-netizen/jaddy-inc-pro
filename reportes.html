```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analítica Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: none; }
        .card-stats { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 24px; padding: 20px; }
        .premium-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 1px solid rgba(212, 175, 55, 0.1); }
        .filter-btn { background: #111; border: 1px solid #222; color: #666; padding: 10px 5px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; flex: 1; transition: 0.3s; }
        .filter-btn.active { background: var(--gold); color: black; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }

</head>
<body class="p-4 pb-24 max-w-md mx-auto select-none">

    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-widest text-center">Sincronizando Datos...</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Regresar</button>
        <h1 class="text-[10px] font-black text-white uppercase tracking-[4px]">Financial IQ</h1>
    </header>

    <!-- Filtros Mejorados -->
    <div class="flex justify-between gap-2 mb-6">
        <button onclick="cambiarFiltro('hoy')" id="btn-hoy" class="filter-btn">Hoy</button>
        <button onclick="cambiarFiltro('mes')" id="btn-mes" class="filter-btn">Este Mes</button>
        <button onclick="cambiarFiltro('todo')" id="btn-todo" class="filter-btn active">Todo</button>
    </div>

    <section class="mb-8">
        <h2 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-4 text-center">Utilidad Final Real</h2>
        <div class="card-stats premium-gradient border-gold/20">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[7px] font-black text-gray-400 uppercase mb-1">Inversión (Costos)</p>
                    <h3 id="inversion-total" class="text-2xl font-black text-white">$0</h3>
                </div>
                <div class="text-right">
                    <p class="text-[7px] font-black text-green-500 uppercase mb-1">Ganancia Neta</p>
                    <h3 id="ganancia-neta" class="text-xl font-black text-green-400">+$0</h3>
                </div>
            </div>
            <p id="status-msg" class="text-[8px] text-center italic text-gray-500 border-t border-white/5 pt-2"></p>
        </div>
    </section>

    <section class="grid grid-cols-1 gap-4">
        <div class="card-stats">
            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[2px] mb-1 text-center">Dinero Ingresado (Caja)</p>
            <h2 id="total-ventas" class="text-4xl font-black text-white text-center">$0</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-stats border-red-900/30">
                <p class="text-[7px] font-black text-red-500 uppercase mb-2">Gastos</p>
                <h3 id="total-egresos" class="text-xl font-black text-white">$0</h3>
            </div>
            <div class="card-stats border-blue-900/30">
                <p class="text-[7px] font-black text-blue-500 uppercase mb-2">Cuentas x Cobrar</p>
                <h3 id="total-credito" class="text-xl font-black text-white">$0</h3>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let filtro = 'todo'; // CAMBIADO A TODO POR DEFECTO PARA VER DATOS
        let store = { ventas: [], productos: [], gastos: [] };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.body.style.display = 'block';
                conectar();
            }
        });

        function conectar() {
            onSnapshot(collection(db, "ventas"), (snap) => {
                store.ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                procesar();
            }, (err) => console.log("Error ventas", err));

            onSnapshot(collection(db, "productos"), (snap) => {
                store.productos = snap.docs.map(d => d.data());
                procesar();
            });

            onSnapshot(collection(db, "gastos"), (snap) => {
                store.gastos = snap.docs.map(d => d.data());
                procesar();
            });
        }

        function parse(n) {
            if (n === null || n === undefined) return 0;
            // Elimina símbolos de moneda y comas para cálculos limpios
            return parseFloat(n.toString().replace(/[$, ]/g, '')) || 0;
        }

        function obtenerFecha(itemFecha) {
            if (!itemFecha) return new Date(0); // Fecha muy antigua si no tiene
            if (itemFecha.seconds) return new Date(itemFecha.seconds * 1000);
            return new Date(itemFecha);
        }

        function procesar() {
            let caja = 0; let inversion = 0; let cxc = 0; let egresos = 0;
            const hoy = new Date();
            const hoyStr = hoy.toDateString();

            store.ventas.forEach(v => {
                const fechaVenta = obtenerFecha(v.fecha);
                const esHoy = fechaVenta.toDateString() === hoyStr;
                const esMes = fechaVenta.getMonth() === hoy.getMonth() && fechaVenta.getFullYear() === hoy.getFullYear();

                if (filtro === 'todo' || (filtro === 'hoy' && esHoy) || (filtro === 'mes' && esMes)) {
                    const montoTotal = parse(v.total || v.precio);
                    
                    // Calcular costo de inversión basado en el nombre del producto
                    const p = store.productos.find(item => item.nombre === v.producto);
                    inversion += (parse(p?.costo) * (parse(v.cantidad) || 1));

                    const metod = (v.metodo || "").toLowerCase();
                    
                    if (metod.includes("contado") || metod.includes("efectivo") || metod.includes("pago movil")) {
                        caja += montoTotal;
                    } else {
                        // Es crédito: sumar solo los abonos que entren en el filtro
                        let totalAbonado = 0;
                        if (v.abonos && Array.isArray(v.abonos)) {
                            v.abonos.forEach(a => {
                                const fechaAbono = obtenerFecha(a.fecha);
                                const abonoEsHoy = fechaAbono.toDateString() === hoyStr;
                                const abonoEsMes = fechaAbono.getMonth() === hoy.getMonth() && fechaAbono.getFullYear() === hoy.getFullYear();

                                if (filtro === 'todo' || (filtro === 'hoy' && abonoEsHoy) || (filtro === 'mes' && abonoEsMes)) {
                                    caja += parse(a.monto);
                                }
                                totalAbonado += parse(a.monto);
                            });
                        }
                        cxc += (montoTotal - totalAbonado);
                    }
                }
            });

            store.gastos.forEach(g => {
                const fechaGasto = obtenerFecha(g.fecha);
                const esHoy = fechaGasto.toDateString() === hoyStr;
                const esMes = fechaGasto.getMonth() === hoy.getMonth() && fechaGasto.getFullYear() === hoy.getFullYear();

                if (filtro === 'todo' || (filtro === 'hoy' && esHoy) || (filtro === 'mes' && esMes)) {
                    egresos += parse(g.monto);
                }
            });

            const neta = caja - egresos - inversion;

            document.getElementById('total-ventas').innerText = `$${Math.round(caja).toLocaleString()}`;
            document.getElementById('total-egresos').innerText = `$${Math.round(egresos).toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${Math.round(cxc).toLocaleString()}`;
            document.getElementById('inversion-total').innerText = `$${Math.round(inversion).toLocaleString()}`;
            document.getElementById('ganancia-neta').innerText = `${neta < 0 ? '-' : '+'}$${Math.abs(Math.round(neta)).toLocaleString()}`;
            document.getElementById('ganancia-neta').style.color = neta >= 0 ? '#4ade80' : '#f87171';
            document.getElementById('status-msg').innerText = `Vínculo activo: ${store.ventas.length} registros en nube.`;
        }

        window.cambiarFiltro = (f) => {
            filtro = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active');
            procesar();
        };
    </script>
</body>
</html>
