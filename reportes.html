<body class="p-4 pb-24 max-w-md mx-auto select-none">

    <!-- Lanzador IA -->

    <!-- Header Principal -->
    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-[#D4AF37] uppercase">← Regresar</button>
        <h1 class="text-[10px] font-black text-white uppercase tracking-[4px]">Financial Intelligence</h1>
    </header>

    <!-- Filtros -->
    <div class="bg-[#0A0A0A] border border-white/5 p-3 rounded-2xl mb-4">
        <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="date" id="fecha-inicio" onchange="aplicarCalendario()" class="date-input-custom">

        <div class="flex justify-between gap-1">

            <button onclick="cambiarFiltro('semana')" id="btn-semana" class="filter-btn flex-1">Semana</button>

    <!-- Métrica Maestra -->
    <section class="mb-6">
        <h2 class="text-[9px] font-black text-gold/80 uppercase tracking-[3px] mb-4 text-center">Balance Neto (<span id="txt-periodo">Hoy</span>)</h2>
        <div class="card-stats premium-gradient border-gold/20">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[7px] font-black text-gray-500 uppercase">Utilidad Real</span>
                <span id="pct-utilidad" class="text-[8px] font-bold text-green-500">+0%</span>
            </div>
            <h3 id="ganancia-neta" class="text-4xl font-black text-white mb-4">$0.00</h3>
            <div class="h-[1px] bg-white/5 w-full mb-4"></div>
            <div class="flex justify-between">
                <div>

                <div class="text-right">
                    <p class="text-[7px] font-black text-gray-500 uppercase">Retorno</p>
                    <p id="total-ventas" class="text-xs font-bold text-green-400">$0.00</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Secundarios -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card-stats border-red-900/20">
            <p class="text-[7px] font-black text-red-500 uppercase mb-1">Gastos/Deudas</p>
            <h4 id="total-egresos" class="text-lg font-black">$0.00</h4>
        </div>
        <div class="card-stats border-blue-900/20">
            <p class="text-[7px] font-black text-blue-500 uppercase mb-1">CxC (Créditos)</p>
            <h4 id="total-credito" class="text-lg font-black">$0.00</h4>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'jaddy-inc-finanzas';
        
        let currentUserId = null;
        let filtroActual = 'hoy';
        let store = { ventas: [], productos: [], egresos: [], prestamos: [] };

        // 1. CONTROL DE ACCESO (Seguridad)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('p-fill').style.width = '100%';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.body.style.display = 'block';
                    conectarBaseDeDatos();
                }, 800);
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. CONEXIÓN REAL CON FIRESTORE
        function conectarBaseDeDatos() {
            // Productos (Global)
            onSnapshot(collection(db, "productos"), snap => {
                store.productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                calcularTodo();
            });

            // Ventas Realizadas (Global del negocio)
            onSnapshot(collection(db, "ventas_realizadas"), snap => {
                store.ventas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                calcularTodo();
            });

            // Egresos Personales (Filtrado por usuario logueado)
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUserId, 'egresos'), snap => {
                store.egresos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                calcularTodo();
            });

            // Préstamos/Abonos Personales (Filtrado por usuario logueado)
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUserId, 'prestamos'), snap => {
                store.prestamos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                calcularTodo();
            });
        }

        // 3. LÓGICA DE PROCESAMIENTO
        function parsear(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[$,]/g, '')) || 0;
        }

        function validarFecha(f) {
            if (filtroActual === 'todo') return true;
            let d;
            if (typeof f === 'number') d = new Date(f);
            else if (f?.seconds) d = new Date(f.seconds * 1000);
            else if (f?.includes('/')) {
                const [day, month, year] = f.split('/');
                d = new Date(year, month - 1, day);
            } else d = new Date(f);

            if (isNaN(d.getTime())) return false;
            const hoy = new Date();

            if (filtroActual === 'custom') {
                const start = new Date(document.getElementById('fecha-inicio').value + "T00:00:00");
                const end = new Date(document.getElementById('fecha-fin').value + "T23:59:59");
                return d >= start && d <= end;
            }
            if (filtroActual === 'hoy') return d.toDateString() === hoy.toDateString();
            if (filtroActual === 'semana') {
                const diff = hoy.getDate() - hoy.getDay() + (hoy.getDay() === 0 ? -6 : 1);
                return d >= new Date(new Date().setDate(diff)).setHours(0,0,0,0);
            }
            if (filtroActual === 'mes') return d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear();
            return true;
        }

        function calcularTodo() {
            let cajaEfectivo = 0; 
            let costoInversion = 0;
            let cxc = 0;
            let gastosTotal = 0;

            // Procesar Ventas y Costos
            store.ventas.forEach(v => {
                if (validarFecha(v.fecha)) {
                    const total = parsear(v.total || v.precio);
                    const prod = store.productos.find(p => p.nombre === v.producto);
                    const costo = (prod ? parsear(prod.costo) : 0) * (parseInt(v.cantidad) || 1);
                    
                    costoInversion += costo;

                    const t = (v.metodo || v.tipo || "").toUpperCase();
                    if (t.includes("CONTADO") || t.includes("EFECTIVO")) {
                        cajaEfectivo += total;
                    } else {
                        // Crédito: Solo sumamos abonos que entren en la fecha
                        let pagado = 0;
                        if (v.abonos) {
                            v.abonos.forEach(ab => {
                                if (validarFecha(ab.fecha)) cajaEfectivo += parsear(ab.monto);
                                pagado += parsear(ab.monto);
                            });
                        }
                        cxc += (total - pagado);
                    }
                }
            });

            // Procesar Egresos del Usuario
            store.egresos.forEach(e => {
                if (validarFecha(e.fecha || e.createdAt)) gastosTotal += parsear(e.monto);
            });

            // Procesar Abonos a Préstamos del Usuario
            store.prestamos.forEach(p => {
                if (p.abonos) {
                    p.abonos.forEach(ab => {
                        if (validarFecha(ab.fecha)) gastosTotal += parsear(ab.monto);
                    });
                }
            });

            const neto = cajaEfectivo - gastosTotal - costoInversion;
            const pct = costoInversion > 0 ? ((neto / costoInversion) * 100).toFixed(1) : 0;

            // Renderizar
            document.getElementById('total-ventas').innerText = `$${cajaEfectivo.toLocaleString()}`;
            document.getElementById('inversion-total').innerText = `$${costoInversion.toLocaleString()}`;
            document.getElementById('total-egresos').innerText = `$${gastosTotal.toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${cxc.toLocaleString()}`;
            document.getElementById('ganancia-neta').innerText = `$${neto.toLocaleString()}`;
            document.getElementById('pct-utilidad').innerText = `${neto >= 0 ? '+' : ''}${pct}%`;
            document.getElementById('ganancia-neta').style.color = neto >= 0 ? '#4ade80' : '#f87171';
        }

        // Eventos Globales
        window.cambiarFiltro = (f) => {
            filtroActual = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active');
            document.getElementById('txt-periodo').innerText = f.charAt(0).toUpperCase() + f.slice(1);
            calcularTodo();
        };

        window.aplicarCalendario = () => {
            if (document.getElementById('fecha-inicio').value && document.getElementById('fecha-fin').value) {
                filtroActual = 'custom';
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('txt-periodo').innerText = "Personalizado";
                calcularTodo();
            }
        };

        window.abrirIA = () => alert("Asistente analizando tendencias... (Próxima actualización)");

    </script>
</body>
</html>
