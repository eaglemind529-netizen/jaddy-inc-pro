
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes & Egresos | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .stat-card { background: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: white; font-size: 13px; outline: none; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #AA8928); color: black; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; padding: 12px; transition: all 0.3s; }
        .btn-gold:active { transform: scale(0.95); opacity: 0.8; }
        #loading-screen { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .date-label { font-size: 7px; color: #D4AF37; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; display: block; letter-spacing: 1px;}
    </style>
</head>
<body class="pb-32 max-w-md mx-auto">

    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Sincronizando Datos</p>
    </div>

    <div class="p-4">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Menú</button>
            <div class="text-right">
                <p class="text-[8px] text-gray-500 font-black uppercase tracking-widest">Análisis de Rango</p>
                <p class="text-gold font-black italic text-sm">JADDY INC</p>
            </div>
        </header>

        <!-- Filtro por Rango de Fechas -->
        <div class="mb-6 bg-[#0A0A0A] p-4 rounded-2xl gold-border">
            <p class="text-[9px] text-gray-500 font-black uppercase mb-3 tracking-[2px] text-center">Filtrar por Periodo</p>
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="date-label">Desde</label>
                    <input type="date" id="fecha-inicio" class="input-field border-none text-white bg-[#151515] font-bold p-2 h-10">
                </div>
                <div class="flex-1">
                    <label class="date-label">Hasta</label>
                    <input type="date" id="fecha-fin" class="input-field border-none text-white bg-[#151515] font-bold p-2 h-10">
                </div>
            </div>
        </div>

        <!-- Dashboard de Utilidad -->
        <div class="stat-card mb-6 border-gold/40 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10">
                <i class="fa-solid fa-gem text-4xl text-gold"></i>
            </div>
            <p class="text-[9px] text-gold font-black uppercase mb-1 tracking-widest">Utilidad Neta del Periodo</p>
            <p id="total-utilidad" class="text-3xl font-black text-white">$0.00</p>
            <div class="flex gap-4 mt-3 pt-3 border-t border-white/5">
                <div>
                    <p class="text-[7px] text-gray-500 font-black uppercase">Ingresos (+)</p>
                    <p id="subtotal-ventas" class="text-sm font-bold text-green-400">$0.00</p>
                </div>
                <div>
                    <p class="text-[7px] text-gray-500 font-black uppercase">Egresos (-)</p>
                    <p id="subtotal-egresos" class="text-sm font-bold text-red-500">$0.00</p>
                </div>
            </div>
        </div>

        <!-- Grid de Stats Secundarios -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="stat-card">
                <p class="text-[7px] text-gray-500 font-black uppercase mb-1">Cuentas por Cobrar</p>
                <p id="total-credito" class="text-lg font-black text-orange-400">$0.00</p>
            </div>
            <div class="stat-card">
                <p class="text-[7px] text-gray-500 font-black uppercase mb-1">Operaciones</p>
                <p id="total-ventas" class="text-lg font-black text-white">0</p>
            </div>
        </div>

        <!-- Detalle de Movimientos -->
        <section class="mb-8">
            <h3 class="text-[9px] font-black text-gray-500 uppercase tracking-[3px] mb-3 px-2 italic">Historial del Periodo</h3>
            <div id="lista-movimientos" class="space-y-2">
                <!-- Sincronización dinámica de Ventas y Egresos -->
            </div>
        </section>

        <!-- Botones de Acción -->
        <div class="fixed bottom-6 left-4 right-4 flex gap-2">
            <button onclick="enviarWhatsApp()" class="flex-1 bg-[#25D366] text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                <span class="text-[11px] uppercase tracking-tighter">Enviar Reporte por WhatsApp</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";

        let userId = null;
        let ventasData = [];
        let egresosData = [];

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                userId = user.uid;
                document.getElementById('loading-screen').style.display = "none";
                
                const hoy = new Date().toISOString().split('T')[0];
                document.getElementById('fecha-inicio').value = hoy;
                document.getElementById('fecha-fin').value = hoy;
                
                escucharDatos(user.uid); 
            } else {
                window.location.href = "login.html";
            }
        });

        function escucharDatos(uid) {
            // Escuchar la colección de Ventas (Información de ventas)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'ventas'), snap => {
                ventasData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                procesarTodo();
            });

            // Escuchar la colección de Egresos (Información de egresos)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'egresos'), snap => {
                egresosData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                procesarTodo();
            });
        }

        function procesarTodo() {
            const inicio = document.getElementById('fecha-inicio').value;
            const fin = document.getElementById('fecha-fin').value;

            if(!inicio || !fin) return;

            const filtrarRango = (itemFecha) => {
                let f = itemFecha;
                if(f.includes('T')) f = f.split('T')[0];
                if(f.includes('/')) {
                    const p = f.split('/');
                    f = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                }
                return f >= inicio && f <= fin;
            };

            const vFiltradas = ventasData.filter(v => filtrarRango(v.fecha));
            const eFiltrados = egresosData.filter(e => filtrarRango(e.fecha));

            // Sumatorias
            const totalV = vFiltradas.reduce((a, v) => a + (v.monto || 0), 0);
            const totalC = vFiltradas.filter(v => v.tipo === 'CREDITO').reduce((a, v) => a + (v.monto || 0), 0);
            const totalE = eFiltrados.reduce((a, e) => a + (e.monto || 0), 0);

            // Actualizar Dash
            document.getElementById('subtotal-ventas').innerText = `$${totalV.toLocaleString()}`;
            document.getElementById('subtotal-egresos').innerText = `$${totalE.toLocaleString()}`;
            document.getElementById('total-utilidad').innerText = `$${(totalV - totalE).toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${totalC.toLocaleString()}`;
            document.getElementById('total-ventas').innerText = vFiltradas.length + eFiltrados.length;

            // Lista Combinada
            const lista = document.getElementById('lista-movimientos');
            const combinados = [
                ...vFiltradas.map(v => ({
                    label: v.cliente || 'VENTA', 
                    valor: v.monto, 
                    tipo: 'VENTA', 
                    fecha: v.fecha, 
                    color: 'text-green-400', 
                    sign: '+',
                    detalle: v.tipo || ''
                })),
                ...eFiltrados.map(e => ({
                    label: e.detalle || e.categoria || 'EGRESO', 
                    valor: e.monto, 
                    tipo: 'EGRESO', 
                    fecha: e.fecha, 
                    color: 'text-red-500', 
                    sign: '-',
                    detalle: e.categoria || ''
                }))
            ].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

            if(combinados.length === 0) {
                lista.innerHTML = '<p class="text-[9px] text-gray-700 text-center uppercase py-10 italic">Sin actividad en este rango</p>';
            } else {
                lista.innerHTML = combinados.map(m => `
                    <div class="flex justify-between items-center bg-[#0A0A0A] p-4 rounded-xl border border-white/5">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[6px] font-black px-1 rounded bg-white/5 text-gray-500 uppercase">${m.tipo}</span>
                                <p class="text-[10px] font-black uppercase text-white tracking-tight">${m.label}</p>
                            </div>
                            <p class="text-[7px] text-gray-500 font-bold uppercase mt-1 italic">${new Date(m.fecha).toLocaleDateString()} - ${m.detalle}</p>
                        </div>
                        <p class="text-[11px] font-black ${m.color}">${m.sign}$${m.valor.toLocaleString()}</p>
                    </div>
                `).join('');
            }
        }

        window.enviarWhatsApp = () => {
            const inicio = document.getElementById('fecha-inicio').value;
            const fin = document.getElementById('fecha-fin').value;
            const u = document.getElementById('total-utilidad').innerText;
            const v = document.getElementById('subtotal-ventas').innerText;
            const e = document.getElementById('subtotal-egresos').innerText;
            const c = document.getElementById('total-credito').innerText;

            const periodo = (inicio === fin) ? inicio : `${inicio} al ${fin}`;

            const mensaje = encodeURIComponent(
                `🏆 *REPORTE JADDY INC*\n` +
                `📅 Periodo: ${periodo}\n` +
                `--------------------------------\n` +
                `💰 *INGRESOS:* ${v}\n` +
                `💸 *EGRESOS:* ${e}\n` +
                `💳 *POR COBRAR:* ${c}\n` +
                `--------------------------------\n` +
                `💎 *UTILIDAD NETA: ${u}*\n` +
                `--------------------------------`
            );
            window.open(`https://wa.me/?text=${mensaje}`);
        }

        document.getElementById('fecha-inicio').addEventListener('change', procesarTodo);
        document.getElementById('fecha-fin').addEventListener('change', procesarTodo);
    </script>
</body>
</html>

```
