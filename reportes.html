    <header class="flex justify-between items-center mb-6">

        <div class="card-stats bg-gradient-to-br from-[#1a1a1a] to-black border-gold/20">
            <h3 id="ganancia-neta" class="text-3xl font-black text-green-400">$0.00</h3>
            <p id="mensaje-status" class="text-[7px] text-gray-500 mt-2 uppercase tracking-widest"></p>
        </div>
    </section>

    <section class="grid grid-cols-1 gap-4">
        <div class="card-stats">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-1 text-center">Ventas Brutas</p>
            <h2 id="total-ventas" class="text-4xl font-black text-white text-center">$0.00</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-stats border-red-900/30">

            </div>

                <p class="text-[7px] font-black text-blue-500 uppercase mb-2">Por Cobrar</p>
                <h3 id="total-credito" class="text-xl font-black text-white">$0.00</h3>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let store = { ventas: [], productos: [], gastos: [], prestamos: [] };
        let filtro = 'todo';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.body.style.display = 'block';
                
                // NOMBRES CORREGIDOS SEGÚN TU CAPTURA DE PANTALLA
                onSnapshot(collection(db, "ventas"), s => { store.ventas = s.docs.map(d => d.data()); calcular(); });
                onSnapshot(collection(db, "productos"), s => { store.productos = s.docs.map(d => d.data()); calcular(); });
                onSnapshot(collection(db, "gastos"), s => { store.gastos = s.docs.map(d => d.data()); calcular(); });
                onSnapshot(collection(db, "deudas"), s => { store.prestamos = s.docs.map(d => d.data()); calcular(); });
            }
        });

        function parse(v) {
            if(!v) return 0;
            return parseFloat(v.toString().replace(/[$,]/g, '')) || 0;
        }

        function calcular() {
            let tVentas = 0; let tGastos = 0; let tInversion = 0; let tCredito = 0;
            const hoy = new Date().toDateString();

            store.ventas.forEach(v => {
                // Si no hay fecha, permitimos que pase en el filtro "todo"
                let fechaV = v.fecha?.seconds ? new Date(v.fecha.seconds * 1000).toDateString() : (v.fecha ? new Date(v.fecha).toDateString() : null);
                
                if (filtro === 'todo' || fechaV === hoy) {
                    const monto = parse(v.total || v.precio);
                    tVentas += monto;

                    // Costo
                    const p = store.productos.find(prod => prod.nombre === v.producto);
                    tInversion += (parse(p?.costo) * (v.cantidad || 1));

                    // Crédito
                    if ((v.metodo || v.tipo || "").toLowerCase().includes("credito")) {
                        let abonos = 0;
                        v.abonos?.forEach(a => abonos += parse(a.monto));
                        tCredito += (monto - abonos);
                    }
                }
            });

            store.gastos.forEach(g => {
                let fechaG = g.fecha?.seconds ? new Date(g.fecha.seconds * 1000).toDateString() : (g.fecha ? new Date(g.fecha).toDateString() : null);
                if (filtro === 'todo' || fechaG === hoy) tGastos += parse(g.monto);
            });

            const neta = tVentas - tGastos - tInversion;

            document.getElementById('total-ventas').innerText = `$${tVentas.toLocaleString()}`;
            document.getElementById('total-egresos').innerText = `$${tGastos.toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${tCredito.toLocaleString()}`;
            document.getElementById('ganancia-neta').innerText = `$${neta.toLocaleString()}`;
            document.getElementById('mensaje-status').innerText = `${store.ventas.length} ventas procesadas`;
        }

        window.cambiarFiltro = (f) => {
            filtro = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active');
            calcular();
        }
    </script>
