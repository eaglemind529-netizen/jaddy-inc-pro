<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Luxury | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: none; }

<body class="pb-24 max-w-md mx-auto">

    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Generando Inteligencia</p>
    </div>

    <div class="p-4">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
            <div class="text-right">
                <p class="text-[8px] text-gray-500 font-black uppercase">Balance General</p>
                <p class="text-gold font-black italic text-xs">JADDY INC</p>
            </div>
        </header>

        <!-- Filtro Temporal -->
        <div class="mb-6 flex gap-2 items-center bg-[#0A0A0A] p-3 rounded-2xl gold-border">
            <i class="fa-solid fa-calendar-day text-gold text-xs ml-2"></i>
            <input type="date" id="filtro-fecha" class="input-field border-none text-gold uppercase tracking-widest bg-transparent">
        </div>

        <!-- Stats Principales -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="stat-card">
                <p class="text-[7px] text-gray-500 font-black uppercase mb-1 tracking-tighter">Total Recaudado</p>
                <p id="total-monto" class="text-xl font-black text-green-400">$0.00</p>

                <p class="text-[7px] text-gray-500 font-black uppercase mb-1 tracking-tighter">Volumen Ventas</p>
                <p id="total-ventas" class="text-xl font-black text-white">0</p>

            <div class="stat-card">
                <p class="text-[7px] text-gray-500 font-black uppercase mb-1 tracking-tighter">Por Cobrar (Crédito)</p>

                <p class="text-[7px] text-gray-500 font-black uppercase mb-1 tracking-tighter">Promedio x Venta</p>
                <p id="promedio-venta" class="text-xl font-black text-blue-400">$0.00</p>

        <!-- Top Productos -->
        <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-6">
            <h3 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-4 italic flex items-center gap-2">
                <i class="fa-solid fa-crown text-[8px]"></i> Desempeño de Inventario
            </h3>
            <div id="lista-top-productos" class="space-y-4">
                <!-- Se llena dinamicamente -->
            </div>
        </section>

        <!-- Desglose por Vendedor -->
        <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border">
            <h3 class="text-[9px] font-black text-gray-500 uppercase tracking-[3px] mb-4 italic text-center">Ranking de Equipo</h3>
            <div id="lista-vendedores" class="space-y-2">
                <!-- Se llena dinamicamente -->
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userId = null;
        let ventasData = [];

        onAuthStateChanged(auth, (user) => { 
            if(user && !user.isAnonymous){ 
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                
                // Fecha de hoy por defecto
                document.getElementById('filtro-fecha').valueAsDate = new Date();
                
                escucharVentas(user.uid); 
            } else {
                window.location.href = "login.html";
            }
        });

        function escucharVentas(uid) {
            // Escuchamos todas las ventas para poder filtrar dinámicamente en el cliente
            onSnapshot(collection(db, 'usuarios', uid, 'ventas_realizadas'), snap => {
                ventasData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                procesarReportes();
            });
        }

        function procesarReportes() {
            const fechaFiltro = new Date(document.getElementById('filtro-fecha').value + 'T00:00:00').toLocaleDateString();
            
            // Filtrar por la fecha seleccionada
            const ventasFiltradas = ventasData.filter(v => v.fecha_venta === fechaFiltro);

            let totalMonto = 0;
            let totalCredito = 0;
            let conteoVentas = ventasFiltradas.length;
            let productosMap = {};
            let vendedoresMap = {};

            ventasFiltradas.forEach(v => {
                totalMonto += v.total;
                if(v.tipo === 'CREDITO') totalCredito += v.total;

                // Agrupar por producto
                productosMap[v.producto] = (productosMap[v.producto] || 0) + v.cantidad;
                
                // Agrupar por vendedor
                vendedoresMap[v.vendedor] = (vendedoresMap[v.vendedor] || 0) + v.total;
            });

            // Renderizar Stats
            document.getElementById('total-monto').innerText = `$${totalMonto.toLocaleString()}`;
            document.getElementById('total-ventas').innerText = conteoVentas;
            document.getElementById('total-credito').innerText = `$${totalCredito.toLocaleString()}`;
            document.getElementById('promedio-venta').innerText = `$${(totalMonto / (conteoVentas || 1)).toLocaleString(undefined, {maximumFractionDigits: 2})}`;

            // Renderizar Top Productos
            const listaProd = document.getElementById('lista-top-productos');
            const sortedProds = Object.entries(productosMap).sort((a,b) => b[1] - a[1]).slice(0, 5);
            
            if(sortedProds.length === 0) {
                listaProd.innerHTML = '<p class="text-[10px] text-gray-600 text-center uppercase py-4">Sin datos hoy</p>';
            } else {
                listaProd.innerHTML = sortedProds.map(([name, cant]) => `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-gold"></div>
                            <p class="text-[11px] font-black uppercase">${name}</p>
                        </div>
                        <p class="text-[11px] font-black text-gray-400">${cant} UNID.</p>
                    </div>
                `).join('');
            }

            // Renderizar Vendedores
            const listaVend = document.getElementById('lista-vendedores');
            const sortedVend = Object.entries(vendedoresMap).sort((a,b) => b[1] - a[1]);
            
            listaVend.innerHTML = sortedVend.map(([name, monto]) => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[10px] font-black uppercase text-gold italic">${name || 'SIN NOMBRE'}</p>
                    <p class="text-[10px] font-black text-green-400">$${monto.toLocaleString()}</p>
                </div>
            `).join('');
        }

        document.getElementById('filtro-fecha').addEventListener('change', procesarReportes);

    </script>
</body>
</html>
