<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analítica Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }

<body class="p-4 pb-24 max-w-md mx-auto select-none">

    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-widest text-center">Conectando a Colecciones:<br>Ventas, Gastos y Productos</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Regresar</button>
        <h1 class="text-[10px] font-black text-white uppercase tracking-[4px]">Financial Intelligence</h1>
    </header>

    <div class="flex justify-between gap-1 mb-6">
        <button onclick="cambiarFiltro('hoy')" id="btn-hoy" class="filter-btn active">Hoy</button>
        <button onclick="cambiarFiltro('mes')" id="btn-mes" class="filter-btn">Mes</button>
        <button onclick="cambiarFiltro('todo')" id="btn-todo" class="filter-btn">Historial</button>
    </div>

    <section class="mb-8">
        <h2 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-4 text-center">Utilidad Final (Caja - Costos - Gastos)</h2>
        <div class="card-stats premium-gradient border-gold/20">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[7px] font-black text-gray-400 uppercase mb-1">Inversión (Costos)</p>
                    <h3 id="inversion-total" class="text-2xl font-black text-white">$0.00</h3>
                </div>
                <div class="text-right">
                    <p class="text-[7px] font-black text-green-500 uppercase mb-1">Ganancia Neta</p>

            <p id="status-msg" class="text-[8px] text-center italic text-gray-500"></p>
        </div>
    </section>

    <section class="grid grid-cols-1 gap-4">
        <div class="card-stats">
            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[2px] mb-1 text-center">Dinero Ingresado (Caja)</p>
            <h2 id="total-ventas" class="text-4xl font-black text-white text-center">$0.00</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-stats border-red-900/30">
                <p class="text-[7px] font-black text-red-500 uppercase mb-2">Gastos Totales</p>
                <h3 id="total-egresos" class="text-xl font-black text-white">$0.00</h3>
            </div>
            <div class="card-stats border-blue-900/30">
                <p class="text-[7px] font-black text-blue-500 uppercase mb-2">CxC (Por Cobrar)</p>
                <h3 id="total-credito" class="text-xl font-black text-white">$0.00</h3>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let filtro = 'hoy';
        let store = { ventas: [], productos: [], gastos: [] };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.body.style.display = 'block';
                conectar();
            } else {
                window.location.href = "login.html";
            }
        });

        function conectar() {
            // USANDO LOS NOMBRES DE TU CAPTURA DE PANTALLA
            onSnapshot(collection(db, "ventas"), (snap) => {
                store.ventas = snap.docs.map(d => d.data());
                procesar();
            });

            onSnapshot(collection(db, "productos"), (snap) => {
                store.productos = snap.docs.map(d => d.data());
                procesar();
            });

            onSnapshot(collection(db, "gastos"), (snap) => {
                store.gastos = snap.docs.map(d => d.data());
                procesar();
            });
        }

        function parse(n) {
            if (!n) return 0;
            return parseFloat(n.toString().replace(/[$,]/g, '')) || 0;
        }

        function procesar() {
            let caja = 0; let inversion = 0; let cxc = 0; let egresos = 0;
            const hoy = new Date().toDateString();

            store.ventas.forEach(v => {
                // Verificar fecha
                let d;
                if (v.fecha?.seconds) d = new Date(v.fecha.seconds * 1000);
                else d = new Date(v.fecha);
                
                if (filtro === 'todo' || d.toDateString() === hoy) {
                    const monto = parse(v.total || v.precio);
                    const p = store.productos.find(item => item.nombre === v.producto);
                    inversion += (parse(p?.costo) * (v.cantidad || 1));

                    const metod = (v.metodo || "").toLowerCase();
                    if (metod.includes("contado") || metod.includes("efectivo")) {
                        caja += monto;
                    } else {
                        let abonado = 0;
                        v.abonos?.forEach(a => { 
                            let da = a.fecha?.seconds ? new Date(a.fecha.seconds * 1000) : new Date(a.fecha);
                            if (filtro === 'todo' || da.toDateString() === hoy) caja += parse(a.monto);
                            abonado += parse(a.monto);
                        });
                        cxc += (monto - abonado);
                    }
                }
            });

            store.gastos.forEach(g => {
                let dg = g.fecha?.seconds ? new Date(g.fecha.seconds * 1000) : new Date(g.fecha);
                if (filtro === 'todo' || dg.toDateString() === hoy) egresos += parse(g.monto);
            });

            const neta = caja - egresos - inversion;

            document.getElementById('total-ventas').innerText = `$${caja.toLocaleString()}`;
            document.getElementById('total-egresos').innerText = `$${egresos.toLocaleString()}`;
            document.getElementById('total-credito').innerText = `$${cxc.toLocaleString()}`;
            document.getElementById('inversion-total').innerText = `$${inversion.toLocaleString()}`;
            document.getElementById('ganancia-neta').innerText = `$${neta.toLocaleString()}`;
            document.getElementById('ganancia-neta').style.color = neta >= 0 ? '#4ade80' : '#f87171';
            document.getElementById('status-msg').innerText = `Sincronizado: ${store.ventas.length} ventas encontradas`;
        }

        window.cambiarFiltro = (f) => {
            filtro = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active');
            procesar();
        };
    </script>
</body>
</html>
