```html
<!DOCTYPE html>
<html lang="es">
<head>

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

</head>
<body class="select-none">
    <div id="app">
        <!-- Header Identificado -->
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-black italic">JI</div>
                    <h1 class="text-xs font-black text-white italic tracking-tight uppercase">Bóveda de Datos</h1>
                </div>
                <p id="user-display-name" class="text-[8px] text-amber-500 font-black mt-1 uppercase tracking-widest italic">Identificando...</p>
                <p id="user-id-display" class="text-[6px] text-zinc-700 font-mono uppercase tracking-tighter italic">Validando Acceso Privado...</p>
            </div>
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-zinc-800"></div>
                <span id="status-text" class="text-[8px] font-black text-zinc-500 uppercase tracking-widest italic">Offline</span>
            </div>
        </header>

        <main class="p-5 max-w-lg mx-auto pb-24 space-y-6 fade-in">
            <!-- Balance General Personal -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] shadow-xl">
                    <p class="text-[8px] uppercase font-black text-zinc-500 mb-1 italic">Mis Gastos</p>
                    <p id="total-egresos" class="text-2xl font-black text-white italic">$0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] shadow-xl">
                    <p class="text-[8px] uppercase font-black text-zinc-500 mb-1 italic">Mis Préstamos</p>
                    <p id="total-deuda" class="text-2xl font-black text-amber-500 italic">$0.00</p>
                </div>
            </div>

            <!-- Navegación -->
            <div class="flex bg-zinc-900 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab uppercase italic">Mi Diario</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500 uppercase italic">Mis Préstamos</button>
            </div>

            <!-- VISTA: EGRESOS -->
            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50">
                    <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-black italic">$</span>
                        <input type="number" step="0.01" required placeholder="0.00" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-2xl focus:border-amber-500 outline-none text-center">
                    </div>
                    <input type="text" placeholder="DETALLE DEL GASTO" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-[10px] outline-none text-zinc-400 text-center uppercase font-bold tracking-widest">
                    <button type="submit" id="btn-submit-egreso" class="w-full py-5 rounded-2xl bg-white text-black font-black italic text-[10px] tracking-[0.2em] uppercase hover:bg-amber-500 transition-all">Registrar Privado</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <!-- VISTA: DEUDAS -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50">
                    <input type="text" required placeholder="¿QUIÉN TE DEBE?" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-[10px] outline-none text-center uppercase tracking-widest">
                    <input type="number" required placeholder="MONTO $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-xl outline-none text-center">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest">Inicia</label>
                            <input type="date" id="deuda-fecha-init" class="w-full bg-transparent text-white font-black text-[10px] outline-none">
                        </div>
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest">Vence</label>
                            <input type="date" id="deuda-fecha-end" class="w-full bg-transparent text-white font-black text-[10px] outline-none">
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-submit-deuda" class="w-full py-5 rounded-2xl bg-amber-500 text-black font-black italic text-[10px] tracking-[0.2em] uppercase">Abrir Préstamo</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>

        <!-- Modales de Control -->
        <div id="modal-detalle" class="fixed inset-0 z-[100] hidden flex flex-col bg-black modal-backdrop">
            <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
                <div>
                    <h2 id="det-name" class="text-white font-black uppercase italic text-lg tracking-tighter">Cargando...</h2>
                    <p class="text-[7px] text-zinc-600 font-mono uppercase mt-1 italic">Espacio de Trabajo Privado</p>
                </div>
                <button onclick="closeModal('modal-detalle')" class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4" id="det-list"></div>
            <div class="p-8 bg-zinc-900 border-t border-zinc-800 space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="det-amount" placeholder="Abonar $" class="flex-1 bg-black border border-zinc-800 rounded-2xl p-5 text-xl font-black text-white outline-none">
                    <button id="det-pay-btn" class="bg-white text-black font-black px-8 rounded-2xl uppercase italic text-[10px] tracking-widest transition-all">OK</button>
                </div>
            </div>
        </div>

        <div id="modal-confirm" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="bg-zinc-900 border border-zinc-800 w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 text-center">
                <i class="fas fa-shield-alt text-amber-500 text-3xl"></i>
                <h3 class="text-white font-black uppercase italic text-xs tracking-tight">¿Borrar de tu historial?</h3>
                <div class="flex flex-col gap-3">
                    <button id="btn-confirm-delete" class="w-full py-4 rounded-2xl bg-red-600 text-white font-black text-[10px] uppercase italic">Borrar Permanente</button>
                    <button onclick="closeModal('modal-confirm')" class="w-full py-4 rounded-2xl bg-zinc-800 text-zinc-400 font-black text-[10px] uppercase italic">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU APP (Extraída del entorno)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-main';

        let user = null;
        let activeCat = 'otros';
        let debtsData = [];
        let selectedDebtId = null;
        let unsubscribes = [];

        // 1. GESTIÓN DE SESIÓN AISLADA
        const initSession = async () => {
            try {
                // Forzar que la sesión se guarde en el navegador (Local Storage)
                await setPersistence(auth, browserLocalPersistence);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth Error:", e);
                document.getElementById('user-display-name').innerText = "ERROR DE ACCESO";
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                const name = user.displayName || user.email || "Usuario Privado";
                document.getElementById('user-display-name').innerText = `HOLA, ${name.split('@')[0].toUpperCase()}`;
                document.getElementById('user-id-display').innerText = `TU LLAVE: ${user.uid.substring(0,10)}...`;
                
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                document.getElementById('status-text').innerText = "PRIVADO Y SEGURO";
                document.getElementById('status-text').className = "text-[8px] font-black text-emerald-500 italic";
                
                startPrivateListeners();
            } else {
                initSession();
            }
        });

        // 2. ESCUCHA DE DATOS (REGLA DE ORO: SIEMPRE BAJO /users/UID/)
        function startPrivateListeners() {
            if (!user) return;
            
            // Limpiar suscripciones previas
            unsubscribes.forEach(u => u());
            unsubscribes = [];

            // Ruta: /artifacts/{appId}/users/{userId}/egresos
            const eRef = collection(db, 'artifacts', appId, 'users', user.uid, 'egresos');
            const uE = onSnapshot(eRef, (snap) => {
                renderEgresos(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            });
            unsubscribes.push(uE);

            // Ruta: /artifacts/{appId}/users/{userId}/prestamos
            const dRef = collection(db, 'artifacts', appId, 'users', user.uid, 'prestamos');
            const uD = onSnapshot(dRef, (snap) => {
                debtsData = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(debtsData);
                if (selectedDebtId) {
                    const active = debtsData.find(d => d.id === selectedDebtId);
                    if (active) renderHistory(active);
                }
            });
            unsubscribes.push(uD);
        }

        // 3. GUARDADO DE DATOS (JUAN NUNCA VERÁ LO DE PEDRO)
        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!user) return;
            const btn = document.getElementById('btn-submit-egreso');
            const monto = parseFloat(document.getElementById('egreso-monto').value);
            
            btn.classList.add('loading');
            try {
                // Guardar en la colección privada del usuario logueado actualmente
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), {
                    categoria: activeCat,
                    monto: monto,
                    detalle: document.getElementById('egreso-detalle').value || "Gasto sin nombre",
                    createdAt: Date.now()
                });
                e.target.reset();
                selectCat('otros');
            } finally {
                btn.classList.remove('loading');
            }
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!user) return;
            const btn = document.getElementById('btn-submit-deuda');
            btn.classList.add('loading');
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'prestamos'), {
                    acreedor: document.getElementById('deuda-acreedor').value.toUpperCase(),
                    montoBase: parseFloat(document.getElementById('deuda-monto').value),
                    fechaInicio: document.getElementById('deuda-fecha-init').value,
                    fechaVencimiento: document.getElementById('deuda-fecha-end').value,
                    abonos: [],
                    createdAt: Date.now()
                });
                e.target.reset();
            } finally {
                btn.classList.remove('loading');
            }
        };

        // --- RENDERIZADO (UI) ---
        function renderEgresos(data) {
            const container = document.getElementById('list-egresos');
            let total = 0;
            const mesActual = new Date().getMonth();

            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(e => {
                const d = new Date(e.createdAt);
                if(d.getMonth() === mesActual) total += parseFloat(e.monto || 0);

                return `
                    <div class="bg-zinc-900/40 p-5 rounded-3xl flex justify-between items-center border border-zinc-800/30 fade-in">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-black flex items-center justify-center text-xl shadow-inner border border-zinc-800/50">
                                ${CATS.find(c => c.id === e.categoria)?.icon || '📦'}
                            </div>
                            <div>
                                <p class="text-white font-black text-[10px] uppercase italic tracking-tighter">${e.categoria}</p>
                                <p class="text-[9px] text-zinc-500 font-bold uppercase truncate max-w-[120px]">${e.detalle}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-white font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                            <button onclick="askToDelete('egresos', '${e.id}')" class="text-zinc-800 mt-2 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-[9px]"></i></button>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        function renderDeudas(data) {
            let total = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoBase) - pagado;
                total += saldo;

                return `
                    <div onclick="openDebtDetail('${p.id}')" class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-6 cursor-pointer active:scale-95 transition-transform fade-in">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[8px] font-black text-zinc-600 uppercase italic">Acreedor</p>
                                <h3 class="text-white font-black italic uppercase text-sm">${p.acreedor}</h3>
                            </div>
                            <div class="text-right">
                                <p class="text-amber-500 font-black text-xl italic">$${saldo.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="w-full bg-black h-1.5 rounded-full overflow-hidden mb-3">
                            <div class="bg-amber-500 h-full transition-all duration-1000" style="width: ${Math.min((pagado/p.montoBase)*100, 100)}%"></div>
                        </div>
                        <div class="flex justify-between items-center text-[7px] font-black text-zinc-500 italic uppercase">
                            <span>Finaliza: ${p.fechaVencimiento || '---'}</span>
                            <button onclick="event.stopPropagation(); askToDelete('prestamos', '${p.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${total.toFixed(2)}`;
        }

        // --- INTERACCIONES ---
        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        window.selectCat = (id) => { activeCat = id; renderCats(); };
        function renderCats() {
            const CATS_LIST = [
                { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
                { id: 'servicios', label: 'Servicios', icon: '⚡' },
                { id: 'personal', label: 'Personal', icon: '👥' },
                { id: 'inversion', label: 'Inversión', icon: '💎' },
                { id: 'otros', label: 'Otros', icon: '📦' }
            ];
            document.getElementById('categories-grid').innerHTML = CATS_LIST.map(cat => `
                <button type="button" onclick="selectCat('${cat.id}')" class="p-3 rounded-2xl border text-[7px] font-black flex flex-col items-center gap-2 transition-all ${activeCat === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-xl">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>`).join('');
        }

        window.openDebtDetail = (id) => {
            selectedDebtId = id;
            const d = debtsData.find(x => x.id === id);
            if(d) {
                renderHistory(d);
                document.getElementById('modal-detalle').classList.remove('hidden');
            }
        };

        window.renderHistory = (p) => {
            document.getElementById('det-name').innerText = p.acreedor;
            document.getElementById('det-list').innerHTML = (p.abonos || []).sort((a,b) => b.createdAt - a.createdAt).map(h => `
                <div class="bg-black border border-zinc-800 p-5 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-emerald-500 uppercase italic">Abono Recibido</p>
                        <p class="text-[10px] text-zinc-500 font-mono">${h.fecha}</p>
                    </div>
                    <p class="text-white font-black italic text-lg">$${h.monto.toFixed(2)}</p>
                </div>
            `).join('') || `<p class="text-center text-zinc-800 italic py-10 uppercase text-[8px] font-black tracking-widest">Sin abonos registrados</p>`;
        };

        document.getElementById('det-pay-btn').onclick = async () => {
            if (!user || !selectedDebtId) return;
            const btn = document.getElementById('det-pay-btn');
            const monto = parseFloat(document.getElementById('det-amount').value);
            if (!monto) return;

            btn.innerText = "...";
            const pRef = doc(db, 'artifacts', appId, 'users', user.uid, 'prestamos', selectedDebtId);
            const pSnap = await getDoc(pRef);
            const data = pSnap.data();

            const nuevoAbono = { monto, fecha: new Date().toLocaleDateString(), createdAt: Date.now() };
            await updateDoc(pRef, { abonos: [...(data.abonos || []), nuevoAbono] });
            
            // Reflejar abono en gastos personales (opcional)
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), {
                categoria: 'otros', monto, detalle: `ABONO DE: ${data.acreedor}`, createdAt: Date.now()
            });

            document.getElementById('det-amount').value = '';
            btn.innerText = "OK";
        };

        window.askToDelete = (coll, id) => {
            document.getElementById('modal-confirm').classList.remove('hidden');
            document.getElementById('btn-confirm-delete').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, coll, id));
                closeModal('modal-confirm');
                closeModal('modal-detalle');
            };
        };

        window.closeModal = (id) => {
            if(id === 'modal-detalle') selectedDebtId = null;
            document.getElementById(id).classList.add('hidden');
        };

        renderCats();
        initSession();
    </script>
</body>
</html>
