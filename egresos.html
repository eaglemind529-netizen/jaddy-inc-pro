
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: #d4d4d8; font-family: 'Inter', sans-serif; display: none; }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .active-tab { background-color: #f59e0b; color: black; box-shadow: 0 4px 50px rgba(245, 158, 11, 0.2); }
        .category-selected { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        
        #loading-screen { 
            position: fixed; inset: 0; background: #050505; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .card-dark { background: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 20px; }
        #history-modal { background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <!-- Pantalla de Carga/Seguridad idéntica a Cobranza -->
    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Verificando Acceso</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div class="flex gap-2">
            <button onclick="toggleHistory(true)" class="w-8 h-8 rounded-full bg-zinc-900 flex items-center justify-center text-gold border border-zinc-800">
                <i class="fas fa-history text-[10px]"></i>
            </button>
            <div id="statusDot" class="w-2 h-2 rounded-full bg-zinc-800 mt-3"></div>
        </div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-3xl font-black uppercase italic tracking-tighter leading-none">Finanzas</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[4px]">Egresos y Deudas</p>
    </div>

    <!-- Resumen de Cuentas -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card-dark p-4 border-l-4 border-red-500">
            <p class="text-[8px] uppercase font-black text-zinc-500 mb-1">Egresos Mes</p>
            <p id="total-egresos" class="text-xl font-black text-white italic">$0.00</p>
        </div>
        <div class="card-dark p-4 border-l-4 border-amber-500">
            <p class="text-[8px] uppercase font-black text-zinc-500 mb-1">Deuda Total</p>
            <p id="total-deuda" class="text-xl font-black text-white italic">$0.00</p>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex bg-[#0A0A0A] p-1 rounded-2xl border border-zinc-900 mb-6">
        <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab uppercase">Egresos</button>
        <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500 uppercase">Deudas</button>
    </div>

    <!-- Contenido Egresos -->
    <div id="content-egresos" class="space-y-6">
        <form id="egreso-form" class="space-y-4 card-dark p-5 border-zinc-800/50 shadow-2xl">
            <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
            <input type="number" step="0.01" required placeholder="0.00 $" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg focus:border-gold outline-none">
            <input type="text" placeholder="Concepto o descripción" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-[10px] font-bold uppercase outline-none">
            <button type="submit" class="w-full py-4 rounded-2xl bg-white text-black font-black italic text-[10px] tracking-widest hover:bg-gold transition-colors uppercase">Registrar Egreso</button>
        </form>
        <div id="list-egresos" class="space-y-3"></div>
    </div>

    <!-- Contenido Deudas -->
    <div id="content-deudas" class="hidden space-y-6">
        <form id="deuda-form" class="space-y-4 card-dark p-5 border-zinc-800/50 shadow-2xl">
            <input type="text" required placeholder="Acreedor (A quién le debes)" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-[10px] uppercase outline-none">
            <input type="number" required placeholder="Monto Préstamo $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg outline-none">
            <div class="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-zinc-800">
                <span class="text-[8px] font-black uppercase text-zinc-500 italic">Interés mensual (%)</span>
                <button type="button" id="toggle-interes" class="w-10 h-5 rounded-full relative transition-all bg-zinc-800">
                    <div id="toggle-circle" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-all"></div>
                </button>
            </div>
            <input type="number" placeholder="Ej: 5" id="deuda-interes-valor" class="hidden w-full bg-black border border-gold/40 p-4 rounded-2xl text-gold font-black text-xs outline-none">
            <button type="submit" class="w-full py-4 rounded-2xl bg-gold text-black font-black italic text-[10px] tracking-widest uppercase shadow-lg shadow-gold/10 hover:bg-white transition-colors">Crear Deuda</button>
        </form>
        <div id="list-deudas" class="space-y-4"></div>
    </div>

    <!-- Modal Historial -->
    <div id="history-modal" class="fixed inset-0 z-[100] hidden flex flex-col">
        <header class="p-6 flex justify-between items-center border-b border-zinc-800 bg-black">
            <h2 class="font-black text-gold italic text-[10px] tracking-widest uppercase">Historial de Liquidaciones</h2>
            <button onclick="toggleHistory(false)" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500">
                <i class="fas fa-times"></i>
            </button>
        </header>
        <div id="list-history" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Mismos datos de Cobranza
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userId = null;
        let activeCategory = 'otros';
        let hasInterest = false;

        const categories = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servic.', icon: '⚡' },
            { id: 'personal', label: 'Person.', icon: '👥' },
            { id: 'otros', label: 'Otros', icon: '📦' },
            { id: 'inversion', label: 'Invers.', icon: '💎' }
        ];

        // SEGURIDAD: Validación de login idéntica a Cobranza
        onAuthStateChanged(auth, (user) => {
            if(user && !user.isAnonymous) {
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('statusDot').classList.add('bg-green-500');
                startSync(user.uid);
                renderCategories();
            } else {
                window.location.href = "login.html";
            }
        });

        function startSync(uid) {
            // Sincronizar Egresos: /usuarios/{uid}/finanzas_egresos
            onSnapshot(collection(db, 'usuarios', uid, 'finanzas_egresos'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEgresos(list);
            });

            // Sincronizar Deudas: /usuarios/{uid}/finanzas_deudas
            onSnapshot(collection(db, 'usuarios', uid, 'finanzas_deudas'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                const activas = list.filter(l => l.estado !== 'pagado');
                const pagadas = list.filter(l => l.estado === 'pagado');
                renderDeudas(activas);
                renderHistorial(pagadas);
            });
        }

        // --- Renderers y UI ---
        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        window.renderCategories = () => {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(cat => `
                <button type="button" onclick="selectCategory('${cat.id}')" class="p-2 rounded-xl border text-[8px] font-black flex flex-col items-center gap-1 transition-all ${activeCategory === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-base">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>
            `).join('');
        };

        window.selectCategory = (id) => { activeCategory = id; renderCategories(); };

        window.toggleHistory = (show) => { document.getElementById('history-modal').classList.toggle('hidden', !show); };

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.map(e => {
                total += parseFloat(e.monto || 0);
                const icon = categories.find(c => c.id === e.categoria)?.icon || '📦';
                return `<div class="card-dark p-4 flex justify-between items-center border-l-4 border-zinc-800">
                    <div class="flex items-center gap-3">
                        <div class="text-xl">${icon}</div>
                        <div>
                            <p class="text-white font-black text-[10px] uppercase italic">${e.categoria}</p>
                            <p class="text-[8px] text-zinc-500 font-bold uppercase">${e.detalle || ''}</p>
                        </div>
                    </div>
                    <p class="text-red-500 font-black italic text-xs">-$${parseFloat(e.monto).toFixed(2)}</p>
                </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toLocaleString()}`;
        }

        function renderDeudas(data) {
            let totalD = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoTotalConInteres || 0) - pagado;
                totalD += (saldo > 0 ? saldo : 0);
                return `
                <div class="card-dark overflow-hidden border-l-4 border-gold">
                    <div class="p-4 bg-zinc-800/10">
                        <p class="text-white font-black text-[10px] uppercase italic tracking-widest">${p.acreedor}</p>
                        <p class="text-gold font-black text-2xl italic mt-1">$${saldo.toLocaleString()}</p>
                    </div>
                    <div class="p-3 bg-black/40 flex gap-2">
                        <input type="number" placeholder="0.00" id="abono-${p.id}" class="flex-1 bg-black border border-zinc-800 rounded-xl p-2 text-[12px] font-black text-white outline-none">
                        <button onclick="handleAbono('${p.id}')" class="bg-white text-black text-[9px] font-black px-4 rounded-xl uppercase">Abonar</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${totalD.toLocaleString()}`;
        }

        function renderHistorial(data) {
            const container = document.getElementById('list-history');
            container.innerHTML = data.map(p => `
                <div class="card-dark p-5 opacity-50 border-l-4 border-green-500">
                    <p class="text-[8px] font-black text-green-500 uppercase mb-1">Liquidada</p>
                    <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                    <p class="text-zinc-500 font-black italic text-xs mt-1">Total Pagado: $${parseFloat(p.montoTotalConInteres).toFixed(2)}</p>
                </div>
            `).join('');
        }

        // Acciones Firebase
        window.handleAbono = async (id) => {
            const input = document.getElementById(`abono-${id}`);
            const monto = parseFloat(input.value);
            if(!monto || isNaN(monto)) return;
            const docRef = doc(db, 'usuarios', userId, 'finanzas_deudas', id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                const abonos = data.abonos || [];
                const totalAbonado = abonos.reduce((s, a) => s + a.monto, 0) + monto;
                const update = { abonos: [...abonos, { monto, fecha: new Date().toLocaleDateString() }] };
                if (totalAbonado >= data.montoTotalConInteres) update.estado = 'pagado';
                await updateDoc(docRef, update);
                input.value = '';
            }
        };

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'usuarios', userId, 'finanzas_egresos'), {
                categoria: activeCategory,
                monto: parseFloat(document.getElementById('egreso-monto').value),
                detalle: document.getElementById('egreso-detalle').value.toUpperCase(),
                fecha: new Date().toLocaleDateString()
            });
            e.target.reset();
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const mBase = parseFloat(document.getElementById('deuda-monto').value);
            const porc = parseFloat(document.getElementById('deuda-interes-valor').value || 0);
            const mTotal = mBase + (mBase * (porc / 100));
            await addDoc(collection(db, 'usuarios', userId, 'finanzas_deudas'), {
                acreedor: document.getElementById('deuda-acreedor').value.toUpperCase(),
                montoBase: mBase,
                montoTotalConInteres: mTotal,
                abonos: [],
                estado: 'activo',
                fecha: new Date().toLocaleDateString()
            });
            e.target.reset();
        };

        document.getElementById('toggle-interes').onclick = () => {
            hasInterest = !hasInterest;
            const btn = document.getElementById('toggle-interes');
            const circle = document.getElementById('toggle-circle');
            const input = document.getElementById('deuda-interes-valor');
            btn.className = `w-10 h-5 rounded-full relative transition-all ${hasInterest ? 'bg-gold' : 'bg-zinc-800'}`;
            circle.style.left = hasInterest ? '1.375rem' : '0.125rem';
            input.classList.toggle('hidden', !hasInterest);
        };
    </script>
</body>
</html>
