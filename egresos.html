
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egresos y Deudas - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #D4AF37; --bg: #050505; }
        /* Seguridad: oculto hasta login */
        body { font-family: 'Inter', sans-serif; background-color: black; color: #d4d4d8; display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .active-tab { background-color: #f59e0b; color: black; box-shadow: 0 4px 158px rgba(245, 158, 11, 0.2); }
        .category-selected { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        
        .dot-online {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981, 0 0 20px rgba(16, 185, 129, 0.4);
        }

        #history-modal {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
        }

        #loading-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="select-none">

    <!-- Pantalla de Carga/Seguridad -->
    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mb-4"></div>
        <p class="text-amber-500 text-[10px] font-black uppercase tracking-[0.5em]">Verificando Acceso</p>
    </div>

    <div id="app">
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='index.html'" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-amber-500">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-black italic">JI</div>
                    <h1 class="text-sm font-black text-white italic tracking-tight">FINANZAS</h1>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleHistory(true)" class="w-9 h-9 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-amber-500 hover:bg-zinc-800 transition-all">
                    <i class="fas fa-history text-xs"></i>
                </button>
                <div id="statusDot" class="w-2 h-2 rounded-full bg-zinc-800"></div>
            </div>
        </header>

        <main class="p-5 max-w-lg mx-auto pb-10 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
                    <i class="fas fa-arrow-trend-down text-red-500 mb-2"></i>
                    <p class="text-[9px] uppercase font-black text-zinc-500">Gastos Mensuales</p>
                    <p id="total-egresos" class="text-xl font-black text-white italic">$0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
                    <i class="fas fa-wallet text-amber-500 mb-2"></i>
                    <p class="text-[9px] uppercase font-black text-zinc-500">Deuda Activa</p>
                    <p id="total-deuda" class="text-xl font-black text-white italic">$0.00</p>
                </div>
            </div>

            <div class="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab">EGRESOS</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500">DEUDAS</button>
            </div>

            <!-- Sección Egresos -->
            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50 relative shadow-2xl">
                    <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
                    <input type="number" step="0.01" required placeholder="0.00 $" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg focus:border-amber-500 outline-none">
                    <input type="text" placeholder="Concepto o descripción" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-xs outline-none">
                    <button type="submit" id="btn-submit-egreso" class="w-full py-4 rounded-2xl bg-white text-black font-black italic text-xs tracking-widest hover:bg-amber-500 transition-colors uppercase">Registrar Egreso</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <!-- Sección Deudas -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50 shadow-2xl">
                    <input type="text" required placeholder="Nombre del acreedor" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-xs outline-none">
                    <input type="number" required placeholder="Monto del préstamo $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg outline-none">
                    <div class="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-zinc-800">
                        <span class="text-[9px] font-black uppercase text-zinc-500 italic">Interés mensual (%)</span>
                        <button type="button" id="toggle-interes" class="w-10 h-5 rounded-full relative transition-all bg-zinc-800">
                            <div id="toggle-circle" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-all"></div>
                        </button>
                    </div>
                    <input type="number" placeholder="Ej: 5" id="deuda-interes-valor" class="hidden w-full bg-black border border-amber-500/40 p-4 rounded-2xl text-amber-500 font-black text-xs outline-none">
                    <button type="submit" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black italic text-xs tracking-widest uppercase shadow-lg shadow-amber-500/10 hover:bg-white transition-colors">Crear Deuda</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>

        <!-- MODAL DE HISTORIAL -->
        <div id="history-modal" class="fixed inset-0 z-[100] hidden flex flex-col">
            <header class="p-6 flex justify-between items-center border-b border-zinc-800 bg-black">
                <div class="flex items-center gap-3">
                    <i class="fas fa-history text-amber-500"></i>
                    <h2 class="font-black text-white italic text-sm tracking-tight uppercase">Historial de Deudas Pagas</h2>
                </div>
                <button onclick="toggleHistory(false)" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500">
                    <i class="fas fa-times"></i>
                </button>
            </header>
            <div id="list-history" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userId = null;
        let activeCategory = 'otros';
        let hasInterest = false;

        const categories = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servic.', icon: '⚡' },
            { id: 'personal', label: 'Person.', icon: '👥' },
            { id: 'otros', label: 'Otros', icon: '📦' },
            { id: 'inversion', label: 'Invers.', icon: '💎' }
        ];

        // SEGURIDAD: Solo acceso si hay login real de correo (Como en Cobranza)
        onAuthStateChanged(auth, (user) => {
            if(user && !user.isAnonymous) {
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('statusDot').classList.add('dot-online');
                startListening(user.uid);
                renderCategories();
            } else {
                window.location.href = "login.html";
            }
        });

        function startListening(uid) {
            // Egresos privados
            onSnapshot(collection(db, 'usuarios', uid, 'finanzas_egresos'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEgresos(list);
            });

            // Deudas privadas
            onSnapshot(collection(db, 'usuarios', uid, 'finanzas_deudas'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                const activas = list.filter(l => l.estado !== 'pagado');
                const pagadas = list.filter(l => l.estado === 'pagado');
                renderDeudas(activas);
                renderHistorial(pagadas);
            });
        }

        // --- Lógica de Interfaz Manteniendo tu Diseño ---
        window.toggleHistory = (show) => { document.getElementById('history-modal').classList.toggle('hidden', !show); };
        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        window.selectCategory = (id) => { activeCategory = id; renderCategories(); };

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(cat => `
                <button type="button" onclick="window.selectCategory('${cat.id}')" class="p-2 rounded-xl border text-[8px] font-black flex flex-col items-center gap-1 transition-all ${activeCategory === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>
            `).join('');
        }

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.map(e => {
                total += parseFloat(e.monto || 0);
                return `<div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800/40">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center text-lg">${categories.find(c => c.id === e.categoria)?.icon || '📦'}</div>
                        <div>
                            <p class="text-white font-black text-xs uppercase italic">${e.categoria}</p>
                            <p class="text-[10px] text-zinc-500">${e.detalle || ''}</p>
                        </div>
                    </div>
                    <p class="text-red-500 font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toLocaleString()}`;
        }

        function renderDeudas(data) {
            let totalD = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoTotalConInteres || 0) - pagado;
                totalD += (saldo > 0 ? saldo : 0);
                return `
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden group">
                    <div class="p-5 bg-zinc-800/10 relative">
                        <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                        <p class="text-amber-500 font-black text-3xl italic mt-1">$${saldo.toLocaleString()}</p>
                    </div>
                    <div class="p-4 bg-black/40 space-y-3">
                        <div class="flex gap-2">
                            <input type="number" placeholder="Abonar $" id="abono-${p.id}" class="flex-1 bg-black border border-zinc-800 rounded-xl p-3 text-[11px] font-black text-white outline-none">
                            <button onclick="window.handleAbono('${p.id}')" class="bg-white text-black text-[9px] font-black px-4 rounded-xl italic uppercase">Abonar</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${totalD.toLocaleString()}`;
        }

        function renderHistorial(data) {
            const container = document.getElementById('list-history');
            container.innerHTML = data.map(p => `
                <div class="bg-zinc-900/40 border border-zinc-800 p-5 rounded-3xl opacity-60">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[8px] font-black text-emerald-500 uppercase mb-1"><i class="fas fa-check-circle mr-1"></i>Liquidada</p>
                            <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                        </div>
                        <p class="text-zinc-500 font-black italic text-sm">$${parseFloat(p.montoTotalConInteres).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');
        }

        window.handleAbono = async (id) => {
            const input = document.getElementById(`abono-${id}`);
            const monto = parseFloat(input.value);
            if(!monto) return;
            const docRef = doc(db, 'usuarios', userId, 'finanzas_deudas', id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                const abonos = data.abonos || [];
                const totalAbonado = abonos.reduce((s, a) => s + a.monto, 0) + monto;
                const update = { abonos: [...abonos, { monto, fecha: new Date().toLocaleDateString() }] };
                if (totalAbonado >= data.montoTotalConInteres) update.estado = 'pagado';
                await updateDoc(docRef, update);
                input.value = '';
            }
        };

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'usuarios', userId, 'finanzas_egresos'), {
                categoria: activeCategory,
                monto: parseFloat(document.getElementById('egreso-monto').value),
                detalle: document.getElementById('egreso-detalle').value.toUpperCase(),
                fecha: new Date().toLocaleDateString()
            });
            e.target.reset();
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const mBase = parseFloat(document.getElementById('deuda-monto').value);
            const porc = parseFloat(document.getElementById('deuda-interes-valor').value || 0);
            const mTotal = mBase + (mBase * (porc / 100));
            await addDoc(collection(db, 'usuarios', userId, 'finanzas_deudas'), {
                acreedor: document.getElementById('deuda-acreedor').value.toUpperCase(),
                montoBase: mBase,
                montoTotalConInteres: mTotal,
                abonos: [],
                estado: 'activo',
                fecha: new Date().toLocaleDateString()
            });
            e.target.reset();
        };

        document.getElementById('toggle-interes').onclick = () => {
            hasInterest = !hasInterest;
            const btn = document.getElementById('toggle-interes');
            const circle = document.getElementById('toggle-circle');
            const input = document.getElementById('deuda-interes-valor');
            btn.className = `w-10 h-5 rounded-full relative transition-all ${hasInterest ? 'bg-amber-500 shadow-[0_0_10px_#f59e0b]' : 'bg-zinc-800'}`;
            circle.style.left = hasInterest ? '1.375rem' : '0.125rem';
            input.classList.toggle('hidden', !hasInterest);
        };
    </script>
</body>
</html>
