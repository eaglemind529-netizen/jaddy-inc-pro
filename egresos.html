<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; overflow-x: hidden; }
        .active-tab { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: black; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .category-selected { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; transform: scale(1.05); }
        .modal-backdrop { background-color: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .glass { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(39, 39, 42, 1); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="select-none">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="p-5 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/80 backdrop-blur-xl z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-black italic shadow-[0_0_20px_rgba(245, 158, 11, 0.3)]">JI</div>
                <div>
                    <h1 class="text-[10px] font-black text-white uppercase tracking-tighter italic">Bóveda Administrativa</h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-zinc-800 transition-all duration-500"></div>
                        <p id="user-name" class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest italic">Verificando Usuario...</p>
                    </div>
                </div>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full glass flex items-center justify-center text-zinc-500 hover:text-white transition-colors">
                <i class="fas fa-sign-out-alt text-sm"></i>
            </button>
        </header>

        <main class="p-5 max-w-lg mx-auto w-full flex-1 pb-28 space-y-6 fade-in">
            <!-- Resumen Financiero -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-[2rem] card-shadow text-center">
                    <p class="text-[7px] uppercase font-black text-zinc-500 mb-1 tracking-[0.2em] italic">Gastos del Mes</p>
                    <p id="total-egresos" class="text-2xl font-black text-white italic">$0.00</p>
                </div>
                <div class="glass p-5 rounded-[2rem] card-shadow text-center">
                    <p class="text-[7px] uppercase font-black text-zinc-500 mb-1 tracking-[0.2em] italic">Deuda Pendiente</p>
                    <p id="total-deuda" class="text-2xl font-black text-red-500 italic">$0.00</p>
                </div>
            </div>

            <!-- Navegación -->
            <div class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800/50">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[9px] font-black transition-all active-tab uppercase italic tracking-widest">Diario</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[9px] font-black transition-all text-zinc-500 uppercase italic tracking-widest">Préstamos</button>
            </div>

            <!-- VISTA: EGRESOS -->
            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 glass p-6 rounded-[2.5rem] card-shadow">
                    <!-- Categorías ajustadas para mejor visibilidad -->
                    <div id="categories-grid" class="grid grid-cols-4 gap-2"></div>
                    
                    <div class="relative group">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 font-black italic">$</span>
                        <input type="number" step="0.01" required placeholder="0.00" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-3xl focus:border-amber-500 outline-none text-center transition-all">
                    </div>
                    
                    <input type="text" placeholder="¿EN QUÉ SE FUE EL DINERO?" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-[9px] outline-none text-zinc-400 text-center uppercase font-bold tracking-[0.2em] focus:border-amber-500">
                    
                    <button type="submit" id="btn-save-gasto" class="w-full py-5 rounded-2xl bg-white text-black font-black italic text-[10px] tracking-[0.3em] uppercase hover:bg-amber-500 transition-all active:scale-95">Registrar en Bóveda</button>
                </form>

                <div id="list-egresos" class="space-y-3">
                    <div class="text-center py-10 opacity-20"><i class="fas fa-circle-notch animate-spin text-2xl"></i></div>
                </div>
            </div>

            <!-- VISTA: DEUDAS -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 glass p-6 rounded-[2.5rem] card-shadow">
                    <input type="text" required placeholder="NOMBRE DEL ACREEDOR" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-[9px] outline-none text-center uppercase tracking-widest focus:border-red-500">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-black italic">$</span>
                            <input type="number" step="0.01" required placeholder="CAPITAL" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-lg outline-none text-center pl-8 focus:border-red-500">
                        </div>
                        <div class="relative">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-red-500 font-black italic">%</span>
                            <input type="number" step="0.1" required placeholder="INTERÉS" id="deuda-interes" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-red-500 font-black text-lg outline-none text-center pr-8 focus:border-red-500">
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-save-deuda" class="w-full py-5 rounded-2xl bg-red-600 text-white font-black italic text-[10px] tracking-[0.3em] uppercase shadow-lg shadow-red-900/20 active:scale-95 transition-all">Crear Registro de Deuda</button>
                </form>

                <div id="list-deudas-activas" class="space-y-4"></div>
            </div>
        </main>

        <!-- MODAL: AGREGAR CATEGORÍA -->
        <div id="modal-categoria" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="glass w-full max-w-xs p-6 rounded-[2rem] space-y-4 fade-in">
                <h3 class="text-white font-black uppercase italic text-center text-xs tracking-widest">Nueva Categoría</h3>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="cat-emoji" placeholder="EMOJI" class="bg-black border border-zinc-800 p-4 rounded-xl text-center text-xl outline-none focus:border-amber-500">
                    <input type="text" id="cat-nombre" placeholder="NOMBRE" class="bg-black border border-zinc-800 p-4 rounded-xl text-center text-[9px] font-black uppercase outline-none focus:border-amber-500">
                </div>
                <div class="flex gap-2">
                    <button onclick="closeModal('modal-categoria')" class="flex-1 py-3 bg-zinc-900 text-zinc-500 rounded-xl font-black uppercase text-[8px]">Cancelar</button>
                    <button onclick="saveNewCategory()" class="flex-1 py-3 bg-amber-500 text-black rounded-xl font-black uppercase text-[8px]">Guardar</button>
                </div>
            </div>
        </div>

        <!-- MODAL: DETALLE DE DEUDA -->
        <div id="modal-detalle" class="fixed inset-0 z-[100] hidden flex flex-col bg-black modal-backdrop">
            <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
                <div>
                    <h2 id="det-name" class="text-white font-black uppercase italic text-xl tracking-tighter">Detalle</h2>
                    <p class="text-[7px] text-zinc-600 font-black uppercase mt-1 italic tracking-widest">Control de Pagos y Prórrogas</p>
                </div>
                <button onclick="closeModal('modal-detalle')" class="w-12 h-12 rounded-full glass flex items-center justify-center text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="glass p-8 rounded-[2.5rem] text-center border-red-900/30">
                    <p class="text-[8px] text-zinc-500 font-black uppercase italic tracking-widest mb-2">Saldo Actual a Liquidar</p>
                    <p id="det-saldo-valor" class="text-5xl font-black text-red-500 italic tracking-tighter">$0.00</p>
                    <div class="flex justify-center gap-4 mt-4 text-[7px] font-black uppercase text-zinc-600">
                        <span id="det-base">Base: $0</span>
                        <span id="det-int">Interés: 0%</span>
                    </div>
                </div>

                <div id="prorroga-form-container" class="hidden glass p-6 rounded-3xl border border-amber-900/30 fade-in space-y-4">
                    <h4 class="text-[9px] font-black text-amber-500 uppercase italic tracking-widest text-center">Nueva Prórroga</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[7px] text-zinc-500 font-black uppercase ml-2">Días</label>
                            <input type="number" id="prorroga-dias" placeholder="0" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-white font-black text-center text-sm outline-none focus:border-amber-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[7px] text-zinc-500 font-black uppercase ml-2">% Interés</label>
                            <input type="number" step="0.1" id="prorroga-interes" placeholder="0%" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-amber-500 font-black text-center text-sm outline-none focus:border-amber-500">
                        </div>
                    </div>
                    <button onclick="confirmProrroga()" class="w-full py-3 bg-amber-500 text-black font-black uppercase italic text-[9px] rounded-xl active:scale-95 transition-all">Confirmar Extensión</button>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[8px] font-black text-zinc-500 uppercase tracking-widest ml-4">Historial de Movimientos</h4>
                    <div id="det-list" class="space-y-3 pb-10"></div>
                </div>
            </div>

            <!-- Footer: Registro de Abono -->
            <div class="p-6 bg-zinc-950 border-t border-zinc-900 flex flex-col gap-4">
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 font-black italic">$</span>
                    <input type="number" id="det-amount" placeholder="CANTIDAD PAGADA" class="w-full bg-black border border-zinc-800 rounded-2xl p-5 text-2xl font-black text-white outline-none text-center">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="confirmPayment('abono')" class="col-span-2 bg-white text-black font-black py-5 rounded-2xl uppercase italic text-[9px] tracking-widest active:scale-95 transition-all">Abonar Capital</button>
                    <button onclick="toggleProrrogaUI()" class="bg-zinc-900 text-amber-500 border border-amber-900/30 font-black py-5 rounded-2xl flex items-center justify-center text-xl active:scale-95 transition-all"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, getDoc, enableIndexedDbPersistence, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-finance-pro-v2';

        enableIndexedDbPersistence(db).catch(() => console.warn("Modo Offline activado"));

        let user = null;
        let activeCat = 'otros';
        let debtsData = [];
        let userCategories = [];
        let selectedDebtId = null;

        const DEFAULT_CATS = [
            { id: 'comida', icon: '🍲', label: 'Comida' }, 
            { id: 'alquiler', icon: '🏠', label: 'Renta' }, 
            { id: 'servicios', icon: '⚡', label: 'Servicios' }, 
            { id: 'inversion', icon: '📈', label: 'Inversión' },
            { id: 'personal', icon: '👥', label: 'Personal' }, 
            { id: 'otros', icon: '📦', label: 'Otros' }
        ];

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('user-name').innerText = u.email ? u.email.split('@')[0].toUpperCase() : 'BÓVEDA ACTIVA';
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                startListeners();
            } else { initAuth(); }
        });

        function startListeners() {
            if (!user) return;
            
            // Listener Categorías
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'categorias'), (snap) => {
                userCategories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCats();
            });

            // Listener Egresos
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), (snap) => {
                const data = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEgresos(data);
            });

            // Listener Préstamos
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'prestamos'), (snap) => {
                debtsData = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(debtsData);
                if (selectedDebtId) {
                    const active = debtsData.find(d => d.id === selectedDebtId);
                    if (active) renderHistory(active);
                }
            });
        }

        window.saveNewCategory = async () => {
            const emoji = document.getElementById('cat-emoji').value || '📁';
            const label = document.getElementById('cat-nombre').value.toUpperCase();
            if (!label) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'categorias'), {
                    icon: emoji, label, createdAt: Date.now()
                });
                closeModal('modal-categoria');
                document.getElementById('cat-emoji').value = '';
                document.getElementById('cat-nombre').value = '';
            } catch (err) { console.error(err); }
        };

        window.selectCat = (id) => { activeCat = id; renderCats(); };

        function renderCats() {
            const allCats = [...DEFAULT_CATS, ...userCategories];
            document.getElementById('categories-grid').innerHTML = allCats.map(c => `
                <button type="button" onclick="selectCat('${c.id}')" class="p-2 py-3 rounded-2xl border flex flex-col items-center justify-center transition-all ${activeCat === c.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${c.icon}</span>
                    <span class="text-[7px] font-black uppercase mt-1.5 tracking-tighter w-full text-center leading-none break-words">${c.label}</span>
                </button>`).join('') + `
                <button type="button" onclick="document.getElementById('modal-categoria').classList.remove('hidden')" class="p-2 py-3 rounded-2xl border border-dashed border-zinc-800 flex flex-col items-center justify-center text-zinc-600 hover:border-amber-500 transition-all">
                    <span class="text-lg"><i class="fas fa-plus"></i></span>
                    <span class="text-[7px] font-black uppercase mt-1.5">NUEVA</span>
                </button>`;
        }

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-gasto');
            const monto = parseFloat(document.getElementById('egreso-monto').value);
            const detalle = document.getElementById('egreso-detalle').value.toUpperCase() || "SIN DETALLE";
            btn.disabled = true;
            try {
                const catObj = [...DEFAULT_CATS, ...userCategories].find(c => c.id === activeCat);
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), {
                    categoriaId: activeCat,
                    categoriaNombre: catObj?.label || 'OTROS',
                    categoriaIcon: catObj?.icon || '📦',
                    monto, detalle, createdAt: Date.now()
                });
                e.target.reset();
                selectCat('otros');
            } catch (err) { console.error(err); } finally { btn.disabled = false; }
        };

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(e => {
                total += e.monto;
                return `<div class="glass p-4 rounded-3xl flex justify-between items-center border border-zinc-800/50 fade-in mb-3">
                    <div class="flex items-center gap-4">
                        <div class="text-2xl">${e.categoriaIcon || '📦'}</div>
                        <div><p class="text-white font-black text-[10px] uppercase italic tracking-tighter">${e.categoriaNombre || 'EGRESO'}</p><p class="text-[8px] text-zinc-500 font-bold uppercase">${e.detalle}</p></div>
                    </div>
                    <div class="flex items-center gap-4"><p class="text-white font-black italic">-$${e.monto.toFixed(2)}</p><button onclick="deleteItem('egresos', '${e.id}')" class="text-zinc-800 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-[10px]"></i></button></div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-zinc-700 italic text-[10px]">Sin movimientos</p>';
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const acreedor = document.getElementById('deuda-acreedor').value.toUpperCase();
            const monto = parseFloat(document.getElementById('deuda-monto').value);
            const int = parseFloat(document.getElementById('deuda-interes').value || 0);
            const total = monto + (monto * (int / 100));
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'prestamos'), {
                    acreedor, montoBase: monto, porcentajeInteres: int, totalConInteres: total, abonos: [], createdAt: Date.now(), estado: 'pendiente'
                });
                e.target.reset();
                switchTab('deudas');
            } catch (err) { console.error(err); }
        };

        window.toggleProrrogaUI = () => document.getElementById('prorroga-form-container').classList.toggle('hidden');

        window.confirmProrroga = async () => {
            const dias = parseInt(document.getElementById('prorroga-dias').value);
            const pct = parseFloat(document.getElementById('prorroga-interes').value);
            if (!dias || isNaN(pct) || !selectedDebtId) return;

            try {
                const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'prestamos', selectedDebtId);
                const snap = await getDoc(ref);
                const data = snap.data();
                const nuevoInteresValor = data.montoBase * (pct / 100);
                const nuevoTotal = (data.totalConInteres || 0) + nuevoInteresValor;

                await updateDoc(ref, {
                    totalConInteres: nuevoTotal,
                    abonos: [...(data.abonos || []), {
                        monto: 0, tipo: 'prorroga_info', detalle: `EXTENSIÓN ${dias} DÍAS (+${pct}%)`,
                        fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }).toUpperCase(),
                        createdAt: Date.now()
                    }]
                });
                toggleProrrogaUI();
            } catch (err) { console.error(err); }
        };

        window.confirmPayment = async (tipo) => {
            const val = parseFloat(document.getElementById('det-amount').value);
            if (!val || !selectedDebtId) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'prestamos', selectedDebtId);
                const snap = await getDoc(ref);
                const currentData = snap.data();
                await updateDoc(ref, {
                    abonos: [...(currentData.abonos || []), { 
                        monto: val, tipo, fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }).toUpperCase(), 
                        createdAt: Date.now() 
                    }]
                });
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), {
                    categoriaId: 'prestamos', categoriaNombre: 'PRESTAMO', categoriaIcon: '💸',
                    monto: val, detalle: `ABONO A: ${currentData.acreedor}`, createdAt: Date.now()
                });
                document.getElementById('det-amount').value = '';
            } catch (err) { console.error(err); }
        };

        function renderDeudas(data) {
            let totalD = 0;
            document.getElementById('list-deudas-activas').innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(l => {
                const pagadoCapital = (l.abonos || []).filter(a => a.tipo === 'abono').reduce((s, a) => s + a.monto, 0);
                const saldo = (l.totalConInteres || 0) - pagadoCapital;
                if (saldo > 0) totalD += saldo;
                return `<div onclick="openDebt('${l.id}')" class="glass p-6 rounded-[2.5rem] border ${saldo <= 0 ? 'border-emerald-900/30 opacity-50' : 'border-red-900/30'} fade-in cursor-pointer active:scale-95 transition-all mb-4">
                    <div class="flex justify-between items-center">
                        <div><h4 class="text-white font-black italic uppercase text-xs">${l.acreedor}</h4><p class="text-[7px] font-black text-zinc-500 uppercase mt-1 tracking-widest">${saldo <= 0 ? 'LIQUIDADO' : 'PENDIENTE'}</p></div>
                        <p class="text-xl font-black italic ${saldo <= 0 ? 'text-emerald-500' : 'text-white'}">$${saldo.toFixed(2)}</p>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-zinc-700 italic text-[10px]">Sin deudas registradas</p>';
            document.getElementById('total-deuda').innerText = `$${totalD.toFixed(2)}`;
        }

        window.openDebt = (id) => {
            selectedDebtId = id;
            const l = debtsData.find(d => d.id === id);
            if(l) { renderHistory(l); document.getElementById('modal-detalle').classList.remove('hidden'); }
        };

        function renderHistory(l) {
            const pagadoCapital = (l.abonos || []).filter(a => a.tipo === 'abono').reduce((s, a) => s + a.monto, 0);
            const saldo = (l.totalConInteres || 0) - pagadoCapital;
            document.getElementById('det-name').innerText = l.acreedor;
            document.getElementById('det-saldo-valor').innerText = `$${saldo.toFixed(2)}`;
            document.getElementById('det-base').innerText = `Base: $${l.montoBase}`;
            document.getElementById('det-int').innerText = `Int: ${l.porcentajeInteres}%`;
            document.getElementById('det-list').innerHTML = (l.abonos || []).sort((a,b) => b.createdAt - a.createdAt).map(a => {
                const isProrroga = a.tipo === 'prorroga_info';
                return `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border ${isProrroga ? 'border-amber-900/30' : 'border-zinc-800/40'}">
                    <div>
                        <p class="text-[7px] font-black uppercase ${isProrroga ? 'text-amber-500' : 'text-emerald-500'} tracking-widest">${isProrroga ? 'Prórroga' : 'Abono Capital'}</p>
                        <p class="text-[10px] font-bold text-white">${isProrroga ? a.detalle : a.fecha}</p>
                    </div>
                    ${!isProrroga ? `<span class="font-black italic text-white">-$${a.monto.toFixed(2)}</span>` : '<i class="fas fa-clock text-amber-500 text-[10px]"></i>'}
                </div>`;
            }).join('') || '<p class="text-center py-6 text-zinc-800 italic text-[9px]">Sin abonos</p>';
        }

        window.deleteItem = async (coll, id) => {
            if (!confirm("¿Eliminar este registro de forma permanente?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, coll, id));
                if (coll === 'prestamos') closeModal('modal-detalle');
            } catch (err) { console.error(err); }
        };

        window.switchTab = (t) => {
            document.getElementById('content-egresos').classList.toggle('hidden', t !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', t !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[9px] font-black transition-all ${t === 'egresos' ? 'active-tab' : 'text-zinc-500 uppercase italic tracking-widest'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[9px] font-black transition-all ${t === 'deudas' ? 'active-tab' : 'text-zinc-500 uppercase italic tracking-widest'}`;
        };

        window.closeModal = (id) => { 
            if(id === 'modal-detalle') selectedDebtId = null; 
            document.getElementById(id).classList.add('hidden'); 
        };

        window.logout = () => signOut(auth).then(() => window.location.reload());
        
        initAuth();
        renderCats();
    </script>
</body>
</html>
