<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; color: #d4d4d8; overflow-x: hidden; }
        .active-tab { background-color: #f59e0b; color: black; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); }
        .category-selected { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .modal-backdrop { background-color: rgba(0,0,0,0.95); backdrop-filter: blur(12px); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .loading { opacity: 0.5; pointer-events: none; }
        
        /* Botón Volver Estilo Luxury */

            background: rgba(24, 24, 27, 0.8);

            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

</head>
<body class="select-none">
    <div id="app">
        <!-- Header con Navegación al Index -->
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <!-- BOTÓN VOLVER (Redirige al Dashboard Principal) -->
                <a href="index.html" class="btn-back w-12 h-12 rounded-2xl flex items-center justify-center text-zinc-400">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <div class="flex flex-col">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-amber-500 rounded-md flex items-center justify-center font-black text-black italic text-[10px]">JI</div>
                        <h1 class="text-[10px] font-black text-white italic tracking-widest uppercase">Finanzas Vault</h1>
                    </div>
                    <p id="user-display-name" class="text-[8px] text-amber-500 font-black mt-0.5 uppercase tracking-tighter italic">Cargando...</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-[7px] font-black text-zinc-700 uppercase tracking-widest italic">Offline</span>
            </div>
        </header>

        <main class="p-5 max-w-lg mx-auto pb-24 space-y-6 fade-in">
            <!-- Totales -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] shadow-xl">
                    <p class="text-[8px] uppercase font-black text-zinc-500 mb-1 italic">Gastos Mensuales</p>
                    <p id="total-egresos" class="text-2xl font-black text-white italic">$0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] shadow-xl">
                    <p class="text-[8px] uppercase font-black text-zinc-500 mb-1 italic">Cuentas por Cobrar</p>
                    <p id="total-deuda" class="text-2xl font-black text-amber-500 italic">$0.00</p>
                </div>
            </div>

            <!-- Selector de Secciones -->
            <div class="flex bg-zinc-900 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab uppercase italic">Diario de Gastos</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500 uppercase italic">Control Préstamos</button>
            </div>

            <!-- VISTA: EGRESOS -->
            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50">
                    <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-black italic">$</span>
                        <input type="number" step="0.01" required placeholder="0.00" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-2xl focus:border-amber-500 outline-none text-center">
                    </div>
                    <input type="text" placeholder="¿EN QUÉ SE GASTÓ?" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-[10px] outline-none text-zinc-400 text-center uppercase font-bold tracking-widest">
                    <button type="submit" id="btn-submit-egreso" class="w-full py-5 rounded-2xl bg-white text-black font-black italic text-[10px] tracking-[0.2em] uppercase active:scale-95 transition-all">Guardar en Nube</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <!-- VISTA: DEUDAS -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50">
                    <input type="text" required placeholder="NOMBRE DE LA PERSONA / EMPRESA" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-[10px] outline-none text-center uppercase tracking-widest">
                    <input type="number" required placeholder="MONTO PRESTADO $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-xl outline-none text-center">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest text-center">Fecha Inicio</label>
                            <input type="date" id="deuda-fecha-init" class="w-full bg-transparent text-white font-black text-center text-[10px] outline-none">
                        </div>
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest text-center">Vencimiento</label>
                            <input type="date" id="deuda-fecha-end" class="w-full bg-transparent text-white font-black text-center text-[10px] outline-none">
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-submit-deuda" class="w-full py-5 rounded-2xl bg-amber-500 text-black font-black italic text-[10px] tracking-[0.2em] uppercase active:scale-95 transition-all">Registrar Préstamo</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>

        <!-- MODALES (Detalle y Confirmación) -->
        <div id="modal-detalle" class="fixed inset-0 z-[100] hidden flex flex-col bg-black modal-backdrop">
            <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
                <h2 id="det-name" class="text-white font-black uppercase italic text-lg tracking-tighter">Detalle</h2>
                <button onclick="closeModal('modal-detalle')" class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4" id="det-list"></div>
            <div class="p-8 bg-zinc-900 border-t border-zinc-800 space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="det-amount" placeholder="Registrar Abono $" class="flex-1 bg-black border border-zinc-800 rounded-2xl p-5 text-xl font-black text-white outline-none">
                    <button id="det-pay-btn" class="bg-white text-black font-black px-8 rounded-2xl uppercase italic text-[10px] tracking-widest">Abonar</button>
                </div>
            </div>
        </div>

        <div id="modal-confirm" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="bg-zinc-900 border border-zinc-800 w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 text-center">
                <h3 class="text-white font-black uppercase italic text-xs">¿Eliminar registro?</h3>
                <div class="flex flex-col gap-3">
                    <button id="btn-confirm-delete" class="w-full py-4 rounded-2xl bg-red-600 text-white font-black text-[10px] uppercase italic">Confirmar</button>
                    <button onclick="closeModal('modal-confirm')" class="w-full py-4 rounded-2xl bg-zinc-800 text-zinc-400 font-black text-[10px] uppercase italic">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-finance-module';

        let currentUser = null;
        let activeCat = 'otros';
        let debtsData = [];
        let unsubEgresos = null;
        let unsubDeudas = null;
        let selectedDebtId = null;

        const CATS = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servicios', icon: '⚡' },
            { id: 'personal', label: 'Personal', icon: '👥' },
            { id: 'inversion', label: 'Inversión', icon: '💎' },
            { id: 'otros', label: 'Otros', icon: '📦' }
        ];

        const startSession = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display-name').innerText = `BOVEDA: ${user.uid.substring(0,10).toUpperCase()}`;
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]";
                document.getElementById('status-text').innerText = "ONLINE";
                document.getElementById('status-text').classList.replace('text-zinc-700', 'text-emerald-500');
                setupListeners();
            } else { startSession(); }
        });

        startSession();

        function setupListeners() {
            if (!currentUser) return;
            if (unsubEgresos) unsubEgresos();
            if (unsubDeudas) unsubDeudas();

            unsubEgresos = onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'egresos'), (snap) => {
                renderEgresos(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            });

            unsubDeudas = onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'prestamos'), (snap) => {
                debtsData = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(debtsData);
                if (selectedDebtId) {
                    const active = debtsData.find(d => d.id === selectedDebtId);
                    if (active) renderHistory(active);
                }
            });
        }

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-egreso');
            const monto = parseFloat(document.getElementById('egreso-monto').value);
            if (!monto || !currentUser) return;

            btn.classList.add('loading');
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'egresos'), {
                categoria: activeCat, monto, detalle: document.getElementById('egreso-detalle').value.toUpperCase() || "SIN DETALLE", createdAt: Date.now()
            });
            e.target.reset();
            btn.classList.remove('loading');
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-deuda');
            if (!currentUser) return;

            btn.classList.add('loading');
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'prestamos'), {
                acreedor: document.getElementById('deuda-acreedor').value.toUpperCase(),
                montoBase: parseFloat(document.getElementById('deuda-monto').value),
                fechaInicio: document.getElementById('deuda-fecha-init').value,
                fechaVencimiento: document.getElementById('deuda-fecha-end').value,
                abonos: [], createdAt: Date.now()
            });
            e.target.reset();
            btn.classList.remove('loading');
        };

        function renderEgresos(data) {
            const container = document.getElementById('list-egresos');
            let total = 0;
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(e => {
                total += parseFloat(e.monto || 0);
                return `<div class="bg-zinc-900/40 p-4 rounded-3xl flex justify-between items-center border border-zinc-800/30">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-lg">${CATS.find(c => c.id === e.categoria)?.icon || '📦'}</div>
                        <div>
                            <p class="text-white font-black text-[9px] uppercase italic">${e.categoria}</p>
                            <p class="text-[8px] text-zinc-600 font-bold uppercase truncate max-w-[100px]">${e.detalle}</p>
                        </div>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <span class="text-white font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</span>
                        <button onclick="askToDelete('egresos', '${e.id}')" class="text-zinc-800 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        function renderDeudas(data) {
            let total = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = p.montoBase - pagado;
                total += saldo;
                return `<div onclick="openDebtDetail('${p.id}')" class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-6 cursor-pointer active:scale-95 transition-all">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[7px] font-black text-zinc-600 uppercase italic">Préstamo</p>
                            <h3 class="text-white font-black italic uppercase text-[10px]">${p.acreedor}</h3>
                        </div>
                        <p class="text-amber-500 font-black text-xl italic">$${saldo.toFixed(2)}</p>
                    </div>
                    <div class="w-full bg-black h-1 rounded-full mt-4 overflow-hidden">
                        <div class="bg-amber-500 h-full" style="width: ${Math.min((pagado/p.montoBase)*100, 100)}%"></div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${total.toFixed(2)}`;
        }

        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        window.selectCat = (id) => { activeCat = id; renderCats(); };
        function renderCats() {
            document.getElementById('categories-grid').innerHTML = CATS.map(cat => `
                <button type="button" onclick="selectCat('${cat.id}')" class="p-2.5 rounded-2xl border text-[6px] font-black flex flex-col items-center gap-1.5 transition-all ${activeCat === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>`).join('');
        }

        window.openDebtDetail = (id) => {
            selectedDebtId = id;
            const d = debtsData.find(x => x.id === id);
            if(d) { renderHistory(d); document.getElementById('modal-detalle').classList.remove('hidden'); }
        };

        window.renderHistory = (p) => {
            document.getElementById('det-name').innerText = p.acreedor;
            document.getElementById('det-list').innerHTML = (p.abonos || []).sort((a,b) => b.createdAt - a.createdAt).map(h => `
                <div class="bg-black border border-zinc-800 p-4 rounded-2xl flex justify-between items-center">
                    <p class="text-[10px] text-zinc-500 font-mono">${h.fecha}</p>
                    <p class="text-white font-black italic text-md">$${h.monto.toFixed(2)}</p>
                </div>
            `).join('') || `<p class="text-center text-zinc-800 italic py-10 text-[8px]">SIN ABONOS</p>`;
        };

        document.getElementById('det-pay-btn').onclick = async () => {
            if (!currentUser || !selectedDebtId) return;
            const monto = parseFloat(document.getElementById('det-amount').value);
            if (!monto) return;
            const pRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'prestamos', selectedDebtId);
            const pSnap = await getDoc(pRef);
            await updateDoc(pRef, { abonos: [...(pSnap.data().abonos || []), { monto, fecha: new Date().toLocaleDateString(), createdAt: Date.now() }] });
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'egresos'), { categoria: 'otros', monto, detalle: `ABONO: ${pSnap.data().acreedor}`, createdAt: Date.now() });
            document.getElementById('det-amount').value = '';
        };

        window.askToDelete = (coll, id) => {
            document.getElementById('modal-confirm').classList.remove('hidden');
            document.getElementById('btn-confirm-delete').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, coll, id));
                closeModal('modal-confirm');
                closeModal('modal-detalle');
            };
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        renderCats();
    </script>
</body>
</html>
