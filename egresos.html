```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egresos y Deudas - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; color: #d4d4d8; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .active-tab { background-color: #f59e0b; color: black; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); }
        .category-selected { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .modal-backdrop { background-color: rgba(0,0,0,0.9); backdrop-filter: blur(12px); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="select-none">
    <div id="app">
        <!-- Header -->
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-black italic">JI</div>
                <h1 class="text-sm font-black text-white italic tracking-tight">FINANZAS</h1>
            </div>
            <div id="connection-badge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase transition-all border-zinc-700 text-zinc-500">
                <div id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-700"></div>
                <span id="connection-text">Conectando</span>
            </div>
        </header>

        <main class="p-5 max-w-lg mx-auto pb-10 space-y-6">
            <!-- Resumen -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
                    <p class="text-[9px] uppercase font-black text-zinc-500 mb-1">Egresos Mes</p>
                    <p id="total-egresos" class="text-xl font-black text-white italic">$0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
                    <p class="text-[9px] uppercase font-black text-zinc-500 mb-1">Saldo Deuda</p>
                    <p id="total-deuda" class="text-xl font-black text-white italic">$0.00</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab uppercase">Egresos</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500 uppercase">Deudas</button>
            </div>

            <!-- Egresos Section -->
            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50">
                    <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
                    <input type="number" step="0.01" required placeholder="0.00 $" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg focus:border-amber-500 outline-none">
                    <input type="text" placeholder="Concepto" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-xs outline-none text-zinc-400">
                    <button type="submit" class="w-full py-4 rounded-2xl bg-white text-black font-black italic text-xs tracking-widest uppercase hover:bg-amber-500 transition-colors">Registrar Gasto</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <!-- Deudas Section -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50 shadow-2xl">
                    <input type="text" required placeholder="Nombre acreedor" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-xs outline-none">
                    <input type="number" required placeholder="Monto préstamo $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg outline-none">
                    
                    <textarea id="deuda-descripcion" placeholder="¿Para qué es este préstamo? (Detalles adicionales...)" rows="2" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-zinc-400 font-medium text-[10px] outline-none resize-none focus:border-amber-500/50 transition-colors"></textarea>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-zinc-500 uppercase ml-2 italic">Fecha Préstamo</label>
                            <input type="date" id="deuda-fecha-inicio" class="w-full bg-black border border-zinc-800 p-3 rounded-2xl text-white font-black text-[10px] outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-zinc-500 uppercase ml-2 italic">Fecha Venc.</label>
                            <input type="date" id="deuda-fecha-venc" class="w-full bg-black border border-zinc-800 p-3 rounded-2xl text-white font-black text-[10px] outline-none">
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-zinc-800">
                        <span class="text-[9px] font-black uppercase text-zinc-500 italic">¿Aplicar Interés inicial?</span>
                        <button type="button" id="toggle-interes" class="w-10 h-5 rounded-full relative transition-all bg-zinc-800">
                            <div id="toggle-circle" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-all"></div>
                        </button>
                    </div>
                    <input type="number" placeholder="Interés inicial %" id="deuda-interes-valor" class="hidden w-full bg-black border border-amber-500/40 p-4 rounded-2xl text-amber-500 font-black text-xs outline-none">
                    <button type="submit" id="submit-deuda-btn" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black italic text-xs tracking-widest uppercase">Crear Deuda</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>

        <!-- Detalle de Préstamo (Modal Full) -->
        <div id="detalle-modal" class="fixed inset-0 z-[100] hidden flex flex-col bg-black modal-backdrop slide-up">
            <div class="p-6 border-b border-zinc-900 flex justify-between items-center bg-black/50 backdrop-blur-md">
                <div>
                    <h2 id="det-acreedor" class="text-white font-black uppercase italic text-sm">Cargando...</h2>
                    <p id="det-desc-sub" class="text-[9px] text-zinc-500 font-bold uppercase italic max-w-[200px] truncate"></p>
                </div>
                <button onclick="closeDetalleModal()" class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4" id="det-historial"></div>
            <div class="p-6 bg-zinc-900 border-t border-zinc-800 space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="det-monto-input" placeholder="0.00 $" class="flex-1 bg-black border border-zinc-800 rounded-2xl p-4 text-lg font-black text-white outline-none focus:border-amber-500">
                    <button id="det-abono-btn" class="bg-white text-black font-black px-6 rounded-2xl uppercase italic text-xs">Abonar</button>
                </div>
                <button id="det-prorroga-btn" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black uppercase italic text-xs shadow-lg shadow-amber-500/10"><i class="fas fa-plus mr-2"></i>Aplicar Interés / Prórroga</button>
            </div>
        </div>

        <!-- Prórroga Modal -->
        <div id="progroga-modal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="bg-zinc-900 border border-amber-500/30 w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 shadow-2xl">
                <div class="text-center">
                    <h3 class="text-amber-500 font-black uppercase italic text-sm">Ajustar Prórroga</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">Suma días y porcentaje</p>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-zinc-500 uppercase ml-2 italic">Días a sumar</label>
                        <input type="number" id="prorroga-dias" placeholder="Ej: 15" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-xs outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-zinc-500 uppercase ml-2 italic">% Interés extra</label>
                        <input type="number" id="prorroga-interes" placeholder="Ej: 5" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-amber-500 font-black text-xs outline-none">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button id="confirm-prorroga-btn" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black text-[10px] uppercase italic">Confirmar Cambios</button>
                    <button onclick="closeProrrogaModal()" class="w-full py-4 rounded-2xl bg-zinc-800 text-zinc-400 font-black text-[10px] uppercase italic">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Confirmar Borrado -->
        <div id="confirm-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="bg-zinc-900 border border-zinc-800 w-full max-w-xs rounded-[2rem] p-8 space-y-6 shadow-2xl text-center">
                <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto text-2xl">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <h3 class="text-white font-black uppercase italic text-sm">¿Eliminar registro?</h3>
                <div class="flex flex-col gap-2">
                    <button id="confirm-yes-btn" class="w-full py-4 rounded-2xl bg-red-500 text-white font-black text-[10px] uppercase italic">Eliminar</button>
                    <button onclick="closeConfirmModal()" class="w-full py-4 rounded-2xl bg-zinc-800 text-zinc-400 font-black text-[10px] uppercase italic">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, collection, doc, getDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query,
            enableIndexedDbPersistence 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";

        enableIndexedDbPersistence(db).catch(() => {});

        let currentUser = null;
        let activeCategory = 'otros';
        let hasInterest = false;
        let activeDebtId = null;
        let editingDebtId = null;
        let cachedDeudas = []; // Memoria local para carga instantánea

        const categories = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servicios', icon: '⚡' },
            { id: 'personal', label: 'Personal', icon: '👥' },
            { id: 'otros', label: 'Otros', icon: '📦' },
            { id: 'inversion', label: 'Inversión', icon: '💎' }
        ];

        const getToday = () => new Date().toISOString().split('T')[0];
        const getFormatDate = () => new Date().toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        document.getElementById('deuda-fecha-inicio').value = getToday();

        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                updateConnectionUI();
                startListening();
            }
        });

        function updateConnectionUI() {
            const badge = document.getElementById('connection-badge');
            badge.className = `flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase transition-all ${navigator.onLine ? 'border-emerald-500/30 text-emerald-500' : 'border-red-500/30 text-red-500'}`;
            document.getElementById('connection-text').innerText = navigator.onLine ? "Online" : "Local";
            document.getElementById('connection-dot').className = `w-1.5 h-1.5 rounded-full ${navigator.onLine ? 'bg-emerald-500' : 'bg-red-500'}`;
        }

        function startListening() {
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'egresos')), (snap) => {
                renderEgresos(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            });
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'prestamos')), (snap) => {
                cachedDeudas = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(cachedDeudas);
                // Si el modal está abierto, actualizamos su contenido inmediatamente
                if (activeDebtId) {
                    const active = cachedDeudas.find(d => d.id === activeDebtId);
                    if (active) renderHistorial(active);
                }
            });
        }

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.filter(e => e.tipo !== 'ABONO_PRESTAMO').sort((a,b) => b.createdAt - a.createdAt).map(e => {
                total += parseFloat(e.monto || 0);
                return `
                    <div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800/40">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center text-lg">${categories.find(c => c.id === e.categoria)?.icon || '📦'}</div>
                            <div>
                                <p class="text-white font-black text-[10px] uppercase italic">${e.categoria}</p>
                                <p class="text-[9px] text-zinc-500">${e.detalle || ''}</p>
                                <p class="text-[7px] text-zinc-700 font-bold uppercase italic">${e.fecha || ''}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-red-500 font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                            <button onclick="window.askDelete('egresos', '${e.id}')" class="text-zinc-800 mt-1"><i class="fas fa-trash text-[8px]"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        function renderDeudas(data) {
            let totalD = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.map(p => {
                const movs = p.abonos || [];
                const extraInt = movs.filter(m => m.tipo === 'INTERES').reduce((a,c) => a + c.monto, 0);
                const abonos = movs.filter(m => m.tipo === 'ABONO').reduce((a,c) => a + c.monto, 0);
                const saldo = (parseFloat(p.montoTotalConInteres) + extraInt) - abonos;
                totalD += saldo;

                return `
                    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-xl active:scale-[0.98] transition-all relative">
                        <div onclick="window.openDetalleModal('${p.id}')" class="p-5 pr-14 cursor-pointer">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-white font-black text-[10px] uppercase italic opacity-60">${p.acreedor}</p>
                                    <p class="text-amber-500 font-black text-3xl italic mt-1">$${saldo.toFixed(2)}</p>
                                    ${p.descripcion ? `<p class="text-[8px] text-zinc-500 font-medium italic mt-2 max-w-[150px] line-clamp-1">${p.descripcion}</p>` : ''}
                                </div>
                                <div class="text-right">
                                    <p class="text-[7px] text-amber-500 font-black uppercase italic">Vence</p>
                                    <p class="text-[10px] text-white font-black">${p.fechaVencimiento || '-'}</p>
                                </div>
                            </div>
                            <div class="mt-4 flex justify-between items-center bg-black/40 p-3 rounded-xl border border-zinc-800/40">
                                <span class="text-[8px] text-zinc-500 font-black uppercase italic">Ver historial y abonar</span>
                                <i class="fas fa-chevron-right text-zinc-700 text-[10px]"></i>
                            </div>
                        </div>
                        <div class="absolute right-3 top-5 flex flex-col gap-2">
                            <button onclick="event.stopPropagation(); window.editDebt('${p.id}')" class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                                <i class="fas fa-pen text-[10px]"></i>
                            </button>
                            <button onclick="event.stopPropagation(); window.askDelete('prestamos', '${p.id}')" class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-600 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${totalD.toFixed(2)}`;
        }

        window.editDebt = async (id) => {
            editingDebtId = id;
            const data = cachedDeudas.find(d => d.id === id);
            if (data) {
                document.getElementById('deuda-acreedor').value = data.acreedor;
                document.getElementById('deuda-monto').value = data.montoBase;
                document.getElementById('deuda-descripcion').value = data.descripcion || '';
                document.getElementById('deuda-fecha-inicio').value = data.fechaInicio;
                document.getElementById('deuda-fecha-venc').value = data.fechaVencimiento;
                document.getElementById('submit-deuda-btn').innerText = "Actualizar Deuda";
                document.getElementById('deuda-form').scrollIntoView({ behavior: 'smooth' });
            }
        };

        window.openDetalleModal = (id) => {
            activeDebtId = id;
            const data = cachedDeudas.find(d => d.id === id);
            if (data) {
                renderHistorial(data); // Renderizado instantáneo desde memoria
                document.getElementById('detalle-modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeDetalleModal = () => {
            activeDebtId = null;
            document.getElementById('detalle-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        function renderHistorial(p) {
            document.getElementById('det-acreedor').innerText = p.acreedor;
            document.getElementById('det-desc-sub').innerText = p.descripcion || 'Sin descripción';
            
            const hist = document.getElementById('det-historial');
            const movs = p.abonos || [];
            
            hist.innerHTML = `
                ${p.descripcion ? `
                <div class="bg-zinc-900/20 border border-zinc-800/40 rounded-2xl p-4">
                    <p class="text-zinc-500 font-black text-[7px] uppercase mb-1">Detalles del préstamo</p>
                    <p class="text-zinc-300 text-[10px] leading-relaxed italic">${p.descripcion}</p>
                </div>
                ` : ''}

                <div class="bg-zinc-900/40 border border-zinc-800 rounded-2xl p-4 flex justify-between items-center">
                    <div>
                        <p class="text-zinc-500 font-black text-[8px] uppercase">Capital Inicial</p>
                        <p class="text-white font-black italic text-lg">$${parseFloat(p.montoBase).toFixed(2)}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-zinc-500 font-black text-[8px] uppercase">Con Interés Inicial</p>
                        <p class="text-zinc-400 font-black italic text-xs">$${parseFloat(p.montoTotalConInteres).toFixed(2)}</p>
                    </div>
                </div>
                ${movs.length === 0 ? '<p class="text-center py-10 text-[10px] text-zinc-700 font-black uppercase italic">Sin movimientos registrados</p>' : ''}
                ${movs.sort((a,b) => b.id - a.id).map(m => `
                    <div class="p-4 rounded-2xl flex justify-between items-center border ${m.tipo === 'INTERES' ? 'bg-amber-500/5 border-amber-500/20' : 'bg-black border-zinc-800'}">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black uppercase italic ${m.tipo === 'INTERES' ? 'text-amber-500' : 'text-zinc-500'}">
                                    ${m.tipo === 'INTERES' ? 'Prórroga' : 'Abono'}
                                </span>
                                <span class="text-[7px] text-zinc-700 font-bold">${m.fecha}</span>
                            </div>
                            <p class="text-[9px] text-zinc-400 mt-0.5">${m.tipo === 'INTERES' ? `+${m.dias} días (${m.porcentaje}%)` : 'Pago recibido'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-black italic ${m.tipo === 'INTERES' ? 'text-amber-500' : 'text-white'}">
                                ${m.tipo === 'INTERES' ? '+' : '-'}$${m.monto.toFixed(2)}
                            </span>
                            <button onclick="window.deleteMov('${p.id}', ${m.id})" class="text-zinc-800 hover:text-red-500"><i class="fas fa-trash-alt text-[10px]"></i></button>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        document.getElementById('det-abono-btn').onclick = async () => {
            const input = document.getElementById('det-monto-input');
            const monto = parseFloat(input.value);
            if (!monto || monto <= 0) return;

            const data = cachedDeudas.find(d => d.id === activeDebtId);
            if (!data) return;

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prestamos', activeDebtId);
            const mov = { id: Date.now(), monto, fecha: getFormatDate(), tipo: 'ABONO' };
            
            await updateDoc(docRef, { abonos: [...(data.abonos || []), mov] });
            
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'egresos'), {
                categoria: 'otros', monto, detalle: `Abono a ${data.acreedor}`, createdAt: Date.now(), fecha: getFormatDate(), uid: currentUser?.uid, tipo: 'ABONO_PRESTAMO'
            });

            input.value = '';
        };

        window.openProrrogaModal = () => document.getElementById('progroga-modal').classList.remove('hidden');
        window.closeProrrogaModal = () => {
            document.getElementById('progroga-modal').classList.add('hidden');
            document.getElementById('prorroga-dias').value = '';
            document.getElementById('prorroga-interes').value = '';
        };

        document.getElementById('det-prorroga-btn').onclick = () => window.openProrrogaModal();

        document.getElementById('confirm-prorroga-btn').onclick = async () => {
            const dias = parseInt(document.getElementById('prorroga-dias').value);
            const pct = parseFloat(document.getElementById('prorroga-interes').value);
            if (!dias || isNaN(pct)) return;

            const data = cachedDeudas.find(d => d.id === activeDebtId);
            if (!data) return;

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prestamos', activeDebtId);
            const movs = data.abonos || [];
            const extraInt = movs.filter(m => m.tipo === 'INTERES').reduce((a,c) => a + c.monto, 0);
            const abonos = movs.filter(m => m.tipo === 'ABONO').reduce((a,c) => a + c.monto, 0);
            const saldoActual = (parseFloat(data.montoTotalConInteres) + extraInt) - abonos;

            const montoInteres = saldoActual * (pct / 100);

            const fechaOriginal = new Date(data.fechaVencimiento || getToday());
            fechaOriginal.setDate(fechaOriginal.getDate() + dias);
            const nuevaFechaVenc = fechaOriginal.toISOString().split('T')[0];

            const nuevoMov = { id: Date.now(), monto: montoInteres, fecha: getFormatDate(), tipo: 'INTERES', porcentaje: pct, dias: dias };
            
            await updateDoc(docRef, { 
                abonos: [...movs, nuevoMov],
                fechaVencimiento: nuevaFechaVenc 
            });

            closeProrrogaModal();
        };

        window.deleteMov = async (pId, mId) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prestamos', pId);
            const data = cachedDeudas.find(d => d.id === pId);
            if (data) {
                const filt = data.abonos.filter(m => m.id !== mId);
                await updateDoc(docRef, { abonos: filt });
            }
        };

        function renderCategories() {
            document.getElementById('categories-grid').innerHTML = categories.map(cat => `
                <button type="button" onclick="window.selectCategory('${cat.id}')" class="p-2 rounded-xl border text-[8px] font-black flex flex-col items-center gap-1 transition-all ${activeCategory === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>
            `).join('');
        }
        window.selectCategory = (id) => { activeCategory = id; renderCategories(); };

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'egresos'), {
                categoria: activeCategory, monto: parseFloat(document.getElementById('egreso-monto').value),
                detalle: document.getElementById('egreso-detalle').value,
                createdAt: Date.now(), fecha: new Date().toLocaleDateString('es-ES'), uid: currentUser?.uid
            });
            e.target.reset();
            window.selectCategory('otros');
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const base = parseFloat(document.getElementById('deuda-monto').value);
            const int = parseFloat(document.getElementById('deuda-interes-valor').value || 0);
            const desc = document.getElementById('deuda-descripcion').value;
            const total = base + (base * (int / 100));
            const acreedor = document.getElementById('deuda-acreedor').value;
            const fInic = document.getElementById('deuda-fecha-inicio').value;
            const fVenc = document.getElementById('deuda-fecha-venc').value;

            if (editingDebtId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'prestamos', editingDebtId), {
                    acreedor, montoBase: base, montoTotalConInteres: total,
                    descripcion: desc,
                    fechaInicio: fInic, fechaVencimiento: fVenc
                });
                editingDebtId = null;
                document.getElementById('submit-deuda-btn').innerText = "Crear Deuda";
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'prestamos'), {
                    acreedor, montoBase: base, montoTotalConInteres: total,
                    descripcion: desc,
                    fechaInicio: fInic, fechaVencimiento: fVenc,
                    abonos: [], createdAt: Date.now(), uid: currentUser?.uid
                });
            }
            e.target.reset();
            document.getElementById('deuda-fecha-inicio').value = getToday();
            resetToggle();
        };

        document.getElementById('toggle-interes').onclick = () => {
            hasInterest = !hasInterest;
            const btn = document.getElementById('toggle-interes');
            const circle = document.getElementById('toggle-circle');
            btn.className = `w-10 h-5 rounded-full relative transition-all ${hasInterest ? 'bg-amber-500 shadow-[0_0_10px_#f59e0b]' : 'bg-zinc-800'}`;
            circle.style.left = hasInterest ? '1.375rem' : '0.125rem';
            document.getElementById('deuda-interes-valor').classList.toggle('hidden', !hasInterest);
        };

        function resetToggle() {
            hasInterest = false;
            document.getElementById('toggle-interes').className = `w-10 h-5 rounded-full relative transition-all bg-zinc-800`;
            document.getElementById('toggle-circle').style.left = '0.125rem';
            document.getElementById('deuda-interes-valor').classList.add('hidden');
        }

        window.askDelete = (col, id) => {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-yes-btn').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                document.getElementById('confirm-modal').classList.add('hidden');
            };
        };

        window.closeConfirmModal = () => document.getElementById('confirm-modal').classList.add('hidden');

        renderCategories();
        signInAnonymously(auth);
    </script>
</body>
</html>
