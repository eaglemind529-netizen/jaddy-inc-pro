```html

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        }
    </style>
</head>
<body class="select-none">
    <div id="app">
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-amber-500">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-black italic">JI</div>
                    <h1 class="text-sm font-black text-white italic tracking-tight">FINANZAS</h1>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="connection-badge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase transition-all border-zinc-800 text-zinc-500">
                    <div id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-700 transition-all duration-500"></div>
                    <span id="connection-text">Offline</span>
                </div>
                <button class="w-9 h-9 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-amber-500">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <main class="p-5 max-w-lg mx-auto pb-10 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">
                    <i class="fas fa-arrow-trend-down text-red-500 mb-2"></i>
                    <p class="text-[9px] uppercase font-black text-zinc-500">Gastos Mensuales</p>
                    <p id="total-egresos" class="text-xl font-black text-white italic">$0.00</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl shadow-xl">

                    <p class="text-[9px] uppercase font-black text-zinc-500">Saldo en Deuda</p>
                    <p id="total-deuda" class="text-xl font-black text-white italic">$0.00</p>
                </div>
            </div>

            <div class="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                <button onclick="switchTab('egresos')" id="tab-egresos" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all active-tab">EGRESOS</button>
                <button onclick="switchTab('deudas')" id="tab-deudas" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500">DEUDAS</button>
            </div>

            <div id="content-egresos" class="space-y-6">
                <form id="egreso-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50 relative shadow-2xl">
                    <div id="categories-grid" class="grid grid-cols-5 gap-2"></div>
                    <input type="number" step="0.01" required placeholder="0.00 $" id="egreso-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg focus:border-amber-500 outline-none">
                    <input type="text" placeholder="Concepto o descripción" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-xs outline-none">
                    <button type="submit" id="btn-submit-egreso" class="w-full py-4 rounded-2xl bg-white text-black font-black italic text-xs tracking-widest hover:bg-amber-500 transition-colors uppercase">Registrar Egreso</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-5 rounded-3xl border border-zinc-800/50 shadow-2xl">
                    <input type="text" required placeholder="Nombre del acreedor" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-xs outline-none">
                    <input type="number" required placeholder="Monto del préstamo $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-lg outline-none">
                    <div class="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-zinc-800">
                        <span class="text-[9px] font-black uppercase text-zinc-500 italic">Interés mensual (%)</span>
                        <button type="button" id="toggle-interes" class="w-10 h-5 rounded-full relative transition-all bg-zinc-800">
                            <div id="toggle-circle" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-all"></div>
                        </button>
                    </div>
                    <input type="number" placeholder="Ej: 5" id="deuda-interes-valor" class="hidden w-full bg-black border border-amber-500/40 p-4 rounded-2xl text-amber-500 font-black text-xs outline-none">
                    <button type="submit" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black italic text-xs tracking-widest uppercase shadow-lg shadow-amber-500/10 hover:bg-white transition-colors">Crear Deuda</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            addDoc, 
            updateDoc, 
            deleteDoc, 
            onSnapshot, 
            query,
            enableNetwork
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890",
            measurementId: "G-7VCRCRSCRQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";

        let activeCategory = 'otros';
        let hasInterest = false;

        const categories = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servicios', icon: '⚡' },
            { id: 'personal', label: 'Personal', icon: '👥' },
            { id: 'otros', label: 'Otros', icon: '📦' },
            { id: 'inversion', label: 'Inversión', icon: '💎' }
        ];

        // Función para actualizar el estado visual de conexión
        function updateConnectionUI(online) {
            const badge = document.getElementById('connection-badge');
            const dot = document.getElementById('connection-dot');
            const text = document.getElementById('connection-text');
            
            if (online) {
                badge.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase transition-all border-emerald-500/30 text-emerald-500";
                dot.className = "w-1.5 h-1.5 rounded-full dot-online animate-pulse";
                text.innerText = "Online";
            } else {
                badge.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase transition-all border-zinc-700 text-zinc-500";
                dot.className = "w-1.5 h-1.5 rounded-full bg-zinc-700";
                text.innerText = "Offline";
            }
        }

        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(cat => `
                <button type="button" onclick="window.selectCategory('${cat.id}')" id="cat-${cat.id}" class="p-2 rounded-xl border text-[8px] font-black flex flex-col items-center gap-1 transition-all ${activeCategory === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>
            `).join('');
        }

        window.selectCategory = (id) => {
            activeCategory = id;
            renderCategories();
        };

        document.getElementById('toggle-interes').onclick = () => {
            hasInterest = !hasInterest;
            const btn = document.getElementById('toggle-interes');
            const circle = document.getElementById('toggle-circle');
            const input = document.getElementById('deuda-interes-valor');
            btn.className = `w-10 h-5 rounded-full relative transition-all ${hasInterest ? 'bg-amber-500 shadow-[0_0_10px_#f59e0b]' : 'bg-zinc-800'}`;
            circle.style.left = hasInterest ? '1.375rem' : '0.125rem';
            input.classList.toggle('hidden', !hasInterest);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Forzar reconexión si fuera necesario
                enableNetwork(db).then(() => {
                    updateConnectionUI(true);
                    startListening(user.uid);
                });
            } else {
                updateConnectionUI(false);
                window.location.replace('login.html');
            }
        });

        function startListening(uid) {
            // Escuchar Egresos
            const qE = query(collection(db, 'artifacts', appId, 'users', uid, 'egresos'));
            onSnapshot(qE, (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEgresos(list.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)));
            }, (error) => {
                console.error("Firestore Error:", error);
                updateConnectionUI(false);
            });

            // Escuchar Préstamos/Deudas
            const qP = query(collection(db, 'artifacts', appId, 'users', uid, 'prestamos'));
            onSnapshot(qP, (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(list.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)));
            });
        }

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.map(e => {
                total += parseFloat(e.monto || 0);
                const cat = categories.find(c => c.id === e.categoria);
                return `
                    <div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800/40 group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center text-lg">${cat?.icon || '📦'}</div>
                            <div>
                                <p class="text-white font-black text-xs uppercase italic">${e.categoria}</p>
                                <p class="text-[10px] text-zinc-500">${e.detalle || ''}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-red-500 font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                                <p class="text-[8px] text-zinc-700 font-bold uppercase">${e.fecha}</p>
                            </div>
                            <button onclick="window.deleteItem('egresos', '${e.id}')" class="text-zinc-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-2">
                                <i class="fas fa-trash-can text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        function renderDeudas(data) {
            let totalD = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoTotalConInteres || 0) - pagado;
                totalD += saldo;
                return `
                    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden group">
                        <div class="p-5 bg-zinc-800/10 relative">
                            <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                            <p class="text-amber-500 font-black text-3xl italic mt-1">$${saldo.toFixed(2)}</p>
                            <button onclick="window.deleteItem('prestamos', '${p.id}')" class="absolute top-4 right-4 text-zinc-600 hover:text-red-500 opacity-0 group-hover:opacity-100 p-2">
                                <i class="fas fa-trash-can text-[10px]"></i>
                            </button>
                        </div>
                        <div class="p-4 bg-black/40 space-y-3">
                            ${(p.abonos || []).map(ab => `<div class="flex justify-between items-center text-[10px] text-zinc-500 font-black bg-zinc-900/40 p-2 rounded-lg"><span>${ab.fecha}</span><span class="text-white">-$${ab.monto.toFixed(2)}</span></div>`).join('')}
                            <div class="flex gap-2">
                                <input type="number" placeholder="Abonar $" id="abono-${p.id}" class="flex-1 bg-black border border-zinc-800 rounded-xl p-3 text-[11px] font-black text-white outline-none">
                                <button onclick="window.handleAbono('${p.id}')" class="bg-white text-black text-[9px] font-black px-4 rounded-xl italic uppercase">Abonar</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${totalD.toFixed(2)}`;
        }

        // ACCIÓN: REGISTRAR EGRESO
        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            const mInput = document.getElementById('egreso-monto');
            const dInput = document.getElementById('egreso-detalle');
            const btn = document.getElementById('btn-submit-egreso');

            const monto = parseFloat(mInput.value);
            if (isNaN(monto) || monto <= 0) return;

            try {
                btn.disabled = true;
                btn.innerText = "PROCESANDO...";
                
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'egresos'), {
                    categoria: activeCategory,
                    monto: monto,
                    detalle: dInput.value || "Sin descripción",
                    createdAt: Date.now(),
                    fecha: new Date().toLocaleDateString('es-ES')
                });

                mInput.value = ''; 
                dInput.value = '';
                activeCategory = 'otros';
                renderCategories();
            } catch (err) {
                console.error("Error al registrar egreso:", err);
            } finally {
                btn.disabled = false;
                btn.innerText = "REGISTRAR EGRESO";
            }
        };

        // ACCIÓN: CREAR DEUDA
        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            const ac = document.getElementById('deuda-acreedor').value;
            const mo = document.getElementById('deuda-monto').value;
            const int = document.getElementById('deuda-interes-valor').value || 0;

            if (!ac || !mo) return;

            try {
                const mBase = parseFloat(mo);
                const mTotal = mBase + (mBase * (parseFloat(int) / 100));

                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'prestamos'), {
                    acreedor: ac,
                    montoBase: mBase,
                    montoTotalConInteres: mTotal,
                    porcentajeAplicado: parseFloat(int),
                    abonos: [],
                    createdAt: Date.now(),
                    fecha: new Date().toLocaleDateString('es-ES')
                });

                document.getElementById('deuda-form').reset();
                hasInterest = false;
                document.getElementById('deuda-interes-valor').classList.add('hidden');
                document.getElementById('toggle-interes').className = "w-10 h-5 rounded-full relative transition-all bg-zinc-800";
            } catch (err) {
                console.error("Error al registrar deuda:", err);
            }
        };

        window.handleAbono = async (id) => {
            const user = auth.currentUser;
            if (!user) return;
            const input = document.getElementById(`abono-${id}`);
            const monto = parseFloat(input.value);
            if (!monto || isNaN(monto)) return;

            try {
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'prestamos', id);
                onSnapshot(docRef, async (snap) => {
                    const data = snap.data();
                    if (data) {
                        const nuevosAbonos = [...(data.abonos || []), { 
                            id: Date.now(), 
                            monto: monto, 
                            fecha: new Date().toLocaleDateString('es-ES') 
                        }];
                        await updateDoc(docRef, { abonos: nuevosAbonos });
                    }
                }, { onlyOnce: true });
                input.value = '';
            } catch (err) {
                console.error("Error en abono:", err);
            }
        };

        window.deleteItem = async (col, id) => {
            const user = auth.currentUser;
            if (!user) return;
            if (confirm('¿Eliminar este registro permanentemente?')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, col, id));
                } catch (err) {
                    console.error("Error al eliminar:", err);
                }
            }
        };

        renderCategories();
    </script>
</body>
</html>
