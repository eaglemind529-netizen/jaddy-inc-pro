    <script type="module">

        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";

        let userId = null;
        let activeCategory = 'otros';
        let hasInterest = false;

        const categories = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servicios', icon: '⚡' },
            { id: 'personal', label: 'Personal', icon: '👥' },
            { id: 'deuda', label: 'Deuda', icon: '💸' },
            { id: 'inversion', label: 'Inversión', icon: '💎' },
            { id: 'otros', label: 'Otros', icon: '📦' }
        ];

        onAuthStateChanged(auth, (user) => {
            if(user) {
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                
                document.getElementById('egreso-fecha').valueAsDate = new Date();
                document.getElementById('deuda-fecha-inicio').valueAsDate = new Date();
                document.getElementById('deuda-fecha-vence').valueAsDate = new Date();

                document.getElementById('connection-badge').className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-[8px] font-black uppercase border-emerald-500/30 text-emerald-500";
                document.getElementById('connection-dot').className = "w-1.5 h-1.5 rounded-full dot-online animate-pulse";
                document.getElementById('connection-text').innerText = "Online";
                startListening(user.uid);
                renderCategories();
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('toggle-interes').addEventListener('click', () => {
            hasInterest = !hasInterest;
            const circle = document.getElementById('toggle-circle');
            const input = document.getElementById('deuda-interes-valor');
            const btn = document.getElementById('toggle-interes');
            
            circle.style.left = hasInterest ? '22px' : '2px';
            btn.className = `w-10 h-5 rounded-full relative transition-all ${hasInterest ? 'bg-amber-500' : 'bg-zinc-800'}`;
            input.classList.toggle('hidden', !hasInterest);
        });

        function startListening(uid) {
            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'egresos'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderEgresos(list);
            });

            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'prestamos'), (snap) => {
                const list = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                const activas = list.filter(l => l.estado !== 'pagado');
                const pagadas = list.filter(l => l.estado === 'pagado');
                renderDeudas(activas);
                renderHistorial(pagadas);
            });
        }

        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            const monto = parseFloat(document.getElementById('egreso-monto').value);
            const detalle = document.getElementById('egreso-detalle').value;
            const fechaManual = document.getElementById('egreso-fecha').value;
            if(!userId) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', userId, 'egresos'), {
                categoria: activeCategory,
                monto,
                detalle: detalle.toUpperCase(),
                fecha: new Date(fechaManual + 'T12:00:00').toISOString()
            });
            e.target.reset();
            document.getElementById('egreso-fecha').valueAsDate = new Date();
            renderCategories();
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            const acreedor = document.getElementById('deuda-acreedor').value;

            const fechaInicio = document.getElementById('deuda-fecha-inicio').value;
            const fechaVence = document.getElementById('deuda-fecha-vence').value;
            const interes = hasInterest ? parseFloat(document.getElementById('deuda-interes-valor').value || 0) : 0;
            if(!userId) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', userId, 'prestamos'), {
                acreedor: acreedor.toUpperCase(),
                montoInicial: monto,
                montoTotalConInteres: monto + (monto * (interes / 100)),
                fechaInicio,
                fechaVence,
                interes,
                estado: 'activo',
                abonos: []
            });
            e.target.reset();
            document.getElementById('deuda-fecha-inicio').valueAsDate = new Date();
            document.getElementById('deuda-fecha-vence').valueAsDate = new Date();
        };

        window.toggleHistory = (show) => { document.getElementById('history-modal').classList.toggle('hidden', !show); };
        window.switchTab = (tab) => {
            document.getElementById('content-egresos').classList.toggle('hidden', tab !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', tab !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${tab === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };
        window.selectCategory = (id) => { activeCategory = id; renderCategories(); };
        window.gestionarBorrado = async (coleccion, id) => {
            if(!userId) return;
            const docRef = doc(db, 'artifacts', appId, 'users', userId, coleccion, id);
            if(coleccion === 'prestamos') {
                const snap = await getDoc(docRef);
                if(snap.exists() && snap.data().estado === 'pagado') {
                    await updateDoc(docRef, { estado: 'activo', abonos: [] });
                    return;
                }
            }
            await deleteDoc(docRef);
        };

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = categories.map(cat => `
                <button type="button" onclick="window.selectCategory('${cat.id}')" id="cat-${cat.id}" class="p-2 rounded-xl border text-[8px] font-black flex flex-col items-center gap-1 transition-all ${activeCategory === cat.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${cat.icon}</span>${cat.label.toUpperCase()}
                </button>
            `).join('');
        }

        function renderEgresos(data) {
            let total = 0;
            const container = document.getElementById('list-egresos');
            container.innerHTML = data.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(e => {
                total += parseFloat(e.monto || 0);
                const fechaDisplay = new Date(e.fecha).toLocaleDateString();
                return `<div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800/40">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center text-lg">${categories.find(c => c.id === e.categoria)?.icon || '📦'}</div>
                        <div>
                            <p class="text-white font-black text-xs uppercase italic">${e.categoria}</p>
                            <p class="text-[8px] text-zinc-600 font-bold">${fechaDisplay}</p>
                            <p class="text-[10px] text-zinc-500">${e.detalle || ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="text-red-500 font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                        <button onclick="window.gestionarBorrado('egresos', '${e.id}')" class="text-zinc-700 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toLocaleString()}`;
        }

        function renderDeudas(data) {
            let totalD = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoTotalConInteres || 0) - pagado;
                totalD += (saldo > 0 ? saldo : 0);
                return `
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden mb-4">
                    <div class="p-5 bg-zinc-800/10 flex justify-between items-start">
                        <div>
                            <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                            <div class="flex flex-wrap gap-2 mt-1">
                                <p class="text-[8px] text-zinc-500 font-bold">RECIBIDO: ${p.fechaInicio || 'S/F'}</p>
                                <p class="text-[8px] text-amber-500/80 font-bold">PAGO: ${p.fechaVence || 'S/F'}</p>
                            </div>
                            <p class="text-amber-500 font-black text-3xl italic mt-1">$${saldo.toLocaleString()}</p>
                        </div>
                        <button onclick="window.gestionarBorrado('prestamos', '${p.id}')" class="text-zinc-700 hover:text-red-500 transition-colors p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    
                    <div class="p-4 bg-black/40 space-y-4">
                        <div class="space-y-2">
                            <div class="flex gap-2">
                                <input type="number" placeholder="Abonar $" id="abono-${p.id}" class="flex-[2] bg-black border border-zinc-800 rounded-xl p-3 text-[11px] font-black text-white outline-none">
                                <input type="date" id="abono-fecha-${p.id}" class="flex-[1.5] bg-black border border-zinc-800 rounded-xl p-2 text-[9px] text-white outline-none">
                            </div>
                            <button onclick="window.handleAbono('${p.id}', '${p.acreedor}')" class="w-full bg-white text-black text-[9px] font-black py-3 rounded-xl italic uppercase">Confirmar Abono</button>
                        </div>

                        <div class="pt-3 border-t border-zinc-800/50 flex gap-2">
                            <div class="flex-1 grid grid-cols-2 gap-2">
                                <input type="number" placeholder="Días" id="pro-dias-${p.id}" class="bg-black/50 border border-zinc-800 rounded-lg p-2 text-[10px] text-white">
                                <input type="number" placeholder="%" id="pro-porc-${p.id}" class="bg-black/50 border border-zinc-800 rounded-lg p-2 text-[10px] text-white">
                            </div>
                            <button onclick="window.handleProrroga('${p.id}')" class="bg-zinc-800 text-amber-500 text-[8px] font-black px-3 rounded-lg uppercase">Prórroga</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${totalD.toLocaleString()}`;
        }

        function renderHistorial(data) {
            const container = document.getElementById('list-history');
            container.innerHTML = data.map(p => `
                <div class="bg-zinc-900/40 border border-zinc-800 p-5 rounded-3xl opacity-60 flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-emerald-500 uppercase mb-1"><i class="fas fa-check-circle mr-1"></i>Liquidada</p>
                        <p class="text-white font-black text-sm uppercase italic">${p.acreedor}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="text-zinc-500 font-black italic text-sm">$${parseFloat(p.montoTotalConInteres).toFixed(2)}</p>
                        <button onclick="window.gestionarBorrado('prestamos', '${p.id}')" class="text-amber-500 p-2" title="Reactivar">
                            <i class="fas fa-undo-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.handleAbono = async (id, acreedor) => {
            const inputMonto = document.getElementById(`abono-${id}`);
            const inputFecha = document.getElementById(`abono-fecha-${id}`);
            const monto = parseFloat(inputMonto.value);
            const fechaAbono = inputFecha.value || new Date().toISOString().split('T')[0];
            if(!monto || !userId) return;
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'prestamos', id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                const abonos = data.abonos || [];
                const totalAbonado = abonos.reduce((s, a) => s + a.monto, 0) + monto;
                const update = { abonos: [...abonos, { monto, fecha: fechaAbono }] };
                if (totalAbonado >= data.montoTotalConInteres) update.estado = 'pagado';
                await updateDoc(docRef, update);
                await addDoc(collection(db, 'artifacts', appId, 'users', userId, 'egresos'), {
                    categoria: 'deuda',
                    monto: monto,
                    detalle: `ABONO A: ${acreedor}`.toUpperCase(),
                    fecha: new Date(fechaAbono + 'T12:00:00').toISOString()
                });
                inputMonto.value = '';
                inputFecha.value = '';
            }
        };

        window.handleProrroga = async (id) => {
            const dias = parseInt(document.getElementById(`pro-dias-${id}`).value);
            const porc = parseFloat(document.getElementById(`pro-porc-${id}`).value);
            if(!dias || !porc || !userId) return;
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'prestamos', id);
            const snap = await getDoc(docRef);
            if(snap.exists()){
                const current = snap.data().montoTotalConInteres;
                const extra = current * (porc/100);
                await updateDoc(docRef, { montoTotalConInteres: current + extra });
            }
        };
    </script>
</body>
