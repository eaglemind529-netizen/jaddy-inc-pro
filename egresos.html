<body class="select-none">
    <div id="app">
        <!-- Header -->
        <header class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">

                <div class="flex items-center gap-2">

        <main class="p-5 max-w-lg mx-auto pb-24 space-y-6 fade-in">

                    <p class="text-[8px] uppercase font-black text-zinc-500 mb-1 italic">Mis Gastos</p>
                    <p id="total-egresos" class="text-2xl font-black text-white italic">$0.00</p>

                    <input type="text" placeholder="DETALLE" id="egreso-detalle" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-[10px] outline-none text-zinc-400 text-center uppercase font-bold tracking-widest">
                    <button type="submit" id="btn-submit-egreso" class="w-full py-5 rounded-2xl bg-white text-black font-black italic text-[10px] tracking-[0.2em] uppercase hover:bg-amber-500 transition-all">Guardar Registro</button>
                </form>
                <div id="list-egresos" class="space-y-3"></div>
            </div>

            <!-- VISTA: DEUDAS -->
            <div id="content-deudas" class="hidden space-y-6">
                <form id="deuda-form" class="space-y-4 bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50">
                    <input type="text" required placeholder="CLIENTE / DEUDOR" id="deuda-acreedor" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white font-black text-[10px] outline-none text-center uppercase tracking-widest">
                    <input type="number" required placeholder="MONTO $" id="deuda-monto" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black text-xl outline-none text-center">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest">Inicio</label>
                            <input type="date" id="deuda-fecha-init" class="w-full bg-transparent text-white font-black text-[10px] outline-none">
                        </div>
                        <div class="bg-black p-3 rounded-2xl border border-zinc-800">
                            <label class="text-[7px] font-black text-zinc-600 uppercase mb-1 block italic tracking-widest">Vence</label>
                            <input type="date" id="deuda-fecha-end" class="w-full bg-transparent text-white font-black text-[10px] outline-none">
                        </div>
                    </div>
                    <button type="submit" id="btn-submit-deuda" class="w-full py-5 rounded-2xl bg-amber-500 text-black font-black italic text-[10px] tracking-[0.2em] uppercase">Registrar Deuda</button>
                </form>
                <div id="list-deudas" class="space-y-4"></div>
            </div>
        </main>

        <!-- Modales -->
        <div id="modal-detalle" class="fixed inset-0 z-[100] hidden flex flex-col bg-black modal-backdrop">
            <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
                <div>
                    <h2 id="det-name" class="text-white font-black uppercase italic text-lg tracking-tighter">Detalle</h2>
                    <p class="text-[7px] text-zinc-600 font-mono uppercase mt-1 italic">Nube Privada Activa</p>
                </div>
                <button onclick="closeModal('modal-detalle')" class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4" id="det-list"></div>
            <div class="p-8 bg-zinc-900 border-t border-zinc-800 space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="det-amount" placeholder="Abono $" class="flex-1 bg-black border border-zinc-800 rounded-2xl p-5 text-xl font-black text-white outline-none">
                    <button id="det-pay-btn" class="bg-white text-black font-black px-8 rounded-2xl uppercase italic text-[10px] tracking-widest">OK</button>
                </div>
            </div>
        </div>

        <div id="modal-confirm" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6 modal-backdrop">
            <div class="bg-zinc-900 border border-zinc-800 w-full max-w-xs rounded-[2.5rem] p-8 space-y-6 text-center">
                <i class="fas fa-trash text-red-500 text-3xl"></i>
                <h3 class="text-white font-black uppercase italic text-xs tracking-tight">¿Eliminar registro?</h3>
                <div class="flex flex-col gap-3">
                    <button id="btn-confirm-delete" class="w-full py-4 rounded-2xl bg-red-600 text-white font-black text-[10px] uppercase italic">Eliminar</button>
                    <button onclick="closeModal('modal-confirm')" class="w-full py-4 rounded-2xl bg-zinc-800 text-zinc-400 font-black text-[10px] uppercase italic">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // TUS CREDENCIALES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890",
            measurementId: "G-7VCRCRSCRQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let activeCat = 'otros';
        let debtsData = [];
        let selectedDebtId = null;
        let unsubscribes = [];

        // Inicializar Sesión
        const init = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Error Auth:", e);
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('user-display-name').innerText = `USUARIO: ${user.uid.substring(0,8).toUpperCase()}`;
                document.getElementById('user-id-display').innerText = `SESIÓN PRIVADA ACTIVA`;
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                document.getElementById('status-text').innerText = "EN LÍNEA";
                document.getElementById('status-text').className = "text-[8px] font-black text-emerald-500 italic";
                startListeners();
            } else {
                init();
            }
        });

        function startListeners() {
            if (!user) return;
            unsubscribes.forEach(un => un());
            
            // Colección bajo TU usuario
            const eRef = collection(db, 'users', user.uid, 'egresos');
            unsubscribes.push(onSnapshot(eRef, (snap) => {
                renderEgresos(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            }));

            const dRef = collection(db, 'users', user.uid, 'prestamos');
            unsubscribes.push(onSnapshot(dRef, (snap) => {
                debtsData = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderDeudas(debtsData);
                if (selectedDebtId) {
                    const active = debtsData.find(d => d.id === selectedDebtId);
                    if (active) renderHistory(active);
                }
            }));
        }

        // --- ACCIONES ---
        document.getElementById('egreso-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!user) return;
            const monto = parseFloat(document.getElementById('egreso-monto').value);
            await addDoc(collection(db, 'users', user.uid, 'egresos'), {
                categoria: activeCat,
                monto: monto,
                detalle: document.getElementById('egreso-detalle').value || "S/D",
                createdAt: Date.now()
            });
            e.target.reset();
        };

        document.getElementById('deuda-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!user) return;
            await addDoc(collection(db, 'users', user.uid, 'prestamos'), {
                acreedor: document.getElementById('deuda-acreedor').value.toUpperCase(),
                montoBase: parseFloat(document.getElementById('deuda-monto').value),
                fechaInicio: document.getElementById('deuda-fecha-init').value,
                fechaVencimiento: document.getElementById('deuda-fecha-end').value,
                abonos: [],
                createdAt: Date.now()
            });
            e.target.reset();
        };

        // --- UI ---
        function renderEgresos(data) {
            const container = document.getElementById('list-egresos');
            let total = 0;
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(e => {
                total += parseFloat(e.monto || 0);
                return `
                    <div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${CATS.find(c => c.id === e.categoria)?.icon || '📦'}</span>
                            <div>
                                <p class="text-white font-black text-[9px] uppercase">${e.categoria}</p>
                                <p class="text-[8px] text-zinc-500 uppercase">${e.detalle}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-white font-black italic text-sm">-$${parseFloat(e.monto).toFixed(2)}</p>
                            <button onclick="askToDelete('egresos', '${e.id}')" class="text-zinc-700 text-[9px] mt-1"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('total-egresos').innerText = `$${total.toFixed(2)}`;
        }

        function renderDeudas(data) {
            let total = 0;
            const container = document.getElementById('list-deudas');
            container.innerHTML = data.sort((a,b) => b.createdAt - a.createdAt).map(p => {
                const pagado = (p.abonos || []).reduce((acc, curr) => acc + curr.monto, 0);
                const saldo = parseFloat(p.montoBase) - pagado;
                total += saldo;
                return `
                    <div onclick="openDebtDetail('${p.id}')" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer">
                        <div class="flex justify-between mb-3">
                            <h3 class="text-white font-black italic uppercase text-xs">${p.acreedor}</h3>
                            <p class="text-amber-500 font-black text-lg italic">$${saldo.toFixed(2)}</p>
                        </div>
                        <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                            <div class="bg-amber-500 h-full" style="width: ${(pagado/p.montoBase)*100}%"></div>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('total-deuda').innerText = `$${total.toFixed(2)}`;
        }

        const CATS = [
            { id: 'alquiler', label: 'Alquiler', icon: '🏠' },
            { id: 'servicios', label: 'Servicios', icon: '⚡' },
            { id: 'personal', label: 'Personal', icon: '👥' },
            { id: 'inversion', label: 'Inversión', icon: '💎' },
            { id: 'otros', label: 'Otros', icon: '📦' }
        ];

        window.switchTab = (t) => {
            document.getElementById('content-egresos').classList.toggle('hidden', t !== 'egresos');
            document.getElementById('content-deudas').classList.toggle('hidden', t !== 'deudas');
            document.getElementById('tab-egresos').className = `flex-1 py-3 rounded-xl text-[10px] font-black ${t === 'egresos' ? 'active-tab' : 'text-zinc-500'}`;
            document.getElementById('tab-deudas').className = `flex-1 py-3 rounded-xl text-[10px] font-black ${t === 'deudas' ? 'active-tab' : 'text-zinc-500'}`;
        };

        window.selectCat = (id) => { activeCat = id; renderCats(); };
        function renderCats() {
            document.getElementById('categories-grid').innerHTML = CATS.map(c => `
                <button type="button" onclick="selectCat('${c.id}')" class="p-2 rounded-xl border text-[6px] font-black flex flex-col items-center gap-1 ${activeCat === c.id ? 'category-selected' : 'border-zinc-800 text-zinc-600'}">
                    <span class="text-lg">${c.icon}</span>${c.label.toUpperCase()}
                </button>`).join('');
        }

        window.openDebtDetail = (id) => {
            selectedDebtId = id;
            const d = debtsData.find(x => x.id === id);
            if(d) { renderHistory(d); document.getElementById('modal-detalle').classList.remove('hidden'); }
        };

        window.renderHistory = (p) => {
            document.getElementById('det-name').innerText = p.acreedor;
            document.getElementById('det-list').innerHTML = (p.abonos || []).map(h => `
                <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                    <p class="text-[8px] text-zinc-500 font-black uppercase">${h.fecha}</p>
                    <p class="text-white font-black italic">$${h.monto.toFixed(2)}</p>
                </div>`).join('');
        };

        document.getElementById('det-pay-btn').onclick = async () => {
            if (!user || !selectedDebtId) return;
            const val = parseFloat(document.getElementById('det-amount').value);
            if (!val) return;
            const ref = doc(db, 'users', user.uid, 'prestamos', selectedDebtId);
            const snap = await getDoc(ref);
            await updateDoc(ref, { abonos: [...(snap.data().abonos || []), { monto: val, fecha: new Date().toLocaleDateString(), createdAt: Date.now() }] });
            document.getElementById('det-amount').value = '';
        };

        window.askToDelete = (coll, id) => {
            document.getElementById('modal-confirm').classList.remove('hidden');
            document.getElementById('btn-confirm-delete').onclick = async () => {
                await deleteDoc(doc(db, 'users', user.uid, coll, id));
                closeModal('modal-confirm');
                closeModal('modal-detalle');
            };
        };

        window.closeModal = (i) => document.getElementById(i).classList.add('hidden');

        renderCats();
        init();
    </script>
</body>
</html>
