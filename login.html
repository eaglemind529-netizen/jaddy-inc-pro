<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Acceso - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #D4AF37; --negro-puro: #050505; }
        body { 
            background-color: var(--negro-puro); 
            color: #E0E0E0; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-box { background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%); }
        
        .auth-card {
            width: 90%;
            max-width: 380px;

            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }

        .input-luxury {
            width: 100%;

            border: 1px solid #222;

            outline: none;
            transition: all 0.3s;
            font-size: 14px;
            margin-bottom: 15px;

        .input-luxury:focus { border-color: var(--oro); background: #1a1a1a; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .btn-auth {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            padding: 18px;
            border-radius: 20px;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.25);
            cursor: pointer;
            margin-top: 10px;
            border: none;
            transition: all 0.2s;
        }
        .btn-auth:disabled { opacity: 0.5; cursor: wait; }
        .btn-auth:active { transform: scale(0.96); }

        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);

        .auth-toggle {
            margin-top: 30px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            cursor: pointer;

            font-weight: bold;

        .auth-toggle span { color: var(--oro); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="w-10 h-10 border-2 border-oro/20 border-t-oro rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="text-[10px] text-oro tracking-[0.3em] font-black uppercase">Validando Acceso Elite</p>
    </div>

    <section class="flex flex-col items-center w-full">
        <div class="mb-12 text-center">
            <div class="w-20 h-20 gold-box rounded-[28px] flex items-center justify-center text-black text-3xl font-black shadow-2xl mx-auto mb-6">JI</div>
            <h2 class="texto-dorado text-3xl font-black uppercase tracking-[0.1em]">Luxury Admin</h2>
            <p class="text-gray-600 text-[9px] uppercase tracking-[0.5em] mt-3 font-bold opacity-60">Jaddy INC System</p>
        </div>

        <div class="auth-card">
            <h3 id="auth-title" class="text-white text-center font-bold uppercase tracking-widest text-[10px] mb-10 opacity-40">Identificación de Usuario</h3>
            
            <div id="auth-msg" class="text-center text-red-500 text-[10px] font-black mb-6 hidden uppercase tracking-widest"></div>
            
            <input type="email" id="email-input" class="input-luxury" placeholder="Correo Electrónico" autocomplete="email">
            <input type="password" id="pass-input" class="input-luxury" placeholder="Contraseña">
            
            <button onclick="handleAuth()" id="auth-btn" class="btn-auth">Entrar</button>
            
            <div class="auth-toggle" onclick="toggleAuthMode()">
                <p id="toggle-text">¿Sin acceso al sistema? <span>Registrar</span></p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        window.toggleAuthMode = function() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Identificación de Usuario" : "Crear Nueva Credencial";
            document.getElementById('auth-btn').innerText = isLogin ? "Entrar" : "Registrar";
            document.getElementById('toggle-text').innerHTML = isLogin ? 
                "¿Sin acceso al sistema? <span>Registrar</span>" : 
                "¿Ya tienes cuenta? <span>Regresar</span>";
        }

        window.handleAuth = async function() {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const loader = document.getElementById('loading-overlay');
            const btn = document.getElementById('auth-btn');

            if (!email || !pass) {
                showMsg("Complete los datos");
                return;
            }

            loader.style.display = 'flex';
            btn.disabled = true;
            
            try {
                // 1. FORZAMOS PERSISTENCIA LOCAL (Inmortalidad de la sesión)
                await setPersistence(auth, browserLocalPersistence);
                
                if (isLogin) {
                    // 2. Si ya había una sesión anónima abierta por error, la cerramos antes de entrar con la Real
                    if (auth.currentUser && auth.currentUser.isAnonymous) {
                        await signOut(auth);
                    }
                    
                    await signInWithEmailAndPassword(auth, email, pass);
                    
                    // 3. Redirección forzada tras confirmar que la sesión se grabó
                    window.location.href = 'index.html';
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    showMsg("¡Credencial Creada!", true);
                    setTimeout(() => toggleAuthMode(), 1500);
                    loader.style.display = 'none';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                let errorMsg = "Error de Acceso";
                if (error.code === 'auth/invalid-credential') errorMsg = "Clave o Correo Incorrectos";
                if (error.code === 'auth/email-already-in-use') errorMsg = "Este correo ya está registrado";
                if (error.code === 'auth/weak-password') errorMsg = "Clave demasiado débil";
                showMsg(errorMsg);
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function showMsg(t, isSuccess = false) {
            const msg = document.getElementById('auth-msg');
            msg.innerText = t;
            msg.style.color = isSuccess ? '#D4AF37' : '#ef4444';
            msg.classList.remove('hidden');
        }

        // Bloqueo de seguridad: Si ya estás logueado con correo, no te deja quedarte en el login
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
