    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>

            from { opacity: 0; transform: translateY(30px) scale(0.95); }

        .pass-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;

        .input-luxury {
            width: 100%;
            background: #151515;

            border-radius: 20px;

            transition: all 0.3s;
            font-size: 14px;

        .input-luxury:focus { border-color: var(--oro); background: #1a1a1a; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .eye-toggle {
            position: absolute;

            letter-spacing: 2px;

        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100;

    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-2 border-oro/20 border-t-oro rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] text-oro tracking-[0.3em] font-black uppercase">Procesando...</p>
        </div>
    </div>

    <section class="flex flex-col items-center w-full">
        <div class="mb-12 text-center">
            <div class="w-20 h-20 gold-box rounded-[28px] flex items-center justify-center text-black text-3xl font-black shadow-2xl mx-auto mb-6">JI</div>
            <h2 class="texto-dorado text-3xl font-black uppercase tracking-[0.1em]">Asistente Administrativo</h2>
            <p class="text-gray-600 text-[9px] uppercase tracking-[0.5em] mt-3 font-bold opacity-60">Jaddy INC System</p>
        </div>

        <div class="auth-card">
            <h3 id="auth-title" class="text-white text-center font-bold uppercase tracking-widest text-[10px] mb-10 opacity-40">Identificación de Usuario</h3>
            
            <div id="auth-msg" class="text-center text-red-500 text-[10px] font-black mb-6 hidden uppercase tracking-widest"></div>
            
            <input type="email" id="email-input" class="input-luxury" placeholder="Correo Electrónico" autocomplete="email" style="margin-bottom: 15px;">
            
            <div class="pass-container">
                <input type="password" id="pass-input" class="input-luxury" placeholder="Contraseña">
                <div class="eye-toggle" onclick="togglePass()">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
            </div>
            
            <button onclick="handleAuth()" id="auth-btn" class="btn-auth">Entrar</button>
            
            <div class="auth-toggle" onclick="toggleAuthMode()">
                <p id="toggle-text">¿Sin acceso al sistema? <span>Registrar</span></p>
            </div>
        </div>
    </section>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890",
            measurementId: "G-7VCRCRSCRQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        window.togglePass = function() {
            const input = document.getElementById('pass-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        };

        window.toggleAuthMode = function() {
            isLogin = !isLogin;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const toggle = document.getElementById('toggle-text');
            
            title.innerText = isLogin ? "Identificación de Usuario" : "Crear Nueva Credencial";
            btn.innerText = isLogin ? "Entrar" : "Registrar Usuario";
            toggle.innerHTML = isLogin ? 
                "¿Sin acceso al sistema? <span>Registrar</span>" : 
                "¿Ya tienes cuenta? <span>Regresar</span>";
            
            // Limpiar mensaje al cambiar modo
            document.getElementById('auth-msg').classList.add('hidden');
        };

        function showMsg(t, isSuccess = false) {
            const msg = document.getElementById('auth-msg');
            msg.innerText = t;
            msg.style.color = isSuccess ? '#D4AF37' : '#ef4444';
            msg.classList.remove('hidden');
            // No ocultar si es éxito para que lean el mensaje antes de redirigir
            if(!isSuccess) setTimeout(() => msg.classList.add('hidden'), 4000);
        }

        window.handleAuth = async function() {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const loader = document.getElementById('loading-overlay');
            
            if (!email || !pass) return showMsg("Complete los campos requeridos");
            if (pass.length < 6) return showMsg("La contraseña debe tener 6+ caracteres");

            loader.style.display = 'flex';

            try {
                if (isLogin) {
                    // LOGIN
                    await signInWithEmailAndPassword(auth, email, pass);
                    showMsg("Acceso Autorizado", true);
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    // REGISTRO
                    await createUserWithEmailAndPassword(auth, email, pass);
                    showMsg("Usuario registrado con éxito", true);
                    // Esperar un momento y volver al login
                    setTimeout(() => { window.toggleAuthMode(); }, 1500);
                }
            } catch (error) {
                console.error("Error Firebase:", error.code);
                let errorMsg = "Error en la operación";
                
                switch (error.code) {
                    case 'auth/user-not-found': errorMsg = "Usuario no registrado"; break;
                    case 'auth/wrong-password': errorMsg = "Credenciales incorrectas"; break;
                    case 'auth/email-already-in-use': errorMsg = "El correo ya está en uso"; break;
                    case 'auth/invalid-email': errorMsg = "Formato de correo inválido"; break;
                    case 'auth/weak-password': errorMsg = "Contraseña demasiado débil"; break;
                    case 'auth/network-request-failed': errorMsg = "Sin conexión a internet"; break;
                }
                showMsg(errorMsg);
            } finally {
                loader.style.display = 'none';
            }
        };

        // Redirigir si ya está logueado (opcional)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Sesión detectada para:", user.email);
            }
        });
    </script>
</body>
</html>
