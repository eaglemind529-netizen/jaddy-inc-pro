<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-deudores { background: #0A0A0A; border: 1px solid #1A1A1A; border-left: 4px solid var(--gold); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        .input-abono { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; font-size: 16px; width: 100%; text-align: center; outline: none; }
        .btn-abonar { background: white; color: black; font-weight: 900; border-radius: 12px; padding: 12px; font-size: 10px; text-transform: uppercase; width: 100%; }
        .modal-abono { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="Ventas.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver a Ventas</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-3xl font-black uppercase italic tracking-tighter">Deudores</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[4px]">Control de Abonos Reales</p>
    </div>

    <div class="mb-6">
        <input type="text" id="busqueda" oninput="renderizar()" placeholder="BUSCAR CLIENTE..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold">
    </div>

    <div id="listaDeudores" class="space-y-4">
        <div class="text-center py-20 opacity-30 text-[10px] font-black uppercase tracking-widest">Sincronizando con Ventas...</div>
    </div>

    <div id="modalAbono" class="modal-abono">
        <div class="bg-[#0A0A0A] border border-gray-800 p-8 rounded-[32px] w-full max-w-sm">
            <h2 class="text-gold font-black uppercase text-[10px] mb-1 tracking-widest">Registrar Abono</h2>
            <p id="modal-nombre" class="text-xl font-black text-white mb-6 uppercase italic"></p>
            
            <div class="space-y-4">
                <input type="number" id="input-monto" class="input-abono" placeholder="0.00">
                <div class="flex gap-2">
                    <button onclick="cerrarModal()" class="flex-1 py-4 text-[10px] font-black text-gray-500 uppercase">Cancelar</button>
                    <button onclick="ejecutarAbono()" class="flex-2 btn-abonar">Guardar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let todasLasVentas = [];
        let deudorActivo = null;

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#00ff00]";
                conectarVentas();
            }
        });

        function conectarVentas() {
            // USAMOS LA MISMA RUTA QUE TU VENTAS.HTML
            const colRef = collection(db, "ventas_realizadas");
            
            onSnapshot(colRef, (snapshot) => {
                todasLasVentas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar();
            });
        }

        window.renderizar = () => {
            const container = document.getElementById('listaDeudores');
            const buscar = document.getElementById('busqueda').value.toUpperCase();
            
            // FILTRO: Solo tipo CREDITO y que el total sea mayor a 0
            const deudores = todasLasVentas.filter(v => 
                v.tipo === 'CREDITO' && 
                v.total > 0 &&
                (v.cliente && v.cliente.toUpperCase().includes(buscar))
            );

            container.innerHTML = deudores.map(v => `
                <div class="card-deudores">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-sm font-black uppercase">${v.cliente}</h3>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">${v.fecha_legible} - ${v.vendedor}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] text-gold font-black uppercase mb-1">Saldo Deuda</p>
                            <p class="text-lg font-black text-white">$${parseFloat(v.total).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="text-[9px] text-gray-500 mb-4 border-b border-white/5 pb-2 uppercase italic">
                        ${v.producto} / ${v.variante}
                    </div>
                    <button onclick="abrirModal('${v.id}', '${v.cliente}', ${v.total})" class="btn-abonar">Registrar Abono</button>
                </div>
            `).join('');

            if(deudores.length === 0) {
                container.innerHTML = '<p class="text-center py-20 opacity-20 text-[10px] font-black uppercase">No hay deudas pendientes</p>';
            }
        };

        window.abrirModal = (id, nombre, saldo) => {
            deudorActivo = { id, nombre, saldo };
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('modalAbono').style.display = 'flex';
        };

        window.cerrarModal = () => document.getElementById('modalAbono').style.display = 'none';

        window.ejecutarAbono = async () => {
            const abono = parseFloat(document.getElementById('input-monto').value);
            if(!abono || abono <= 0) return alert("Monto no válido");
            
            const nuevoTotal = deudorActivo.saldo - abono;
            if(nuevoTotal < 0) return alert("El abono supera la deuda");

            try {
                const docRef = doc(db, "ventas_realizadas", deudorActivo.id);
                await updateDoc(docRef, {
                    total: nuevoTotal,
                    // Si llega a 0, podrías cambiar el tipo a CONTADO para que desaparezca
                    tipo: nuevoTotal === 0 ? 'CONTADO' : 'CREDITO'
                });
                cerrarModal();
                alert("Abono guardado correctamente");
            } catch (e) {
                alert("Error al actualizar");
            }
        };

        signInAnonymously(auth);
    </script>
</body>
</html>
