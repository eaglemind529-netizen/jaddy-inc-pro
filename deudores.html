    <style>

<body class="p-4 pb-24 max-w-md mx-auto select-none">

        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Sincronizando Deudas</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-zinc-800"></div>

    <div class="mb-8">
        <h1 class="texto-dorado text-3xl font-black uppercase italic tracking-tighter">Deudores</h1>

    <div class="mb-6 flex gap-2">
        <input type="text" id="busqueda" oninput="window.renderizar()" placeholder="BUSCAR CLIENTE..." class="flex-1 bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold">
        <button onclick="document.getElementById('historial-titulo').scrollIntoView({behavior:'smooth'})" class="bg-[#0F0F0F] border border-gray-800 px-4 rounded-xl text-gold"><i class="fa-solid fa-clock-rotate-left"></i></button>

    <div id="listaDeudores" class="space-y-4">

            <p id="modal-nombre" class="text-xl font-black text-white mb-6 uppercase italic"></p>
            <div class="space-y-4">
                <div>
                    <label class="text-[7px] text-gold font-black uppercase ml-2 mb-1 block tracking-widest">Monto del Abono</label>
                    <input type="number" id="input-monto" class="input-abono" placeholder="0.00">
                </div>
                <div>
                    <label class="text-[7px] text-gold font-black uppercase ml-2 mb-1 block tracking-widest">Fecha del Pago</label>
                    <input type="date" id="input-fecha" class="input-abono text-sm">

                    <button id="btnEjecutar" onclick="window.ejecutarAbono()" class="flex-2 btn-abonar">Guardar Pago</button>
                </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let todasLasVentas = [];
        let deudorActivo = null;
        let userId = null;

        onAuthStateChanged(auth, (user) => {
            if(user && !user.isAnonymous) {
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('statusDot').classList.add('bg-green-500');
                conectarBaseDeDatos(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function conectarBaseDeDatos(uid) {
            const colRef = collection(db, 'usuarios', uid, 'ventas_realizadas');
            onSnapshot(colRef, (snapshot) => {
                todasLasVentas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                window.renderizar();
            });
        }

        window.renderizar = () => {
            const containerDeudas = document.getElementById('listaDeudores');
            const containerHistorial = document.getElementById('listaHistorial');
            const buscar = document.getElementById('busqueda').value.toUpperCase();
            
            // FILTRAR DEUDORES (Saldo > 0)
            const deudores = todasLasVentas.filter(v => {
                const saldo = v.saldo_pendiente !== undefined ? v.saldo_pendiente : (v.total || v.precio || 0);
                return saldo > 0 && v.tipo === 'CREDITO' && 
                (v.cliente && v.cliente.toUpperCase().includes(buscar));
            });

            // FILTRAR HISTORIAL (Saldo <= 0 y tuvo abonos)
            const historial = todasLasVentas.filter(v => {
                const saldo = v.saldo_pendiente !== undefined ? v.saldo_pendiente : -1;
                return saldo === 0 && (v.cliente && v.cliente.toUpperCase().includes(buscar));
            });

            // Render Deudas
            containerDeudas.innerHTML = deudores.map(v => {
                const saldoDisplay = v.saldo_pendiente !== undefined ? v.saldo_pendiente : (v.total || v.precio || 0);
                return `
                <div class="card-deudores">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-sm font-black uppercase text-white">${v.cliente}</h3>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">${v.fecha_venta || v.fecha || 'Sin fecha'}</p>
                            <p class="text-[7px] text-gold/50 font-black uppercase mt-1 italic">${v.producto || 'Venta'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] text-gold font-black uppercase">Saldo Pendiente</p>
                            <p class="text-lg font-black text-white">$${parseFloat(saldoDisplay).toLocaleString()}</p>
                        </div>
                    </div>
                    <button onclick="window.abrirModal('${v.id}', '${v.cliente}', ${saldoDisplay})" class="btn-abonar">Abonar Pago</button>
                </div>
            `}).join('');

            // Render Historial
            containerHistorial.innerHTML = historial.map(v => `
                <div class="card-historial">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-[10px] font-black uppercase text-gray-400">${v.cliente}</h3>
                            <p class="text-[7px] text-green-500 font-black uppercase">PAGADO COMPLETAMENTE ✓</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-white">$${parseFloat(v.total || v.precio || 0).toLocaleString()}</p>
                            <p class="text-[6px] text-gray-600 uppercase">Valor de Venta</p>
                        </div>
                    </div>
                </div>
            `).join('');

            if(deudores.length === 0) containerDeudas.innerHTML = '<p class="text-center py-10 opacity-20 text-[10px] font-black uppercase italic">Sin deudas activas</p>';
            if(historial.length === 0) containerHistorial.innerHTML = '<p class="text-center py-4 opacity-20 text-[10px] font-black uppercase italic">Historial vacío</p>';
        };

        window.abrirModal = (id, nombre, saldo) => {
            deudorActivo = { id, nombre, saldo };
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('input-fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalAbono').style.display = 'flex';
        };

        window.cerrarModal = () => document.getElementById('modalAbono').style.display = 'none';

        window.ejecutarAbono = async () => {
            const inputMonto = document.getElementById('input-monto');
            const inputFecha = document.getElementById('input-fecha');
            const abono = parseFloat(inputMonto.value);
            const fechaAbono = inputFecha.value;

            if(!abono || abono <= 0) return;
            
            const nuevoSaldo = deudorActivo.saldo - abono;
            if(nuevoSaldo < 0) { alert("El monto supera la deuda"); return; }

            try {
                const docRef = doc(db, 'usuarios', userId, 'ventas_realizadas', deudorActivo.id);
                
                // ACTUALIZACIÓN SEGURA:
                // 1. Mantenemos el campo 'total' INTACTO para que Reportes no falle.
                // 2. Usamos 'saldo_pendiente' para la lógica de cobranza.
                await updateDoc(docRef, {
                    saldo_pendiente: nuevoSaldo,
                    // Si ya pagó todo, lo marcamos como pagado pero no borramos el monto total de la venta
                    estado_cobranza: nuevoSaldo <= 0 ? 'PAGADO' : 'PENDIENTE',
                    abonos: arrayUnion({
                        monto: abono,
                        fecha: fechaAbono
                    })
                });

                window.cerrarModal();
                inputMonto.value = '';
            } catch (e) {
                console.error("Error al abonar:", e);
                alert("Error al procesar abono.");
            }
        };
    </script>
</body>
