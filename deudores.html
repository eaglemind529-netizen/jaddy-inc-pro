<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobranza Luxury | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-deudores { background: #0A0A0A; border: 1px solid #1A1A1A; border-left: 4px solid var(--gold); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-abono { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; font-size: 16px; width: 100%; outline: none; text-align: center; font-weight: bold; }
        .input-abono:focus { border-color: var(--gold); }
        .btn-abonar { background: white; color: black; font-weight: 900; border-radius: 12px; padding: 12px; font-size: 11px; text-transform: uppercase; width: 100%; }
        .modal-abono { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }

    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <a href="Ventas.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver a Ventas</a>
        <div class="flex flex-col items-end">
            <span id="status-text" class="text-[7px] text-gray-500 font-black tracking-widest uppercase">Sincronizando...</span>
            <div id="status-dot" class="w-2 h-2 rounded-full bg-red-600"></div>
        </div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-3xl font-black uppercase tracking-tighter italic">CARTERA</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[4px]">Control de Pagos y Abonos</p>
    </div>

    <!-- Resumen Dinámico -->
    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-400 uppercase font-black mb-1 italic">Saldo por Cobrar</p>
            <p id="total-cartera" class="text-xl font-black text-white">$0.00</p>
        </div>
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-400 uppercase font-black mb-1 italic">Clientes</p>
            <p id="conteo-clientes" class="text-xl font-black text-gold">0</p>
        </div>
    </div>

    <!-- Buscador -->
    <div class="relative mb-8">
        <input type="text" id="busqueda" oninput="actualizarVista()" placeholder="BUSCAR DEUDOR..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold/50">
    </div>

    <!-- Lista de Deudores -->
    <div id="loading-ui" class="flex flex-col items-center py-10">
        <div class="loader mb-4"></div>
        <p class="text-[8px] font-black text-gray-600 uppercase tracking-widest">Leyendo Firestore...</p>
    </div>
    
    <div id="listaDeudores" class="space-y-4"></div>

    <!-- Modal Abono -->
    <div id="modalAbono" class="modal-abono">
        <div class="bg-[#0A0A0A] border border-gray-800 p-8 rounded-[32px] w-full max-w-sm">
            <h2 class="text-gold font-black uppercase text-xs mb-1 tracking-widest">Registrar Abono</h2>
            <p id="nombre-cliente-modal" class="text-xl font-black text-white mb-6 uppercase italic"></p>
            
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-[8px] text-gray-500 uppercase font-black">Monto a abonar</label>
                        <span id="saldo-pendiente-modal" class="text-[8px] text-gold font-black uppercase"></span>
                    </div>
                    <input type="number" id="input-monto-abono" class="input-abono" placeholder="0.00">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="cerrarModal()" class="flex-1 py-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">Cancelar</button>
                    <button onclick="guardarAbono()" class="flex-[2] btn-abonar">Guardar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN REAL APPS-D45D6
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-app';

        let ventasCloud = [];
        let itemSeleccionado = null;

        // Inicio de Sesión y Carga
        const iniciar = async () => {
            try {
                await signInAnonymously(auth);
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#00ff00]";
                document.getElementById('status-text').innerText = "ONLINE - CLOUD";
                document.getElementById('loading-ui').style.display = 'none';
                
                escucharVentas();
            } catch (e) {
                document.getElementById('status-text').innerText = "ERROR DE CONEXIÓN";
            }
        };

        function escucharVentas() {
            // Ruta compartida con Ventas.html
            const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas');
            
            onSnapshot(colPath, (snapshot) => {
                ventasCloud = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                actualizarVista();
            });
        }

        window.actualizarVista = () => {
            const listado = document.getElementById('listaDeudores');
            const search = document.getElementById('busqueda').value.toUpperCase();
            
            // Filtro: Solo CRÉDITOS que no estén PAGADOS
            const filtrados = ventasCloud.filter(v => 
                v.tipo === "CREDITO" && 
                v.estado !== "PAGADO" &&
                (v.cliente && v.cliente.includes(search))
            );

            let sumaTotal = 0;
            let html = '';

            filtrados.forEach(v => {
                const monto = parseFloat(v.total || 0);
                sumaTotal += monto;
                
                html += `
                    <div class="card-deudores">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-sm font-black uppercase italic">${v.cliente}</h3>
                                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter">${v.fecha_legible || 'Registro Reciente'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[7px] text-gold font-black uppercase mb-1">Pendiente</p>
                                <p class="text-lg font-black text-white">$${monto.toLocaleString()}</p>
                            </div>
                        </div>
                        
                        <div class="text-[9px] text-gray-500 uppercase font-bold mb-4 flex justify-between border-b border-white/5 pb-2">
                            <span>Item: ${v.producto}</span>
                            <span>Vendedor: ${v.vendedor || 'Admin'}</span>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="abrirAbono('${v.id}', '${v.cliente}', ${monto})" class="btn-abonar">Registrar Abono</button>
                            <button onclick="notificar('${v.cliente}', ${monto})" class="bg-[#111] border border-gray-800 text-green-500 px-4 rounded-xl text-sm">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            listado.innerHTML = html || `<p class="text-center py-20 text-[9px] text-gray-600 font-black uppercase tracking-[3px]">No se encontraron deudas activas</p>`;
            document.getElementById('total-cartera').innerText = `$${sumaTotal.toLocaleString()}`;
            document.getElementById('conteo-clientes').innerText = filtrados.length;
        };

        window.abrirAbono = (id, nombre, saldo) => {
            itemSeleccionado = { id, nombre, saldo };
            document.getElementById('nombre-cliente-modal').innerText = nombre;
            document.getElementById('saldo-pendiente-modal').innerText = `Saldo: $${saldo.toLocaleString()}`;
            document.getElementById('input-monto-abono').value = "";
            document.getElementById('modalAbono').style.display = 'flex';
        };

        window.cerrarModal = () => document.getElementById('modalAbono').style.display = 'none';

        window.guardarAbono = async () => {
            const montoAbono = parseFloat(document.getElementById('input-monto-abono').value);
            
            if(!montoAbono || montoAbono <= 0) return alert("Ingresa un monto válido");
            if(montoAbono > itemSeleccionado.saldo) return alert("El abono no puede superar la deuda");

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas', itemSeleccionado.id);
                const nuevoTotal = itemSeleccionado.saldo - montoAbono;
                
                const updates = {
                    total: nuevoTotal,
                    ultimo_abono: montoAbono,
                    fecha_pago_actualizacion: new Date().toLocaleString()
                };

                if(nuevoTotal <= 0) updates.estado = "PAGADO";

                await updateDoc(docRef, updates);
                cerrarModal();
                // Opcional: Sonido o feedback visual de éxito
            } catch (e) {
                alert("Error al procesar el abono en la nube");
            }
        };

        window.notificar = (nombre, monto) => {
            const msg = `Hola ${nombre}, te saludamos de Jaddy INC para recordarte tu pago pendiente por $${monto.toLocaleString()}. ¿Cuándo podrías pasar a abonar?`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };

        iniciar();
    </script>
</body>
</html>
