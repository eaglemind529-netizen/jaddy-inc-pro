<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

            position: fixed; inset: 0; background: #050505; z-index: 9999;

    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <!-- Pantalla de Carga/Seguridad -->
    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">Verificando Acceso</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-zinc-800"></div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-3xl font-black uppercase italic tracking-tighter">Deudores</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[4px]">Control de Abonos</p>
    </div>

    <div class="mb-6">
        <input type="text" id="busqueda" oninput="window.renderizar()" placeholder="BUSCAR CLIENTE..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold">
    </div>

    <div id="listaDeudores" class="space-y-4">
        <div class="text-center py-20 opacity-30 text-[10px] font-black uppercase tracking-widest">Sincronizando deudas...</div>
    </div>

    <!-- Modal de Abonos -->
    <div id="modalAbono" class="modal-abono">
        <div class="bg-[#0A0A0A] border border-gray-800 p-8 rounded-[32px] w-full max-w-sm">
            <h2 class="text-gold font-black uppercase text-[10px] mb-1 tracking-widest">Registrar Abono</h2>
            <p id="modal-nombre" class="text-xl font-black text-white mb-6 uppercase italic"></p>
            <div class="space-y-4">
                <input type="number" id="input-monto" class="input-abono" placeholder="0.00">
                <div class="flex gap-2">
                    <button onclick="window.cerrarModal()" class="flex-1 py-4 text-[10px] font-black text-gray-500 uppercase">Cancelar</button>
                    <button id="btnEjecutar" onclick="window.ejecutarAbono()" class="flex-2 btn-abonar">Guardar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let todasLasVentas = [];
        let deudorActivo = null;
        let userId = null;

        // SEGURIDAD: Solo acceso si hay login real de correo
        onAuthStateChanged(auth, (user) => {
            if(user && !user.isAnonymous) {
                userId = user.uid;
                document.body.style.display = "block";
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('statusDot').classList.add('bg-green-500');
                conectarBaseDeDatos(user.uid);
            } else {
                // Si no hay login real, fuera
                window.location.href = "login.html";
            }
        });

        function conectarBaseDeDatos(uid) {
            // Ruta sincronizada con tus otros archivos protegidos
            const colRef = collection(db, 'usuarios', uid, 'ventas_realizadas');
            
            onSnapshot(colRef, (snapshot) => {
                todasLasVentas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                window.renderizar();
            });
        }

        window.renderizar = () => {
            const container = document.getElementById('listaDeudores');
            if(!container) return;
            const buscar = document.getElementById('busqueda').value.toUpperCase();
            
            const deudores = todasLasVentas.filter(v => 
                v.tipo === 'CREDITO' && v.total > 0 &&
                (v.cliente && v.cliente.toUpperCase().includes(buscar))
            );

            container.innerHTML = deudores.map(v => `
                <div class="card-deudores">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-sm font-black uppercase text-white">${v.cliente}</h3>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">${v.fecha_venta || 'Reciente'}</p>
                            <p class="text-[7px] text-gold/50 font-black uppercase mt-1 italic">${v.producto}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] text-gold font-black uppercase">Saldo</p>
                            <p class="text-lg font-black text-white">$${parseFloat(v.total).toLocaleString()}</p>
                        </div>
                    </div>
                    <button onclick="window.abrirModal('${v.id}', '${v.cliente}', ${v.total})" class="btn-abonar">Abonar</button>
                </div>
            `).join('');

            if(deudores.length === 0) {
                container.innerHTML = '<p class="text-center py-20 opacity-20 text-[10px] font-black uppercase">Sin deudas pendientes</p>';
            }
        };

        window.abrirModal = (id, nombre, saldo) => {
            deudorActivo = { id, nombre, saldo };
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('modalAbono').style.display = 'flex';
        };

        window.cerrarModal = () => document.getElementById('modalAbono').style.display = 'none';

        window.ejecutarAbono = async () => {
            const input = document.getElementById('input-monto');
            const abono = parseFloat(input.value);
            if(!abono || abono <= 0) return;
            
            const nuevoTotal = deudorActivo.saldo - abono;
            if(nuevoTotal < 0) {
                alert("El abono supera la deuda.");
                return;
            }

            try {
                const docRef = doc(db, 'usuarios', userId, 'ventas_realizadas', deudorActivo.id);
                await updateDoc(docRef, {
                    total: nuevoTotal,
                    tipo: nuevoTotal === 0 ? 'CONTADO' : 'CREDITO'
                });
                window.cerrarModal();
                input.value = '';
            } catch (e) {
                console.error("Error al abonar:", e);
            }
        };
    </script>
</body>
</html>
