<body class="flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 h-16 border-b border-gray-900 bg-black flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-oro"><i class="fas fa-chevron-left"></i></a>
            <h1 class="texto-dorado uppercase tracking-widest text-xs font-black">Cartera Master</h1>
        </div>
        <div class="flex items-center gap-2">
            <div id="punto-estado" class="w-2 h-2 bg-green-600 rounded-full"></div>

        </div>
    </header>

    <main class="p-6">
        <!-- Resumen Dinámico -->
        <div class="flex gap-4 mb-8">
            <div class="flex-1 bg-black border border-gray-900 p-4 rounded-2xl">
                <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Total Créditos</p>
                <p id="total-cartera" class="text-xl font-black texto-dorado">$0.00</p>
            </div>
            <div class="flex-1 bg-black border border-gray-900 p-4 rounded-2xl">
                <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Clientes</p>
                <p id="total-clientes" class="text-xl font-black text-white">0</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="relative mb-6">
            <i class="fas fa-search absolute right-4 top-4 text-gray-600"></i>
            <input type="text" id="buscador" class="search-bar" placeholder="Buscar cliente..." oninput="renderizarDeudores()">
        </div>

        <!-- Lista de Deudores Dinámica -->
        <div class="space-y-4" id="contenedor-deudores">
            <!-- Se llena con JS -->
        </div>
    </main>

    <script>
        // Función para cargar ventas desde localStorage (o tu sistema de persistencia)
        function obtenerVentasCredito() {
            // Intentamos obtener las ventas guardadas. Ajusta 'ventas_jaddy' al nombre que uses en tu repo.
            const ventasRaw = localStorage.getItem('ventas_jaddy') || '[]';
            const ventas = JSON.parse(ventasRaw);
            
            // Filtramos solo las que son a crédito
            return ventas.filter(v => v.metodoPago === 'Crédito' || v.tipo === 'Crédito');
        }

        function renderizarDeudores() {
            const contenedor = document.getElementById('contenedor-deudores');
            const filtro = document.getElementById('buscador').value.toLowerCase();
            const deudores = obtenerVentasCredito();
            
            let html = '';
            let totalAcumulado = 0;

            // Filtrar por nombre si hay búsqueda
            const listaFiltrada = deudores.filter(d => 
                (d.cliente || 'Consumidor Final').toLowerCase().includes(filtro)
            );

            if (listaFiltrada.length === 0) {
                contenedor.innerHTML = `<p class="text-center text-gray-600 text-xs mt-10 uppercase tracking-widest">No hay créditos registrados</p>`;
                document.getElementById('total-cartera').innerText = `$0.00`;
                document.getElementById('total-clientes').innerText = `0`;
                return;
            }

            listaFiltrada.forEach(venta => {
                const monto = parseFloat(venta.total || 0);
                totalAcumulado += monto;
                
                html += `
                    <div class="card-deuda">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-black text-sm uppercase tracking-tighter">${venta.cliente || 'Cliente sin nombre'}</h3>
                                <p class="text-[10px] text-gray-500">Fecha: ${venta.fecha || 'N/A'}</p>
                            </div>
                            <span class="badge-oro px-2 py-1 rounded text-[8px] font-black uppercase italic">Pendiente</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[9px] text-gray-400 uppercase font-bold">Saldo a cobrar</p>
                                <p class="text-lg font-black text-white">$${monto.toLocaleString('es-CO', {minimumFractionDigits: 2})}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="notificarWhatsApp('${venta.cliente}')" class="btn-accion"><i class="fab fa-whatsapp"></i></button>
                                <button class="btn-accion text-oro"><i class="fas fa-hand-holding-usd"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
            document.getElementById('total-cartera').innerText = `$${totalAcumulado.toLocaleString('es-CO', {minimumFractionDigits: 2})}`;
            document.getElementById('total-clientes').innerText = listaFiltrada.length;
        }

        function notificarWhatsApp(nombre) {
            // Ejemplo de acción
            console.log("Notificando a " + nombre);
        }

        // Detección de conexión
        function updateConnection() {
            const punto = document.getElementById('punto-estado');
            const texto = document.getElementById('texto-estado');
            if (navigator.onLine) {
                punto.className = "w-2 h-2 bg-green-600 rounded-full animate-pulse";
                texto.innerText = "EN LÍNEA";
            } else {
                punto.className = "w-2 h-2 bg-orange-500 rounded-full";
                texto.innerText = "MODO OFFLINE";
            }
        }

        window.onload = () => {
            renderizarDeudores();
            updateConnection();
        };

        window.addEventListener('online', updateConnection);
        window.addEventListener('offline', updateConnection);
    </script>
</body>
</html>
