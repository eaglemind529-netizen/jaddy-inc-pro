```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobranza | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-cobro { background: #0A0A0A; border: 1px solid #1A1A1A; border-left: 4px solid var(--gold); border-radius: 20px; padding: 18px; margin-bottom: 12px; transition: transform 0.2s; }
        .card-cobro:active { transform: scale(0.98); }
        .badge-credito { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); font-size: 8px; padding: 2px 8px; border-radius: 6px; font-weight: 900; }
        .btn-cobrar { background: white; color: black; font-weight: 900; border-radius: 12px; padding: 10px 16px; font-size: 10px; text-transform: uppercase; }
        .loader { width: 20px; height: 20px; border: 2px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div class="flex flex-col items-end">
            <span id="status-text" class="text-[7px] text-gray-500 font-black tracking-widest uppercase mb-1">Desconectado</span>
            <div id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
        </div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-2xl font-black uppercase tracking-tighter">Gestión de Cobros</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[3px]">Cartera de Clientes</p>
    </div>

    <!-- Resumen de Cartera -->
    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Saldo Pendiente</p>
            <p id="total-monto" class="text-xl font-black text-white">$0</p>
        </div>
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Cuentas Activas</p>
            <p id="total-conteo" class="text-xl font-black text-gold">0</p>
        </div>
    </div>

    <!-- Filtro de Búsqueda -->
    <div class="relative mb-6">
        <input type="text" id="busqueda" oninput="filtrarCobros()" placeholder="BUSCAR POR NOMBRE..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold/50 transition-all">
    </div>

    <!-- Contenedor de Lista -->
    <div id="loading-state" class="flex flex-col items-center py-10">
        <div class="loader mb-4"></div>
        <p class="text-[8px] font-black text-gray-600 uppercase tracking-widest">Sincronizando Base de Datos...</p>
    </div>
    
    <div id="listaCobranza" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let todasLasVentas = [];
        let usuarioActual = null;

        // --- FLUJO DE AUTENTICACIÓN (REGLA 3) ---
        const iniciarSesion = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de Auth:", error);
                document.getElementById('status-text').innerText = "ERROR DE ACCESO";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioActual = user;
                document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#00ff00]";
                document.getElementById('status-text').innerText = "CONECTADO A CLOUD";
                document.getElementById('loading-state').style.display = 'none';
                escucharCobros();
            }
        });

        // --- ESCUCHA DE DATOS (REGLA 1 y 2) ---
        function escucharCobros() {
            if (!usuarioActual) return;

            // Ruta estricta de Firestore
            const ventasPath = collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas');
            
            // Usamos una query simple (Regla 2) y filtramos en memoria
            onSnapshot(ventasPath, (snapshot) => {
                todasLasVentas = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderizar(todasLasVentas);
            }, (error) => {
                console.error("Falla en lectura:", error);
            });
        }

        function renderizar(datos) {
            const lista = document.getElementById('listaCobranza');
            const busqueda = document.getElementById('busqueda').value.toUpperCase();
            
            // Filtrado manual (Siguiendo Regla 2: no usar queries complejas en Firestore)
            const pendientes = datos.filter(v => 
                v.tipo === "CREDITO" && 
                v.estado !== "PAGADO" &&
                (v.cliente && v.cliente.includes(busqueda))
            );

            // Ordenamiento manual por fecha descendente
            pendientes.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            let html = '';
            let totalDinero = 0;

            pendientes.forEach((v) => {
                totalDinero += (v.total || 0);
                html += `
                    <div class="card-cobro animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="badge-credito uppercase italic">Pendiente de Cobro</span>
                                <h3 class="text-sm font-black uppercase mt-1 tracking-tight">${v.cliente}</h3>
                                <p class="text-[9px] text-gray-500 font-bold tracking-tighter">${v.fecha_legible || 'S/F'} • VENDEDOR: ${v.vendedor}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-white">$${(v.total || 0).toLocaleString()}</p>
                                <p class="text-[7px] text-gold font-black uppercase">Vence: ${v.fecha_pago || 'POR DEFINIR'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="enviarRecordatorio('${v.cliente}', '${v.total}')" 
                               class="flex-1 bg-[#111] border border-gray-800 text-[9px] font-black uppercase py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-green-950/20 transition-colors">
                                <i class="fab fa-whatsapp text-green-500 text-xs"></i> WhatsApp
                            </button>
                            <button onclick="marcarComoPagado('${v.id}')" class="btn-cobrar flex-1 shadow-lg shadow-white/5">
                                Registrar Pago
                            </button>
                        </div>
                        <div class="mt-3 pt-3 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[8px] text-gray-500 italic">${v.producto} (${v.variante})</span>
                            <span class="text-[8px] text-gray-400 font-black">CANT: ${v.cantidad}</span>
                        </div>
                    </div>
                `;
            });

            lista.innerHTML = html || `<div class="text-center py-20 opacity-30 font-black uppercase text-[10px] tracking-[4px]">Sin cuentas pendientes</div>`;
            document.getElementById('total-monto').innerText = `$${totalDinero.toLocaleString()}`;
            document.getElementById('total-conteo').innerText = pendientes.length;
        }

        window.filtrarCobros = () => renderizar(todasLasVentas);

        window.enviarRecordatorio = (nombre, monto) => {
            const msg = encodeURIComponent(`Hola ${nombre}, te saludamos de Jaddy INC. Te escribimos para recordarte tu pago pendiente por un valor de $${monto}. ¿Cómo podemos ayudarte con el pago hoy?`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };

        window.marcarComoPagado = async (id) => {
            // Usamos un modal de confirmación simple (sin alert de navegador según reglas)
            if(!confirm("¿Deseas marcar esta cuenta como TOTALMENTE PAGADA?")) return;

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas', id);
                await updateDoc(docRef, {
                    estado: "PAGADO",
                    fecha_pago_real: new Date().toLocaleDateString(),
                    timestamp_pago: Date.now()
                });
            } catch (e) {
                console.error("Error al actualizar:", e);
            }
        };

        // Iniciar el proceso
        iniciarSesion();
    </script>
</body>
</html>
