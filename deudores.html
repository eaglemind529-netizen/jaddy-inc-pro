
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Cartera | Notificaciones Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000000; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-header { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .debt-card { background: linear-gradient(145deg, #0f0f0f 0%, #050505 100%); border: 1px solid #1A1A1A; border-radius: 28px; padding: 24px; }
        .input-gold { background: #111; border: 1px solid #333; border-radius: 12px; padding: 10px; color: white; width: 100%; font-size: 14px; }
        .input-gold:focus { border-color: var(--gold); outline: none; }
        .btn-gold { background: var(--gold); color: black; font-weight: 800; border-radius: 14px; padding: 12px; font-size: 12px; text-transform: uppercase; width: 100%; transition: opacity 0.2s; }
        .modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .notif-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 p-6 flex justify-between items-center">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 text-gray-400">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="text-center">
            <h1 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-1">Total en Cartera</h1>
            <p id="total-pendiente" class="text-2xl font-black text-white">$0.00</p>
        </div>
        <button id="btn-notif" class="w-10 h-10 rounded-full bg-gold/10 flex items-center justify-center border border-gold/20 text-gold relative">
            <i class="fas fa-bell"></i>
            <span id="notif-count" class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </button>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <!-- Buscador -->
        <div class="mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-sm"></i>
                <input type="text" id="busqueda" placeholder="Buscar cliente deudor..." class="input-gold pl-10">
            </div>
        </div>

        <!-- Lista de Deudores -->
        <div id="lista-cartera" class="space-y-6">
            <div class="text-center py-20 opacity-40">
                <i class="fas fa-circle-notch fa-spin text-3xl text-gold"></i>
                <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-gray-500">Cargando cuentas...</p>
            </div>
        </div>
    </main>

    <!-- Modal para Registrar Pago -->
    <div id="modal-pago" class="modal">
        <div class="bg-[#0A0A0A] border border-white/10 w-full max-w-sm rounded-[32px] p-8">
            <h3 class="text-xl font-black mb-1">Registrar Cobro</h3>
            <p id="modal-cliente" class="text-gold text-[10px] font-bold uppercase tracking-widest mb-6">CLIENTE</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Monto a pagar hoy ($)</label>
                    <input type="number" id="monto-abono" step="0.01" class="input-gold mt-1" placeholder="0.00">
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="cerrarModal()" class="flex-1 bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase">Salir</button>
                    <button id="btn-confirmar-pago" class="flex-1 btn-gold py-4">Confirmar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jaddy-inc-prods';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let itemsCartera = [];
        let itemSeleccionado = null;
        let notificados = new Set(); // Para no repetir notificaciones en la misma sesión

        // Solicitar permisos de notificación
        const solicitarPermisosNotif = async () => {
            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    console.log("Permisos de notificación concedidos");
                }
            }
        };

        // Función para enviar notificación nativa
        const enviarNotificacion = (cliente, deuda) => {
            if (Notification.permission === "granted" && !notificados.has(cliente)) {
                const n = new Notification("⚠️ CLIENTE ATRASADO", {
                    body: `${cliente} está atrasado y debe $${deuda.toFixed(2)}. ¡Cobrar hoy!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/5968/5968313.png"
                });
                notificados.add(cliente);
                n.onclick = () => { window.focus(); };
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                solicitarPermisosNotif();
                iniciarSincronizacion();
            }
        });

        function iniciarSincronizacion() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'ventas');
            onSnapshot(q, (snapshot) => {
                itemsCartera = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                                           .filter(v => (v.saldo !== undefined ? v.saldo : v.total) > 0);
                
                checkMorosos(itemsCartera);
                renderCartera(itemsCartera);
            });
        }

        function checkMorosos(data) {
            let countMorosos = 0;
            const hoy = new Date();
            
            data.forEach(d => {
                const saldo = d.saldo !== undefined ? d.saldo : d.total;
                const fechaVenta = new Date(d.fecha);
                const fechaLimite = d.fechaLimite ? new Date(d.fechaLimite) : new Date(fechaVenta.getTime() + (7 * 24 * 60 * 60 * 1000));
                
                if (hoy > fechaLimite && saldo > 0) {
                    countMorosos++;
                    enviarNotificacion(d.cliente, saldo);
                }
            });

            const badge = document.getElementById('notif-count');
            if (countMorosos > 0) {
                badge.innerText = countMorosos;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCartera(data) {
            const container = document.getElementById('lista-cartera');
            const totalDisplay = document.getElementById('total-pendiente');
            let totalGeneral = 0;

            if (data.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-600 font-bold uppercase text-[10px] tracking-widest">Cartera limpia</div>';
                totalDisplay.innerText = "$0.00";
                return;
            }

            container.innerHTML = data.map(d => {
                const saldo = d.saldo !== undefined ? d.saldo : d.total;
                totalGeneral += saldo;

                const fechaVenta = new Date(d.fecha);
                const fechaLimite = d.fechaLimite ? new Date(d.fechaLimite) : new Date(fechaVenta.getTime() + (7 * 24 * 60 * 60 * 1000));
                const hoy = new Date();
                const esAtrasado = hoy > fechaLimite;

                return `
                    <div class="debt-card ${esAtrasado ? 'border-red-500/30 ring-1 ring-red-500/20' : 'border-white/5'}">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="px-2 py-1 rounded text-[8px] font-black uppercase ${esAtrasado ? 'bg-red-500 text-white animate-pulse' : 'bg-green-500/10 text-green-500'}">
                                        ${esAtrasado ? '⚠️ ATRASADO' : 'PENDIENTE'}
                                    </span>
                                    <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">ID: ${d.id.slice(-4)}</span>
                                </div>
                                <h3 class="text-lg font-black text-white truncate max-w-[150px]">${d.cliente}</h3>
                                <p class="text-[9px] text-gray-500 font-bold mt-1">Límite: ${fechaLimite.toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-black ${esAtrasado ? 'text-red-500' : 'text-gold'}">$${saldo.toFixed(2)}</p>
                                <p class="text-[8px] font-bold text-gray-600 uppercase">Saldo</p>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="abrirModalPago('${d.id}')" class="btn-gold flex-1">
                                <i class="fas fa-dollar-sign mr-2"></i> Registrar Abono
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            totalDisplay.innerText = `$${totalGeneral.toFixed(2)}`;
        }

        window.abrirModalPago = (id) => {
            itemSeleccionado = itemsCartera.find(i => i.id === id);
            document.getElementById('modal-cliente').innerText = itemSeleccionado.cliente;
            document.getElementById('monto-abono').value = (itemSeleccionado.saldo || itemSeleccionado.total);
            document.getElementById('modal-pago').classList.add('active');
        };

        window.cerrarModal = () => {
            document.getElementById('modal-pago').classList.remove('active');
        };

        document.getElementById('btn-confirmar-pago').onclick = async () => {
            const monto = parseFloat(document.getElementById('monto-abono').value);
            const saldoActual = itemSeleccionado.saldo !== undefined ? itemSeleccionado.saldo : itemSeleccionado.total;
            
            if (isNaN(monto) || monto <= 0 || monto > saldoActual) return alert("Monto no válido");

            const nuevoSaldo = saldoActual - monto;
            const hoy = new Date().toISOString();

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ventas', itemSeleccionado.id), {
                    saldo: nuevoSaldo,
                    ultimoAbonoFecha: hoy,
                    fechaLiquidacionReal: nuevoSaldo === 0 ? hoy : null
                });
                cerrarModal();
            } catch (e) { alert("Error al guardar"); }
        };

        document.getElementById('busqueda').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderCartera(itemsCartera.filter(i => i.cliente.toLowerCase().includes(val)));
        };

        document.getElementById('btn-notif').onclick = () => {
            solicitarPermisosNotif();
        };

    </script>
</body>
</html>
