```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobranza Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .texto-dorado { background: linear-gradient(to bottom, #CF9E1D 22%, #F1D37E 45%, #CF9E1D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-cobro { background: #0A0A0A; border: 1px solid #1A1A1A; border-left: 4px solid var(--gold); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        .badge-credito { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); font-size: 8px; padding: 2px 8px; border-radius: 6px; font-weight: 900; }
        .btn-cobrar { background: white; color: black; font-weight: 900; border-radius: 12px; padding: 10px 16px; font-size: 10px; text-transform: uppercase; }
        .loader { width: 30px; height: 30px; border: 3px solid #111; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <!-- Header UI -->
    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div class="flex flex-col items-end">
            <span id="db-status" class="text-[7px] text-gray-600 font-black tracking-widest uppercase mb-1">Iniciando...</span>
            <div id="statusDot" class="w-2 h-2 rounded-full bg-gray-800"></div>
        </div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-2xl font-black uppercase tracking-tighter">Cartera de Créditos</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[3px]">Sincronización Real con Cloud</p>
    </div>

    <!-- Indicadores -->
    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Saldo por Cobrar</p>
            <p id="total-monto" class="text-xl font-black text-white">$0</p>
        </div>
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Clientes Deudores</p>
            <p id="total-conteo" class="text-xl font-black text-gold">0</p>
        </div>
    </div>

    <!-- Buscador -->
    <div class="relative mb-6">
        <input type="text" id="busqueda" oninput="actualizarVista()" placeholder="BUSCAR CLIENTE..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold/50">
    </div>

    <!-- Lista -->
    <div id="loading-ui" class="flex flex-col items-center py-20">
        <div class="loader mb-4"></div>
        <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Conectando a base de datos...</p>
    </div>
    
    <div id="listaCobranza" class="space-y-4"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Inicialización Rigurosa
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let datosVentas = [];
        let usuarioId = null;

        // 2. Autenticación (Requerida por Firestore)
        const conectar = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Fail:", err);
                document.getElementById('db-status').innerText = "ERROR AUTH";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioId = user.uid;
                document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#00ff00]";
                document.getElementById('db-status').innerText = "CLOUD ONLINE";
                document.getElementById('loading-ui').style.display = 'none';
                empezarEscucha();
            }
        });

        // 3. Escucha de Firestore (Ruta Pública compartida entre archivos)
        function empezarEscucha() {
            // RUTA REGLA 1: /artifacts/{appId}/public/data/{collection}
            const path = collection(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas');
            
            onSnapshot(path, (snapshot) => {
                datosVentas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                actualizarVista();
            }, (error) => {
                console.error("Firestore Error:", error);
                document.getElementById('db-status').innerText = "ERROR DE LECTURA";
            });
        }

        // 4. Renderizado Dinámico
        window.actualizarVista = () => {
            const container = document.getElementById('listaCobranza');
            const search = document.getElementById('busqueda').value.toUpperCase();
            
            // Filtramos solo ventas a CRÉDITO que no estén PAGADAS
            const pendientes = datosVentas.filter(v => 
                v.tipo === "CREDITO" && 
                v.estado !== "PAGADO" &&
                (v.cliente && v.cliente.toUpperCase().includes(search))
            );

            // Ordenar por fecha más reciente
            pendientes.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            let total = 0;
            let html = '';

            pendientes.forEach(v => {
                total += parseFloat(v.total || 0);
                html += `
                    <div class="card-cobro">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="badge-credito">CRÉDITO PENDIENTE</span>
                                <h3 class="text-sm font-black uppercase mt-1">${v.cliente || 'Sin Nombre'}</h3>
                                <p class="text-[9px] text-gray-500 font-bold uppercase">${v.fecha_legible || 'No registrada'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-white">$${(v.total || 0).toLocaleString()}</p>
                                <p class="text-[7px] text-gold font-bold uppercase">Vendedor: ${v.vendedor || 'Admin'}</p>
                            </div>
                        </div>
                        <div class="bg-white/5 p-2 rounded-lg mb-4 text-[9px] text-gray-400">
                            <strong>PRODUCTO:</strong> ${v.producto || 'Genérico'} (${v.variante || 'N/A'})
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.whatsapp('${v.cliente}', '${v.total}')" class="flex-1 bg-[#111] border border-gray-800 text-[9px] font-black uppercase py-3 rounded-xl flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp text-green-500"></i> Cobrar
                            </button>
                            <button onclick="window.confirmarPago('${v.id}')" class="btn-cobrar flex-1">
                                Marcar Pagado
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || `
                <div class="text-center py-20 opacity-20">
                    <i class="fas fa-search-dollar text-4xl mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-[4px]">No hay deudores</p>
                </div>
            `;
            
            document.getElementById('total-monto').innerText = `$${total.toLocaleString()}`;
            document.getElementById('total-conteo').innerText = pendientes.length;
        };

        // Acciones Globales
        window.whatsapp = (nombre, monto) => {
            const texto = `Hola ${nombre}, te saludamos de Jaddy INC para recordarte tu saldo pendiente de $${monto}. Quedamos atentos.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        };

        window.confirmarPago = async (id) => {
            if(!confirm("¿Confirmas que este cliente ya canceló su deuda?")) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ventas_realizadas', id);
                await updateDoc(docRef, { estado: "PAGADO" });
            } catch (e) {
                console.error(e);
            }
        };

        conectar();
    </script>
</body>
</html>
