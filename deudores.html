<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobranza | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }

        .card-cobro { background: #0A0A0A; border: 1px solid #1A1A1A; border-left: 4px solid var(--gold); border-radius: 20px; padding: 18px; margin-bottom: 12px; }

        .btn-cobrar { background: white; color: black; font-weight: 900; border-radius: 12px; padding: 8px 16px; font-size: 10px; text-transform: uppercase; }

</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div class="flex flex-col items-end">
            <span id="status-text" class="text-[8px] text-gray-500 font-black tracking-widest uppercase">Cargando...</span>
            <div id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
        </div>
    </header>

    <div class="mb-8">
        <h1 class="texto-dorado text-2xl font-black uppercase tracking-tighter">Gestión de Cobros</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[3px]">Cartera de Créditos</p>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Total por Cobrar</p>
            <p id="total-monto" class="text-lg font-black text-white">$0</p>
        </div>
        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-gray-900">
            <p class="text-[7px] text-gray-500 uppercase font-black mb-1">Pendientes</p>
            <p id="total-conteo" class="text-lg font-black text-gold">0</p>
        </div>
    </div>

    <div class="relative mb-6">
        <input type="text" id="busqueda" placeholder="BUSCAR CLIENTE..." class="w-full bg-[#0F0F0F] border border-gray-800 rounded-xl py-4 px-5 text-xs font-bold text-white uppercase outline-none focus:border-gold/50">
    </div>

    <div id="listaCobranza" class="space-y-4">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencia a la colección que usas en ventas
        const ventasRef = collection(db, "ventas_realizadas");

        // Consulta: Solo ventas tipo "CREDITO" y que NO estén marcadas como pagadas
        const q = query(
            ventasRef, 
            where("tipo", "==", "CREDITO"),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('listaCobranza');
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('status-text');
            
            dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#00ff00]";
            statusText.innerText = "SISTEMA ONLINE";

            let html = '';
            let totalDinero = 0;
            let contador = 0;

            snapshot.forEach((doc) => {
                const v = doc.data();
                // Si ya implementas pagos parciales, aquí filtrarías si el saldo es > 0
                if(v.estado !== "PAGADO") { 
                    totalDinero += v.total;
                    contador++;

                    html += `
                        <div class="card-cobro">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="badge-credito uppercase italic">Venta a Crédito</span>
                                    <h3 class="text-sm font-black uppercase mt-1">${v.cliente}</h3>
                                    <p class="text-[9px] text-gray-500 font-bold">${v.fecha_legible} | ${v.vendedor}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-black text-white">$${v.total.toLocaleString()}</p>
                                    <p class="text-[7px] text-gold font-black uppercase">Cobro: ${v.fecha_pago || 'PEND'}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <a href="https://wa.me/?text=Hola%20${v.cliente},%20te%20saludamos%20de%20Jaddy%20INC.%20Recordatorio%20de%20pago%20por%20$${v.total}" 
                                   class="flex-1 bg-[#111] border border-gray-800 text-[9px] font-black uppercase py-3 rounded-xl flex items-center justify-center gap-2">
                                    <i class="fab fa-whatsapp text-green-500"></i> Cobrar
                                </a>
                                <button onclick="marcarComoPagado('${doc.id}')" class="btn-cobrar flex-1">
                                    Recibir Pago
                                </button>
                            </div>
                            <div class="mt-3 pt-3 border-t border-white/5 text-[8px] text-gray-500 italic">
                                Item: ${v.producto} (${v.variante}) x${v.cantidad}
                            </div>
                        </div>
                    `;
                }
            });

            lista.innerHTML = html || '<p class="text-center text-gray-600 text-[10px] font-black uppercase py-10">No hay cuentas pendientes</p>';
            document.getElementById('total-monto').innerText = `$${totalDinero.toLocaleString()}`;
            document.getElementById('total-conteo').innerText = contador;
        });

        // Función para marcar como pagado (Actualiza la misma venta en Firebase)
        window.marcarComoPagado = async (id) => {
            if(confirm("¿Confirmas que recibiste el pago completo?")) {
                try {
                    const ventaDoc = doc(db, "ventas_realizadas", id);
                    await updateDoc(ventaDoc, {
                        estado: "PAGADO",
                        fecha_cobro_real: new Date().toLocaleDateString()
                    });
                    alert("¡Pago registrado con éxito!");
                } catch (e) {
                    alert("Error al procesar pago");
                }
            }
        };

    </script>
</body>
</html>
