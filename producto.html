```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0A0A0A; }
        body { background-color: var(--dark-bg); color: #E5E5E5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-dark { background: #141414 !important; border: 1px solid #333 !important; color: white !important; }
        .input-dark:focus { border-color: var(--gold) !important; outline: none; }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #aa8a2e 100%); color: black; font-weight: bold; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); opacity: 0.8; }
        .card-product { background: #111; border: 1px solid #222; border-radius: 24px; transition: 0.3s; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .bg-online { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
        .bg-offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-4 pb-28">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl font-bold text-xs uppercase hidden shadow-2xl"></div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8 pt-2">
            <button onclick="window.location.href='index.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#111] gold-border text-gold">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="text-right">
                <h1 class="text-xl font-black text-white italic">JADDY INC</h1>
                <span id="connStatus" class="status-pill bg-offline">Desconectado</span>
            </div>
        </header>

        <!-- Formulario -->
        <section class="bg-[#111] p-6 rounded-[2.5rem] gold-border mb-8 shadow-inner">
            <form id="productForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label class="text-[10px] text-gray-500 mb-1 block uppercase font-bold">Código</label>
                        <input type="text" id="codigo" placeholder="ID-01" class="input-dark w-full p-4 rounded-2xl text-xs font-bold" required>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-500 mb-1 block uppercase font-bold">Producto</label>
                        <input type="text" id="nombre" placeholder="Nombre Perfume" class="input-dark w-full p-4 rounded-2xl text-xs uppercase" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-gray-500 mb-1 block uppercase font-bold">Costo $</label>
                        <input type="number" step="0.01" id="costo" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs">
                    </div>
                    <div>
                        <label class="text-[10px] text-green-500 mb-1 block uppercase font-bold">Detal $</label>
                        <input type="number" step="0.01" id="precio_detal" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs font-bold text-green-400">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-blue-400 mb-1 block uppercase font-bold">Crédito $</label>
                        <input type="number" step="0.01" id="precio_credito" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs text-blue-400">
                    </div>
                    <div>
                        <label class="text-[10px] text-gold mb-1 block uppercase font-bold">Mayor $</label>
                        <input type="number" step="0.01" id="precio_mayor" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs text-gold">
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs tracking-widest mt-2 shadow-lg shadow-gold/20">
                    Guardar en Sistema
                </button>
            </form>
        </section>

        <!-- Lista -->
        <div id="productList" class="space-y-4">
            <div class="text-center py-10 opacity-20">
                <i class="fas fa-spinner animate-spin text-2xl mb-2"></i>
                <p class="text-[10px] uppercase font-bold tracking-widest">Sincronizando nube...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, appId, collection, doc, addDoc, updateDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged } from './conexion.js';

        const productForm = document.getElementById('productForm');
        const productList = document.getElementById('productList');
        const connStatus = document.getElementById('connStatus');
        const saveBtn = document.getElementById('saveBtn');

        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-2xl ${isError ? 'bg-red-600 text-white' : 'bg-gold text-black'}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                connStatus.innerText = "Online";
                connStatus.className = "status-pill bg-online";
                initListener();
            } else {
                signInAnonymously(auth).catch(err => {
                    connStatus.innerText = "Error Auth";
                });
            }
        });

        function initListener() {
            // Ruta obligatoria para persistencia en este entorno
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'productos_maestro');
            
            onSnapshot(colRef, (snapshot) => {
                if (snapshot.empty) {
                    productList.innerHTML = '<p class="text-center text-gray-600 text-[10px] py-10 uppercase tracking-widest italic">No hay productos registrados</p>';
                    return;
                }

                let html = '';
                snapshot.forEach(snapDoc => {
                    const p = snapDoc.data();
                    const id = snapDoc.id;
                    html += `
                        <div class="card-product p-5 shadow-xl border border-white/5" onclick="editProduct('${id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center border border-white/5 text-gold">
                                        <i class="fas fa-wine-bottle text-xs"></i>
                                    </div>
                                    <div>
                                        <p class="text-[8px] text-gold font-black tracking-widest uppercase">${p.codigo}</p>
                                        <h3 class="text-sm font-black text-white uppercase">${p.nombre}</h3>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-black text-white">$${p.precio_detal || '0'}</p>
                                    <p class="text-[7px] text-gray-500 uppercase font-bold">Precio Detal</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 pt-3 border-t border-white/5">
                                <div class="text-center">
                                    <p class="text-[7px] text-gray-500 uppercase">Costo</p>
                                    <p class="text-[9px] text-white font-bold">$${p.costo || '0'}</p>
                                </div>
                                <div class="text-center border-x border-white/5">
                                    <p class="text-[7px] text-blue-400 uppercase">Crédito</p>
                                    <p class="text-[9px] text-blue-400 font-bold">$${p.precio_credito || '0'}</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-[7px] text-gold uppercase">Mayor</p>
                                    <p class="text-[9px] text-gold font-bold">$${p.precio_mayor || '0'}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
                productList.innerHTML = html;
            }, (err) => {
                connStatus.innerText = "Error DB";
                connStatus.className = "status-pill bg-offline";
            });
        }

        productForm.onsubmit = async (e) => {
            e.preventDefault();
            if (connStatus.innerText !== "Online") return showToast("Sin conexión", true);

            saveBtn.disabled = true;
            saveBtn.innerText = "Guardando...";

            const id = document.getElementById('editId').value;
            const data = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: document.getElementById('costo').value || 0,
                precio_detal: document.getElementById('precio_detal').value || 0,
                precio_credito: document.getElementById('precio_credito').value || 0,
                precio_mayor: document.getElementById('precio_mayor').value || 0,
                updated: new Date().getTime()
            };

            try {
                if (id) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'productos_maestro', id);
                    await updateDoc(docRef, data);
                    showToast("Actualizado");
                } else {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'productos_maestro');
                    await addDoc(colRef, data);
                    showToast("Registrado");
                }
                productForm.reset();
                document.getElementById('editId').value = '';
                saveBtn.innerText = "Guardar en Sistema";
            } catch (err) {
                showToast("Error", true);
            } finally {
                saveBtn.disabled = false;
            }
        };

        window.editProduct = (id, data) => {
            document.getElementById('editId').value = id;
            document.getElementById('codigo').value = data.codigo;
            document.getElementById('nombre').value = data.nombre;
            document.getElementById('costo').value = data.costo;
            document.getElementById('precio_detal').value = data.precio_detal;
            document.getElementById('precio_credito').value = data.precio_credito;
            document.getElementById('precio_mayor').value = data.precio_mayor;
            saveBtn.innerText = "Actualizar Producto";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>
