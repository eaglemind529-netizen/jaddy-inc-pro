```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equipo de Vendedores | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; }
        .input-field::placeholder { text-transform: none; color: #555; }
        .vendedor-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .btn-action { width: 35px; height: 35px; display: flex; items-center: center; justify-content: center; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.2); color: var(--gold); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600 shadow-[0_0_8px_rgba(220,38,38,0.5)]"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6">Registrar Vendedor</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-1">
                    <input type="text" id="v-codigo" placeholder="Cód (V-01)" class="input-field text-center font-black">
                </div>
                <div class="col-span-2">
                    <input type="text" id="v-nombre" placeholder="Nombre Completo" class="input-field font-bold">
                </div>
            </div>
            <input type="tel" id="v-tel" placeholder="Número de Teléfono" class="input-field">
            <input type="text" id="v-zona" placeholder="Ubicación / Zona de Trabajo" class="input-field">
            
            <button onclick="guardarVendedor()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-all shadow-lg shadow-white/5">
                Guardar en Equipo
            </button>
        </div>
    </section>

    <div class="flex items-center justify-between mb-4 px-2">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px]">Mi Equipo Activo</h2>
        <span id="counter" class="text-[9px] bg-gold/10 text-gold px-2 py-0.5 rounded-full font-bold">0 MIEMBROS</span>
    </div>
    
    <div id="listaVendedores" class="space-y-3">
        <!-- Los vendedores aparecerán aquí -->
    </div>

    <script type="module">
        import { conectarCerebro, auth, onAuthStateChanged } from './conexion.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const db = getFirestore();
        const appId = "jaddy-inc-inventario";
        const statusDot = document.getElementById('statusDot');

        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.classList.replace('bg-red-600', 'bg-green-500');
                statusDot.classList.replace('shadow-[0_0_8px_rgba(220,38,38,0.5)]', 'shadow-[0_0_8px_rgba(34,197,94,0.5)]');
                
                // Escuchar cambios en la colección de vendedores
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'vendedores'), (snap) => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderizarVendedores(data);
                });
            }
        });

        window.guardarVendedor = async () => {
            const codigo = document.getElementById('v-codigo').value.trim().toUpperCase();
            const nombre = document.getElementById('v-nombre').value.trim().toUpperCase();
            const tel = document.getElementById('v-tel').value.trim();
            const zona = document.getElementById('v-zona').value.trim().toUpperCase();

            if (!codigo || !nombre) {
                return; // Evita guardar vacíos
            }

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vendedores', codigo), {
                    codigo, nombre, tel, zona, fechaRegistro: new Date().getTime()
                });
                
                // Limpiar campos
                document.getElementById('v-codigo').value = "";
                document.getElementById('v-nombre').value = "";
                document.getElementById('v-tel').value = "";
                document.getElementById('v-zona').value = "";
            } catch (e) {
                console.error("Error al guardar:", e);
            }
        };

        window.eliminarVendedor = async (id) => {
            // Un pequeño seguro antes de borrar
            if(confirm("¿Estás seguro de eliminar a este vendedor?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vendedores', id));
            }
        };

        function renderizarVendedores(vendedores) {
            const container = document.getElementById('listaVendedores');
            const counter = document.getElementById('counter');
            
            counter.innerText = `${vendedores.length} MIEMBROS`;
            container.innerHTML = '';

            vendedores.forEach(v => {
                container.innerHTML += `
                    <div class="vendedor-card">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black bg-gold text-black px-1.5 rounded">${v.codigo}</span>
                                    <h3 class="text-xs font-black text-white uppercase">${v.nombre}</h3>
                                </div>
                                <div class="text-[9px] text-gray-500 font-bold uppercase tracking-wide">
                                    <i class="fas fa-map-marker-alt text-[8px] mr-1 text-gold/50"></i> ${v.zona || 'SIN ZONA'}
                                </div>
                                <div class="text-[9px] text-gray-500 font-bold uppercase tracking-wide mt-1">
                                    <i class="fas fa-phone text-[8px] mr-1 text-gold/50"></i> ${v.tel || 'SIN TELÉFONO'}
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${v.tel ? `
                                    <a href="https://wa.me/${v.tel.replace(/\s+/g, '')}" target="_blank" class="btn-action">
                                        <i class="fab fa-whatsapp"></i>
                                    </a>
                                    <a href="tel:${v.tel}" class="btn-action">
                                        <i class="fas fa-phone-alt"></i>
                                    </a>
                                ` : ''}
                                <button onclick="eliminarVendedor('${v.id}')" class="btn-action border-red-900/30 text-red-500">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
