```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equipo | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; }
        .vendedor-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .btn-action { width: 35px; height: 35px; display: flex; items-center: center; justify-content: center; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.2); color: var(--gold); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6">Registrar Vendedor</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <input type="text" id="v-codigo" placeholder="CÓDIGO" class="input-field text-center font-black">
                <input type="text" id="v-nombre" placeholder="NOMBRE COMPLETO" class="input-field col-span-2 font-bold">
            </div>
            <input type="tel" id="v-tel" placeholder="TELÉFONO" class="input-field">
            <input type="text" id="v-zona" placeholder="ZONA DE TRABAJO" class="input-field">
            
            <button id="btn-guardar" onclick="guardarVendedor()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-sm active:scale-95 transition-all">
                Guardar en Equipo
            </button>
        </div>
    </section>

    <div id="listaVendedores" class="space-y-3"></div>

    <script type="module">
        // Importamos las herramientas necesarias
        import { conectarCerebro, auth, onAuthStateChanged } from './conexion.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const db = getFirestore();
        const appId = "jaddy-inc-inventario"; 
        const statusDot = document.getElementById('statusDot');

        // Ruta maestra que usa tu sistema
        const RUTA_VENDEDORES = ['artifacts', appId, 'public', 'data', 'vendedores_jaddy'];

        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.classList.replace('bg-red-600', 'bg-green-500');
                
                // Escuchar la lista de vendedores
                const colRef = collection(db, ...RUTA_VENDEDORES);
                onSnapshot(colRef, (snap) => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderizarVendedores(data);
                });
            }
        });

        window.guardarVendedor = async () => {
            const btn = document.getElementById('btn-guardar');
            const codigo = document.getElementById('v-codigo').value.trim().toUpperCase();
            const nombre = document.getElementById('v-nombre').value.trim().toUpperCase();
            const tel = document.getElementById('v-tel').value.trim();
            const zona = document.getElementById('v-zona').value.trim().toUpperCase();

            if (!codigo || !nombre) return alert("Faltan datos");

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            try {
                // Usamos addDoc (igual que tu función subirProducto) para que Firebase asigne el permiso correctamente
                const colRef = collection(db, ...RUTA_VENDEDORES);
                await addDoc(colRef, {
                    codigo, nombre, tel, zona, creado: new Date().getTime()
                });
                
                // Limpiar
                document.getElementById('v-codigo').value = "";
                document.getElementById('v-nombre').value = "";
                document.getElementById('v-tel').value = "";
                document.getElementById('v-zona').value = "";
            } catch (e) {
                console.error("Error:", e);
                alert("Error al guardar. Revisa la consola.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR EN EQUIPO";
            }
        };

        window.eliminarVendedor = async (id) => {
            if(confirm("¿Eliminar vendedor?")) {
                await deleteDoc(doc(db, ...RUTA_VENDEDORES, id));
            }
        };

        function renderizarVendedores(vendedores) {
            const container = document.getElementById('listaVendedores');
            // Ordenar por código
            vendedores.sort((a, b) => (a.codigo || "").localeCompare(b.codigo || ""));
            
            container.innerHTML = vendedores.map(v => `
                <div class="vendedor-card shadow-lg">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-black bg-gold text-black px-1.5 rounded">${v.codigo}</span>
                                <h3 class="text-xs font-black text-white uppercase">${v.nombre}</h3>
                            </div>
                            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-wide">
                                <i class="fas fa-map-marker-alt mr-1 text-gold/50"></i> ${v.zona || 'SIN ZONA'}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${v.tel ? `<a href="https://wa.me/${v.tel.replace(/\s+/g, '')}" target="_blank" class="btn-action"><i class="fab fa-whatsapp"></i></a>` : ''}
                            <button onclick="eliminarVendedor('${v.id}')" class="btn-action border-red-900/30 text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
