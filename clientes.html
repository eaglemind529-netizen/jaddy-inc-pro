
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clientes Premium | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; outline: none; }
        .input-field:focus { border-color: var(--gold); }
        .client-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        #modalDetalle, #subModalAnalisis { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; 
            display: none; flex-direction: column; padding: 20px; 
            backdrop-filter: blur(15px); animation: slideUp 0.3s ease; 
        }
        #subModalAnalisis { z-index: 110; background: #000; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .badge-moroso { background: #ef4444; color: white; }
        .badge-bueno { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .premium-card { background: linear-gradient(135deg, #111 0%, #000 100%); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px; position: relative; overflow: hidden; }
        .history-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; border-left: 3px solid transparent; }
        .history-item.credito { border-left-color: #ef4444; }
        .history-item.contado { border-left-color: var(--gold); }
        .text-gold { color: var(--gold); }
        #notifBanner { background: #D4AF37; color: black; padding: 10px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; display: none; cursor: pointer; }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto">

    <div id="notifBanner">
        <i class="fas fa-bell animate-bounce mr-2"></i> Activar Alertas de Cobro
    </div>

    <div class="p-4">
        <!-- Modales -->
        <div id="subModalAnalisis">
            <header class="flex justify-between items-center mb-8">
                <button onclick="cerrarAnalisis()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white text-xl">←</button>
                <h2 class="text-[9px] font-black text-gold uppercase tracking-[4px]">Análisis Inteligente</h2>
                <div class="w-10"></div>
            </header>
            <div id="listaAnalisisProds" class="space-y-4 overflow-y-auto pb-10"></div>
        </div>

        <div id="modalDetalle">
            <header class="flex justify-between items-center mb-6">
                <button onclick="cerrarDetalle()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white text-xl">×</button>
                <h2 class="text-[9px] font-black text-gold uppercase tracking-[4px]">Perfil Cliente</h2>
                <div class="w-10"></div>
            </header>
            <div id="detalleContenido" class="flex-1 overflow-y-auto space-y-6 pb-10"></div>
        </div>

        <!-- Header Principal -->
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-zinc-800 transition-all duration-500"></div>
        </header>

        <!-- Formulario de Registro -->
        <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
            <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Registro Jaddy INC</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="cli-codigo" placeholder="CÓD" class="input-field col-span-1">
                    <input type="text" id="cli-nombre" placeholder="Nombre Completo" class="input-field col-span-2">
                </div>
                <input type="text" id="cli-ubicacion" placeholder="Ubicación" class="input-field">
                <input type="tel" id="cli-telefono" placeholder="WhatsApp" class="input-field">
                <button id="btn-guardar" onclick="procesarCliente()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-xs hover:bg-gold transition-colors">Guardar Cliente</button>
            </div>
        </section>

        <!-- Lista de Clientes -->
        <div id="listaClientes" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas";

        let todasLasVentas = [];
        let todosLosClientes = [];
        let userId = null;

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                userId = user.uid;
                document.getElementById('statusDot').style.backgroundColor="#22c55e";
                document.getElementById('statusDot').style.boxShadow="0 0 10px #22c55e";
                escucharVentas(user.uid); 
                escucharClientes(user.uid); 
            } else {
                // Si no hay sesión, intentamos anónimo o redirigimos (según tu flujo)
                signInAnonymously(auth);
            }
        });

        function escucharVentas(uid) { 
            const qVentas = collection(db, 'artifacts', appId, 'users', uid, 'ventas_realizadas');
            onSnapshot(qVentas, (s) => { 
                todasLasVentas = s.docs.map(d => ({id: d.id, ...d.data()})); 
            }); 
        }

        function escucharClientes(uid) { 
            const qClientes = query(collection(db, 'artifacts', appId, 'users', uid, 'clientes'), orderBy("nombre", "asc"));
            onSnapshot(qClientes, (s) => { 
                todosLosClientes = s.docs.map(d => ({id_doc: d.id, ...d.data()})); 
                renderizarClientes(); 
            }); 
        }

        window.procesarCliente = async () => {
            if(!userId) return;
            const editId = document.getElementById('edit-id').value;
            const btn = document.getElementById('btn-guardar');
            
            const c = { 
                codigo: document.getElementById('cli-codigo').value.toUpperCase(),
                nombre: document.getElementById('cli-nombre').value.toUpperCase(),
                ubicacion: document.getElementById('cli-ubicacion').value.toUpperCase(),
                telefono: document.getElementById('cli-telefono').value,
                updatedAt: Date.now()
            };

            if(!c.nombre) return;

            try {
                btn.disabled = true;
                btn.innerText = "PROCESANDO...";
                
                const userClientesRef = collection(db, 'artifacts', appId, 'users', userId, 'clientes');

                if(editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'clientes', editId), c);
                } else {
                    const newId = "CLI-" + Date.now();
                    await setDoc(doc(userClientesRef, newId), c);
                }
                limpiar();
            } catch (e) { 
                console.error("Error al guardar cliente:", e);
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar Cliente";
            }
        };

        window.abrirDetalle = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            if(!c) return;
            
            const ventas = todasLasVentas.filter(v => v.cliente === c.nombre);
            const totalGasto = ventas.reduce((acc, v) => acc + (parseFloat(v.total) || 0), 0);
            const totalDeuda = ventas.filter(v => v.tipo === 'CREDITO').reduce((acc, v) => acc + (parseFloat(v.total) || 0), 0);

            document.getElementById('detalleContenido').innerHTML = `
                <div class="premium-card p-6 text-center">
                    <h3 class="text-xl font-black text-white uppercase">${c.nombre}</h3>
                    <p class="text-[7px] text-gray-500 tracking-[3px] mb-3">${c.codigo}</p>
                    <div class="flex justify-center gap-2">
                        <span class="status-pill ${totalDeuda > 0 ? 'badge-moroso' : 'badge-bueno'}">${totalDeuda > 0 ? 'Con Deuda' : 'Al día'}</span>
                        <a href="https://wa.me/${c.telefono}" target="_blank" class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center text-white"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl text-center border border-white/5">
                        <p class="text-[7px] font-black text-gray-500 uppercase mb-1">Total Compras</p>
                        <p class="text-lg font-black text-gold">$${totalGasto.toLocaleString()}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl text-center border border-white/5">
                        <p class="text-[7px] font-black text-gray-500 uppercase mb-1">Deuda Pendiente</p>
                        <p class="text-lg font-black text-red-500">$${totalDeuda.toLocaleString()}</p>
                    </div>
                </div>

                <button onclick="abrirAnalisisProductos('${c.id_doc}')" class="w-full bg-gold/10 border border-gold/30 p-5 rounded-[24px] flex justify-between items-center">
                    <span class="text-[10px] font-black text-white uppercase italic">Ver Marcas y Productos Favoritos</span>
                    <i class="fas fa-chevron-right text-gold/40"></i>
                </button>

                <div class="space-y-2">
                    <h4 class="text-[8px] font-black text-gray-600 uppercase ml-2 italic">Historial de Despachos</h4>
                    ${ventas.length === 0 ? '<p class="text-center text-[9px] text-zinc-600 py-4 uppercase font-black">Sin registros de ventas</p>' : ventas.map(v => `
                        <div class="history-item ${v.tipo === 'CREDITO' ? 'credito' : 'contado'} flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-black text-white uppercase">${v.producto || 'Producto'}</p>
                                <p class="text-[7px] text-gray-500 font-bold uppercase">${v.variante || 'GENERAL'} • ${v.fecha_legible || 'S/F'}</p>
                            </div>
                            <p class="text-[11px] font-black text-gold">$${(parseFloat(v.total) || 0).toLocaleString()}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="prepararEdicion('${c.id_doc}')" class="bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px]">Editar Perfil</button>
                    <button onclick="eliminarCliente('${c.id_doc}')" class="bg-red-900/20 text-red-500 font-black py-4 rounded-2xl uppercase text-[10px]">Eliminar</button>
                </div>
            `;
            document.getElementById('modalDetalle').style.display = 'flex';
        };

        window.abrirAnalisisProductos = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            const ventas = todasLasVentas.filter(v => v.cliente === c.nombre);
            const resumenProd = {};

            ventas.forEach(v => {
                const key = v.producto || 'Indefinido';
                if(!resumenProd[key]) resumenProd[key] = { cant: 0, total: 0, var: v.variante };
                resumenProd[key].cant += (parseFloat(v.cantidad) || 1);
                resumenProd[key].total += (parseFloat(v.total) || 0);
            });

            document.getElementById('listaAnalisisProds').innerHTML = `
                <h4 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-4 italic">Análisis de Consumo</h4>
                ${Object.keys(resumenProd).length === 0 ? '<p class="text-center text-[9px] text-zinc-600 py-10 uppercase font-black">No hay datos suficientes</p>' : Object.entries(resumenProd).map(([p, d]) => `
                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center mb-2 border border-white/5">
                        <div>
                            <p class="text-xs font-black text-white uppercase">${p}</p>
                            <p class="text-[8px] text-gold/60 font-black uppercase italic">${d.var || 'GENERAL'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-gold">${d.cant} UNID.</p>
                            <p class="text-[9px] text-gray-500 font-bold">$${d.total.toLocaleString()}</p>
                        </div>
                    </div>
                `).join('')}
            `;
            document.getElementById('subModalAnalisis').style.display = 'flex';
        };

        window.prepararEdicion = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            if(!c) return;
            document.getElementById('edit-id').value = c.id_doc;
            document.getElementById('cli-codigo').value = c.codigo;
            document.getElementById('cli-nombre').value = c.nombre;
            document.getElementById('cli-ubicacion').value = c.ubicacion;
            document.getElementById('cli-telefono').value = c.telefono;
            cerrarDetalle();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.eliminarCliente = async (id) => {
            if(!userId) return;
            if(confirm('¿ELIMINAR ESTE CLIENTE Y TODOS SUS REGISTROS?')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, 'clientes', id));
                    cerrarDetalle();
                } catch (e) { console.error(e); }
            }
        };

        window.cerrarAnalisis = () => { document.getElementById('subModalAnalisis').style.display = 'none'; };
        window.cerrarDetalle = () => { document.getElementById('modalDetalle').style.display = 'none'; };

        function renderizarClientes() {
            document.getElementById('listaClientes').innerHTML = todosLosClientes.map(c => `
                <div class="client-card flex justify-between items-center" onclick="abrirDetalle('${c.id_doc}')">
                    <div>
                        <p class="text-[7px] text-gold font-black mb-1">${c.codigo || 'S/C'}</p>
                        <h4 class="text-xs font-black uppercase text-white tracking-wide">${c.nombre}</h4>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-gold/40"></i>
                </div>
            `).join('');
        }

        function limpiar() {
            document.getElementById('edit-id').value = "";
            document.getElementById('cli-codigo').value = "";
            document.getElementById('cli-nombre').value = "";
            document.getElementById('cli-ubicacion').value = "";
            document.getElementById('cli-telefono').value = "";
        }
    </script>
</body>
</html>

```
