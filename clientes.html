
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clientes Premium | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        
        .client-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        
        #modalDetalle, #subModalAnalisis { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; 
            display: none; flex-direction: column; padding: 20px; 
            backdrop-filter: blur(15px); animation: slideUp 0.3s ease; 
        }
        #subModalAnalisis { z-index: 110; background: #000; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .badge-vip { background: var(--gold); color: black; }
        .badge-moroso { background: #ef4444; color: white; }
        .badge-bueno { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        
        .premium-card {
            background: linear-gradient(135deg, #111 0%, #000 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 12px;
            border-left: 3px solid transparent;
        }
        .history-item.credito { border-left-color: #ef4444; }
        .history-item.contado { border-left-color: var(--gold); }

        .text-gold { color: var(--gold); }
        ::-webkit-scrollbar { width: 0px; }

        #notifBanner { background: #D4AF37; color: black; padding: 10px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; display: none; cursor: pointer; }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto">

    <div id="notifBanner" onclick="activarNotificaciones()">
        <i class="fas fa-bell animate-bounce mr-2"></i> Activar Alertas de Cobro en mi Celular
    </div>

    <div class="p-4">
        <!-- MODALES -->
        <div id="subModalAnalisis">
            <header class="flex justify-between items-center mb-8">
                <button onclick="cerrarAnalisis()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white text-xl">←</button>
                <h2 class="text-[9px] font-black text-gold uppercase tracking-[4px]">Análisis Inteligente</h2>
                <div class="w-10"></div>
            </header>
            <div id="listaAnalisisProds" class="space-y-4 overflow-y-auto pb-10"></div>
        </div>

        <div id="modalDetalle">
            <header class="flex justify-between items-center mb-6">
                <button onclick="cerrarDetalle()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white text-xl">×</button>
                <h2 class="text-[9px] font-black text-gold uppercase tracking-[4px]">Perfil Cliente</h2>
                <div class="w-10"></div>
            </header>
            <div id="detalleContenido" class="flex-1 overflow-y-auto space-y-6 pb-10"></div>
        </div>

        <!-- HEADER -->
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
        </header>

        <!-- REGISTRO -->
        <section class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
            <h2 id="titulo-form" class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Registro Jaddy INC</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="cli-codigo" placeholder="CÓD" class="input-field col-span-1">
                    <input type="text" id="cli-nombre" placeholder="Nombre Completo" class="input-field col-span-2">
                </div>
                <input type="text" id="cli-ubicacion" placeholder="Ubicación" class="input-field">
                <input type="tel" id="cli-telefono" placeholder="WhatsApp" class="input-field">
                
                <div class="flex gap-2">
                    <button id="btn-cancelar" onclick="limpiarFormulario()" class="hidden flex-1 bg-red-900/20 text-red-500 font-black py-4 rounded-xl uppercase text-[10px]">×</button>
                    <button id="btn-guardar" onclick="procesarCliente()" class="flex-[3] bg-white text-black font-black py-4 rounded-xl uppercase text-xs">Guardar Cliente</button>
                </div>
            </div>
        </section>

        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2 italic">Cartera de Clientes</h2>
        <div id="listaClientes" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU CEREBRO (DATABASE)
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let todasLasVentas = [];
        let todosLosClientes = [];

        // CONEXIÓN AL CEREBRO
        signInAnonymously(auth);
        onAuthStateChanged(auth, (u) => { 
            if(u){ 
                escucharVentas(); 
                escucharClientes(); 
                document.getElementById('statusDot').style.backgroundColor="#22c55e";
                verificarPermisosNotif();
            } 
        });

        // --- SISTEMA DE NOTIFICACIONES ---
        window.verificarPermisosNotif = () => {
            if ("Notification" in window) {
                if (Notification.permission === "default") document.getElementById('notifBanner').style.display = "block";
            }
        };

        window.activarNotificaciones = () => {
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    document.getElementById('notifBanner').style.display = "none";
                }
            });
        };

        function enviarNotificacion(titulo, mensaje) {
            if (Notification.permission === "granted") {
                new Notification(titulo, { body: mensaje });
            }
        }

        // --- CEREBRO: GUARDADO Y LECTURA ---
        function escucharVentas() { 
            onSnapshot(collection(db, "ventas_realizadas"), (s) => { 
                todasLasVentas = s.docs.map(d => ({id_venta: d.id, ...d.data()})); 
                verificarCobrosProximos(todasLasVentas);
            }); 
        }

        function escucharClientes() { 
            onSnapshot(query(collection(db, "clientes"), orderBy("nombre", "asc")), (s) => { 
                todosLosClientes = s.docs.map(d => ({id_doc: d.id, ...d.data()})); 
                renderizarClientes(); 
            }); 
        }

        window.procesarCliente = async () => {
            const editId = document.getElementById('edit-id').value;
            const c = { 
                codigo: document.getElementById('cli-codigo').value.toUpperCase(),
                nombre: document.getElementById('cli-nombre').value.toUpperCase(),
                ubicacion: document.getElementById('cli-ubicacion').value.toUpperCase(),
                telefono: document.getElementById('cli-telefono').value
            };
            if(!c.nombre || !c.codigo) return;
            
            try {
                if(editId) {
                    await updateDoc(doc(db, "clientes", editId), c);
                } else {
                    await setDoc(doc(db, "clientes", "CLI-"+Date.now()), {...c, fechaAlta: new Date().toISOString()});
                }
                limpiarFormulario();
            } catch (e) {
                console.error("Error al guardar:", e);
            }
        };

        function verificarCobrosProximos(ventas) {
            const hoy = new Date();
            ventas.forEach(v => {
                if(v.tipo === 'CREDITO' && v.fechaPago) {
                    const f = new Date(v.fechaPago);
                    const diff = Math.ceil((f - hoy) / (1000 * 60 * 60 * 24));
                    if(diff === 3) enviarNotificacion("Cobro en 3 días", `${v.cliente} debe pagar $${v.precio}`);
                    if(diff === 0) enviarNotificacion("Cobro HOY", `Fecha límite para ${v.cliente}: $${v.precio}`);
                }
            });
        }

        window.limpiarFormulario = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('cli-codigo').value = "";
            document.getElementById('cli-nombre').value = "";
            document.getElementById('cli-ubicacion').value = "";
            document.getElementById('cli-telefono').value = "";
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('btn-guardar').innerText = "Guardar Cliente";
        };

        window.abrirDetalle = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            const ventas = todasLasVentas.filter(v => v.cliente === c.nombre || v.clienteId === c.id_doc);
            const totalGasto = ventas.reduce((acc, v) => acc + parseFloat(v.precio || 0), 0);
            const totalDeuda = ventas.filter(v => v.tipo === 'CREDITO').reduce((acc, v) => acc + parseFloat(v.precio || 0), 0);

            document.getElementById('detalleContenido').innerHTML = `
                <div class="premium-card p-6 text-center shadow-2xl">
                    <h3 class="text-xl font-black text-white uppercase">${c.nombre}</h3>
                    <p class="text-[7px] text-gray-500 tracking-[3px] mb-3">${c.codigo}</p>
                    <div class="flex justify-center gap-2">
                        <span class="status-pill ${totalDeuda > 0 ? 'badge-moroso' : 'badge-bueno'}">${totalDeuda > 0 ? 'Con Deuda' : 'Al día'}</span>
                        <a href="https://wa.me/${c.telefono}" target="_blank" class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white"><i class="fab fa-whatsapp text-xs"></i></a>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[7px] font-black text-gray-500 uppercase mb-1">Total Compras</p>
                        <p class="text-lg font-black text-gold">$${totalGasto.toFixed(2)}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[7px] font-black text-gray-500 uppercase mb-1">Deuda Pendiente</p>
                        <p class="text-lg font-black text-red-500">$${totalDeuda.toFixed(2)}</p>
                    </div>
                </div>

                <button onclick="abrirAnalisisProductos('${c.id_doc}')" class="w-full bg-gold/10 border border-gold/30 p-5 rounded-[24px] flex items-center justify-between">
                    <span class="text-[10px] font-black text-white uppercase italic">Ver Marcas y Productos Favoritos</span>
                    <i class="fas fa-chevron-right text-gold/40 text-xs"></i>
                </button>

                <div class="space-y-2">
                    <h4 class="text-[8px] font-black text-gray-600 uppercase ml-2">Historial</h4>
                    ${ventas.map(v => `
                        <div class="history-item ${v.tipo === 'CREDITO' ? 'credito' : 'contado'} flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-black text-white uppercase">${v.producto}</p>
                                <p class="text-[7px] text-gray-500 font-bold uppercase">${v.marca || 'S/M'} • ${new Date(v.fecha).toLocaleDateString()}</p>
                            </div>
                            <p class="text-[11px] font-black text-gold">$${v.precio}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="prepararEdicion('${c.id_doc}')" class="bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px]">Editar</button>
                    <button onclick="eliminarCliente('${c.id_doc}')" class="bg-red-900/20 text-red-500 font-black py-4 rounded-2xl uppercase text-[10px]">Eliminar</button>
                </div>
            `;
            document.getElementById('modalDetalle').style.display = 'flex';
        };

        window.abrirAnalisisProductos = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            const ventas = todasLasVentas.filter(v => v.cliente === c.nombre || v.clienteId === c.id_doc);
            
            const resumenProd = {};
            const resumenMarca = {};

            ventas.forEach(v => {
                if(!resumenProd[v.producto]) resumenProd[v.producto] = { cant: 0, total: 0, marca: v.marca || 'S/M' };
                resumenProd[v.producto].cant++;
                resumenProd[v.producto].total += parseFloat(v.precio || 0);

                const m = v.marca || 'SIN MARCA';
                resumenMarca[m] = (resumenMarca[m] || 0) + 1;
            });

            const marcasSorted = Object.entries(resumenMarca).sort((a,b) => b[1] - a[1]);

            document.getElementById('listaAnalisisProds').innerHTML = `
                <div class="mb-6">
                    <h4 class="text-[9px] font-black text-gold uppercase tracking-[3px] mb-4 italic">Marcas Favoritas</h4>
                    <div class="flex flex-wrap gap-2">
                        ${marcasSorted.map(([m, c]) => `<div class="bg-gold/10 px-4 py-2 rounded-full text-[10px] font-black uppercase text-white">${m} <span class="text-gold">x${c}</span></div>`).join('')}
                    </div>
                </div>
                <h4 class="text-[9px] font-black text-gray-500 uppercase tracking-[3px] mb-4 italic">Productos</h4>
                ${Object.entries(resumenProd).map(([p, d]) => `
                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center mb-2">
                        <div>
                            <p class="text-xs font-black text-white uppercase">${p}</p>
                            <p class="text-[8px] text-gold/60 font-black uppercase italic">${d.marca}</p>
                        </div>
                        <p class="text-xs font-black text-gold">${d.cant} unid.</p>
                    </div>
                `).join('')}
            `;
            document.getElementById('subModalAnalisis').style.display = 'flex';
        };

        window.cerrarAnalisis = () => { document.getElementById('subModalAnalisis').style.display = 'none'; };
        window.cerrarDetalle = () => { document.getElementById('modalDetalle').style.display = 'none'; };

        window.prepararEdicion = (id) => {
            const c = todosLosClientes.find(x => x.id_doc === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('cli-codigo').value = c.codigo;
            document.getElementById('cli-nombre').value = c.nombre;
            document.getElementById('cli-ubicacion').value = c.ubicacion;
            document.getElementById('cli-telefono').value = c.telefono;
            document.getElementById('btn-cancelar').classList.remove('hidden');
            document.getElementById('btn-guardar').innerText = "Actualizar";
            cerrarDetalle();
        };

        window.eliminarCliente = async (id) => {
            if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "clientes", id));
            cerrarDetalle();
        };

        function renderizarClientes() {
            const list = document.getElementById('listaClientes');
            list.innerHTML = todosLosClientes.map(c => `
                <div class="client-card flex justify-between items-center" onclick="abrirDetalle('${c.id_doc}')">
                    <div>
                        <p class="text-[7px] text-gold font-black mb-1">${c.codigo}</p>
                        <h4 class="text-xs font-black uppercase text-white">${c.nombre}</h4>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-gold/40"></i>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

```
