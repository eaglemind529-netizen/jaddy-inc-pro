```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #auth-guard { 
            position: fixed; inset: 0; background: #000; z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #main-content { opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
        #main-content.authorized { opacity: 1; pointer-events: auto; }

        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; outline: none; }
        .card-master { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; margin-bottom: 12px; overflow: hidden; }
        .label-stat { font-size: 7px; text-transform: uppercase; color: #555; font-weight: 800; letter-spacing: 1px; }
        .detalle-variante { display: none; max-height: 0; overflow: hidden; }
        .detalle-variante.active { display: block; max-height: 1000px; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .loader { width: 40px; height: 40px; border: 3px solid #111; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <div id="auth-guard">
        <div class="loader mb-4"></div>
        <p class="text-[10px] font-black tracking-[4px] text-gold uppercase animate-pulse">Sincronizando con Usuarios...</p>
    </div>

    <main id="main-content">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Panel Ventas</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
        </header>

        <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
            <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6 italic">Ingreso de Mercancía</h2>
            <div class="space-y-4">
                
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Producto Maestro:</p>
                    <select id="sel-producto" class="input-field border-gold/20">
                        <option value="">CARGANDO PRODUCTOS...</option>
                    </select>
                </div>
                
                <div class="relative">
                    <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante / Talla:</p>
                    <select id="sel-variante" class="input-field border-white/10">
                        <option value="GENERAL">SELECCIONE PRODUCTO PRIMERO</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Fecha Ingreso:</p>
                        <input type="date" id="inp-fecha" class="input-field text-xs">
                    </div>
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Cantidad:</p>
                        <input type="number" id="inp-cantidad" placeholder="0" class="input-field font-black text-xl text-center text-gold">
                    </div>
                </div>
                
                <button id="btnGuardar" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                    REGISTRAR ENTRADA
                </button>
            </div>
        </section>

        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2 italic">Stock en Tiempo Real</h2>
        <div id="displayStock" class="space-y-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authGuard = document.getElementById('auth-guard');
        const mainContent = document.getElementById('main-content');
        const selProd = document.getElementById('sel-producto');
        const selVar = document.getElementById('sel-variante');
        const inpFecha = document.getElementById('inp-fecha');
        const btnGuardar = document.getElementById('btnGuardar');
        const displayStock = document.getElementById('displayStock');
        
        inpFecha.valueAsDate = new Date();

        let productosMaestros = [];
        let inventarioData = {};
        let userId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                userId = user.uid;
                authGuard.style.opacity = "0";
                setTimeout(() => {
                    authGuard.style.display = "none";
                    mainContent.classList.add('authorized');
                }, 500);
                vincularBaseDeDatos(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function vincularBaseDeDatos(uid) {
            // Cargar Productos Maestros para el Select
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), (snap) => {
                productosMaestros = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                if (productosMaestros.length === 0) {
                    selProd.innerHTML = '<option value="">SIN PRODUCTOS REGISTRADOS</option>';
                } else {
                    const currentVal = selProd.value;
                    selProd.innerHTML = '<option value="">-- SELECCIONA PRODUCTO --</option>' + 
                        productosMaestros.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()} (${p.codigo})</option>`).join('');
                    if(currentVal) selProd.value = currentVal;
                }
            });

            // Cargar Stock Real
            onSnapshot(collection(db, 'usuarios', uid, 'inventario_master'), (snap) => {
                inventarioData = {};
                snap.docs.forEach(d => { inventarioData[d.id] = d.data(); });
                renderizarTabla();
            });
        }

        // LÓGICA: Cuando cambia el producto, cargar sus variantes específicas
        selProd.onchange = () => {
            const pId = selProd.value;
            if (!pId) {
                selVar.innerHTML = '<option value="GENERAL">SELECCIONE PRODUCTO</option>';
                return;
            }

            const producto = productosMaestros.find(p => p.id === pId);
            const variantes = producto.variantes || [];

            if (variantes.length === 0) {
                selVar.innerHTML = '<option value="GENERAL">GENERAL / ÚNICA</option>';
            } else {
                selVar.innerHTML = variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            }
        };

        btnGuardar.onclick = async () => {
            const prodId = selProd.value;
            const variante = selVar.value;
            const fecha = inpFecha.value;
            const cantInput = document.getElementById('inp-cantidad');
            const cant = parseInt(cantInput.value);

            if (!userId || !prodId || isNaN(cant) || cant <= 0 || !fecha || !variante) {
                alert("Complete todos los campos correctamente");
                return;
            }

            const prod = productosMaestros.find(p => p.id === prodId);
            // El ID del documento de stock es Producto_Variante para que sean únicos
            const docId = `${prodId}_${variante.replace(/\s+/g, '_')}`;

            try {
                btnGuardar.disabled = true;
                btnGuardar.innerText = "REGISTRANDO...";

                await setDoc(doc(db, 'usuarios', userId, 'inventario_master', docId), {
                    prodId, 
                    variante,
                    nombreProducto: prod.nombre,
                    codigo: prod.codigo,
                    entradas: increment(cant),
                    ventas: increment(0),
                    stock: increment(cant),
                    ultimaFechaIngreso: fecha,
                    lastUpdate: Date.now()
                }, { merge: true });

                cantInput.value = "";
                btnGuardar.innerText = "¡EXITO!";
                setTimeout(() => { 
                    btnGuardar.disabled = false; 
                    btnGuardar.innerText = "REGISTRAR ENTRADA"; 
                }, 1000);
            } catch (e) {
                console.error(e);
                btnGuardar.disabled = false;
                btnGuardar.innerText = "ERROR AL GUARDAR";
            }
        };

        window.toggleDetalle = (id) => document.getElementById('det-' + id).classList.toggle('active');

        function renderizarTabla() {
            displayStock.innerHTML = '';
            const grupos = {};
            
            Object.values(inventarioData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { nombre: item.nombreProducto, codigo: item.codigo, items: [] };
                grupos[item.prodId].items.push(item);
            });

            if (Object.keys(grupos).length === 0) {
                displayStock.innerHTML = '<div class="text-center py-10 opacity-20 text-[10px] font-black uppercase tracking-widest">Sin stock registrado</div>';
                return;
            }

            for (let id in grupos) {
                const g = grupos[id];
                const totalStock = g.items.reduce((acc, s) => acc + (s.stock || 0), 0);
                const ultFecha = g.items.reduce((max, item) => !max || (item.ultimaFechaIngreso > max) ? item.ultimaFechaIngreso : max, "");

                displayStock.innerHTML += `
                    <div class="card-master gold-border">
                        <button onclick="toggleDetalle('${id}')" class="w-full flex justify-between items-center p-5 bg-[#0D0D0D] active:bg-[#151515] transition-colors">
                            <div class="text-left">
                                <span class="text-[7px] bg-gold/10 text-gold px-2 py-0.5 rounded border border-gold/20 font-bold uppercase">${g.codigo}</span>
                                <h3 class="text-xs font-black uppercase text-white mt-1 tracking-tight">${g.nombre}</h3>
                                <p class="text-[6px] text-gray-500 font-bold uppercase mt-1 tracking-tighter">ÚLT. INGRESO: ${ultFecha || '---'}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-white font-black text-xl leading-none">${totalStock}</div>
                                <div class="label-stat tracking-widest opacity-50">UNIDADES</div>
                            </div>
                        </button>
                        <div id="det-${id}" class="detalle-variante bg-black/40 border-t border-white/5">
                            ${g.items.map(s => `
                                <div class="p-4 border-b border-white/5 last:border-0 flex justify-between items-center">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <p class="text-[10px] font-black text-gold uppercase">${s.variante}</p>
                                        </div>
                                        <p class="text-[6px] text-zinc-600 font-bold uppercase">STOCK ACTUAL</p>
                                    </div>
                                    <div class="flex gap-6">
                                        <div class="text-center">
                                            <p class="label-stat">ENTRADAS</p>
                                            <p class="text-[10px] font-bold text-zinc-500">${s.entradas}</p>
                                        </div>
                                        <div class="text-center">
                                            <p class="label-stat text-green-500">DISPONIBLE</p>
                                            <p class="text-[11px] font-black text-white">${s.stock}</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
