```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Detallado | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; }
        .card-master { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; margin-bottom: 12px; overflow: hidden; }
        .stat-number { font-size: 14px; font-weight: 900; }
        .label-stat { font-size: 7px; text-transform: uppercase; color: #555; font-weight: 800; letter-spacing: 1px; }
        .detalle-variante { display: none; }
        .detalle-variante.active { display: block; }
        .bg-gold-soft { background: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600"></div>
    </header>

    <!-- Registro de Entrada de Mercancía -->
    <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6">Entrada de Mercancía</h2>
        <div class="space-y-4">
            <select id="sel-producto" class="input-field font-bold uppercase"></select>
            <select id="sel-variante" class="input-field font-bold uppercase">
                <option value="">Selecciona Producto</option>
            </select>
            <input type="number" id="inp-cantidad" placeholder="Cantidad" class="input-field font-black text-xl text-center">
            <button onclick="registrarEntrada()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                Guardar en Stock
            </button>
        </div>
    </section>

    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2">Control de Stock por Categoría</h2>
    <div id="displayStock" class="space-y-4"></div>

    <script type="module">
        import { conectarCerebro, obtenerProductos, auth, onAuthStateChanged } from './conexion.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const db = getFirestore();
        const appId = "jaddy-inc-inventario";
        const statusDot = document.getElementById('statusDot');
        let productosMaestros = [];
        let stockData = {};

        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.classList.replace('bg-red-600', 'bg-green-500');
                obtenerProductos((lista) => {
                    productosMaestros = lista;
                    document.getElementById('sel-producto').innerHTML = '<option value="">-- CATEGORÍA --</option>' + 
                        lista.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventario_master'), (snap) => {
                    stockData = {};
                    snap.docs.forEach(d => stockData[d.id] = d.data());
                    renderizarInventario();
                });
            }
        });

        document.getElementById('sel-producto').onchange = (e) => {
            const prod = productosMaestros.find(p => p.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            selVar.innerHTML = (prod && prod.variantes) ? prod.variantes.map(v => `<option value="${v}">${v}</option>`).join('') : '<option value="GENERAL">GENERAL</option>';
        };

        window.registrarEntrada = async () => {
            const prodId = document.getElementById('sel-producto').value;
            const variante = document.getElementById('sel-variante').value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);
            if (!prodId || !variante || isNaN(cant)) return;

            const prod = productosMaestros.find(p => p.id === prodId);
            const docId = `${prodId}_${variante}`;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventario_master', docId), {
                prodId, nombre: prod.nombre, variante, entradas: increment(cant), ventas: increment(0), stock_actual: increment(cant)
            }, { merge: true });
            document.getElementById('inp-cantidad').value = "";
        };

        window.toggleDetalle = (id) => {
            const el = document.getElementById('det-' + id);
            el.classList.toggle('active');
        };

        function renderizarInventario() {
            const container = document.getElementById('displayStock');
            container.innerHTML = '';
            const grupos = {};
            
            Object.values(stockData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { nombre: item.nombre, subitems: [] };
                grupos[item.prodId].subitems.push(item);
            });

            for (let id in grupos) {
                const g = grupos[id];
                const totalStock = g.subitems.reduce((acc, s) => acc + (s.stock_actual || 0), 0);
                
                container.innerHTML += `
                    <div class="card-master">
                        <button onclick="toggleDetalle('${id}')" class="w-full flex justify-between items-center p-5 bg-[#111] active:bg-[#1a1a1a]">
                            <div class="text-left">
                                <h3 class="text-xs font-black uppercase text-white">${g.nombre}</h3>
                                <span class="text-[8px] text-gold font-bold uppercase tracking-widest">${g.subitems.length} Fragancias registradas</span>
                            </div>
                            <div class="text-right">
                                <div class="text-white font-black text-lg">${totalStock}</div>
                                <div class="label-stat">Total Stock</div>
                            </div>
                        </button>
                        <div id="det-${id}" class="detalle-variante border-t border-white/5 bg-black/40">
                            ${g.subitems.map(s => `
                                <div class="p-4 border-b border-white/5 last:border-0">
                                    <div class="text-[10px] font-black text-gray-300 uppercase mb-3 flex items-center gap-2">
                                        <i class="fas fa-tag text-[8px] text-gold"></i> ${s.variante}
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <div class="bg-blue-900/20 p-2 rounded-lg text-center border border-blue-900/30">
                                            <div class="label-stat text-blue-400">Entraron</div>
                                            <div class="stat-number text-blue-100">${s.entradas || 0}</div>
                                        </div>
                                        <div class="bg-red-900/20 p-2 rounded-lg text-center border border-red-900/30">
                                            <div class="label-stat text-red-400">Ventas</div>
                                            <div class="stat-number text-red-100">${s.ventas || 0}</div>
                                        </div>
                                        <div class="bg-gold-soft p-2 rounded-lg text-center border border-gold/30">
                                            <div class="label-stat text-gold">Quedan</div>
                                            <div class="stat-number text-gold">${s.stock_actual || 0}</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>

```
