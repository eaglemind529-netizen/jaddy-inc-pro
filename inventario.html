```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; }
        .input-field:focus { border-color: var(--gold); outline: none; }
        .card-stat { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 16px; margin-bottom: 15px; }
        .stat-number { font-size: 18px; font-weight: 900; color: var(--gold); }
        .label-stat { font-size: 9px; text-transform: uppercase; color: #555; letter-spacing: 1px; font-weight: 800; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</a>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600"></div>
    </header>

    <!-- Panel de Carga (Compras) -->
    <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6" style="color:var(--gold)">Registrar Entrada de Mercancía</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-[9px] font-bold text-gray-500 uppercase ml-2 mb-1 block">Producto Maestro</label>
                <select id="sel-producto" class="input-field font-bold uppercase"></select>
            </div>

            <div>
                <label class="text-[9px] font-bold text-gray-500 uppercase ml-2 mb-1 block">Variante / Fragancia</label>
                <select id="sel-variante" class="input-field font-bold uppercase">
                    <option value="">Selecciona Producto Primero</option>
                </select>
            </div>
            
            <div>
                <label class="text-[9px] font-bold text-gray-500 uppercase ml-2 mb-1 block">Cantidad a Ingresar</label>
                <input type="number" id="inp-cantidad" placeholder="0" class="input-field font-black text-xl text-center">
            </div>

            <button onclick="registrarEntrada()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                Guardar en Stock
            </button>
        </div>
    </section>

    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2">Estado Real del Inventario</h2>
    <div id="displayStock" class="space-y-4"></div>

    <script type="module">
        import { conectarCerebro, obtenerProductos, auth, onAuthStateChanged } from './conexion.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const db = getFirestore();
        const appId = "jaddy-inc-inventario";
        const statusDot = document.getElementById('statusDot');
        
        let productosMaestros = [];
        let stockData = {};

        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.classList.replace('bg-red-600', 'bg-green-500');
                
                // 1. Cargar Productos Maestros
                obtenerProductos((lista) => {
                    productosMaestros = lista;
                    const sel = document.getElementById('sel-producto');
                    sel.innerHTML = '<option value="">-- SELECCIONAR --</option>' + 
                        lista.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
                });

                // 2. Escuchar Inventario (Entradas, Ventas, Stock)
                const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventario_master');
                onSnapshot(invRef, (snap) => {
                    stockData = {};
                    snap.docs.forEach(d => stockData[d.id] = d.data());
                    renderizarInventario();
                });
            }
        });

        // Actualizar variantes al cambiar producto
        document.getElementById('sel-producto').onchange = (e) => {
            const prod = productosMaestros.find(p => p.id === e.target.value);
            const selVar = document.getElementById('sel-variante');
            if (prod && prod.variantes && prod.variantes.length > 0) {
                selVar.innerHTML = prod.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                selVar.innerHTML = '<option value="GENERAL">SIN VARIANTES</option>';
            }
        };

        window.registrarEntrada = async () => {
            const prodId = document.getElementById('sel-producto').value;
            const variante = document.getElementById('sel-variante').value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);

            if (!prodId || !variante || isNaN(cant) || cant <= 0) return;

            const prod = productosMaestros.find(p => p.id === prodId);
            const docId = `${prodId}_${variante}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventario_master', docId);

            await setDoc(docRef, {
                prodId,
                nombre: prod.nombre,
                codigo: prod.codigo,
                variante,
                entradas: increment(cant),
                ventas: increment(0), // Inicializamos ventas en 0 si no existe
                stock_actual: increment(cant),
                actualizado: new Date().getTime()
            }, { merge: true });

            document.getElementById('inp-cantidad').value = "";
        };

        function renderizarInventario() {
            const container = document.getElementById('displayStock');
            container.innerHTML = '';

            // Agrupar por producto principal
            const grupos = {};
            Object.values(stockData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { nombre: item.nombre, codigo: item.codigo, subitems: [] };
                grupos[item.prodId].subitems.push(item);
            });

            for (let id in grupos) {
                const g = grupos[id];
                container.innerHTML += `
                    <div class="card-stat">
                        <div class="flex justify-between items-start mb-4 border-b border-white/5 pb-2">
                            <div>
                                <h3 class="text-xs font-black uppercase text-white">${g.nombre}</h3>
                                <span class="text-[8px] text-gold font-bold tracking-widest">${g.codigo}</span>
                            </div>
                        </div>
                        
                        <div class="space-y-3">
                            ${g.subitems.map(s => `
                                <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                                    <div class="text-[10px] font-black text-gray-400 uppercase mb-2">${s.variante}</div>
                                    <div class="grid grid-cols-3 gap-2 text-center">
                                        <div>
                                            <div class="stat-number text-blue-400">${s.entradas || 0}</div>
                                            <div class="label-stat">Entradas</div>
                                        </div>
                                        <div>
                                            <div class="stat-number text-red-500">${s.ventas || 0}</div>
                                            <div class="label-stat">Ventas</div>
                                        </div>
                                        <div class="bg-gold/10 rounded-lg p-1">
                                            <div class="stat-number" style="color:var(--gold)">${s.stock_actual || 0}</div>
                                            <div class="label-stat" style="color:var(--gold)">Quedan</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
