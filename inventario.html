
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Detallado | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .card-master { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; margin-bottom: 12px; overflow: hidden; transition: all 0.3s; }
        .stat-number { font-size: 14px; font-weight: 900; }
        .label-stat { font-size: 7px; text-transform: uppercase; color: #555; font-weight: 800; letter-spacing: 1px; }
        .detalle-variante { display: none; max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .detalle-variante.active { display: block; max-height: 1000px; }
        .bg-gold-soft { background: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Inicio</button>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
    </header>

    <!-- Registro de Entrada de Mercancía -->
    <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
        <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6 italic">Entrada de Mercancía</h2>
        <div class="space-y-4">
            <!-- Se llena con productos de la DB -->
            <select id="sel-producto" class="input-field"></select>
            
            <!-- Se llena con variantes del producto seleccionado -->
            <select id="sel-variante" class="input-field">
                <option value="">Selecciona Variante</option>
            </select>
            
            <input type="number" id="inp-cantidad" placeholder="CANTIDAD A INGRESAR" class="input-field font-black text-xl text-center text-gold">
            
            <button id="btnGuardar" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                Actualizar Stock
            </button>
        </div>
    </section>

    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2">Control de Stock Maestro</h2>
    <div id="displayStock" class="space-y-4">
        <div class="text-center py-10 opacity-30 italic text-xs uppercase font-bold">Cargando inventario...</div>
    </div>

    <!-- CEREBRO FIREBASE INYECTADO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDot = document.getElementById('statusDot');
        const selProd = document.getElementById('sel-producto');
        const selVar = document.getElementById('sel-variante');
        
        let productosMaestros = [];
        let inventarioData = {};

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.style.backgroundColor = "#22c55e";
                statusDot.style.boxShadow = "0 0 10px rgba(34, 197, 94, 0.5)";
                escucharProductos();
                escucharInventario();
            }
        });

        // 1. Escuchar la lista de productos (de la otra página)
        function escucharProductos() {
            onSnapshot(query(collection(db, "productos")), (snap) => {
                productosMaestros = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                selProd.innerHTML = '<option value="">-- ELIGE PRODUCTO --</option>' + 
                    productosMaestros.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            });
        }

        // 2. Escuchar el inventario físico
        function escucharInventario() {
            onSnapshot(collection(db, "inventario_master"), (snap) => {
                inventarioData = {};
                snap.docs.forEach(d => inventarioData[d.id] = d.data());
                renderizarInventario();
            });
        }

        // 3. Cambiar variantes al elegir producto
        selProd.onchange = (e) => {
            const prod = productosMaestros.find(p => p.id === e.target.value);
            if (prod && prod.variantes && prod.variantes.length > 0) {
                selVar.innerHTML = prod.variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            } else {
                selVar.innerHTML = '<option value="GENERAL">SIN VARIANTES</option>';
            }
        };

        // 4. Guardar Entrada
        document.getElementById('btnGuardar').onclick = async () => {
            const prodId = selProd.value;
            const variante = selVar.value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);

            if (!prodId || !variante || isNaN(cant)) {
                alert("Completa todos los campos");
                return;
            }

            const prod = productosMaestros.find(p => p.id === prodId);
            const docId = `${prodId}_${variante.replace(/\s+/g, '_')}`;

            try {
                await setDoc(doc(db, "inventario_master", docId), {
                    prodId: prodId,
                    nombreProducto: prod.nombre,
                    variante: variante,
                    entradas: increment(cant),
                    ventas: increment(0),
                    stock: increment(cant)
                }, { merge: true });

                document.getElementById('inp-cantidad').value = "";
                alert("Stock actualizado con éxito");
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        // 5. Mostrar en pantalla
        window.toggleDetalle = (id) => {
            document.getElementById('det-' + id).classList.toggle('active');
        };

        function renderizarInventario() {
            const container = document.getElementById('displayStock');
            container.innerHTML = '';
            
            const grupos = {};
            Object.values(inventarioData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { nombre: item.nombreProducto, items: [] };
                grupos[item.prodId].items.push(item);
            });

            if (Object.keys(grupos).length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-20 text-xs font-black uppercase">Inventario vacío</div>';
                return;
            }

            for (let id in grupos) {
                const g = grupos[id];
                const totalStock = g.items.reduce((acc, s) => acc + (s.stock || 0), 0);
                const totalEntradas = g.items.reduce((acc, s) => acc + (s.entradas || 0), 0);
                const totalVentas = g.items.reduce((acc, s) => acc + (s.ventas || 0), 0);

                container.innerHTML += `
                    <div class="card-master">
                        <button onclick="toggleDetalle('${id}')" class="w-full flex justify-between items-center p-5 bg-[#0D0D0D] active:bg-[#151515]">
                            <div class="text-left">
                                <h3 class="text-xs font-black uppercase text-white tracking-tighter">${g.nombre}</h3>
                                <span class="text-[7px] text-gold font-bold uppercase tracking-widest">${g.items.length} Variantes en stock</span>
                            </div>
                            <div class="text-right">
                                <div class="text-white font-black text-lg leading-none">${totalStock}</div>
                                <div class="label-stat">Total Stock</div>
                            </div>
                        </button>
                        
                        <div id="det-${id}" class="detalle-variante bg-black/40 border-t border-white/5">
                            <div class="p-4 grid grid-cols-2 gap-4 border-b border-white/5 bg-white/5">
                                <div>
                                    <p class="label-stat">Total Entradas</p>
                                    <p class="text-[10px] font-black text-blue-400">${totalEntradas}</p>
                                </div>
                                <div class="text-right">
                                    <p class="label-stat">Total Ventas</p>
                                    <p class="text-[10px] font-black text-red-500">${totalVentas}</p>
                                </div>
                            </div>
                            
                            ${g.items.map(s => `
                                <div class="p-4 border-b border-white/5 last:border-0">
                                    <div class="text-[10px] font-black text-gray-300 uppercase mb-3 flex items-center gap-2">
                                        <i class="fas fa-tag text-[8px] text-gold"></i> ${s.variante}
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <div class="bg-blue-900/10 p-2 rounded-lg text-center border border-blue-900/20">
                                            <div class="label-stat text-blue-500">Entró</div>
                                            <div class="stat-number text-blue-100">${s.entradas || 0}</div>
                                        </div>
                                        <div class="bg-red-900/10 p-2 rounded-lg text-center border border-red-900/20">
                                            <div class="label-stat text-red-500">Vendió</div>
                                            <div class="stat-number text-red-100">${s.ventas || 0}</div>
                                        </div>
                                        <div class="bg-gold-soft p-2 rounded-lg text-center border border-gold/30">
                                            <div class="label-stat text-gold">Queda</div>
                                            <div class="stat-number text-gold">${s.stock || 0}</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
