    <style>
        :root { --gold: #D4AF37; --bg: #050505; }

            position: fixed; inset: 0; background: #000; z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;

        .detalle-variante.active { display: block; max-height: 1000px; }
        
        /* Loader */

<body class="p-4 pb-24 max-w-md mx-auto">

    <!-- PROTECCIÓN DE DATOS: Solo desaparece con Login Real -->
    <div id="auth-guard">

        <p class="text-[10px] font-black tracking-[4px] text-gold uppercase animate-pulse">Verificando Credenciales...</p>

    <!-- INTERFAZ REAL: Oculta por defecto -->
    <main id="main-content">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Panel Ventas</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
        </header>

        <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
            <h2 class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6 italic">Ingreso de Mercancía</h2>
            <div class="space-y-4">
                <!-- SELECT DE PRODUCTOS CONECTADO -->
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Producto Maestro:</p>
                    <select id="sel-producto" class="input-field border-gold/20">
                        <option value="">CARGANDO TUS PRODUCTOS...</option>
                    </select>
                </div>
                
                <!-- SELECT DE VARIANTES CONECTADO -->
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante / Talla:</p>
                    <select id="sel-variante" class="input-field">
                        <option value="">SELECCIONA VARIANTE</option>
                    </select>
                </div>
                
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Cantidad a sumar:</p>
                    <input type="number" id="inp-cantidad" placeholder="0" class="input-field font-black text-xl text-center text-gold">
                </div>
                
                <button id="btnGuardar" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">

                </button>

        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] mb-4 ml-2 italic">Inventario en tu Nube</h2>
        <div id="displayStock" class="space-y-4">
            <div class="text-center py-10 opacity-30 italic text-xs uppercase font-bold">Consultando base de datos...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authGuard = document.getElementById('auth-guard');
        const mainContent = document.getElementById('main-content');
        const selProd = document.getElementById('sel-producto');
        const selVar = document.getElementById('sel-variante');
        const btnGuardar = document.getElementById('btnGuardar');
        const displayStock = document.getElementById('displayStock');
        
        let productosMaestros = [];
        let inventarioData = {};
        let userId = null;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                authGuard.style.opacity = "0";
                setTimeout(() => {
                    authGuard.style.display = "none";
                    mainContent.classList.add('authorized');
                }, 500);
                vincularBaseDeDatos(user.uid);
            }
        });

        function vincularBaseDeDatos(uid) {
            // CONEXIÓN REAL A PRODUCTOS: Trae lo que creaste en el otro archivo
            onSnapshot(query(collection(db, 'users', uid, 'productos'), orderBy("nombre", "asc")), (snap) => {
                productosMaestros = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                if (productosMaestros.length === 0) {
                    selProd.innerHTML = '<option value="">NO TIENES PRODUCTOS CREADOS</option>';
                } else {
                    selProd.innerHTML = '<option value="">-- SELECCIONA PRODUCTO --</option>' + 
                        productosMaestros.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()}</option>`).join('');
                }
            });

            // CONEXIÓN REAL A INVENTARIO
            onSnapshot(collection(db, 'users', uid, 'inventario_master'), (snap) => {
                inventarioData = {};
                snap.docs.forEach(d => { inventarioData[d.id] = d.data(); });
                renderizarTabla();
            });
        }

        // Al cambiar de producto, cargamos sus variantes reales
        selProd.onchange = (e) => {
            const prod = productosMaestros.find(p => p.id === e.target.value);
            if (prod && prod.variantes && prod.variantes.length > 0) {
                selVar.innerHTML = prod.variantes.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
            } else {
                selVar.innerHTML = '<option value="GENERAL">ESTANDAR (SIN VARIANTES)</option>';
            }
        };

        btnGuardar.onclick = async () => {
            const prodId = selProd.value;
            const variante = selVar.value;
            const cant = parseInt(document.getElementById('inp-cantidad').value);

            if (!userId || !prodId || isNaN(cant) || cant <= 0) {
                alert("Verifica el producto y la cantidad");
                return;
            }

            const prod = productosMaestros.find(p => p.id === prodId);
            const docId = `${prodId}_${variante.replace(/\s+/g, '_')}`;

            try {
                btnGuardar.innerText = "SINCRONIZANDO...";
                btnGuardar.disabled = true;

                // GUARDADO EN TU RUTA PRIVADA
                await setDoc(doc(db, 'users', userId, 'inventario_master', docId), {
                    prodId, variante,
                    nombreProducto: prod.nombre,
                    entradas: increment(cant),
                    ventas: increment(0),
                    stock: increment(cant),
                    lastUpdate: Date.now()
                }, { merge: true });

                document.getElementById('inp-cantidad').value = "";
                btnGuardar.innerText = "¡SINCRONIZADO!";
                setTimeout(() => { 
                    btnGuardar.disabled = false; 
                    btnGuardar.innerText = "REGISTRAR ENTRADA"; 
                }, 1000);
            } catch (e) {
                console.error(e);
                alert("Error al guardar en la nube");
                btnGuardar.disabled = false;
            }
        };

        window.toggleDetalle = (id) => document.getElementById('det-' + id).classList.toggle('active');

        function renderizarTabla() {
            displayStock.innerHTML = '';
            const grupos = {};
            Object.values(inventarioData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { nombre: item.nombreProducto, items: [] };
                grupos[item.prodId].items.push(item);
            });

            if (Object.keys(grupos).length === 0) {
                displayStock.innerHTML = '<div class="text-center py-10 opacity-20 text-[10px] font-black uppercase">No hay stock en tu base de datos</div>';
                return;
            }

            for (let id in grupos) {
                const g = grupos[id];
                const total = g.items.reduce((acc, s) => acc + (s.stock || 0), 0);
                displayStock.innerHTML += `
                    <div class="card-master">
                        <button onclick="toggleDetalle('${id}')" class="w-full flex justify-between items-center p-5 bg-[#0D0D0D] active:bg-[#151515]">
                            <div class="text-left">
                                <h3 class="text-xs font-black uppercase text-white">${g.nombre}</h3>
                                <span class="text-[7px] text-gold font-bold uppercase tracking-widest">${g.items.length} VARIANTES ACTIVAS</span>
                            </div>
                            <div class="text-right">
                                <div class="text-white font-black text-lg leading-none">${total}</div>
                                <div class="label-stat">Existencia</div>
                            </div>
                        </button>
                        <div id="det-${id}" class="detalle-variante bg-black/40 border-t border-white/5">
                            ${g.items.map(s => `
                                <div class="p-4 border-b border-white/5 last:border-0 flex justify-between items-center">
                                    <span class="text-[10px] font-black text-gray-300 uppercase">${s.variante}</span>
                                    <div class="flex gap-4">
                                        <div class="text-center"><p class="label-stat">In</p><p class="text-[10px] font-bold text-blue-400">${s.entradas}</p></div>
                                        <div class="text-center"><p class="label-stat">Stock</p><p class="text-[10px] font-black text-gold">${s.stock}</p></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
