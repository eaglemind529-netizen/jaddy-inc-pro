```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JADDY INC - CONTROL DE ENTRADAS</title>
    <style>
        :root {
            --dorado: #D4AF37;
            --negro: #0a0a0a;
            --gris-oscuro: #121212;
            --gris-claro: #1e1e1e;
        }

        body {
            background-color: var(--negro);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--dorado);
            padding-bottom: 10px;
        }

        .btn-volver {
            color: var(--dorado);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid var(--dorado);
            padding: 6px 12px;
            border-radius: 5px;
        }

        /* --- FORMULARIO DE ENTRADA --- */
        .panel-registro {
            background-color: var(--gris-oscuro);
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .seccion-titulo {
            color: var(--dorado);
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .campo { margin-bottom: 15px; }

        label {
            display: block;
            color: var(--dorado);
            font-size: 11px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            appearance: none; /* Quita estilo nativo en iOS */
        }

        input:focus { border-color: var(--dorado); outline: none; }

        .btn-guardar {
            width: 100%;
            background: var(--dorado);
            color: black;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- LISTADO DE STOCK --- */
        .contenedor-lista { width: 100%; max-width: 500px; }

        .producto-card {
            background: var(--gris-claro);
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
        }

        .card-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info h3 {
            margin: 0;
            color: var(--dorado);
            font-size: 17px;
            text-transform: uppercase;
        }

        .card-info span {
            color: #777;
            font-size: 11px;
        }

        .badge-total {
            background: var(--dorado);
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        /* --- VARIANTES INTERNAS --- */
        .variantes-lista {
            background: rgba(0,0,0,0.3);
            padding: 0 15px;
            border-top: 1px solid #222;
        }

        .variante-item {
            padding: 15px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .variante-item:last-child { border-bottom: none; }

        .v-nombre {
            font-weight: bold;
            font-size: 15px;
            display: block;
        }

        .v-fecha {
            font-size: 10px;
            color: #555;
            display: block;
            margin-top: 4px;
        }

        .v-stock {
            color: var(--dorado);
            font-size: 20px;
            font-weight: bold;
            margin-right: 15px;
        }

        .btn-vender {
            background: #8b0000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-volver">← VOLVER</a>
        <span style="color:var(--dorado); font-weight:bold; letter-spacing:1px;">JADDY INC.</span>
    </div>

    <div class="panel-registro">
        <div class="seccion-titulo">Cargar Mercancía</div>
        
        <div class="campo">
            <label>Seleccionar Producto</label>
            <select id="sel-producto">
                <option value="">-- ¿Qué producto entró? --</option>
                <!-- Aquí puedes añadir o quitar los productos base que manejas -->
                <option value="GENÉRICO-PERFUME 30ML-UDS">PERFUMES 30ML</option>
                <option value="GENÉRICO-PERFUME 100ML-UDS">PERFUMES 100ML</option>
                <option value="JADDY-JABÓN ARTESANAL-UDS">JABONES JADDY</option>
                <option value="GRANJA-POLLO ENTERO-KG">POLLO (POR KG)</option>
            </select>
        </div>

        <div class="campo">
            <label>Variante (Fragancia / Sabor / Otros)</label>
            <input type="text" id="inp-variante" placeholder="Ej: Bad Boy, Fresa, etc.">
        </div>
        
        <div class="campo">
            <label>Cantidad Ingresada</label>
            <input type="number" id="inp-cantidad" placeholder="0">
        </div>

        <button class="btn-guardar" onclick="registrar()">REGISTRAR ENTRADA</button>
    </div>

    <div class="contenedor-lista" id="lista-inventario"></div>

    <script>
        // Memoria de Stock
        let inventario = JSON.parse(localStorage.getItem('jaddy_stock_v3')) || {};

        function registrar() {
            const selectVal = document.getElementById('sel-producto').value;
            const variante = document.getElementById('inp-variante').value.trim().toUpperCase();
            const cantidad = parseInt(document.getElementById('inp-cantidad').value);
            
            // Fecha y Hora actual (Venezuela)
            const ahora = new Date().toLocaleString('es-VE', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            if(!selectVal) return alert("Selecciona un producto.");
            if(!variante || isNaN(cantidad) || cantidad <= 0) return alert("Pon variante y cantidad.");

            if(!inventario[selectVal]) {
                const partes = selectVal.split('-');
                inventario[selectVal] = {
                    marca: partes[0],
                    nombre: partes[1],
                    medida: partes[2],
                    items: {}
                };
            }

            // Si ya existe la variante, sumamos. Si no, creamos.
            if(!inventario[selectVal].items[variante]) {
                inventario[selectVal].items[variante] = { stock: 0, fecha: "" };
            }

            inventario[selectVal].items[variante].stock += cantidad;
            inventario[selectVal].items[variante].fecha = ahora;

            // Guardar en el teléfono
            localStorage.setItem('jaddy_stock_v3', JSON.stringify(inventario));
            
            // Limpiar campos
            document.getElementById('inp-variante').value = "";
            document.getElementById('inp-cantidad').value = "";
            
            render();
        }

        function vender(prodID, varName) {
            if(inventario[prodID].items[varName].stock > 0) {
                inventario[prodID].items[varName].stock--;
                localStorage.setItem('jaddy_stock_v3', JSON.stringify(inventario));
                render();
            }
        }

        function render() {
            const container = document.getElementById('lista-inventario');
            container.innerHTML = '';

            for(let id in inventario) {
                const prod = inventario[id];
                let totalGrupo = 0;
                let itemsHtml = '';

                for(let vName in prod.items) {
                    const item = prod.items[vName];
                    totalGrupo += item.stock;
                    itemsHtml += `
                        <div class="variante-item">
                            <div>
                                <span class="v-nombre">${vName}</span>
                                <span class="v-fecha">Última carga: ${item.fecha}</span>
                            </div>
                            <div style="display:flex; align-items:center;">
                                <span class="v-stock">${item.stock}</span>
                                <button class="btn-vender" onclick="vender('${id}','${vName}')">VENTA</button>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="producto-card">
                        <div class="card-header">
                            <div class="card-info">
                                <h3>${prod.marca} ${prod.nombre}</h3>
                                <span>${prod.medida}</span>
                            </div>
                            <div class="badge-total">TOTAL: ${totalGrupo}</div>
                        </div>
                        <div class="variantes-lista">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }
        }

        // Cargar al abrir
        render();
    </script>
</body>
</html>
