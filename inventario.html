```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Real | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #auth-guard { 
            position: fixed; inset: 0; background: #000; z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #main-content { opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
        #main-content.authorized { opacity: 1; pointer-events: auto; }

        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; outline: none; }
        .card-master { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; margin-bottom: 12px; overflow: hidden; }
        .label-stat { font-size: 7px; text-transform: uppercase; color: #555; font-weight: 800; letter-spacing: 1px; }
        .detalle-variante { display: none; max-height: 0; overflow: hidden; }
        .detalle-variante.active { display: block; max-height: 2000px; }
        
        .editing-mode { border-color: #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .loader { width: 40px; height: 40px; border: 3px solid #111; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <div id="auth-guard">
        <div class="loader mb-4"></div>
        <p class="text-[10px] font-black tracking-[4px] text-gold uppercase animate-pulse">Sincronizando con Usuarios...</p>
    </div>

    <main id="main-content">
        <header class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Panel Ventas</button>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
        </header>

        <section id="form-container" class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl transition-all">
            <h2 id="form-title" class="text-center text-gold font-black uppercase text-[10px] tracking-[3px] mb-6 italic">Ingreso de Mercancía</h2>
            <div class="space-y-4">
                
                <input type="hidden" id="edit-id" value="">

                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Producto Maestro:</p>
                    <select id="sel-producto" class="input-field border-gold/20">
                        <option value="">CARGANDO PRODUCTOS...</option>
                    </select>
                </div>
                
                <div class="relative">
                    <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante / Talla:</p>
                    <select id="sel-variante" class="input-field border-white/10">
                        <option value="GENERAL">SELECCIONE PRODUCTO PRIMERO</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Fecha Ingreso:</p>
                        <input type="date" id="inp-fecha" class="input-field text-xs">
                    </div>
                    <div class="relative">
                        <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Cantidad:</p>
                        <input type="number" id="inp-cantidad" placeholder="0" class="input-field font-black text-xl text-center text-gold">
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="btn-cancelar" onclick="cancelarEdicion()" class="hidden flex-1 bg-zinc-800 text-white font-black py-4 rounded-xl uppercase text-[10px]">Cancelar</button>
                    <button id="btnGuardar" class="flex-[2] bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                        REGISTRAR ENTRADA
                    </button>
                </div>
            </div>
        </section>

        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[2px] italic">Stock en Tiempo Real</h2>
            <div class="text-[8px] font-black text-gold border border-gold/20 px-2 py-1 rounded">ACTUALIZADO</div>
        </div>
        
        <div id="displayStock" class="space-y-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, increment, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authGuard = document.getElementById('auth-guard');
        const mainContent = document.getElementById('main-content');
        const selProd = document.getElementById('sel-producto');
        const selVar = document.getElementById('sel-variante');
        const inpFecha = document.getElementById('inp-fecha');
        const btnGuardar = document.getElementById('btnGuardar');
        const displayStock = document.getElementById('displayStock');
        
        inpFecha.valueAsDate = new Date();

        let productosMaestros = [];
        let inventarioData = {};
        let userId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                userId = user.uid;
                authGuard.style.opacity = "0";
                setTimeout(() => {
                    authGuard.style.display = "none";
                    mainContent.classList.add('authorized');
                }, 500);
                vincularBaseDeDatos(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function vincularBaseDeDatos(uid) {
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), (snap) => {
                productosMaestros = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                if (productosMaestros.length === 0) {
                    selProd.innerHTML = '<option value="">SIN PRODUCTOS REGISTRADOS</option>';
                } else {
                    const currentVal = selProd.value;
                    selProd.innerHTML = '<option value="">-- SELECCIONA PRODUCTO --</option>' + 
                        productosMaestros.map(p => `<option value="${p.id}">${p.nombre.toUpperCase()} (${p.codigo})</option>`).join('');
                    if(currentVal) {
                        selProd.value = currentVal;
                    }
                }
            });

            onSnapshot(collection(db, 'usuarios', uid, 'inventario_master'), (snap) => {
                inventarioData = {};
                snap.docs.forEach(d => { inventarioData[d.id] = { id_doc: d.id, ...d.data() }; });
                renderizarTabla();
            });
        }

        selProd.onchange = () => {
            const pId = selProd.value;
            if (!pId) {
                selVar.innerHTML = '<option value="GENERAL">SELECCIONE PRODUCTO PRIMERO</option>';
                return;
            }
            const producto = productosMaestros.find(p => p.id === pId);
            if (!producto) return;

            const variantes = producto.variantes || [];
            if (variantes.length === 0) {
                selVar.innerHTML = '<option value="GENERAL">GENERAL / ÚNICA</option>';
            } else {
                selVar.innerHTML = variantes.map(v => `<option value="${v}">${v}</option>`).join('');
            }
        };

        btnGuardar.onclick = async () => {
            const prodId = selProd.value;
            const variante = selVar.value;
            const fecha = inpFecha.value;
            const cantInput = document.getElementById('inp-cantidad');
            const cant = parseInt(cantInput.value);
            const editId = document.getElementById('edit-id').value;

            if (!userId || !prodId || isNaN(cant) || cant < 0 || !fecha || !variante) {
                alert("Complete los datos correctamente");
                return;
            }

            const prod = productosMaestros.find(p => p.id === prodId);
            const docId = editId || `${prodId}_${variante.replace(/\s+/g, '_')}`;

            try {
                btnGuardar.disabled = true;
                btnGuardar.innerText = "PROCESANDO...";

                if (editId) {
                    await updateDoc(doc(db, 'usuarios', userId, 'inventario_master', docId), {
                        entradas: cant,
                        stock: cant - (inventarioData[docId]?.ventas || 0),
                        ultimaFechaIngreso: fecha,
                        lastUpdate: Date.now()
                    });
                } else {
                    await setDoc(doc(db, 'usuarios', userId, 'inventario_master', docId), {
                        prodId, variante,
                        nombreProducto: prod.nombre,
                        codigo: prod.codigo,
                        entradas: increment(cant),
                        ventas: increment(0),
                        stock: increment(cant),
                        ultimaFechaIngreso: fecha,
                        lastUpdate: Date.now()
                    }, { merge: true });
                }

                cancelarEdicion();
                btnGuardar.innerText = "¡ÉXITO!";
                setTimeout(() => { 
                    btnGuardar.disabled = false; 
                    btnGuardar.innerText = "REGISTRAR ENTRADA"; 
                }, 1000);
            } catch (e) {
                console.error(e);
                alert("Error al guardar");
                btnGuardar.disabled = false;
                btnGuardar.innerText = "ERROR";
            }
        };

        window.editarItem = (docId) => {
            const item = inventarioData[docId];
            if (!item) return;

            document.getElementById('edit-id').value = docId;
            document.getElementById('form-container').classList.add('editing-mode');
            document.getElementById('form-title').innerText = "Editando Stock";
            document.getElementById('btnGuardar').innerText = "ACTUALIZAR STOCK";
            document.getElementById('btn-cancelar').classList.remove('hidden');

            selProd.value = item.prodId;
            selProd.dispatchEvent(new Event('change'));
            selVar.value = item.variante;
            inpFecha.value = item.ultimaFechaIngreso;
            document.getElementById('inp-cantidad').value = item.entradas;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.borrarItem = async (docId) => {
            if (confirm("¿Eliminar este registro de inventario definitivamente?")) {
                try {
                    await deleteDoc(doc(db, 'usuarios', userId, 'inventario_master', docId));
                } catch (e) { alert("Error al borrar"); }
            }
        };

        window.cancelarEdicion = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-container').classList.remove('editing-mode');
            document.getElementById('form-title').innerText = "Ingreso de Mercancía";
            document.getElementById('btnGuardar').innerText = "REGISTRAR ENTRADA";
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('inp-cantidad').value = "";
            selProd.value = "";
            selVar.innerHTML = '<option value="GENERAL">SELECCIONE PRODUCTO PRIMERO</option>';
        };

        window.toggleDetalle = (id) => document.getElementById('det-' + id).classList.toggle('active');

        function renderizarTabla() {
            displayStock.innerHTML = '';
            const grupos = {};
            
            Object.values(inventarioData).forEach(item => {
                if (!grupos[item.prodId]) grupos[item.prodId] = { id: item.prodId, nombre: item.nombreProducto, codigo: item.codigo, items: [] };
                grupos[item.prodId].items.push(item);
            });

            if (Object.keys(grupos).length === 0) {
                displayStock.innerHTML = '<div class="text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-[4px]">Esperando registros...</div>';
                return;
            }

            for (let id in grupos) {
                const g = grupos[id];
                const totalStock = g.items.reduce((acc, s) => acc + (s.stock || 0), 0);
                const totalVentas = g.items.reduce((acc, s) => acc + (s.ventas || 0), 0);

                displayStock.innerHTML += `
                    <div class="card-master gold-border shadow-xl">
                        <button onclick="toggleDetalle('${id}')" class="w-full flex justify-between items-center p-5 bg-[#0D0D0D] active:bg-[#151515] transition-colors relative">
                            <div class="text-left z-10">
                                <span class="text-[7px] bg-gold/10 text-gold px-2 py-0.5 rounded border border-gold/20 font-bold uppercase tracking-widest">${g.codigo}</span>
                                <h3 class="text-sm font-black uppercase text-white mt-1.5 tracking-tight">${g.nombre}</h3>
                            </div>
                            <div class="text-right z-10">
                                <div class="text-white font-black text-2xl leading-none">${totalStock}</div>
                                <div class="label-stat opacity-40">EN STOCK</div>
                            </div>
                            <div class="absolute bottom-0 left-0 h-[2px] bg-green-500/30" style="width: ${Math.min(100, (totalVentas/(totalStock+totalVentas || 1))*100)}%"></div>
                        </button>
                        <div id="det-${id}" class="detalle-variante bg-black/60 border-t border-white/5">
                            ${g.items.map(s => `
                                <div class="p-4 border-b border-white/5 last:border-0 flex justify-between items-center">
                                    <div class="flex-1">
                                        <p class="text-[11px] font-black text-gold uppercase tracking-tighter">${s.variante}</p>
                                        <div class="flex gap-3 mt-1.5">
                                            <button onclick="editarItem('${s.id_doc}')" class="text-[8px] text-blue-400 font-black uppercase underline">Editar</button>
                                            <button onclick="borrarItem('${s.id_doc}')" class="text-[8px] text-red-500 font-black uppercase underline">Borrar</button>
                                        </div>
                                    </div>
                                    <div class="flex gap-4">
                                        <div class="text-center">
                                            <p class="label-stat">TOTAL</p>
                                            <p class="text-[10px] font-bold text-zinc-500">${s.entradas || 0}</p>
                                        </div>
                                        <!-- NUEVA COLUMNA DE VENTAS AGREGADA -->
                                        <div class="text-center">
                                            <p class="label-stat text-orange-500">VEND.</p>
                                            <p class="text-[10px] font-bold text-zinc-400">${s.ventas || 0}</p>
                                        </div>
                                        <div class="text-center bg-white/5 px-3 py-1 rounded-lg">
                                            <p class="label-stat text-green-500">DISP.</p>
                                            <p class="text-[12px] font-black text-white">${s.stock || 0}</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>

```
