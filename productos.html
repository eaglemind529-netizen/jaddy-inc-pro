<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy INC - FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-black text-white p-5">

    <div class="flex justify-between items-center mb-5">
        <h1 class="text-yellow-500 font-black">JADDY INC</h1>
        <div id="punto" class="w-3 h-3 bg-red-600 rounded-full"></div>
    </div>

    <div class="bg-gray-900 p-4 rounded-xl border border-yellow-900/30">
        <input type="text" id="n" placeholder="NOMBRE" class="w-full p-3 bg-black mb-2 rounded border border-gray-800">
        <input type="number" id="p" placeholder="PRECIO" class="w-full p-3 bg-black mb-4 rounded border border-gray-800">
        <button id="btn" class="w-full bg-yellow-600 p-4 rounded font-bold text-black">GUARDAR AHORA</button>
    </div>

    <div id="lista" class="mt-5 space-y-2"></div>

    <script>
        // TUS DATOS DIRECTOS
        const config = {
            apiKey: "AIzaSyCcAnybOnm9LOKgIAoykhFygp23jLyX9ZY",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        // INICIO FORZADO
        firebase.initializeApp(config);
        const db = firebase.firestore();

        firebase.auth().signInAnonymously().then(() => {
            document.getElementById('punto').className = "w-3 h-3 bg-green-500";
            
            // CARGAR
            db.collection('artifacts/jaddy-inc-inventario/public/data/productos_jaddy')
              .onSnapshot(snap => {
                  const lista = document.getElementById('lista');
                  lista.innerHTML = "";
                  snap.forEach(doc => {
                      const d = doc.data();
                      lista.innerHTML += `<div class="p-3 bg-gray-800 rounded uppercase text-xs font-bold">${d.nombre} - $${d.precio}</div>`;
                  });
              });
        });

        // GUARDAR
        document.getElementById('btn').onclick = () => {
            const n = document.getElementById('n').value;
            const p = document.getElementById('p').value;
            if(!n || !p) return alert("LLENA TODO");

            db.collection('artifacts/jaddy-inc-inventario/public/data/productos_jaddy').add({
                nombre: n.toUpperCase(),
                precio: p,
                fecha: Date.now()
            }).then(() => {
                document.getElementById('n').value = "";
                document.getElementById('p').value = "";
            });
        };
    </script>
</body>
</html>
