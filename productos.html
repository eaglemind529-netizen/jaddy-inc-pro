<!DOCTYPE html>

    <header class="flex justify-between items-center py-6 mb-4">

            <h1 class="text-2xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-gold">JADDY</span></h1>
            <p id="userEmail" class="text-[9px] text-gold font-bold uppercase tracking-widest opacity-60">Conectando...</p>

        <button onclick="cerrarSesion()" class="text-gray-600 hover:text-red-500 transition-colors"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <!-- Formulario de Registro -->
    <section class="bg-[#0A0A0A] p-6 rounded-[32px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="NOMBRE DEL PRODUCTO" class="col-span-2 input-field" required>

    <div class="flex justify-between items-center mb-6 px-2">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Inventario Real</h2>

    <div id="displayLista" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const blocker = document.getElementById('blocker');
        const userEmailLabel = document.getElementById('userEmail');
        const listaDiv = document.getElementById('displayLista');
        const form = document.getElementById('formProd');

        let currentUID = null;

        // 1. CONTROL DE ACCESO ESTRICTO
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                // Usuario con correo confirmado
                currentUID = user.uid;
                userEmailLabel.innerText = "ACCESO ELITE: " + user.email.toUpperCase();
                blocker.style.display = 'none'; // Quitamos el bloqueo
                iniciarSincronizacion(user.uid);
            } else {
                // Si no hay login real, lo mandamos al login.html
                window.location.href = 'login.html';
            }
        });

        // 2. FUNCIÓN DE CARGA REAL
        function iniciarSincronizacion(uid) {
            const q = collection(db, 'usuarios', uid, 'productos');
            
            onSnapshot(q, (snapshot) => {
                const productos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('contador').innerText = `${productos.length} PRODUCTOS`;
                renderizar(productos);
            }, (error) => {
                console.error("Error en nube:", error);
            });
        }

        function renderizar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = `<div class="text-center py-20 opacity-20"><i class="fas fa-box-open text-4xl mb-4"></i><p class="text-xs font-bold uppercase tracking-widest">Nube Vacía</p></div>`;
                return;
            }
            listaDiv.innerHTML = productos.sort((a,b) => b.creado - a.creado).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[9px] font-black text-gold bg-gold/10 px-2 py-0.5 rounded">${p.codigo}</span>
                            <h3 class="text-lg font-black uppercase text-white mt-1">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 font-bold uppercase">Precio Detal</p>
                            <p class="text-xl font-black text-green-400">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end border-t border-white/5 pt-4">
                        <div class="flex gap-6">
                            <div>
                                <p class="text-[8px] text-gray-600 font-bold uppercase">Costo</p>
                                <p class="text-xs font-bold text-white">$${(p.costo || 0).toLocaleString()}</p>
                            </div>
                            <div>
                                <p class="text-[8px] text-gray-600 font-bold uppercase">Mayor</p>
                                <p class="text-xs font-bold text-gold">$${(p.precio_mayor || 0).toLocaleString()}</p>
                            </div>
                        </div>
                        <button onclick="borrarProducto('${p.id}')" class="text-red-500/30 hover:text-red-500 p-2 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 3. GUARDADO SEGURO
        form.onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUID) return;

            const btn = document.getElementById('btnEnvio');
            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO...";

            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                creado: Date.now()
            };

            try {
                await addDoc(collection(db, 'usuarios', currentUID, 'productos'), datos);
                form.reset();
            } catch (err) {
                alert("Error al guardar en Google: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en la Nube";
            }
        };

        window.borrarProducto = async (id) => {
            if (confirm("¿Borrar de la nube?")) {
                await deleteDoc(doc(db, 'usuarios', currentUID, 'productos', id));
            }
        };

        window.cerrarSesion = () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        };
    </script>
</body>
</html>
