```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas CRM | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; font-weight: bold; text-transform: uppercase; appearance: none; }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; border: 1px solid #222; color: #555; transition: 0.3s; background: transparent; }
        .tab-btn.active { background: white; color: black; border-color: white; }
        .sale-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 15px; margin-bottom: 12px; animation: fadeIn 0.4s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #statusDot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.5); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0A0A0A; border: 1px solid #333; border-radius: 24px; padding: 24px; width: 100%; max-width: 320px; text-align: center; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="text-[10px] font-black border border-gold/30 px-4 py-2 rounded-full text-gold uppercase">← Volver</button>
        <div id="statusDot" class="bg-red-500"></div>
    </header>

    <section id="form-container" class="bg-[#0A0A0A] p-5 rounded-[28px] gold-border mb-8 shadow-2xl">
        <h2 id="form-title" class="text-center text-gold font-black uppercase text-[10px] tracking-[4px] mb-6 italic">Panel de Despacho</h2>
        
        <div class="space-y-4">
            <input type="hidden" id="edit-id" value="">
            
            <div class="relative">
                <p class="text-[7px] text-gold font-black absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Despachado por:</p>
                <select id="sel-vendedor" class="input-field border-gold/30 text-gold">
                    <option value="">-- ESPERANDO CONEXIÓN --</option>
                </select>
            </div>

            <div class="flex gap-2">
                <button id="btn-cli-reg" onclick="toggleCliente(true)" class="tab-btn active">Registrado</button>
                <button id="btn-cli-ocu" onclick="toggleCliente(false)" class="tab-btn">Ocasional</button>
            </div>
            
            <div id="area-cliente-reg">
                <select id="sel-cliente" class="input-field">
                    <option value="">-- CARGANDO CLIENTES --</option>
                </select>
            </div>
            
            <div id="area-cliente-ocu" class="hidden">
                <input type="text" id="inp-cliente-nom" placeholder="ESCRIBE EL NOMBRE" class="input-field">
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Producto en Inventario:</p>
                    <select id="sel-producto" class="input-field">
                        <option value="">-- SELECCIONAR PRODUCTO --</option>
                    </select>
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Variante / Fragancia:</p>
                    <select id="sel-variante" class="input-field border-gold/20 text-gold">
                        <option value="">-- ELIGE VARIANTE --</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTipo('CONTADO')" id="t-contado" class="tab-btn active">Detal</button>
                <button onclick="setTipo('CREDITO')" id="t-credito" class="tab-btn">Crédito</button>
                <button onclick="setTipo('MAYOR')" id="t-mayor" class="tab-btn">Mayor</button>
            </div>

            <div id="panel-credito" class="hidden space-y-3 p-4 bg-[#111] rounded-xl border border-gold/10">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <p class="text-[7px] mb-1 text-gray-500 uppercase">F. Entrega</p>
                        <input type="date" id="fecha-entrega" class="input-field py-2 text-xs">
                    </div>
                    <div>
                        <p class="text-[7px] mb-1 text-gray-500 uppercase">F. Cobro</p>
                        <input type="date" id="fecha-pago" class="input-field py-2 text-xs">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Cant:</p>
                    <input type="number" id="inp-cantidad" value="1" min="1" oninput="calcularTotal()" class="input-field text-center text-xl">
                </div>
                <div class="relative">
                    <p class="text-[7px] text-gray-500 absolute -top-2 left-3 bg-[#0A0A0A] px-2 uppercase z-10">Total:</p>
                    <input type="text" id="inp-precio" value="0.00" readonly class="input-field text-center text-xl text-green-400">
                </div>
            </div>

            <div class="flex gap-2">
                <button id="btn-cancel-edit" onclick="cancelarEdicion()" class="hidden flex-1 bg-red-900/30 text-red-500 border border-red-500/30 font-black py-4 rounded-xl uppercase text-xs">Cancelar</button>
                <button id="btn-venta" onclick="registrarVenta()" class="flex-[2] bg-white text-black font-black py-5 rounded-xl uppercase text-sm">Procesar Venta</button>
            </div>
        </div>
    </section>

    <div id="listaVentas" class="space-y-3 pb-10 text-center">
        <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest py-10">Conectando con la nube...</p>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-white font-black uppercase text-sm mb-4">¿Eliminar Venta?</h3>
            <div class="flex gap-2">
                <button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl border border-gray-700 text-gray-400 text-[10px] font-black uppercase">No</button>
                <button id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl bg-red-600 text-white text-[10px] font-black uppercase">Sí, eliminar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "jaddy-inc-finanzas"; 

        let productosGlobal = [];
        let pSeleccionado = null;
        let tipoVenta = 'CONTADO';
        let ventasActuales = [];
        let userId = null;

        // SISTEMA DE AUTENTICACIÓN MEJORADO
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if(user) {
                userId = user.uid;
                document.getElementById('statusDot').className = "bg-green-500 w-3 h-3 rounded-full shadow-[0_0_15px_#00ff00]";
                cargarDatos(user.uid);
            } else {
                document.getElementById('statusDot').className = "bg-red-500 w-3 h-3 rounded-full";
            }
        });

        function cargarDatos(uid) {
            // Vendedores (Privado)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, "vendedores"), (snap) => {
                const data = snap.docs.map(d => d.data());
                const sel = document.getElementById('sel-vendedor');
                sel.innerHTML = '<option value="">-- ELIGE VENDEDOR --</option>' + 
                    data.map(v => `<option value="${v.nombre}">${v.nombre.toUpperCase()}</option>`).join('');
            }, (err) => console.log("Sin acceso a vendedores"));

            // Clientes (Privado)
            onSnapshot(collection(db, 'artifacts', appId, 'users', uid, "clientes"), (snap) => {
                const data = snap.docs.map(d => d.data());
                document.getElementById('sel-cliente').innerHTML = '<option value="">-- ELEGIR CLIENTE --</option>' + 
                    data.map(c => `<option value="${c.nombre}">${c.nombre.toUpperCase()}</option>`).join('');
            }, (err) => console.log("Sin acceso a clientes"));

            // PRODUCTOS (Sincronizado con productos.html)
            const qProd = collection(db, 'artifacts', appId, 'users', uid, 'productos');
            onSnapshot(qProd, (snap) => {
                productosGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('sel-producto').innerHTML = '<option value="">-- SELECCIONAR PRODUCTO --</option>' + 
                    productosGlobal.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            }, (err) => {
                document.getElementById('listaVentas').innerHTML = `<p class="text-red-500 text-[10px] font-bold">ERROR DE PERMISOS EN NUBE</p>`;
            });

            // Ventas Realizadas (Privado)
            const qVentas = collection(db, 'artifacts', appId, 'users', uid, "ventas_realizadas");
            onSnapshot(qVentas, (snap) => {
                ventasActuales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // Ordenar localmente por tiempo (Regla 2: No usar orderBy en servidor sin índices)
                ventasActuales.sort((a, b) => b.timestamp - a.timestamp);
                renderVentas(ventasActuales);
            }, (err) => console.log("Error cargando ventas"));
        }

        document.getElementById('sel-producto').onchange = (e) => {
            pSeleccionado = productosGlobal.find(x => x.id === e.target.value);
            actualizarVariantes(); 
            calcularTotal(); 
        };

        function actualizarVariantes(val = null) {
            const selVar = document.getElementById('sel-variante');
            if (pSeleccionado) {
                const lista = pSeleccionado.variantes || [];
                if (lista.length > 0) {
                    selVar.innerHTML = lista.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
                } else {
                    selVar.innerHTML = '<option value="ÚNICA">-- SIN VARIANTES --</option>';
                }
                if(val) selVar.value = val;
            } else {
                selVar.innerHTML = '<option value="">-- ELIGE VARIANTE --</option>';
            }
        }

        window.toggleCliente = (reg) => {
            document.getElementById('btn-cli-reg').classList.toggle('active', reg);
            document.getElementById('btn-cli-ocu').classList.toggle('active', !reg);
            document.getElementById('area-cliente-reg').classList.toggle('hidden', !reg);
            document.getElementById('area-cliente-ocu').classList.toggle('hidden', reg);
        };

        window.setTipo = (t) => {
            tipoVenta = t;
            ['contado', 'credito', 'mayor'].forEach(id => document.getElementById('t-'+id).classList.toggle('active', id === t.toLowerCase()));
            document.getElementById('panel-credito').classList.toggle('hidden', t !== 'CREDITO');
            calcularTotal();
        };

        window.calcularTotal = () => {
            const cant = parseInt(document.getElementById('inp-cantidad').value) || 0;
            if(!pSeleccionado) {
                document.getElementById('inp-precio').value = "0.00";
                return;
            }
            let precioUnitario = 0;
            if(tipoVenta === 'CONTADO') precioUnitario = pSeleccionado.precio_detal || 0;
            else if(tipoVenta === 'CREDITO') precioUnitario = pSeleccionado.precio_credito || 0;
            else if(tipoVenta === 'MAYOR') precioUnitario = pSeleccionado.precio_mayor || 0;

            document.getElementById('inp-precio').value = (precioUnitario * cant).toLocaleString('en-US', {minimumFractionDigits: 2});
        };

        window.registrarVenta = async () => {
            if(!userId) return alert("No hay conexión con la base de datos");
            const editId = document.getElementById('edit-id').value;
            const v = document.getElementById('sel-vendedor').value;
            const c = document.getElementById('btn-cli-reg').classList.contains('active') ? document.getElementById('sel-cliente').value : document.getElementById('inp-cliente-nom').value;
            const varElegida = document.getElementById('sel-variante').value;

            if(!v || !pSeleccionado || !c || !varElegida) return alert("Faltan datos por completar");

            const data = {
                vendedor: v,
                cliente: c.toUpperCase(),
                producto: pSeleccionado.nombre,
                productoId: pSeleccionado.id,
                variante: varElegida,
                cantidad: parseInt(document.getElementById('inp-cantidad').value),
                total: parseFloat(document.getElementById('inp-precio').value.replace(/,/g, '')),
                tipo: tipoVenta,
                timestamp: Date.now(),
                fecha_legible: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            try {
                const path = collection(db, 'artifacts', appId, 'users', userId, "ventas_realizadas");
                if(editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', userId, "ventas_realizadas", editId), data);
                    cancelarEdicion();
                } else {
                    await addDoc(path, data);
                }
                limpiar();
            } catch (e) { alert("Error al guardar en la nube"); }
        };

        window.iniciarEdicion = (id) => {
            const v = ventasActuales.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('btn-venta').innerText = "ACTUALIZAR";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            document.getElementById('sel-vendedor').value = v.vendedor;
            document.getElementById('sel-producto').value = v.productoId;
            pSeleccionado = productosGlobal.find(p => p.id === v.productoId);
            actualizarVariantes(v.variante);
            setTipo(v.tipo);
            document.getElementById('inp-cantidad').value = v.cantidad;
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.cancelarEdicion = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('btn-venta').innerText = "PROCESAR VENTA";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            limpiar();
        };

        window.pedirEliminar = (id) => {
            const modal = document.getElementById('confirmModal');
            modal.style.display = 'flex';
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, "ventas_realizadas", id));
                closeConfirm();
            };
        };

        window.closeConfirm = () => document.getElementById('confirmModal').style.display = 'none';

        function limpiar() {
            document.getElementById('sel-producto').value = "";
            document.getElementById('sel-variante').innerHTML = '<option value="">-- ELIGE VARIANTE --</option>';
            document.getElementById('inp-cliente-nom').value = "";
            document.getElementById('inp-cantidad').value = 1;
            document.getElementById('inp-precio').value = "0.00";
            pSeleccionado = null;
        }

        function renderVentas(ventas) {
            if(ventas.length === 0) {
                document.getElementById('listaVentas').innerHTML = '<p class="text-[10px] text-gray-700 py-10 font-bold uppercase">No hay ventas hoy</p>';
                return;
            }
            document.getElementById('listaVentas').innerHTML = ventas.map(v => `
                <div class="sale-card text-left">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[7px] text-gold uppercase font-black px-2 py-0.5 border border-gold/20 rounded">${v.tipo}</span>
                            <div class="text-[11px] font-black uppercase mt-1">${v.cliente}</div>
                            <div class="text-[8px] text-gray-500">${v.fecha_legible} ${v.hora}</div>
                        </div>
                        <div class="flex flex-col items-end">
                            <div class="flex gap-2 mb-1">
                                <button onclick="iniciarEdicion('${v.id}')" class="text-blue-500 text-xs"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="pedirEliminar('${v.id}')" class="text-red-500 text-xs"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <div class="text-green-400 font-black">$${v.total.toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="text-[9px] text-gray-400 mt-1 italic border-t border-white/5 pt-1">
                        ${v.producto} / ${v.variante} <span class="text-gold">(x${v.cantidad})</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
