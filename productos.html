```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #1a1a1a;
        }
        .bg-gold { background-color: var(--gold); }
        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
        }
        
        .modal {
            transition: opacity 0.25s ease;
            display: none;
        }
        .modal.active {
            display: flex;
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%);
        }

        .product-card {
            background: #1e1e1e;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }
        .product-card:active {
            transform: scale(0.97);
            border-color: var(--gold);
        }

        input {
            background: #2a2a2a !important;
            color: white !important;
            border: 1px solid #444 !important;
        }
        input:focus {
            border-color: var(--gold) !important;
            outline: none !important;
            border-width: 1px !important;
        }
        
        /* Skeleton loading animation */
        .skeleton {
            background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Encabezado Estilo Oro -->
    <header class="gold-gradient text-black p-5 shadow-2xl sticky top-0 z-10 rounded-b-3xl">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">JADDY INC</h1>
                <p class="text-[10px] uppercase tracking-widest font-bold opacity-80">Luxury Inventory</p>
            </div>
            <button onclick="abrirModalProducto()" class="bg-black text-white px-5 py-2 rounded-full font-bold shadow-lg flex items-center gap-2 text-sm active:scale-90 transition-transform">
                <i class="fas fa-plus-circle text-gold"></i> NUEVO
            </button>
        </div>
    </header>

    <!-- Buscador Elegante -->
    <div class="p-6 max-w-4xl mx-auto">
        <div class="relative">
            <input type="text" id="inputBusqueda" placeholder="Buscar fragancia o código..." class="w-full p-4 pl-12 rounded-2xl shadow-inner outline-none">
            <i class="fas fa-search absolute left-4 top-5 text-gold"></i>
        </div>
    </div>

    <!-- Lista de Productos -->
    <main id="listaProductos" class="p-4 grid grid-cols-1 sm:grid-cols-2 gap-5 max-w-4xl mx-auto">
        <!-- Los productos se cargarán dinámicamente aquí -->
        <div class="skeleton h-36 rounded-3xl opacity-20"></div>
        <div class="skeleton h-36 rounded-3xl opacity-20"></div>
    </main>

    <!-- MODAL: REGISTRO DE PRODUCTO -->
    <div id="modalProducto" class="modal fixed inset-0 bg-black bg-opacity-80 z-50 items-center justify-center p-4">
        <div class="bg-[#1a1a1a] border border-gold/30 w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-white/10 bg-black/50 flex justify-between items-center">
                <h2 class="font-bold text-gold tracking-wide uppercase text-sm">Registrar Producto</h2>
                <button onclick="cerrarModalProducto()" class="text-white bg-white/10 w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/20">&times;</button>
            </div>
            
            <form id="formProducto" class="p-6 overflow-y-auto space-y-6">
                <!-- Foto Placeholder -->
                <div class="text-center">
                    <div class="w-28 h-28 bg-black rounded-3xl mx-auto border-2 border-dashed border-gold/50 flex items-center justify-center relative overflow-hidden">
                        <i class="fas fa-camera text-gold/50 text-2xl"></i>
                    </div>
                    <p class="text-[10px] text-gold mt-2 font-bold uppercase tracking-widest">Imagen Estándar Jaddy</p>
                </div>

                <div class="space-y-4">
                    <div class="group">
                        <label class="block text-[10px] font-bold text-gold uppercase mb-1 ml-1">Nombre de Fragancia</label>
                        <input type="text" id="prodNombre" placeholder="Ej: Invictus - P.R." class="w-full p-3 rounded-xl outline-none" required>
                    </div>
                    <div class="group">
                        <label class="block text-[10px] font-bold text-gold uppercase mb-1 ml-1">Código / SKU</label>
                        <input type="text" id="prodCodigo" placeholder="Ej: P30-001" class="w-full p-3 rounded-xl outline-none">
                    </div>

                    <!-- Panel de Precios -->
                    <div class="bg-black p-5 rounded-3xl border border-gold/20 space-y-4">
                        <h4 class="text-gold text-xs font-black italic tracking-widest flex items-center gap-2 uppercase">
                            <i class="fas fa-coins text-[10px]"></i> Lista de Precios ($)
                        </h4>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold">Costo</label>
                                <input type="number" id="prodCosto" step="0.01" class="w-full p-3 rounded-xl text-center" placeholder="0.00">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold">Detal</label>
                                <input type="number" id="prodDetal" step="0.01" class="w-full p-3 rounded-xl text-center border-gold/30" placeholder="0.00">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold">Mayor</label>
                                <input type="number" id="prodMayor" step="0.01" class="w-full p-3 rounded-xl text-center" placeholder="0.00">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold">Crédito</label>
                                <input type="number" id="prodCredito" step="0.01" class="w-full p-3 rounded-xl text-center" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnGuardar" class="w-full gold-gradient text-black font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform uppercase tracking-tighter">
                    Guardar Producto
                </button>
            </form>
        </div>
    </div>

    <!-- Navegación Inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-md border-t border-white/5 flex justify-around p-4 text-gray-500 max-w-4xl mx-auto z-40 rounded-t-3xl">
        <a href="index.html" class="flex flex-col items-center">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[9px] mt-1 font-bold uppercase tracking-tighter">Menú</span>
        </a>
        <a href="productos.html" class="flex flex-col items-center text-gold">
            <div class="bg-gold/10 p-2 rounded-xl -mt-6 border border-gold/20 shadow-lg">
                <i class="fas fa-box-open text-xl"></i>
            </div>
            <span class="text-[9px] mt-1 font-bold uppercase">Productos</span>
        </a>
        <a href="inventario.html" class="flex flex-col items-center">
            <i class="fas fa-chart-line text-lg"></i>
            <span class="text-[9px] mt-1 font-bold uppercase tracking-tighter">Stock</span>
        </a>
    </nav>

    <script type="module">
        import { guardarProductoJaddy, obtenerCatalogoJaddy } from './conexion.js';

        let todosLosProductos = [];

        // 1. CARGA INICIAL Y ESCUCHA DE CAMBIOS
        obtenerCatalogoJaddy((productos) => {
            todosLosProductos = productos;
            renderizarLista(productos);
        });

        function renderizarLista(lista) {
            const contenedor = document.getElementById('listaProductos');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = `<div class="col-span-full text-center py-20 text-gray-600 uppercase text-xs font-bold tracking-widest">No hay productos registrados</div>`;
                return;
            }

            lista.forEach(p => {
                contenedor.innerHTML += `
                    <div class="product-card rounded-3xl overflow-hidden shadow-2xl">
                        <div class="flex">
                            <div class="w-28 h-32 bg-black relative">
                                <img src="https://via.placeholder.com/150/000000/D4AF37?text=Jaddy" class="w-full h-full object-cover opacity-60">
                                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                            </div>
                            <div class="p-4 flex-1 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start">
                                        <h3 class="font-bold text-white text-sm leading-tight uppercase">${p.nombre}</h3>
                                        <span class="text-[8px] text-gold border border-gold/50 px-1.5 rounded">${p.codigo || 'S/C'}</span>
                                    </div>
                                    <div class="flex items-center gap-2 mt-1">
                                        <div class="w-1.5 h-1.5 rounded-full ${p.stock > 0 ? 'bg-green-500' : 'bg-red-500'}"></div>
                                        <span class="text-[10px] text-gray-500 font-bold uppercase">${p.stock || 0} DISPONIBLES</span>
                                    </div>
                                </div>
                                
                                <div class="flex justify-between items-end mt-2">
                                    <div class="flex flex-col">
                                        <span class="text-[8px] text-gray-500 uppercase font-bold">Precio Detal</span>
                                        <span class="text-gold font-black text-md">${p.precioDetal || '0.00'}$</span>
                                    </div>
                                    <div class="flex flex-col items-end">
                                        <span class="text-[8px] text-gray-500 uppercase font-bold">Crédito</span>
                                        <span class="text-white font-bold text-xs">${p.precioCredito || '0.00'}$</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 2. BUSCADOR
        document.getElementById('inputBusqueda').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => 
                p.nombre.toLowerCase().includes(term) || 
                (p.codigo && p.codigo.toLowerCase().includes(term))
            );
            renderizarLista(filtrados);
        });

        // 3. GUARDAR PRODUCTO
        document.getElementById('formProducto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            
            const datos = {
                nombre: document.getElementById('prodNombre').value,
                codigo: document.getElementById('prodCodigo').value,
                costo: document.getElementById('prodCosto').value,
                precioDetal: document.getElementById('prodDetal').value,
                precioMayor: document.getElementById('prodMayor').value,
                precioCredito: document.getElementById('prodCredito').value,
                stock: 0 // Inicia en 0 hasta la primera compra en inventario
            };

            try {
                btn.disabled = true;
                btn.innerText = "SINCRONIZANDO...";
                
                await guardarProductoJaddy(datos);
                
                // Limpieza
                document.getElementById('formProducto').reset();
                cerrarModalProducto();
                
            } catch (error) {
                console.error(error);
                alert("Error al conectar con Jaddy INC Cloud");
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR PRODUCTO";
            }
        });
    </script>

    <script>
        function abrirModalProducto() { document.getElementById('modalProducto').classList.add('active'); }
        function cerrarModalProducto() { document.getElementById('modalProducto').classList.remove('active'); }
    </script>
</body>
</html>
