<body class="p-4 pb-24">

    <!-- Modal de Edición -->
    <div id="editModal">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black uppercase tracking-tighter">Editar <span class="text-gold">Producto</span></h2>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>

            <form id="formEdit" class="space-y-4">
                <input type="hidden" id="editId">

                    <input type="text" id="editCodigo" placeholder="CÓD" class="input-field" required>

                    <input type="number" step="0.01" id="editCredito" placeholder="CRÉDITO $" class="input-field text-blue-400">

                <button type="submit" id="btnUpdate" class="btn-gold mt-2">Actualizar Cambios</button>
            </form>
        </div>

    <!-- Pantalla de Bloqueo de Seguridad -->
    <div id="blocker">
        <div class="w-12 h-12 border-4 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.4em]">Verificando Acceso Elite...</p>
    </div>

    <header class="flex justify-between items-center py-6 mb-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-gold">JADDY</span></h1>

        </div>
        <!-- Botón de Volver Actualizado -->
        <button onclick="irAlPanel()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gold/10 text-gold border border-gold/30 hover:bg-gold hover:text-black transition-all">
            <i class="fas fa-arrow-left text-xs"></i>
        </button>
    </header>

    <!-- Formulario Principal de Registro -->
    <section class="bg-[#0A0A0A] p-6 rounded-[32px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400 font-bold">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="credito" placeholder="CRÉDITO $" class="input-field text-blue-400">
                <input type="number" step="0.01" id="mayor" placeholder="MAYOR $" class="input-field text-gold font-bold">
            </div>
            <button type="submit" id="btnEnvio" class="btn-gold">Guardar en la Nube</button>
        </form>
    </section>

    <div class="flex justify-between items-center mb-6 px-2">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] flex items-center gap-2">
            <i class="fas fa-database text-gold/40"></i> Inventario Real
        </h2>
        <span id="contador" class="text-[10px] font-bold text-gold bg-gold/10 px-3 py-1 rounded-full border border-gold/20">0 ITEMS</span>
    </div>
    
    <div id="displayLista" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const blocker = document.getElementById('blocker');
        const userEmailLabel = document.getElementById('userEmail');
        const listaDiv = document.getElementById('displayLista');
        const form = document.getElementById('formProd');
        const editModal = document.getElementById('editModal');
        const formEdit = document.getElementById('formEdit');

        let currentUID = null;
        let localProducts = [];

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                currentUID = user.uid;
                userEmailLabel.innerText = "USUARIO: " + user.email.split('@')[0].toUpperCase();
                blocker.style.display = 'none';
                iniciarSincronizacion(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function iniciarSincronizacion(uid) {
            const q = collection(db, 'usuarios', uid, 'productos');
            onSnapshot(q, (snapshot) => {
                localProducts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('contador').innerText = `${localProducts.length} PRODUCTOS`;
                renderizar(localProducts);
            });
        }

        function renderizar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = `<div class="text-center py-20 opacity-20"><i class="fas fa-box-open text-4xl mb-4"></i><p class="text-[10px] font-bold uppercase tracking-widest">Base de datos lista</p></div>`;
                return;
            }
            listaDiv.innerHTML = productos.sort((a,b) => b.creado - a.creado).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[8px] font-black text-gold bg-gold/10 px-2 py-0.5 rounded border border-gold/20">${p.codigo}</span>
                            <h3 class="text-base font-black uppercase text-white mt-2 tracking-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Precio Detal</p>
                            <p class="text-xl font-black text-green-400 tracking-tighter">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-4">
                        <div class="flex gap-4">
                            <div>
                                <p class="text-[8px] text-gray-600 font-bold uppercase">Costo</p>
                                <p class="text-xs font-bold text-white/80">$${(p.costo || 0).toLocaleString()}</p>
                            </div>
                            <div>
                                <p class="text-[8px] text-gray-600 font-bold uppercase">Mayor</p>
                                <p class="text-xs font-bold text-gold">$${(p.precio_mayor || 0).toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${p.id}')" class="w-9 h-9 flex items-center justify-center rounded-xl bg-gold/5 text-gold/40 hover:bg-gold hover:text-black transition-all">
                                <i class="fas fa-edit text-[10px]"></i>
                            </button>
                            <button onclick="borrarProducto('${p.id}')" class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-500/5 text-red-500/40 hover:bg-red-500 hover:text-white transition-all">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Funciones de Edición ---
        window.prepararEdicion = (id) => {
            const p = localProducts.find(prod => prod.id === id);
            if (!p) return;

            document.getElementById('editId').value = p.id;
            document.getElementById('editCodigo').value = p.codigo;
            document.getElementById('editNombre').value = p.nombre;
            document.getElementById('editCosto').value = p.costo;
            document.getElementById('editDetal').value = p.precio_detal;
            document.getElementById('editCredito').value = p.precio_credito;
            document.getElementById('editMayor').value = p.precio_mayor;

            editModal.style.display = 'flex';
        };

        window.cerrarModal = () => { editModal.style.display = 'none'; };

        formEdit.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('btnUpdate');
            btn.disabled = true;

            const nuevosDatos = {
                codigo: document.getElementById('editCodigo').value.toUpperCase().trim(),
                nombre: document.getElementById('editNombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('editCosto').value) || 0,
                precio_detal: parseFloat(document.getElementById('editDetal').value) || 0,
                precio_credito: parseFloat(document.getElementById('editCredito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('editMayor').value) || 0
            };

            try {
                await updateDoc(doc(db, 'usuarios', currentUID, 'productos', id), nuevosDatos);
                cerrarModal();
            } catch (err) {
                alert("Error al actualizar");
            } finally {
                btn.disabled = false;
            }
        };

        // --- Guardar Nuevo ---
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.disabled = true;

            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                creado: Date.now()
            };

            try {
                await addDoc(collection(db, 'usuarios', currentUID, 'productos'), datos);
                form.reset();
                document.getElementById('codigo').focus();
            } catch (err) {
                alert("Error de red");
            } finally {
                btn.disabled = false;
            }
        };

        window.borrarProducto = async (id) => {
            if (confirm("¿Eliminar este producto permanentemente?")) {
                await deleteDoc(doc(db, 'usuarios', currentUID, 'productos', id));
            }
        };

        // Redirección al Index
        window.irAlPanel = () => {
            window.location.href = 'index.html';
        };

        window.cerrarSesion = () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        };
    </script>
</body>
</html>
