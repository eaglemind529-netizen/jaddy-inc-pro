    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .input-field:focus { border-color: var(--gold); outline: none; background: #151515; }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; border-radius: 12px; width: 100%; padding: 16px; text-transform: uppercase; transition: all 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.98); opacity: 0.9; }

        .variant-tag { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        
        #modalVariantes { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0A0A0A; border: 1px solid #222; border-radius: 28px; width: 100%; max-width: 400px; padding: 24px; position: relative; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 pb-10">

    <!-- MODAL DE VARIANTES -->
    <div id="modalVariantes">
        <div class="modal-content shadow-2xl">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-black uppercase tracking-tighter">Gestionar <span class="text-gold">Variantes</span></h2>
                    <p id="targetNombre" class="text-[10px] text-gray-500 font-bold uppercase"></p>
                </div>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            </header>

            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="nuevaVariante" placeholder="MARCA, FRAGANCIA O SABOR" class="input-field flex-1 text-xs">
                    <button id="addVariantBtn" class="bg-white text-black px-4 rounded-xl font-black"><i class="fas fa-plus"></i></button>
                </div>
                
                <div id="listaVariantesModal" class="max-h-40 overflow-y-auto grid grid-cols-2 gap-2 pt-2"></div>

                <button id="saveVariantsBtn" class="btn-gold py-4 text-xs mt-4">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-center py-4 mb-6">
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-[#D4AF37]">JADDY</span></h1>
            <p class="text-[8px] text-gray-500 font-bold tracking-[0.3em] uppercase">Módulos de Élite v2.0</p>
        </div>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-zinc-800 transition-all duration-500"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="NOMBRE DEL PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="credito" placeholder="CRÉDITO $" class="input-field text-blue-400">
                <input type="number" step="0.01" id="mayor" placeholder="MAYOR $" class="input-field text-gold font-bold">
            </div>
            <button type="submit" id="btnEnvio" class="btn-gold">Registrar Producto</button>
        </form>
    </section>

    <div class="mb-4 flex items-center justify-between">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Lista Maestra</h2>
        <span id="contador" class="text-[10px] font-bold text-gold">0 ITEMS</span>
    </div>
    
    <div id="displayLista" class="space-y-3">
        <div class="text-center py-10">
            <i class="fas fa-circle-notch fa-spin text-gold mb-2"></i>
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Sincronizando...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDot = document.getElementById('statusDot');
        const form = document.getElementById('formProd');
        const listaDiv = document.getElementById('displayLista');
        const contador = document.getElementById('contador');

        let userId = null;
        let currentId = null;
        let tempVariants = [];

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                statusDot.style.backgroundColor = "#22c55e";
                statusDot.style.boxShadow = "0 0 15px rgba(34, 197, 94, 0.6)";
                cargarProductos(user.uid);
            }
        });

        function cargarProductos(uid) {
            // RUTA SINCRONIZADA Y PERSISTENTE
            const q = collection(db, 'users', uid, 'productos');
            onSnapshot(q, (snapshot) => {
                const productos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                contador.innerText = `${productos.length} ITEMS`;
                dibujar(productos);
            }, (error) => console.error("Error cargando:", error));
        }

        function dibujar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = '<p class="text-center text-gray-700 py-10 font-bold text-xs">NO HAY PRODUCTOS</p>';
                return;
            }
            listaDiv.innerHTML = productos.map(p => `
                <div class="product-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-black text-gold uppercase tracking-widest">${p.codigo || 'S/C'}</span>
                            <h3 class="text-sm font-black uppercase text-white">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 font-bold">DETAL</p>
                            <p class="text-sm font-black text-green-400">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-2 mb-3">
                        ${(p.variantes || []).map(v => `<span class="variant-tag">${v}</span>`).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-white/5">
                        <div class="flex gap-4">
                            <div>
                                <p class="text-[7px] text-gray-500 font-bold uppercase">Mayor</p>
                                <p class="text-[10px] font-bold text-gold">$${(p.precio_mayor || 0).toLocaleString()}</p>
                            </div>
                            <button onclick="abrirVariantes('${p.id}', '${p.nombre}', ${JSON.stringify(p.variantes || []).replace(/"/g, '&quot;')})" class="flex items-center gap-1 text-[10px] font-bold text-gray-400 bg-white/5 px-3 py-1 rounded-full">
                                <i class="fas fa-tags text-gold"></i> VARIANTES
                            </button>
                        </div>
                        <button onclick="eliminarProd('${p.id}', '${p.nombre}')" class="text-red-500/30 hover:text-red-500 transition-colors px-2">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            `).reverse().join('');
        }

        window.abrirVariantes = (id, nombre, variantes) => {
            currentId = id;
            tempVariants = [...variantes];
            document.getElementById('targetNombre').innerText = nombre;
            document.getElementById('modalVariantes').style.display = 'flex';
            renderVariantesModal();
        };

        window.cerrarModal = () => { document.getElementById('modalVariantes').style.display = 'none'; };

        function renderVariantesModal() {
            const container = document.getElementById('listaVariantesModal');
            container.innerHTML = tempVariants.map((v, i) => `
                <div class="bg-[#111] p-2 rounded-lg border border-[#222] flex justify-between items-center">
                    <span class="text-[9px] font-bold uppercase text-gold">${v}</span>
                    <button onclick="quitarVariante(${i})" class="text-red-500 text-[10px] ml-2"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        document.getElementById('addVariantBtn').onclick = () => {
            const input = document.getElementById('nuevaVariante');
            const val = input.value.trim().toUpperCase();
            if(val) {
                tempVariants.push(val);
                input.value = "";
                renderVariantesModal();
            }
        };

        window.quitarVariante = (i) => {
            tempVariants.splice(i, 1);
            renderVariantesModal();
        };

        document.getElementById('saveVariantsBtn').onclick = async () => {
            if(!userId || !currentId) return;
            const btn = document.getElementById('saveVariantsBtn');
            btn.innerText = "GUARDANDO...";
            try {
                const docRef = doc(db, 'users', userId, 'productos', currentId);
                await updateDoc(docRef, { variantes: tempVariants });
                cerrarModal();
            } catch (e) { console.error(e); }
            btn.innerText = "GUARDAR CAMBIOS";
        };

        window.eliminarProd = async (id, nombre) => {
            if (!userId) return;
            if (confirm(`¿ELIMINAR ${nombre}?`)) {
                try {
                    await deleteDoc(doc(db, 'users', userId, 'productos', id));
                } catch (e) { console.error(e); }
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (!userId) return;
            const btn = document.getElementById('btnEnvio');
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                variantes: [],
                fecha: new Date().toISOString()
            };

            try {
                const collRef = collection(db, 'users', userId, 'productos');
                await addDoc(collRef, datos);
                form.reset();
            } catch (error) {
                console.error(error);
            } finally {
                btn.innerText = "REGISTRAR PRODUCTO";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
