<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Producto | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0A0A0A; }
        body { background-color: var(--dark-bg); color: #E5E5E5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-dark { background: #141414 !important; border: 1px solid #333 !important; color: white !important; }
        .input-dark:focus { border-color: var(--gold) !important; outline: none; }

        .btn-gold:active { transform: scale(0.95); opacity: 0.8; }
        .card-product { background: linear-gradient(145deg, #111 0%, #0a0a0a 100%); border: 1px solid #222; border-radius: 28px; margin-bottom: 1.2rem; }
    </style>
</head>
<body class="p-4 pb-28">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl font-bold text-xs uppercase hidden shadow-2xl"></div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8 pt-2">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#111] gold-border text-gold">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="text-right">
                <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">JADDY <span class="text-gold">INC</span></h1>
                <p id="statusTxt" class="text-[8px] text-gray-500 font-bold uppercase tracking-widest italic">DESCONECTADO</p>
            </div>
        </header>

        <!-- Formulario con los campos que quieres -->
        <section class="bg-[#0f0f0f] p-6 rounded-[2.5rem] gold-border mb-10 shadow-2xl">
            <form id="productForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label class="text-[9px] text-gray-500 mb-1 block uppercase font-black">CÓDIGO</label>
                        <input type="text" id="codigo" placeholder="ID-00" class="input-dark w-full p-4 rounded-2xl text-xs font-bold uppercase" required>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[9px] text-gray-500 mb-1 block uppercase font-black">PRODUCTO</label>
                        <input type="text" id="nombre" placeholder="NOMBRE DEL PERFUME" class="input-dark w-full p-4 rounded-2xl text-xs uppercase font-bold" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] text-gray-500 mb-1 block uppercase font-black">COSTO $</label>
                        <input type="number" step="0.01" id="costo" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="text-[9px] text-green-500 mb-1 block uppercase font-black">DETAL $</label>
                        <input type="number" step="0.01" id="precio_detal" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs font-black text-green-400">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] text-blue-400 mb-1 block uppercase font-black">CRÉDITO $</label>
                        <input type="number" step="0.01" id="precio_credito" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs font-bold text-blue-400">
                    </div>
                    <div>
                        <label class="text-[9px] text-gold mb-1 block uppercase font-black">MAYOR $</label>
                        <input type="number" step="0.01" id="precio_mayor" placeholder="0.00" class="input-dark w-full p-4 rounded-2xl text-xs font-bold text-gold">
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs tracking-[0.2em] mt-2 shadow-xl shadow-gold/10">
                    GUARDAR EN SISTEMA
                </button>
            </form>
        </section>

        <!-- Lista de Productos -->
        <div id="productList" class="space-y-4"></div>
    </div>

    <script type="module">
        // IMPORTANTE: El archivo en tu GitHub se llama conexion.js
        import { 
            guardarProductoJaddy, 
            obtenerCatalogoJaddy, 
            auth, 
            onAuthStateChanged,
            db,
            doc,
            updateDoc
        } from './conexion.js';

        const productForm = document.getElementById('productForm');
        const productList = document.getElementById('productList');
        const statusTxt = document.getElementById('statusTxt');
        const saveBtn = document.getElementById('saveBtn');

        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-2xl ${isError ? 'bg-red-600 text-white' : 'bg-gold text-black'}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        // Monitorear conexión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusTxt.innerText = "CONECTADO";
                statusTxt.className = "text-[8px] text-green-500 font-bold uppercase tracking-widest italic";
                // Usar la función de tu captura
                obtenerCatalogoJaddy((lista) => {
                    renderizar(lista);
                });
            } else {
                statusTxt.innerText = "DESCONECTADO";
                statusTxt.className = "text-[8px] text-red-500 font-bold uppercase tracking-widest italic";
            }
        });

        function renderizar(lista) {
            let html = '';
            lista.forEach(p => {
                html += `
                    <div class="card-product p-6 border border-white/5" onclick="cargarEdicion('${p.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[8px] text-gold font-black uppercase mb-1">${p.codigo || 'S/N'}</p>
                                <h3 class="text-sm font-black text-white uppercase">${p.nombre}</h3>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-green-400">$${p.precio_detal || '0'}</p>
                                <p class="text-[7px] text-gray-500 uppercase font-black">DETAL</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            productList.innerHTML = html;
        }

        productForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase(),
                nombre: document.getElementById('nombre').value.toUpperCase(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('precio_detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('precio_credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('precio_mayor').value) || 0
            };

            try {
                if (id) {
                    // Actualizar (usando la colección de tu captura)
                    const docRef = doc(db, 'artifacts', 'jaddy-inc-inventario', 'public', 'data', 'productos_jaddy', id);
                    await updateDoc(docRef, datos);
                    showToast("ACTUALIZADO");
                } else {
                    // Guardar nuevo (usando tu función de captura)
                    await guardarProductoJaddy(datos);
                    showToast("GUARDADO EXITOSO");
                }
                productForm.reset();
                document.getElementById('editId').value = '';
            } catch (error) {
                showToast("ERROR AL GUARDAR", true);
            }
        };

        window.cargarEdicion = (id, data) => {
            document.getElementById('editId').value = id;
            document.getElementById('codigo').value = data.codigo;
            document.getElementById('nombre').value = data.nombre;
            document.getElementById('costo').value = data.costo;
            document.getElementById('precio_detal').value = data.precio_detal;
            document.getElementById('precio_credito').value = data.precio_credito;
            document.getElementById('precio_mayor').value = data.precio_mayor;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>
