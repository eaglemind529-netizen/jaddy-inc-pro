<body class="p-4 pb-10">

    <div id="modalVariantes">
        <div class="modal-content shadow-2xl">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-black uppercase tracking-tighter">Gestionar <span class="text-gold">Variantes</span></h2>

            </div>

    <header class="flex justify-between items-center py-4 mb-6">
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-[#D4AF37]">JADDY</span></h1>
            <div class="flex items-center gap-2">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                <p id="authStatusLabel" class="text-[7px] text-red-500 font-bold tracking-[0.2em] uppercase">VERIFICANDO CUENTA...</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[6px] text-gray-600 font-bold uppercase tracking-widest">Database ID:</p>
            <p id="userIdLabel" class="text-[8px] text-gray-400 font-mono">********</p>
        </div>
    </header>

    <section id="mainForm" class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl opacity-50 pointer-events-none transition-opacity duration-500">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="NOMBRE DEL PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="credito" placeholder="CRÉDITO $" class="input-field text-blue-400">
                <input type="number" step="0.01" id="mayor" placeholder="MAYOR $" class="input-field text-gold font-bold">
            </div>
            <button type="submit" id="btnEnvio" class="btn-gold">Registrar Producto</button>
        </form>
    </section>

    <div class="mb-4 flex items-center justify-between px-2">
        <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest flex items-center gap-2">
            <i class="fas fa-cloud text-gold"></i> Catálogo en la Nube
        </h2>
        <span id="contador" class="text-[9px] font-bold text-gold bg-gold/10 px-2 py-1 rounded-md">-- ITEMS</span>
    </div>
    
    <div id="displayLista" class="space-y-3">
        <div class="text-center py-20">
            <i class="fas fa-spinner fa-spin text-gold text-2xl mb-4"></i>
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.3em]">Sincronizando con Google...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDot = document.getElementById('statusDot');
        const authLabel = document.getElementById('authStatusLabel');
        const userIdLabel = document.getElementById('userIdLabel');
        const mainForm = document.getElementById('mainForm');
        const btnEnvio = document.getElementById('btnEnvio');
        const listaDiv = document.getElementById('displayLista');
        const contador = document.getElementById('contador');

        let userId = null;
        let currentId = null;
        let tempVariants = [];

        // ASEGURAR QUE LA SESIÓN SE MANTENGA ACTIVA
        const startApp = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error crítico de inicio:", error);
                authLabel.innerText = "ERROR DE PERSISTENCIA";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                userIdLabel.innerText = user.uid;
                statusDot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,1)] animate-none";
                authLabel.innerText = "SESIÓN SEGURA ACTIVA";
                authLabel.classList.replace('text-red-500', 'text-green-500');
                
                // Desbloquear Interfaz
                mainForm.classList.remove('opacity-50', 'pointer-events-none');
                
                escucharDatos(user.uid);
            } else {
                userId = null;
                mainForm.classList.add('opacity-50', 'pointer-events-none');
                authLabel.innerText = "RECONECTANDO...";
            }
        });

        function escucharDatos(uid) {
            // RUTA ABSOLUTA: users / [UID] / productos
            const q = collection(db, 'users', uid, 'productos');
            
            onSnapshot(q, (snapshot) => {
                const productos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                contador.innerText = `${productos.length} PRODUCTOS`;
                dibujar(productos);
            }, (error) => {
                console.error("Error de Firestore:", error);
                listaDiv.innerHTML = `<div class="p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-center">
                    <p class="text-red-500 text-[10px] font-black uppercase">Error de Acceso a Nube</p>
                    <p class="text-white/50 text-[8px] mt-1">${error.message}</p>
                </div>`;
            });
        }

        function dibujar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = `
                    <div class="text-center py-16 border-2 border-dashed border-white/5 rounded-[32px]">
                        <i class="fas fa-box-open text-zinc-800 text-3xl mb-4"></i>
                        <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Nube Vacía - Registra tu primer item</p>
                    </div>`;
                return;
            }
            listaDiv.innerHTML = productos.sort((a,b) => b.timestamp - a.timestamp).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-gold text-black text-[7px] font-black px-1.5 py-0.5 rounded">${p.codigo || 'S/C'}</span>
                                <span class="text-[7px] text-gray-500 font-mono">${new Date(p.fecha).toLocaleDateString()}</span>
                            </div>
                            <h3 class="text-sm font-black uppercase text-white tracking-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-500 font-bold uppercase">Detal</p>
                            <p class="text-sm font-black text-green-400">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-3 mb-4">
                        ${(p.variantes || []).length > 0 
                            ? p.variantes.map(v => `<span class="variant-tag">${v}</span>`).join('') 
                            : '<span class="text-[8px] text-zinc-700 italic">Sin variantes</span>'}
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-white/5">
                        <div class="flex gap-4">
                            <div>
                                <p class="text-[7px] text-gray-600 font-black uppercase">Al Mayor</p>
                                <p class="text-[10px] font-black text-gold">$${(p.precio_mayor || 0).toLocaleString()}</p>
                            </div>
                            <button onclick="abrirVariantes('${p.id}', '${p.nombre}', ${JSON.stringify(p.variantes || []).replace(/"/g, '&quot;')})" class="flex items-center gap-2 text-[9px] font-black text-zinc-400 bg-zinc-900 px-3 py-1.5 rounded-xl border border-white/5">
                                <i class="fas fa-plus-circle text-gold"></i> VARIANTES
                            </button>
                        </div>
                        <button onclick="eliminarProd('${p.id}', '${p.nombre}')" class="w-8 h-8 flex items-center justify-center rounded-full bg-red-500/5 text-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ACCIONES GLOBALES
        window.abrirVariantes = (id, nombre, variantes) => {
            currentId = id;
            tempVariants = [...variantes];
            document.getElementById('targetNombre').innerText = nombre;
            document.getElementById('modalVariantes').style.display = 'flex';
            renderVariantesModal();
        };

        window.cerrarModal = () => { document.getElementById('modalVariantes').style.display = 'none'; };

        function renderVariantesModal() {
            const container = document.getElementById('listaVariantesModal');
            container.innerHTML = tempVariants.map((v, i) => `
                <div class="bg-zinc-900 p-2.5 rounded-xl border border-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase text-gold">${v}</span>
                    <button onclick="quitarVariante(${i})" class="text-red-500 p-1"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        document.getElementById('addVariantBtn').onclick = () => {
            const input = document.getElementById('nuevaVariante');
            const val = input.value.trim().toUpperCase();
            if(val) {
                tempVariants.push(val);
                input.value = "";
                renderVariantesModal();
            }
        };

        window.quitarVariante = (i) => {
            tempVariants.splice(i, 1);
            renderVariantesModal();
        };

        document.getElementById('saveVariantsBtn').onclick = async () => {
            if(!userId || !currentId) return;
            const btn = document.getElementById('saveVariantsBtn');
            btn.innerText = "SINCRONIZANDO...";
            try {
                const docRef = doc(db, 'users', userId, 'productos', currentId);
                await updateDoc(docRef, { variantes: tempVariants });
                cerrarModal();
            } catch (e) { alert("Error al guardar variantes"); }
            btn.innerText = "Guardar Cambios";
        };

        window.eliminarProd = async (id, nombre) => {
            if (!userId) return;
            if (confirm(`¿ELIMINAR ${nombre} DEFINITIVAMENTE DE LA NUBE?`)) {
                try {
                    await deleteDoc(doc(db, 'users', userId, 'productos', id));
                } catch (e) { alert("Error al eliminar"); }
            }
        };

        document.getElementById('formProd').onsubmit = async (e) => {
            e.preventDefault();
            if (!userId) {
                alert("No hay conexión segura con tu cuenta.");
                return;
            }
            
            btnEnvio.innerText = "SUBIENDO A GOOGLE...";
            btnEnvio.disabled = true;

            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                variantes: [],
                timestamp: Date.now(),
                fecha: new Date().toISOString()
            };

            try {
                const collRef = collection(db, 'users', userId, 'productos');
                await addDoc(collRef, datos);
                document.getElementById('formProd').reset();
            } catch (error) {
                console.error(error);
                alert("ERROR: No se pudo guardar. Revisa tu internet.");
            } finally {
                btnEnvio.innerText = "Registrar Producto";
                btnEnvio.disabled = false;
            }
        };

        // Iniciar aplicación
        window.onload = startApp;
    </script>
</body>
</html>
