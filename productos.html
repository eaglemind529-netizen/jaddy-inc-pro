```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy INC | Gestión de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --gold-dark: #b8962e; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        
        .input-field { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 16px; 
            padding: 18px; 
            width: 100%; 
            color: white; 
            font-size: 14px; 
            text-transform: uppercase; 
            font-weight: bold; 
            transition: all 0.3s; 
        }
        .input-field:focus { border-color: var(--gold); outline: none; background: #151515; }

        .btn-main { 
            background: var(--gold); 
            color: black; 
            font-weight: 900; 
            border-radius: 18px; 
            width: 100%; 
            padding: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.3s; 
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-main:active { transform: scale(0.97); opacity: 0.8; }
        
        .product-card { 
            background: #0A0A0A; 
            border: 1px solid #1a1a1a; 
            border-radius: 28px; 
            padding: 24px; 
            margin-bottom: 16px; 
            animation: slideUp 0.4s ease-out; 
        }
        
        .modal-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(10px); 
            padding: 20px; 
        }
        .modal-content { 
            background: #0F0F0F; 
            border: 1px solid #222; 
            border-radius: 35px; 
            width: 100%; 
            max-width: 400px; 
            padding: 28px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .variant-tag { 
            background: #151515; 
            border: 1px solid #333; 
            padding: 14px 18px; 
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #loading-screen { 
            position: fixed; 
            inset: 0; 
            background: #050505; 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body class="p-5 pb-28">

    <!-- PANTALLA DE CARGA -->
    <div id="loading-screen">
        <div class="w-10 h-10 border-2 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.5em]">JADDY INC</p>
    </div>

    <!-- MODAL VARIANTES -->
    <div id="variantsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-xl font-black uppercase tracking-tighter text-white">VARIANTES</h2>
                    <p id="varProdName" class="text-[10px] text-gold font-bold uppercase tracking-widest mt-1 opacity-70"></p>
                </div>
                <button onclick="cerrarModalVariantes()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-gray-400 hover:text-white">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>
            
            <!-- Input para añadir -->
            <div class="relative mb-6">
                <input type="text" id="newVariantName" placeholder="TALLA O COLOR" class="input-field !pr-16">
                <button onclick="sumarVarianteALista()" class="absolute right-2 top-2 bottom-2 w-12 bg-zinc-800 text-gold rounded-xl flex items-center justify-center active:bg-gold active:text-black transition-all">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <!-- Lista temporal en el modal -->
            <div id="listaVariantesTemp" class="space-y-2 mb-8 max-height-[300px] overflow-y-auto">
                <!-- Se llena dinámicamente -->
            </div>

            <!-- Botón de Guardado Final -->
            <button id="btnGuardarVariantes" onclick="guardarVariantesEnNube()" class="btn-main !py-4 flex items-center justify-center gap-3">
                <i class="fas fa-cloud-upload-alt"></i>
                GUARDAR CAMBIOS
            </button>
        </div>
    </div>

    <!-- CABECERA -->
    <header class="flex justify-between items-center py-4 mb-6">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none">PRODUCTOS <span class="text-gold">JADDY</span></h1>
            <p id="userEmail" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">CARGANDO SESIÓN...</p>
        </div>
        <button onclick="window.location.href='index.html'" class="w-12 h-12 rounded-2xl bg-zinc-900 border border-zinc-800 text-zinc-400 flex items-center justify-center">
            <i class="fas fa-sign-out-alt rotate-180"></i>
        </button>
    </header>

    <!-- FORMULARIO PRINCIPAL (Exacto a tu imagen) -->
    <section class="product-card gold-border mb-10">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" id="detal" placeholder="DETAL $" class="input-field text-green-500">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="credito" placeholder="CRÉDITO $" class="input-field">
                <input type="number" id="mayor" placeholder="MAYOR $" class="input-field">
            </div>
            <button type="submit" id="btnEnvio" class="btn-main mt-2">GUARDAR EN LA NUBE</button>
        </form>
    </section>

    <!-- LISTADO -->
    <div class="flex justify-between items-center mb-6 px-2">
        <h2 class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.2em] flex items-center gap-2">
            <i class="fas fa-database text-[10px]"></i> INVENTARIO REAL
        </h2>
        <span id="contador" class="text-[10px] font-bold text-white bg-white/5 border border-white/10 px-4 py-1.5 rounded-full">0 PRODUCTOS</span>
    </div>
    
    <div id="displayLista" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUID = null;
        let localProducts = [];
        let activeProductId = null;
        let tempVariants = []; // Lista temporal para el modal

        // AUTH
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                currentUID = user.uid;
                document.getElementById('userEmail').innerText = "USUARIO: " + user.email.split('@')[0].toUpperCase();
                document.getElementById('loading-screen').style.display = 'none';
                iniciarSincronizacion(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function iniciarSincronizacion(uid) {
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), (snapshot) => {
                localProducts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('contador').innerText = `${localProducts.length} PRODUCTOS`;
                renderizar();
            });
        }

        function renderizar() {
            const listaDiv = document.getElementById('displayLista');
            if (localProducts.length === 0) {
                listaDiv.innerHTML = `<div class="text-center py-20 opacity-20 italic text-xs uppercase tracking-widest font-black">No hay productos registrados</div>`;
                return;
            }
            listaDiv.innerHTML = localProducts.sort((a,b) => b.creado - a.creado).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[9px] font-black text-white bg-zinc-800 px-3 py-1 rounded-lg uppercase tracking-widest">${p.codigo || '000'}</span>
                            <h3 class="text-xl font-black uppercase text-white mt-3 tracking-tighter">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-zinc-500 font-black uppercase mb-1">PRECIO DETAL</p>
                            <p class="text-2xl font-black text-green-500 tracking-tighter">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <!-- Chips de variantes (Vista previa) -->
                    <div class="mt-4 flex flex-wrap gap-1.5">
                        ${(p.variantes || []).map(v => `<span class="text-[8px] text-zinc-400 bg-zinc-900 border border-zinc-800 px-2.5 py-1 rounded-md font-bold uppercase">${v}</span>`).join('')}
                    </div>

                    <div class="flex justify-between items-center mt-6 pt-5 border-t border-white/5">
                        <button onclick="abrirModalVariantes('${p.id}')" class="bg-zinc-900 text-white text-[10px] font-black px-5 py-3 rounded-xl border border-zinc-800 flex items-center gap-2 active:bg-white active:text-black transition-all">
                            <i class="fas fa-plus-circle text-gold"></i> VARIANTES
                        </button>
                        <button onclick="borrarProducto('${p.id}')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/5 text-red-500/30">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- REGISTRO DE PRODUCTO ---
        document.getElementById('formProd').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'usuarios', currentUID, 'productos'), {
                    codigo: document.getElementById('codigo').value.toUpperCase(),
                    nombre: document.getElementById('nombre').value.toUpperCase(),
                    costo: parseFloat(document.getElementById('costo').value) || 0,
                    precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                    precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                    precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                    variantes: [],
                    creado: Date.now()
                });
                document.getElementById('formProd').reset();
            } catch (err) { alert("Error al guardar"); } finally { 
                btn.innerHTML = 'GUARDAR EN LA NUBE';
                btn.disabled = false; 
            }
        };

        // --- LÓGICA DE VARIANTES EN EL MODAL ---
        window.abrirModalVariantes = (id) => {
            activeProductId = id;
            const p = localProducts.find(prod => prod.id === id);
            document.getElementById('varProdName').innerText = p.nombre;
            
            // Cargar variantes actuales a la lista temporal
            tempVariants = [...(p.variantes || [])];
            actualizarListaVisualModal();
            
            document.getElementById('variantsModal').style.display = 'flex';
        };

        window.sumarVarianteALista = () => {
            const inp = document.getElementById('newVariantName');
            const val = inp.value.trim().toUpperCase();
            if (!val) return;
            
            if (tempVariants.includes(val)) {
                alert("Ya agregaste esta variante");
                return;
            }

            tempVariants.push(val);
            inp.value = "";
            actualizarListaVisualModal();
        };

        window.quitarVarianteDeLista = (index) => {
            tempVariants.splice(index, 1);
            actualizarListaVisualModal();
        };

        function actualizarListaVisualModal() {
            const contenedor = document.getElementById('listaVariantesTemp');
            if (tempVariants.length === 0) {
                contenedor.innerHTML = `<div class="py-10 text-center opacity-20 text-[10px] font-black uppercase tracking-widest">Sin variantes añadidas</div>`;
                return;
            }
            contenedor.innerHTML = tempVariants.map((v, i) => `
                <div class="variant-tag">
                    <span class="text-sm font-black text-white">${v}</span>
                    <button onclick="quitarVarianteDeLista(${i})" class="text-zinc-600 hover:text-red-500 w-8 h-8">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        window.guardarVariantesEnNube = async () => {
            const btn = document.getElementById('btnGuardarVariantes');
            btn.innerHTML = '<i class="fas fa-sync animate-spin"></i> SINCRONIZANDO...';
            btn.disabled = true;

            try {
                await updateDoc(doc(db, 'usuarios', currentUID, 'productos', activeProductId), {
                    variantes: tempVariants
                });
                cerrarModalVariantes();
            } catch (err) {
                alert("Error al guardar cambios");
            } finally {
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> GUARDAR CAMBIOS';
                btn.disabled = false;
            }
        };

        window.cerrarModalVariantes = () => {
            document.getElementById('variantsModal').style.display = 'none';
            activeProductId = null;
            tempVariants = [];
        };

        window.borrarProducto = async (id) => {
            if (confirm("¿Estás seguro de borrar este producto?")) {
                await deleteDoc(doc(db, 'usuarios', currentUID, 'productos', id));
            }
        };

    </script>
</body>
</html>
