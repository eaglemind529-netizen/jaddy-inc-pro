<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy INC | Productos y Variantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; transition: all 0.3s; }
        .input-field:focus { border-color: var(--gold); outline: none; background: #151515; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; border-radius: 14px; width: 100%; padding: 18px; text-transform: uppercase; transition: all 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.98); }
        
        .variant-tag { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--gold); padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .product-card { background: #0A0A0A; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        
        #editModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 20px; }
        .modal-content { background: #0F0F0F; border: 1px solid #222; border-radius: 32px; width: 100%; max-width: 450px; padding: 24px; overflow-y: auto; max-height: 90vh; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #blocker { position: fixed; inset: 0; background: #050505; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 pb-24">

    <!-- Modal de Edición -->
    <div id="editModal">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black uppercase tracking-tighter">Editar <span class="text-gold">Producto</span></h2>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form id="formEdit" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-3 gap-3">
                    <input type="text" id="editCodigo" placeholder="CÓD" class="input-field" required>
                    <input type="text" id="editNombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" step="0.01" id="editCosto" placeholder="COSTO $" class="input-field">
                    <input type="number" step="0.01" id="editDetal" placeholder="DETAL $" class="input-field text-green-400 font-bold">
                </div>
                
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-black text-gold uppercase mb-3 tracking-widest">Variantes del Producto</p>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="editInpVariante" placeholder="TALLA / COLOR" class="input-field !p-3 !text-xs">
                        <button type="button" onclick="addVarianteEdicion()" class="bg-gold text-black px-4 rounded-xl font-black text-lg">+</button>
                    </div>
                    <div id="editListaVariantes" class="flex flex-wrap gap-2"></div>
                </div>

                <button type="submit" id="btnUpdate" class="btn-gold mt-2">Actualizar Cambios</button>
            </form>
        </div>
    </div>

    <div id="blocker">
        <div class="w-12 h-12 border-4 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.4em]">Acceso Elite...</p>
    </div>

    <header class="flex justify-between items-center py-6 mb-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-gold">JADDY</span></h1>
            <p id="userEmail" class="text-[9px] text-gold font-bold uppercase tracking-widest opacity-60">Sincronizando...</p>
        </div>
        <button onclick="window.location.href='index.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-gold/10 text-gold border border-gold/30">
            <i class="fas fa-arrow-left text-xs"></i>
        </button>
    </header>

    <section class="bg-[#0A0A0A] p-6 rounded-[32px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400 font-bold">
            </div>

            <!-- SECCIÓN DE VARIANTES -->
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[9px] font-black text-gold uppercase tracking-widest italic">Añadir Variantes (Tallas/Colores)</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="inpVariante" placeholder="Ejem: XL o ROJO" class="input-field !p-3 !text-xs">
                    <button type="button" id="btnAddVar" class="bg-gold/20 text-gold border border-gold/30 px-6 rounded-xl font-black transition-all active:scale-90">+</button>
                </div>
                <div id="listaVariantesTemp" class="flex flex-wrap gap-2 mt-3"></div>
            </div>

            <button type="submit" id="btnEnvio" class="btn-gold">Guardar Producto Maestro</button>
        </form>
    </section>

    <div id="displayLista" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUID = null;
        let localProducts = [];
        let variantesTemporales = [];
        let variantesEdicion = [];

        // --- GESTIÓN DE VARIANTES EN FORMULARIO ---
        const inpVar = document.getElementById('inpVariante');
        const listVar = document.getElementById('listaVariantesTemp');
        
        document.getElementById('btnAddVar').onclick = () => {
            const val = inpVar.value.trim().toUpperCase();
            if(val && !variantesTemporales.includes(val)) {
                variantesTemporales.push(val);
                renderVarTags();
                inpVar.value = "";
            }
        };

        function renderVarTags() {
            listVar.innerHTML = variantesTemporales.map((v, i) => `
                <div class="variant-tag">${v} <i class="fas fa-times cursor-pointer opacity-50" onclick="removeVar(${i})"></i></div>
            `).join('');
        }

        window.removeVar = (i) => {
            variantesTemporales.splice(i, 1);
            renderVarTags();
        };

        // --- LÓGICA FIREBASE ---
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                currentUID = user.uid;
                document.getElementById('userEmail').innerText = "ADMIN: " + user.email.split('@')[0].toUpperCase();
                document.getElementById('blocker').style.display = 'none';
                iniciarSincronizacion(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function iniciarSincronizacion(uid) {
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), (snap) => {
                localProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar(localProducts);
            });
        }

        function renderizar(productos) {
            const lista = document.getElementById('displayLista');
            if (productos.length === 0) {
                lista.innerHTML = `<div class="text-center py-20 opacity-20 italic text-xs uppercase font-black tracking-widest">No hay productos</div>`;
                return;
            }
            lista.innerHTML = productos.sort((a,b) => b.creado - a.creado).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[8px] font-black text-gold bg-gold/10 px-2 py-0.5 rounded border border-gold/20">${p.codigo}</span>
                            <h3 class="text-base font-black uppercase text-white mt-2 tracking-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-green-400 tracking-tighter">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-4">
                        ${(p.variantes || ['ESTÁNDAR']).map(v => `<span class="text-[7px] font-bold text-gray-500 border border-white/10 px-2 py-0.5 rounded uppercase">${v}</span>`).join('')}
                    </div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-4">
                        <p class="text-[9px] text-zinc-600 font-bold uppercase">Costo: <span class="text-white">$${(p.costo || 0).toLocaleString()}</span></p>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${p.id}')" class="w-8 h-8 rounded-lg bg-gold/10 text-gold text-[10px]"><i class="fas fa-edit"></i></button>
                            <button onclick="borrarProducto('${p.id}')" class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 text-[10px]"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- ACCIONES FORMULARIO ---
        document.getElementById('formProd').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.disabled = true;
            
            try {
                // Si no hay variantes, se asocia una por defecto "GENERAL"
                const varsFinales = variantesTemporales.length > 0 ? variantesTemporales : ['GENERAL'];

                await addDoc(collection(db, 'usuarios', currentUID, 'productos'), {
                    codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                    nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                    costo: parseFloat(document.getElementById('costo').value) || 0,
                    precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                    variantes: varsFinales,
                    creado: Date.now()
                });
                
                e.target.reset();
                variantesTemporales = [];
                renderVarTags();
            } catch (err) { alert("Error al guardar"); } 
            finally { btn.disabled = false; }
        };

        // --- EDICIÓN ---
        window.prepararEdicion = (id) => {
            const p = localProducts.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('editCodigo').value = p.codigo;
            document.getElementById('editNombre').value = p.nombre;
            document.getElementById('editCosto').value = p.costo;
            document.getElementById('editDetal').value = p.precio_detal;
            variantesEdicion = p.variantes || [];
            renderVarEdicion();
            document.getElementById('editModal').style.display = 'flex';
        };

        window.addVarianteEdicion = () => {
            const val = document.getElementById('editInpVariante').value.trim().toUpperCase();
            if(val && !variantesEdicion.includes(val)) {
                variantesEdicion.push(val);
                renderVarEdicion();
                document.getElementById('editInpVariante').value = "";
            }
        };

        function renderVarEdicion() {
            document.getElementById('editListaVariantes').innerHTML = variantesEdicion.map((v, i) => `
                <div class="variant-tag">${v} <i class="fas fa-times cursor-pointer opacity-50" onclick="removeVarEdicion(${i})"></i></div>
            `).join('');
        }

        window.removeVarEdicion = (i) => {
            variantesEdicion.splice(i, 1);
            renderVarEdicion();
        };

        window.cerrarModal = () => document.getElementById('editModal').style.display = 'none';

        document.getElementById('formEdit').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            try {
                await updateDoc(doc(db, 'usuarios', currentUID, 'productos', id), {
                    codigo: document.getElementById('editCodigo').value.toUpperCase().trim(),
                    nombre: document.getElementById('editNombre').value.toUpperCase().trim(),
                    costo: parseFloat(document.getElementById('editCosto').value) || 0,
                    precio_detal: parseFloat(document.getElementById('editDetal').value) || 0,
                    variantes: variantesEdicion.length > 0 ? variantesEdicion : ['GENERAL']
                });
                cerrarModal();
            } catch (err) { alert("Error"); }
        };

        window.borrarProducto = async (id) => {
            if (confirm("¿Eliminar este producto y todas sus variantes?")) {
                await deleteDoc(doc(db, 'usuarios', currentUID, 'productos', id));
            }
        };
    </script>
</body>
</html>
