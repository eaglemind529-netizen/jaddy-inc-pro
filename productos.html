```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy INC | Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; text-transform: uppercase; }
        .btn-gold { background: #D4AF37; color: black; font-weight: 800; border-radius: 12px; width: 100%; padding: 16px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black italic uppercase">PRODUCTOS <span class="text-[#D4AF37]">JADDY</span></h1>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600"></div>
    </header>

    <section class="bg-[#0A0A0A] p-5 rounded-[24px] border border-white/10 mb-8">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="NOMBRE" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="detal" placeholder="DETAL $" class="input-field text-green-400">
                <input type="number" id="mayor" placeholder="MAYOR $" class="input-field text-[#D4AF37]">
            </div>
            <button type="submit" class="btn-gold">Registrar</button>
        </form>
    </section>

    <div id="displayLista" class="space-y-3">
        <p class="text-center text-gray-600 text-xs uppercase tracking-widest">Cargando productos...</p>
    </div>

    <script type="module">
        // Importación directa y limpia
        import { conectarCerebro, subirProducto, obtenerProductos, auth, onAuthStateChanged } from './conexion.js';

        const statusDot = document.getElementById('statusDot');
        const form = document.getElementById('formProd');
        const listaDiv = document.getElementById('displayLista');

        // Arrancar conexión
        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.style.backgroundColor = "#22c55e"; // VERDE
                obtenerProductos((productos) => {
                    listaDiv.innerHTML = productos.map(p => `
                        <div class="bg-[#0F0F0F] p-4 rounded-2xl border border-white/5">
                            <span class="text-[8px] text-[#D4AF37] font-bold">${p.codigo}</span>
                            <h3 class="font-bold uppercase text-sm">${p.nombre}</h3>
                            <p class="text-green-400 font-bold">$${p.precio_detal || 0}</p>
                        </div>
                    `).join('');
                });
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase(),
                nombre: document.getElementById('nombre').value.toUpperCase(),
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0
            };
            await subirProducto(datos);
            form.reset();
        };
    </script>
</body>
</html>
