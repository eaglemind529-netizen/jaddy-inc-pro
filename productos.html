<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy INC | Productos Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .input-field:focus { border-color: var(--gold); outline: none; background: #151515; }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; border-radius: 12px; width: 100%; padding: 16px; text-transform: uppercase; transition: all 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.98); opacity: 0.9; }
        .product-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 16px; margin-bottom: 12px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 pb-10">

    <header class="flex justify-between items-center py-4 mb-6">
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-[#D4AF37]">JADDY</span></h1>
            <p class="text-[8px] text-gray-500 font-bold tracking-[0.3em] uppercase">Módulos de Élite v2.0</p>
        </div>
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)] transition-all duration-500"></div>
    </header>

    <!-- FORMULARIO DE REGISTRO -->
    <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="NOMBRE DEL PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="credito" placeholder="CRÉDITO $" class="input-field text-blue-400">
                <input type="number" step="0.01" id="mayor" placeholder="MAYOR $" class="input-field text-gold font-bold">
            </div>
            <button type="submit" id="btnEnvio" class="btn-gold">Registrar Producto</button>
        </form>
    </section>

    <!-- LISTA DE PRODUCTOS -->
    <div class="mb-4 flex items-center justify-between">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Lista Maestra</h2>
        <span id="contador" class="text-[10px] font-bold text-gold">0 ITEMS</span>
    </div>
    
    <div id="displayLista" class="space-y-3">
        <div class="text-center py-10">
            <i class="fas fa-circle-notch fa-spin text-gold mb-2"></i>
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Sincronizando con la nube...</p>
        </div>
    </div>

    <!-- TODO EL CEREBRO DE FIREBASE AQUÍ ADENTRO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DIRECTA
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        // INICIALIZACIÓN
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDot = document.getElementById('statusDot');
        const form = document.getElementById('formProd');
        const listaDiv = document.getElementById('displayLista');
        const contador = document.getElementById('contador');

        // FUNCIÓN: CONECTAR
        const iniciarConexion = async () => {
            try {
                await signInAnonymously(auth);
                console.log("Conectado a Jaddy INC Cloud");
            } catch (e) {
                console.error("Error de conexión", e);
            }
        };

        // ESCUCHAR ESTADO DE CONEXIÓN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDot.style.backgroundColor = "#22c55e"; // VERDE
                statusDot.style.boxShadow = "0 0 15px rgba(34, 197, 94, 0.6)";
                cargarProductos();
            } else {
                statusDot.style.backgroundColor = "#dc2626"; // ROJO
            }
        });

        // FUNCIÓN: CARGAR PRODUCTOS EN TIEMPO REAL
        function cargarProductos() {
            const q = query(collection(db, "productos"));
            onSnapshot(q, (snapshot) => {
                const productos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                contador.innerText = `${productos.length} ITEMS`;
                dibujar(productos);
            });
        }

        // FUNCIÓN: DIBUJAR EN PANTALLA
        function dibujar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = '<p class="text-center text-gray-700 py-10 font-bold text-xs">NO HAY PRODUCTOS REGISTRADOS</p>';
                return;
            }

            listaDiv.innerHTML = productos.map(p => `
                <div class="product-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-black text-gold uppercase tracking-widest">${p.codigo || 'S/C'}</span>
                            <h3 class="text-sm font-black uppercase text-white">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 font-bold">DETAL</p>
                            <p class="text-sm font-black text-green-400">$${p.precio_detal || 0}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-4 pt-3 border-t border-white/5">
                        <div class="flex gap-4">
                            <div>
                                <p class="text-[7px] text-gray-500 font-bold uppercase">Mayor</p>
                                <p class="text-[10px] font-bold text-gold">$${p.precio_mayor || 0}</p>
                            </div>
                            <div>
                                <p class="text-[7px] text-gray-500 font-bold uppercase">Crédito</p>
                                <p class="text-[10px] font-bold text-blue-400">$${p.precio_credito || 0}</p>
                            </div>
                        </div>
                        <button onclick="eliminarProd('${p.id}', '${p.nombre}')" class="text-red-500/50 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            `).reverse().join('');
        }

        // FUNCIÓN: ELIMINAR
        window.eliminarProd = async (id, nombre) => {
            if (confirm(`¿ELIMINAR ${nombre}?`)) {
                await deleteDoc(doc(db, "productos", id));
            }
        };

        // EVENTO: GUARDAR
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
                fecha: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "productos"), datos);
                form.reset();
                console.log("Producto guardado con éxito");
            } catch (error) {
                alert("Error al guardar: " + error.message);
            } finally {
                btn.innerText = "REGISTRAR PRODUCTO";
                btn.disabled = false;
            }
        };

        // ARRANCAR
        iniciarConexion();
    </script>
</body>
</html>
