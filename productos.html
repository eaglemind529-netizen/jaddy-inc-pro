```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #1a1a1a; }
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #f9e29c 50%, #996515 100%); }
        .card-producto { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 24px; 
            transition: all 0.2s ease;
        }
        .modal { display: none; }
        .modal.active { display: flex; }
        input { background: #222 !important; color: white !important; border: 1px solid #444 !important; }
        input:focus { border-color: var(--gold) !important; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- Header -->
    <header class="gold-gradient text-black p-5 shadow-2xl sticky top-0 z-50 rounded-b-[2.5rem] flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">JADDY INC</h1>
            <p id="conexion-status" class="text-[9px] uppercase font-bold opacity-60 tracking-widest">Sincronizando...</p>
        </div>
        <button onclick="abrirModal()" class="bg-black text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform">
            <i class="fas fa-plus text-gold"></i>
        </button>
    </header>

    <!-- Contenedor de Productos -->
    <main id="listaProductos" class="p-4 max-w-4xl mx-auto grid grid-cols-1 gap-4">
        <div id="loading" class="flex flex-col items-center justify-center py-20 opacity-30">
            <div class="w-8 h-8 border-4 border-gold border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-xs font-bold uppercase tracking-widest">Buscando productos...</p>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div id="modalProducto" class="modal fixed inset-0 bg-black/95 z-[60] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#111] border border-gold/20 w-full max-w-md rounded-[2.5rem] flex flex-col max-h-[90vh] shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h2 id="modalTitulo" class="text-gold font-black uppercase text-xs tracking-widest">Nueva Entrada</h2>
                <button onclick="cerrarModal()" class="text-white/40 hover:text-white text-3xl">&times;</button>
            </div>
            
            <form id="formProducto" class="p-6 overflow-y-auto space-y-5">
                <input type="hidden" id="editId">
                
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block ml-1">Nombre del Item</label>
                    <input type="text" id="nombre" placeholder="Ej: Alaciado Keratina" class="w-full p-4 rounded-2xl text-sm" required>
                </div>
                
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block ml-1">Código Referencia</label>
                    <input type="text" id="codigo" placeholder="Ej: AL-001" class="w-full p-4 rounded-2xl text-sm">
                </div>
                
                <div class="bg-black/40 p-5 rounded-[2rem] border border-white/5 space-y-4">
                    <p class="text-[10px] text-gold font-black uppercase tracking-tighter italic">Valores ($)</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] text-gray-600 block mb-1">COSTO</label>
                            <input type="number" id="costo" step="0.01" class="w-full p-3 rounded-xl text-center text-sm" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[9px] text-gold block mb-1">P. DETAL</label>
                            <input type="number" id="detal" step="0.01" class="w-full p-3 rounded-xl text-center text-sm border-gold/20" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-600 block mb-1">P. MAYOR</label>
                            <input type="number" id="mayor" step="0.01" class="w-full p-3 rounded-xl text-center text-sm" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-600 block mb-1">P. CRÉDITO</label>
                            <input type="number" id="credito" step="0.01" class="w-full p-3 rounded-xl text-center text-sm" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full gold-gradient text-black font-black py-5 rounded-2xl shadow-xl uppercase text-xs tracking-widest active:scale-95 transition-all">
                    Confirmar Registro
                </button>
            </form>
        </div>
    </div>

    <!-- Navegación Inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50 max-w-4xl mx-auto rounded-t-[2.5rem]">
        <a href="index.html" class="p-3 text-gray-600"><i class="fas fa-home text-xl"></i></a>
        <a href="productos.html" class="p-3 text-gold bg-gold/10 rounded-2xl px-6"><i class="fas fa-box text-xl"></i></a>
        <a href="inventario.html" class="p-3 text-gray-600"><i class="fas fa-list-ul text-xl"></i></a>
    </nav>

    <script type="module">
        import { guardarProductoJaddy, obtenerCatalogoJaddy, db, doc, updateDoc } from './conexion.js';

        let listaLocal = [];

        // Iniciar Escucha de Firebase
        obtenerCatalogoJaddy((productos) => {
            const status = document.getElementById('conexion-status');
            status.innerText = "Catálogo Conectado";
            status.classList.replace('opacity-60', 'text-green-500');
            
            listaLocal = productos;
            renderizar(productos);
        });

        function renderizar(productos) {
            const container = document.getElementById('listaProductos');
            container.innerHTML = '';
            
            if (productos.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-20">
                        <i class="fas fa-box-open text-5xl mb-4"></i>
                        <p class="text-xs font-bold uppercase tracking-[0.3em]">Vaciado</p>
                    </div>`;
                return;
            }

            productos.forEach(p => {
                const div = document.createElement('div');
                div.className = "card-producto p-5 shadow-2xl relative overflow-hidden";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4 items-center">
                            <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center border border-white/5">
                                <i class="fas fa-tag text-gold opacity-40"></i>
                            </div>
                            <div>
                                <h3 class="text-white font-black uppercase text-sm tracking-tighter">${p.nombre}</h3>
                                <div class="flex items-center gap-2">
                                    <span class="text-gold text-[10px] font-bold tracking-widest">${p.codigo || 'S/C'}</span>
                                    <span class="w-1 h-1 bg-white/20 rounded-full"></span>
                                    <span class="text-[9px] text-gray-500 font-bold uppercase">Stock: ${p.stock || 0}</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="editar('${p.id}')" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-gold active:bg-gold/20">
                            <i class="fas fa-pen text-[10px]"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center bg-black/40 p-4 rounded-2xl border border-white/5">
                        <div>
                            <p class="text-[7px] text-gray-600 uppercase font-bold mb-1">Costo</p>
                            <p class="text-[10px] font-bold">$${Number(p.costo || 0).toFixed(2)}</p>
                        </div>
                        <div class="border-x border-white/5">
                            <p class="text-[7px] text-gold uppercase font-bold mb-1">Detal</p>
                            <p class="text-[10px] font-black text-gold">$${Number(p.precioDetal || 0).toFixed(2)}</p>
                        </div>
                        <div class="border-r border-white/5">
                            <p class="text-[7px] text-gray-600 uppercase font-bold mb-1">Mayor</p>
                            <p class="text-[10px] font-bold">$${Number(p.precioMayor || 0).toFixed(2)}</p>
                        </div>
                        <div>
                            <p class="text-[7px] text-gray-600 uppercase font-bold mb-1">Crédito</p>
                            <p class="text-[10px] font-bold">$${Number(p.precioCredito || 0).toFixed(2)}</p>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Acción Guardar/Editar
        document.getElementById('formProducto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('btnSubmit');
            
            const datos = {
                nombre: document.getElementById('nombre').value,
                codigo: document.getElementById('codigo').value,
                costo: parseFloat(document.getElementById('costo').value || 0),
                precioDetal: parseFloat(document.getElementById('detal').value || 0),
                precioMayor: parseFloat(document.getElementById('mayor').value || 0),
                precioCredito: parseFloat(document.getElementById('credito').value || 0)
            };

            try {
                btn.disabled = true;
                btn.innerText = "Sincronizando...";

                if(id) {
                    // Colección productos_jaddy como en conexion.js
                    await updateDoc(doc(db, "productos_jaddy", id), datos);
                } else {
                    await guardarProductoJaddy({...datos, stock: 0});
                }
                cerrarModal();
            } catch (err) {
                alert("Error crítico: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Registro";
            }
        });

        window.editar = (id) => {
            const p = listaLocal.find(x => x.id === id);
            if(!p) return;
            
            document.getElementById('modalTitulo').innerText = "Editar Registro";
            document.getElementById('editId').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('codigo').value = p.codigo || '';
            document.getElementById('costo').value = p.costo || 0;
            document.getElementById('detal').value = p.precioDetal || 0;
            document.getElementById('mayor').value = p.precioMayor || 0;
            document.getElementById('credito').value = p.precioCredito || 0;
            abrirModal();
        };
    </script>
    
    <script>
        function abrirModal() { document.getElementById('modalProducto').classList.add('active'); }
        function cerrarModal() { 
            document.getElementById('modalProducto').classList.remove('active'); 
            document.getElementById('formProducto').reset(); 
            document.getElementById('editId').value = '';
            document.getElementById('modalTitulo').innerText = "Nueva Entrada";
        }
    </script>
</body>
</html>

```
