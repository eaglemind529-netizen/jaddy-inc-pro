<script type="module">
    // Cambiamos './conexion.js' por solo 'conexion.js' o la ruta completa para engañar al bloqueo
    import { conectarCerebro, subirProducto, obtenerProductos, auth, onAuthStateChanged, db } from './conexion.js?v=1';
    import { doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const statusDot = document.getElementById('statusDot');
    const form = document.getElementById('formProd');
    const listaDiv = document.getElementById('displayLista');
    const prodIdInput = document.getElementById('prodId');

    // Intentar conectar
    conectarCerebro();

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // CAMBIO VISUAL: Si conecta, se pone verde
            statusDot.style.backgroundColor = "#22c55e";
            obtenerProductos((productos) => { dibujar(productos); });
        } else {
            statusDot.style.backgroundColor = "#dc2626";
        }
    });

    // Función para pintar los productos en pantalla
    function dibujar(productos) {
        if(!listaDiv) return;
        listaDiv.innerHTML = productos.map(p => `
            <div class="product-card" style="background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 16px; margin-bottom: 12px;">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span style="color: #D4AF37; font-size: 8px; font-weight: 900;">${p.codigo || 'S/C'}</span>
                        <h3 style="text-transform: uppercase; font-size: 14px; font-weight: 900;">${p.nombre}</h3>
                    </div>
                    <p style="color: #4ade80; font-weight: 900; font-size: 12px;">$${p.precio_detal || 0}</p>
                </div>
            </div>
        `).join('');
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const datos = {
            codigo: document.getElementById('codigo').value.toUpperCase(),
            nombre: document.getElementById('nombre').value.toUpperCase(),
            costo: parseFloat(document.getElementById('costo').value) || 0,
            precio_detal: parseFloat(document.getElementById('detal').value) || 0,
            precio_credito: parseFloat(document.getElementById('credito').value) || 0,
            precio_mayor: parseFloat(document.getElementById('mayor').value) || 0,
            variantes: []
        };
        const exito = await subirProducto(datos);
        if(exito) { form.reset(); alert("¡Perfume Guardado!"); }
    };
</script>
