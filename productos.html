
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy INC | Gestión de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px; width: 100%; color: white; font-size: 14px; text-transform: uppercase; font-weight: bold; transition: all 0.3s; }
        .input-field:focus { border-color: var(--gold); outline: none; background: #151515; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; border-radius: 14px; width: 100%; padding: 18px; text-transform: uppercase; transition: all 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.98); }
        
        .product-card { background: #0A0A0A; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
        .modal-content { background: #0F0F0F; border: 1px solid #222; border-radius: 32px; width: 100%; max-width: 450px; padding: 24px; max-height: 85vh; overflow-y: auto; }

        .variant-pill { background: #151515; border: 1px solid #333; padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #blocker { position: fixed; inset: 0; background: #050505; z-index: 1100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="p-4 pb-24">

    <!-- Modal de Edición de Producto -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black uppercase tracking-tighter">Editar <span class="text-gold">Producto</span></h2>
                <button onclick="cerrarModal('editModal')" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form id="formEdit" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-3 gap-3">
                    <input type="text" id="editCodigo" placeholder="CÓD" class="input-field" required>
                    <input type="text" id="editNombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" step="0.01" id="editCosto" placeholder="COSTO $" class="input-field">
                    <input type="number" step="0.01" id="editDetal" placeholder="DETAL $" class="input-field text-green-400 font-bold">
                </div>
                <button type="submit" id="btnUpdate" class="btn-gold mt-2">Actualizar Datos</button>
            </form>
        </div>
    </div>

    <!-- Modal de Gestión de Variantes -->
    <div id="variantsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-black uppercase tracking-tighter text-gold">Variantes</h2>
                    <p id="varProdName" class="text-[10px] text-gray-500 font-bold uppercase"></p>
                </div>
                <button onclick="cerrarModal('variantsModal')" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="newVariantName" placeholder="TALLA O COLOR" class="input-field !py-3">
                <button onclick="agregarVariante()" class="bg-gold text-black px-6 rounded-xl font-black transition-all active:scale-95">+</button>
            </div>

            <div id="listaVariantesModal" class="space-y-2">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Pantalla de Carga -->
    <div id="blocker">
        <div class="w-12 h-12 border-4 border-gold/20 border-t-gold rounded-full animate-spin mb-4"></div>
        <p class="text-gold text-[10px] font-black uppercase tracking-[0.4em]">Acceso Elite...</p>
    </div>

    <header class="flex justify-between items-center py-6 mb-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">PRODUCTOS <span class="text-gold">JADDY</span></h1>
            <p id="userEmail" class="text-[9px] text-gold font-bold uppercase tracking-widest opacity-60">Sincronizando...</p>
        </div>
        <button onclick="window.location.href='index.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-gold/10 text-gold border border-gold/30 hover:bg-gold hover:text-black transition-all">
            <i class="fas fa-arrow-left text-xs"></i>
        </button>
    </header>

    <!-- Formulario de Creación de Producto -->
    <section class="bg-[#0A0A0A] p-6 rounded-[32px] gold-border mb-8 shadow-2xl">
        <form id="formProd" class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <input type="text" id="codigo" placeholder="CÓD" class="input-field" required>
                <input type="text" id="nombre" placeholder="PRODUCTO" class="col-span-2 input-field" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" step="0.01" id="costo" placeholder="COSTO $" class="input-field">
                <input type="number" step="0.01" id="detal" placeholder="DETAL $" class="input-field text-green-400 font-bold">
            </div>
            <button type="submit" id="btnEnvio" class="btn-gold">Registrar Producto</button>
        </form>
    </section>

    <div class="flex justify-between items-center mb-6 px-2">
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Listado de Productos</h2>
        <span id="contador" class="text-[10px] font-bold text-gold bg-gold/10 px-3 py-1 rounded-full border border-gold/20">0 ITEMS</span>
    </div>
    
    <div id="displayLista" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const blocker = document.getElementById('blocker');
        const userEmailLabel = document.getElementById('userEmail');
        const listaDiv = document.getElementById('displayLista');
        const form = document.getElementById('formProd');

        let currentUID = null;
        let localProducts = [];
        let activeProductId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                currentUID = user.uid;
                userEmailLabel.innerText = "USUARIO: " + user.email.split('@')[0].toUpperCase();
                blocker.style.opacity = '0';
                setTimeout(() => blocker.style.display = 'none', 500);
                iniciarSincronizacion(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function iniciarSincronizacion(uid) {
            onSnapshot(collection(db, 'usuarios', uid, 'productos'), (snapshot) => {
                localProducts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('contador').innerText = `${localProducts.length} ITEMS`;
                renderizar(localProducts);
                
                // Si el modal de variantes está abierto, refrescar su contenido
                if (activeProductId) {
                    actualizarListaVariantesModal();
                }
            });
        }

        function renderizar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = `<div class="text-center py-20 opacity-20 italic text-xs">Inventario vacío</div>`;
                return;
            }
            listaDiv.innerHTML = productos.sort((a,b) => b.creado - a.creado).map(p => `
                <div class="product-card gold-border">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-black text-gold bg-gold/10 px-2 py-0.5 rounded border border-gold/20 uppercase tracking-widest">${p.codigo}</span>
                            <h3 class="text-base font-black uppercase text-white mt-2 tracking-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-green-400 tracking-tighter">$${(p.precio_detal || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex flex-wrap gap-1">
                        ${(p.variantes || []).slice(0, 5).map(v => `<span class="text-[7px] text-zinc-500 border border-zinc-800 px-2 py-0.5 rounded uppercase font-bold">${v}</span>`).join('')}
                        ${(p.variantes || []).length > 5 ? `<span class="text-[7px] text-gold font-bold">...</span>` : ''}
                    </div>

                    <div class="flex justify-between items-center border-t border-white/5 pt-4 mt-4">
                        <button onclick="abrirVariantes('${p.id}')" class="bg-gold/5 text-gold text-[9px] font-black px-4 py-2 rounded-xl border border-gold/20 flex items-center gap-2 hover:bg-gold hover:text-black transition-all">
                            <i class="fas fa-layer-group"></i> VARIANTES
                        </button>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${p.id}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-zinc-900 text-zinc-500 hover:text-gold transition-colors">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="borrarProducto('${p.id}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-zinc-900 text-zinc-500 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- GESTIÓN DE PRODUCTO ---
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.disabled = true;
            try {
                await addDoc(collection(db, 'usuarios', currentUID, 'productos'), {
                    codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                    nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                    costo: parseFloat(document.getElementById('costo').value) || 0,
                    precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                    variantes: [], // Inicializa vacío
                    creado: Date.now()
                });
                form.reset();
            } catch (err) { alert("Error al guardar"); } finally { btn.disabled = false; }
        };

        window.borrarProducto = async (id) => {
            if (confirm("¿Eliminar producto definitivamente?")) {
                await deleteDoc(doc(db, 'usuarios', currentUID, 'productos', id));
            }
        };

        // --- MODAL EDICIÓN ---
        window.prepararEdicion = (id) => {
            const p = localProducts.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('editCodigo').value = p.codigo;
            document.getElementById('editNombre').value = p.nombre;
            document.getElementById('editCosto').value = p.costo;
            document.getElementById('editDetal').value = p.precio_detal;
            document.getElementById('editModal').style.display = 'flex';
        };

        document.getElementById('formEdit').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            try {
                await updateDoc(doc(db, 'usuarios', currentUID, 'productos', id), {
                    codigo: document.getElementById('editCodigo').value.toUpperCase().trim(),
                    nombre: document.getElementById('editNombre').value.toUpperCase().trim(),
                    costo: parseFloat(document.getElementById('editCosto').value) || 0,
                    precio_detal: parseFloat(document.getElementById('editDetal').value) || 0
                });
                cerrarModal('editModal');
            } catch (err) { alert("Error"); }
        };

        // --- GESTIÓN DE VARIANTES (MODAL) ---
        window.abrirVariantes = (id) => {
            activeProductId = id;
            const p = localProducts.find(prod => prod.id === id);
            document.getElementById('varProdName').innerText = p.nombre;
            actualizarListaVariantesModal();
            document.getElementById('variantsModal').style.display = 'flex';
        };

        window.agregarVariante = async () => {
            const inp = document.getElementById('newVariantName');
            const val = inp.value.trim().toUpperCase();
            if (!val) return;

            const p = localProducts.find(prod => prod.id === activeProductId);
            const nuevasVariantes = [...(p.variantes || [])];
            
            if (nuevasVariantes.includes(val)) {
                alert("Esta variante ya existe");
                return;
            }

            nuevasVariantes.push(val);
            await updateDoc(doc(db, 'usuarios', currentUID, 'productos', activeProductId), {
                variantes: nuevasVariantes
            });
            inp.value = "";
        };

        window.eliminarVariante = async (index) => {
            const p = localProducts.find(prod => prod.id === activeProductId);
            const nuevasVariantes = [...(p.variantes || [])];
            nuevasVariantes.splice(index, 1);
            
            await updateDoc(doc(db, 'usuarios', currentUID, 'productos', activeProductId), {
                variantes: nuevasVariantes
            });
        };

        function actualizarListaVariantesModal() {
            const p = localProducts.find(prod => prod.id === activeProductId);
            const contenedor = document.getElementById('listaVariantesModal');
            if (!p.variantes || p.variantes.length === 0) {
                contenedor.innerHTML = `<p class="text-center py-6 text-zinc-600 text-[10px] uppercase font-black tracking-widest">Sin variantes añadidas</p>`;
                return;
            }
            contenedor.innerHTML = p.variantes.map((v, i) => `
                <div class="variant-pill">
                    <span class="text-xs font-black uppercase tracking-tight text-white">${v}</span>
                    <button onclick="eliminarVariante(${i})" class="text-red-500/40 hover:text-red-500 w-8 h-8">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        window.cerrarModal = (id) => {
            document.getElementById(id).style.display = 'none';
            if (id === 'variantsModal') activeProductId = null;
        };

    </script>
</body>
</html>

```
