```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Productos | Jaddy INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .input-field { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px; width: 100%; color: white; font-size: 14px; }
        .input-field:focus { border-color: var(--gold); outline: none; }
        .btn-save { background: var(--gold); color: black; font-weight: 800; border-radius: 12px; width: 100%; padding: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save:disabled { opacity: 0.4; }
        .product-card { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center py-4 mb-6">
            <h1 class="text-xl font-black italic uppercase">PRODUCTOS <span class="text-[#D4AF37]">JADDY</span></h1>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_red]"></div>
        </header>

        <!-- Formulario para Agregar Productos -->
        <section class="bg-[#0A0A0A] p-5 rounded-[24px] gold-border mb-8 shadow-2xl">
            <form id="formProd" class="space-y-4">
                <input type="hidden" id="prodId">
                
                <div class="grid grid-cols-3 gap-3">
                    <input type="text" id="codigo" placeholder="CÓDIGO" class="input-field uppercase font-bold text-xs" required>
                    <input type="text" id="nombre" placeholder="NOMBRE DEL PRODUCTO" class="col-span-2 input-field uppercase font-bold text-xs" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 ml-1 uppercase">Costo $</label>
                        <input type="number" step="0.01" id="costo" placeholder="0.00" class="input-field">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-green-500 ml-1 uppercase">Precio Detal $</label>
                        <input type="number" step="0.01" id="detal" placeholder="0.00" class="input-field text-green-400">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-blue-400 ml-1 uppercase">Precio Crédito $</label>
                        <input type="number" step="0.01" id="credito" placeholder="0.00" class="input-field text-blue-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-[#D4AF37] ml-1 uppercase">Precio Mayor $</label>
                        <input type="number" step="0.01" id="mayor" placeholder="0.00" class="input-field text-[#D4AF37]">
                    </div>
                </div>

                <button type="submit" id="btnEnvio" class="btn-save mt-2 shadow-lg shadow-[#D4AF37]/10">
                    Guardar Producto
                </button>
                <button type="button" id="btnCancel" class="hidden w-full text-center text-gray-500 text-[10px] font-bold uppercase mt-2">Cancelar Edición</button>
            </form>
        </section>

        <!-- Lista de Productos Agregados -->
        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4 ml-2">Productos Registrados</h2>
        <div id="displayLista" class="space-y-3">
            <p class="text-center py-10 opacity-20 text-xs font-bold uppercase italic">Cargando datos...</p>
        </div>
    </div>

    <script type="module">
        import { conectarCerebro, subirProducto, obtenerProductos, auth, onAuthStateChanged } from './conexion.js';

        const form = document.getElementById('formProd');
        const listaDiv = document.getElementById('displayLista');
        const dot = document.getElementById('statusDot');
        const btnEnvio = document.getElementById('btnEnvio');
        const btnCancel = document.getElementById('btnCancel');

        // Iniciar conexión
        conectarCerebro();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                dot.classList.replace('bg-red-600', 'bg-green-500');
                dot.style.boxShadow = "0 0 10px #22c55e";
                
                obtenerProductos((data) => {
                    dibujar(data);
                });
            }
        });

        function dibujar(productos) {
            if (productos.length === 0) {
                listaDiv.innerHTML = '<p class="text-center py-10 opacity-20 text-[10px] font-black uppercase">No hay productos en la lista</p>';
                return;
            }

            listaDiv.innerHTML = productos.map(p => `
                <div class="product-card active:scale-95 transition-transform" onclick="editar('${p.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-black text-[#D4AF37] uppercase tracking-widest">${p.codigo}</span>
                            <h3 class="text-sm font-black uppercase">${p.nombre}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-green-400">$${p.precio_detal || 0}</p>
                            <p class="text-[7px] text-gray-500 font-bold uppercase">DETAL</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            btnEnvio.disabled = true;
            const id = document.getElementById('prodId').value;
            const datos = {
                codigo: document.getElementById('codigo').value.toUpperCase().trim(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio_detal: parseFloat(document.getElementById('detal').value) || 0,
                precio_credito: parseFloat(document.getElementById('credito').value) || 0,
                precio_mayor: parseFloat(document.getElementById('mayor').value) || 0
            };

            try {
                await subirProducto(datos, id || null);
                form.reset();
                limpiar();
            } catch (err) {
                alert("Error al conectar con la base de datos");
            } finally {
                btnEnvio.disabled = false;
            }
        };

        window.editar = (id, p) => {
            document.getElementById('prodId').value = id;
            document.getElementById('codigo').value = p.codigo;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('costo').value = p.costo;
            document.getElementById('detal').value = p.precio_detal;
            document.getElementById('credito').value = p.precio_credito;
            document.getElementById('mayor').value = p.precio_mayor;
            btnEnvio.innerText = "Actualizar Producto";
            btnCancel.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        btnCancel.onclick = limpiar;

        function limpiar() {
            document.getElementById('prodId').value = "";
            form.reset();
            btnEnvio.innerText = "Guardar Producto";
            btnCancel.classList.add('hidden');
        }
    </script>
</body>
</html>
